ng people forget something embarrassing you did."}, {"id": "pv096", "sent": "The new manager tried to bring about real change in the company's culture.", "pv": "bring about", "opts": ["A: discuss", "B: prevent", "C: cause to happen", "D: propose"], "a": "C", "h": "BRING ABOUT = make something happen, especially a change or improvement."}, {"id": "pv097", "sent": "She broke down in tears when she heard the news.", "pv": "break down", "opts": ["A: became angry", "B: lost control of her emotions", "C: left the room", "D: recovered"], "a": "B", "h": "BREAK DOWN = (of a person) lose control of one's feelings and start crying."}, {"id": "pv098", "sent": "The two old rivals finally broke up their longstanding partnership.", "pv": "break up", "opts": ["A: continued", "B: changed", "C: separated", "D: restructured"], "a": "C", "h": "BREAK UP = end a relationship or partnership."}, {"id": "pv099", "sent": "She asked him out to dinner after months of working together.", "pv": "ask out", "opts": ["A: invited to a professional event", "B: invited on a date", "C: dismissed", "D: consulted"], "a": "B", "h": "ASK OUT = invite someone to go somewhere with you because you are romantically interested in them."}, {"id": "pv100", "sent": "The two houses are joined together but you can barely tell they were brought together by the same architect.", "pv": "bring together", "opts": ["A: demolished", "B: designed as a pair", "C: made to meet and work jointly", "D: purchased"], "a": "C", "h": "BRING TOGETHER = create a situation where people meet and work or socialise with each other."}];
const COL = [{"id": "col001", "prompt": "Which word does NOT collocate with REACH?", "key": "REACH", "opts": ["A: a progress", "B: a conclusion", "C: a decision", "D: an agreement"], "a": "A", "h": "You reach an agreement, a conclusion and a decision — but PROGRESS is uncountable and doesn't take REACH. You 'make progress'."}, {"id": "col002", "prompt": "Which word does NOT collocate with TAKE?", "key": "TAKE", "opts": ["A: into account", "B: an advantage", "C: part in", "D: place"], "a": "B", "h": "You take into account, take part in and take place — but the phrase is TAKE ADVANTAGE OF, not 'take an advantage'."}, {"id": "col003", "prompt": "Which word does NOT collocate with MAKE?", "key": "MAKE", "opts": ["A: a contribution", "B: an effort", "C: a research", "D: an impression"], "a": "C", "h": "You make a contribution, an impression and an effort — but RESEARCH is uncountable. You 'do research' or 'conduct research'."}, {"id": "col004", "prompt": "Which word does NOT collocate with BREAK?", "key": "BREAK", "opts": ["A: a progress", "B: new ground", "C: a tradition", "D: a habit"], "a": "A", "h": "You break new ground, break a habit and break with tradition — but 'break a progress' is not standard. You 'make progress'."}, {"id": "col005", "prompt": "Which word does NOT collocate with HAVE?", "key": "HAVE", "opts": ["A: an impact", "B: authority over", "C: a say", "D: an information"], "a": "D", "h": "You have an impact, have authority over and have a say — but INFORMATION is uncountable. You 'have information' (no article)."}, {"id": "col006", "prompt": "Which word does NOT collocate with COME?", "key": "COME", "opts": ["A: to a conclusion", "B: into effect", "C: to an understanding", "D: to a progress"], "a": "D", "h": "You come to a conclusion, come into effect and come to an understanding — but 'come to a progress' is not standard."}, {"id": "col007", "prompt": "Which word does NOT collocate with CAST?", "key": "CAST", "opts": ["A: doubt on", "B: light on", "C: a shadow over", "D: an evidence on"], "a": "D", "h": "You cast doubt on, cast light on and cast a shadow over — but EVIDENCE is uncountable and doesn't collocate with CAST in this way."}, {"id": "col008", "prompt": "Which word does NOT collocate with DRAW?", "key": "DRAW", "opts": ["A: an inspiration from", "B: attention to", "C: a conclusion", "D: a comparison"], "a": "A", "h": "You draw a conclusion, draw attention to and draw a comparison — but you 'draw inspiration FROM' not 'draw an inspiration from'. INSPIRATION is uncountable here."}, {"id": "col009", "prompt": "Which word does NOT collocate with FACE?", "key": "FACE", "opts": ["A: the consequences", "B: up to a problem", "C: a challenge", "D: an evidence"], "a": "D", "h": "You face the consequences, face up to a problem and face a challenge — but EVIDENCE is uncountable and doesn't collocate with FACE."}, {"id": "col010", "prompt": "Which word does NOT collocate with RAISE?", "key": "RAISE", "opts": ["A: a concern", "B: an information", "C: a question", "D: awareness"], "a": "B", "h": "You raise a concern, raise awareness and raise a question — but INFORMATION is uncountable. You 'provide information'."}, {"id": "col011", "prompt": "Which word does NOT collocate with HOLD?", "key": "HOLD", "opts": ["A: authority over", "B: an evidence", "C: sb in high regard", "D: the view that"], "a": "B", "h": "You hold the view that, hold authority over and hold someone in high regard — but EVIDENCE is uncountable. You 'have evidence'."}, {"id": "col012", "prompt": "Which word does NOT collocate with GIVE?", "key": "GIVE", "opts": ["A: an account of", "B: an information", "C: sb the benefit", "D: rise to"], "a": "B", "h": "You give an account of, give rise to and give someone the benefit of the doubt — but INFORMATION is uncountable. You 'provide information'."}, {"id": "col013", "prompt": "Which word does NOT collocate with BEAR?", "key": "BEAR", "opts": ["A: in mind", "B: the consequences", "C: an evidence", "D: a grudge"], "a": "C", "h": "You bear in mind, bear the consequences and bear a grudge — but EVIDENCE is uncountable. You 'present' or 'provide' evidence."}, {"id": "col014", "prompt": "Which word does NOT collocate with TAKE?", "key": "TAKE", "opts": ["A: the initiative", "B: an evidence", "C: a risk", "D: responsibility for"], "a": "B", "h": "You take the initiative, take responsibility for and take a risk — but EVIDENCE is uncountable. You 'have evidence' or 'find evidence'."}, {"id": "col015", "prompt": "Which word does NOT collocate with PUT?", "key": "PUT", "opts": ["A: an evidence", "B: sb under pressure", "C: forward a proposal", "D: into practice"], "a": "A", "h": "You put into practice, put someone under pressure and put forward a proposal — but EVIDENCE doesn't collocate with PUT in this way."}, {"id": "col016", "prompt": "Which word does NOT collocate with STRIKE?", "key": "STRIKE", "opts": ["A: a balance", "B: a deal", "C: a chord", "D: an impression"], "a": "D", "h": "You strike a balance, strike a deal and strike a chord — but you MAKE an impression, not strike one. 'Strike an impression' is not standard."}, {"id": "col017", "prompt": "Which word does NOT collocate with PLAY?", "key": "PLAY", "opts": ["A: a role in", "B: a progress", "C: a part in", "D: by ear"], "a": "B", "h": "You play a role in, play a part in and play it by ear — but 'play a progress' is not standard. You 'make progress'."}, {"id": "col018", "prompt": "Which word does NOT collocate with SERVE?", "key": "SERVE", "opts": ["A: a purpose", "B: an interest", "C: a sentence", "D: a progress"], "a": "D", "h": "You serve a purpose, serve an interest and serve a sentence — but 'serve a progress' is not standard."}, {"id": "col019", "prompt": "Which word does NOT collocate with LAUNCH?", "key": "LAUNCH", "opts": ["A: an initiative", "B: a campaign", "C: an investigation", "D: an evidence"], "a": "D", "h": "You launch an initiative, a campaign and an investigation — but EVIDENCE is uncountable and doesn't take LAUNCH."}, {"id": "col020", "prompt": "Which word does NOT collocate with ACKNOWLEDGE?", "key": "ACKNOWLEDGE", "opts": ["A: an evidence", "B: the fact that", "C: responsibility", "D: sb's contribution"], "a": "A", "h": "You acknowledge the fact that, acknowledge someone's contribution and acknowledge responsibility — but EVIDENCE is uncountable. You 'acknowledge the evidence'."}, {"id": "col021", "prompt": "Which word does NOT collocate with GAIN?", "key": "GAIN", "opts": ["A: an evidence", "B: the upper hand", "C: sb's trust", "D: an insight into"], "a": "A", "h": "You gain an insight into, gain the upper hand and gain someone's trust — but EVIDENCE is uncountable."}, {"id": "col022", "prompt": "Which word does NOT collocate with REACH?", "key": "REACH", "opts": ["A: your potential", "B: a compromise", "C: an evidence", "D: a consensus"], "a": "C", "h": "You reach your potential, reach a compromise and reach a consensus — but EVIDENCE is uncountable. You 'find' or 'have' evidence."}, {"id": "col023", "prompt": "Which word does NOT collocate with COME?", "key": "COME", "opts": ["A: under fire", "B: as a shock", "C: an evidence", "D: into question"], "a": "C", "h": "You come under fire, come as a shock and come into question — but EVIDENCE doesn't collocate with COME in this way."}, {"id": "col024", "prompt": "Which word does NOT collocate with LOSE?", "key": "LOSE", "opts": ["A: track of", "B: ground", "C: an evidence", "D: sight of"], "a": "C", "h": "You lose track of, lose sight of and lose ground — but EVIDENCE doesn't collocate with LOSE. You 'lack evidence' or 'lose a case' due to lack of evidence."}, {"id": "col025", "prompt": "Which word does NOT collocate with FOLLOW?", "key": "FOLLOW", "opts": ["A: sb's lead", "B: suit", "C: an evidence", "D: a pattern"], "a": "C", "h": "You follow someone's lead, follow suit and follow a pattern — but EVIDENCE doesn't collocate with FOLLOW in standard English."}, {"id": "col026", "prompt": "Which word does NOT collocate with SET?", "key": "SET", "opts": ["A: a precedent", "B: an example", "C: the record straight", "D: an evidence"], "a": "D", "h": "You set a precedent, set an example and set the record straight — but EVIDENCE doesn't collocate with SET."}, {"id": "col027", "prompt": "Which word does NOT collocate with CONDUCT?", "key": "CONDUCT", "opts": ["A: an evidence", "B: an experiment", "C: research", "D: a survey"], "a": "A", "h": "You conduct research, conduct an experiment and conduct a survey — but EVIDENCE is uncountable and doesn't take CONDUCT."}, {"id": "col028", "prompt": "Which word does NOT collocate with HOLD?", "key": "HOLD", "opts": ["A: an evidence", "B: talks", "C: a position", "D: sb accountable"], "a": "A", "h": "You hold someone accountable, hold talks and hold a position — but EVIDENCE is uncountable and doesn't take HOLD in standard collocations."}, {"id": "col029", "prompt": "Which word does NOT collocate with POSE?", "key": "POSE", "opts": ["A: a challenge", "B: an evidence", "C: a risk", "D: a threat"], "a": "B", "h": "You pose a threat, pose a challenge and pose a risk — but EVIDENCE doesn't collocate with POSE."}, {"id": "col030", "prompt": "Which word does NOT collocate with EXPRESS?", "key": "EXPRESS", "opts": ["A: concern", "B: reservations", "C: an evidence", "D: a view"], "a": "C", "h": "You express concern, express a view and express reservations — but EVIDENCE is uncountable and doesn't take EXPRESS."}, {"id": "col031", "prompt": "Which word does NOT collocate with SPARK?", "key": "SPARK", "opts": ["A: controversy", "B: an evidence", "C: interest", "D: debate"], "a": "B", "h": "You spark debate, spark controversy and spark interest — but EVIDENCE is uncountable and doesn't collocate with SPARK."}, {"id": "col032", "prompt": "Which word does NOT collocate with SUSTAIN?", "key": "SUSTAIN", "opts": ["A: an evidence", "B: growth", "C: an argument", "D: interest"], "a": "A", "h": "You sustain growth, sustain interest and sustain an argument — but EVIDENCE is uncountable. You 'have' or 'find' evidence."}, {"id": "col033", "prompt": "Which word does NOT collocate with HIGHLIGHT?", "key": "HIGHLIGHT", "opts": ["A: a problem", "B: the need for", "C: an evidence", "D: a concern"], "a": "C", "h": "You highlight a problem, highlight the need for and highlight a concern — but 'highlight an evidence' is not standard. EVIDENCE is uncountable."}, {"id": "col034", "prompt": "Which word does NOT collocate with PROVIDE?", "key": "PROVIDE", "opts": ["A: a progress", "B: an insight", "C: evidence", "D: an opportunity"], "a": "A", "h": "You provide evidence, provide an insight and provide an opportunity — but 'provide a progress' is not standard. You 'make progress'."}, {"id": "col035", "prompt": "Which word does NOT collocate with ADOPT?", "key": "ADOPT", "opts": ["A: an approach", "B: a policy", "C: a progress", "D: a strategy"], "a": "C", "h": "You adopt an approach, adopt a policy and adopt a strategy — but 'adopt a progress' is not standard. Progress is not adopted."}, {"id": "col036", "prompt": "Which word does NOT collocate with UNDERMINE?", "key": "UNDERMINE", "opts": ["A: confidence", "B: an evidence", "C: a position", "D: authority"], "a": "B", "h": "You undermine confidence, undermine authority and undermine a position — but EVIDENCE is uncountable. You 'undermine the evidence' but not 'undermine an evidence'."}, {"id": "col037", "prompt": "Which word does NOT collocate with TACKLE?", "key": "TACKLE", "opts": ["A: an evidence", "B: a problem", "C: inequality", "D: an issue"], "a": "A", "h": "You tackle a problem, tackle an issue and tackle inequality — but EVIDENCE is uncountable and doesn't collocate with TACKLE."}, {"id": "col038", "prompt": "Which word does NOT collocate with CHALLENGE?", "key": "CHALLENGE", "opts": ["A: authority", "B: the status quo", "C: an evidence", "D: an assumption"], "a": "C", "h": "You challenge an assumption, challenge the status quo and challenge authority — but EVIDENCE is uncountable. You 'challenge the evidence'."}, {"id": "col039", "prompt": "Which word does NOT collocate with JUSTIFY?", "key": "JUSTIFY", "opts": ["A: a decision", "B: an evidence", "C: behaviour", "D: an action"], "a": "B", "h": "You justify a decision, justify an action and justify behaviour — but EVIDENCE is uncountable. You 'use evidence to justify' something."}, {"id": "col040", "prompt": "Which word does NOT collocate with RESOLVE?", "key": "RESOLVE", "opts": ["A: a conflict", "B: an evidence", "C: an issue", "D: a dispute"], "a": "B", "h": "You resolve a conflict, resolve a dispute and resolve an issue — but EVIDENCE is uncountable. You 'examine' or 'review' evidence."}, {"id": "col041", "prompt": "Which word does NOT collocate with ACHIEVE?", "key": "ACHIEVE", "opts": ["A: a breakthrough", "B: an evidence", "C: consensus", "D: a balance"], "a": "B", "h": "You achieve a balance, achieve a breakthrough and achieve consensus — but EVIDENCE is uncountable. You 'gather' or 'find' evidence."}, {"id": "col042", "prompt": "Which word does NOT collocate with GENERATE?", "key": "GENERATE", "opts": ["A: income", "B: debate", "C: an evidence", "D: interest"], "a": "C", "h": "You generate income, generate interest and generate debate — but EVIDENCE is uncountable. You 'generate evidence' (no article) but not 'generate an evidence'."}, {"id": "col043", "prompt": "Which word does NOT collocate with SEEK?", "key": "SEEK", "opts": ["A: clarification", "B: approval", "C: an evidence", "D: asylum"], "a": "C", "h": "You seek clarification, seek approval and seek asylum — but EVIDENCE is uncountable. You 'seek evidence' (no article)."}, {"id": "col044", "prompt": "Which word does NOT collocate with MOUNT?", "key": "MOUNT", "opts": ["A: a challenge", "B: an evidence", "C: pressure", "D: a campaign"], "a": "B", "h": "You mount a campaign, mount a challenge and mount pressure — but EVIDENCE is uncountable. You 'mount an argument' or 'build a case', not 'mount an evidence'."}, {"id": "col045", "prompt": "Which word does NOT collocate with PROMOTE?", "key": "PROMOTE", "opts": ["A: growth", "B: awareness", "C: an evidence", "D: equality"], "a": "C", "h": "You promote equality, promote awareness and promote growth — but EVIDENCE is uncountable and doesn't collocate with PROMOTE."}, {"id": "col046", "prompt": "Which word does NOT collocate with DRAW?", "key": "DRAW", "opts": ["A: a distinction", "B: parallels", "C: an evidence", "D: sb's attention"], "a": "C", "h": "You draw a distinction, draw parallels and draw someone's attention — but EVIDENCE is uncountable. You 'draw on evidence' but not 'draw an evidence'."}, {"id": "col047", "prompt": "Which word does NOT collocate with PURSUE?", "key": "PURSUE", "opts": ["A: a policy", "B: a career", "C: an evidence", "D: an objective"], "a": "C", "h": "You pursue a policy, pursue a career and pursue an objective — but EVIDENCE is uncountable. You 'pursue justice' or 'pursue leads', not 'pursue an evidence'."}, {"id": "col048", "prompt": "Which word does NOT collocate with EXERT?", "key": "EXERT", "opts": ["A: pressure", "B: influence", "C: control", "D: an evidence"], "a": "D", "h": "You exert pressure, exert influence and exert control — but EVIDENCE is uncountable and doesn't collocate with EXERT."}, {"id": "col049", "prompt": "Which word does NOT collocate with IMPOSE?", "key": "IMPOSE", "opts": ["A: restrictions", "B: an evidence", "C: sanctions", "D: a ban"], "a": "B", "h": "You impose restrictions, impose a ban and impose sanctions — but EVIDENCE is uncountable. You 'impose' rules, not evidence."}, {"id": "col050", "prompt": "Which word does NOT collocate with UNDERPIN?", "key": "UNDERPIN", "opts": ["A: an argument", "B: a theory", "C: a policy", "D: an evidence"], "a": "D", "h": "You underpin an argument, underpin a theory and underpin a policy — but EVIDENCE is uncountable. You 'underpin something with evidence', not 'underpin an evidence'."}, {"id": "col051", "prompt": "Which word does NOT collocate with TAKE?", "key": "TAKE", "opts": ["A: into consideration", "B: stock of", "C: the view that", "D: an evidence"], "a": "D", "h": "You take into consideration, take stock of and take the view that — but EVIDENCE is uncountable. You 'consider the evidence' but never 'take an evidence'."}, {"id": "col052", "prompt": "Which word does NOT collocate with STRIKE?", "key": "STRIKE", "opts": ["A: an evidence", "B: a contrast", "C: a note", "D: a pose"], "a": "A", "h": "You strike a note, strike a contrast and strike a pose — but EVIDENCE is uncountable. You never 'strike an evidence'."}, {"id": "col053", "prompt": "Which word does NOT collocate with PUT?", "key": "PUT", "opts": ["A: sth in perspective", "B: sth into context", "C: the case for", "D: an evidence"], "a": "D", "h": "You put something in perspective, put something into context and put the case for — but EVIDENCE is uncountable."}, {"id": "col054", "prompt": "Which word does NOT collocate with RUN?", "key": "RUN", "opts": ["A: the risk of", "B: counter to", "C: a campaign", "D: an evidence"], "a": "D", "h": "You run the risk of, run counter to and run a campaign — but EVIDENCE doesn't collocate with RUN in standard English."}, {"id": "col055", "prompt": "Which word does NOT collocate with REINFORCE?", "key": "REINFORCE", "opts": ["A: a message", "B: a stereotype", "C: an argument", "D: an evidence"], "a": "D", "h": "You reinforce a message, reinforce a stereotype and reinforce an argument — but EVIDENCE is uncountable. You 'use evidence to reinforce' something."}, {"id": "col056", "prompt": "Which word does NOT collocate with SHAPE?", "key": "SHAPE", "opts": ["A: attitudes", "B: an evidence", "C: policy", "D: opinions"], "a": "B", "h": "You shape attitudes, shape opinions and shape policy — but EVIDENCE doesn't collocate with SHAPE."}, {"id": "col057", "prompt": "Which word does NOT collocate with QUESTION?", "key": "QUESTION", "opts": ["A: an assumption", "B: sb's motives", "C: the validity of", "D: an evidence"], "a": "D", "h": "You question an assumption, question someone's motives and question the validity of — but EVIDENCE is uncountable. You 'question the evidence' but not 'question an evidence'."}, {"id": "col058", "prompt": "Which word does NOT collocate with REACH?", "key": "REACH", "opts": ["A: an evidence", "B: maturity", "C: a turning point", "D: a verdict"], "a": "A", "h": "You reach a verdict, reach maturity and reach a turning point — but EVIDENCE is uncountable."}, {"id": "col059", "prompt": "Which word does NOT collocate with BRIDGE?", "key": "BRIDGE", "opts": ["A: an evidence", "B: a divide", "C: differences", "D: a gap"], "a": "A", "h": "You bridge a gap, bridge a divide and bridge differences — but EVIDENCE doesn't collocate with BRIDGE."}, {"id": "col060", "prompt": "Which word does NOT collocate with FUEL?", "key": "FUEL", "opts": ["A: an evidence", "B: speculation", "C: tensions", "D: debate"], "a": "A", "h": "You fuel debate, fuel speculation and fuel tensions — but EVIDENCE is uncountable and doesn't collocate with FUEL."}];
const VOC = [{"id": "voc001", "topic": "Thinking", "def": "To form an opinion about someone or something based on available information, not always accurately.", "opts": ["A: speculate", "B: assess", "C: deduce", "D: assume"], "a": "D", "h": "SPECULATE = think about uncertain possibilities. ASSESS = carefully evaluate. DEDUCE = reason from evidence. Which word means believing something is true without proof or confirmation?"}, {"id": "voc002", "topic": "Thinking", "def": "To think carefully about a question or problem for a long time, especially before making an important decision.", "opts": ["A: contemplate", "B: ponder", "C: deliberate", "D: speculate"], "a": "C", "h": "CONTEMPLATE = think about doing something. PONDER = think carefully. SPECULATE = consider uncertain possibilities. Which word suggests a formal, slow and careful process of thinking, especially in a group?"}, {"id": "voc003", "topic": "Thinking", "def": "A feeling or sense that something is true, based on instinct rather than facts.", "opts": ["A: notion", "B: hunch", "C: paradox", "D: ideology"], "a": "B", "h": "A NOTION is a vague idea. A PARADOX is a contradictory situation. An IDEOLOGY is a system of beliefs. Which word refers to a gut feeling — something you sense without being able to explain why?"}, {"id": "voc004", "topic": "Thinking", "def": "The ability to understand things through feelings and inner sense, rather than logic or evidence.", "opts": ["A: genius", "B: inspiration", "C: intuition", "D: guesswork"], "a": "C", "h": "GENIUS = exceptional intellectual ability. INSPIRATION = a sudden creative idea. GUESSWORK = reaching conclusions without proper evidence. Which word describes an inner knowing that bypasses rational analysis?"}, {"id": "voc005", "topic": "Thinking", "def": "Unlikely to be true, or seeming dishonest or suspicious.", "opts": ["A: naive", "B: cynical", "C: dubious", "D: sceptical"], "a": "C", "h": "NAIVE = lacking experience. CYNICAL = believing people are selfish. SCEPTICAL = questioning or unconvinced. Which word describes something you find hard to believe — it seems questionable or suspect?"}, {"id": "voc006", "topic": "Thinking", "def": "Having doubts about whether something is true or right; not willing to accept claims without evidence.", "opts": ["A: pessimistic", "B: sceptical", "C: prejudiced", "D: cynical"], "a": "B", "h": "PESSIMISTIC = expecting the worst. PREJUDICED = having unfair opinions. CYNICAL = distrustful of people's motives. Which word specifically describes intellectual doubt — questioning claims and wanting proof?"}, {"id": "voc007", "topic": "Thinking", "def": "The process of forming conclusions without using facts, logic or evidence.", "opts": ["A: speculation", "B: guesswork", "C: intuition", "D: presumption"], "a": "B", "h": "SPECULATION = thinking about uncertain future possibilities. PRESUMPTION = assuming something is true without checking. Which of the remaining options implies reaching answers randomly, with no method or evidence?"}, {"id": "voc008", "topic": "Thinking", "def": "An idea or belief, especially one that is not fully developed or thought through.", "opts": ["A: ideology", "B: paradox", "C: notion", "D: dilemma"], "a": "C", "h": "IDEOLOGY = a complete system of political beliefs. PARADOX = a contradictory statement or situation. DILEMMA = a difficult choice. Which word means a vague or general idea that someone has in their mind?"}, {"id": "voc009", "topic": "Change", "def": "To gradually become worse in quality, condition or strength.", "opts": ["A: modify", "B: deteriorate", "C: decay", "D: refine"], "a": "B", "h": "MODIFY = change slightly. DECAY = be destroyed by natural processes. REFINE = improve. Which word specifically describes a gradual worsening or decline in quality or condition?"}, {"id": "voc010", "topic": "Change", "def": "New and advanced; using original ideas or methods that have not been used before.", "opts": ["A: radical", "B: novel", "C: innovative", "D: dynamic"], "a": "C", "h": "RADICAL = extreme and fundamental change. NOVEL = new or unusual. DYNAMIC = always changing and developing. Which word specifically refers to introducing new, creative ideas — often in a product or process?"}, {"id": "voc011", "topic": "Change", "def": "A new idea, method or piece of equipment that is being introduced or used for the first time.", "opts": ["A: reform", "B: revolution", "C: innovation", "D: shift"], "a": "C", "h": "REFORM = systematic improvement of existing systems. REVOLUTION = fundamental and sudden change. SHIFT = a gradual change in opinion or direction. Which word is specifically used for a brand new invention, method or idea?"}, {"id": "voc012", "topic": "Change", "def": "A complete or major change in the way something works or is organised, often happening suddenly.", "opts": ["A: transformation", "B: innovation", "C: modification", "D: revision"], "a": "A", "h": "INNOVATION = a new idea or method. MODIFICATION = a minor change. REVISION = changes to improve a document or plan. Which word emphasises that something has been changed completely — it looks or works entirely differently now?"}, {"id": "voc013", "topic": "Change", "def": "To continue to last for a long time, despite difficulties or the passage of time.", "opts": ["A: persist", "B: maintain", "C: endure", "D: sustain"], "a": "C", "h": "PERSIST = continue doing something in a determined way. MAINTAIN = keep something the same. SUSTAIN = provide conditions for something to continue. Which word specifically emphasises surviving or lasting through hardship over time?"}, {"id": "voc014", "topic": "Change", "def": "A gradual change or development that produces a particular result over time.", "opts": ["A: shift", "B: reform", "C: trend", "D: revolution"], "a": "C", "h": "SHIFT = a change in direction or opinion. REFORM = deliberate improvement of a system. REVOLUTION = sudden and dramatic change. Which word describes a general direction that something is moving in — often in society, fashion or data?"}, {"id": "voc015", "topic": "Time", "def": "If time passes or goes by, this verb is used to describe its passage formally.", "opts": ["A: lapse", "B: elapse", "C: expire", "D: persist"], "a": "B", "h": "LAPSE = stop gradually or fail briefly. EXPIRE = come to an official end. PERSIST = continue for a long time. Which word is the formal, neutral verb used to say that a period of time has passed?"}, {"id": "voc016", "topic": "Time", "def": "Intended to last only until something permanent is available; temporary.", "opts": ["A: contemporary", "B: interim", "C: annual", "D: instantaneous"], "a": "B", "h": "CONTEMPORARY = existing now or at the same time as something. ANNUAL = happening once a year. INSTANTANEOUS = happening immediately. Which word describes an arrangement or role that fills a gap until a permanent solution is found?"}, {"id": "voc017", "topic": "Time", "def": "Happening or existing at the same time as something or someone else.", "opts": ["A: contemporary", "B: chronological", "C: interim", "D: perpetual"], "a": "A", "h": "CHRONOLOGICAL = arranged in the order events happened. INTERIM = temporary. PERPETUAL = never ending. Which word means existing at the same period of time — either now, or at the same time as a historical event?"}, {"id": "voc018", "topic": "Time", "def": "A period of ten years, especially one beginning with a year ending in zero.", "opts": ["A: century", "B: era", "C: decade", "D: duration"], "a": "C", "h": "CENTURY = 100 years. ERA = a long period with a particular character. DURATION = the length of time something lasts. Which word specifically refers to a ten-year period?"}, {"id": "voc019", "topic": "Time", "def": "The length of time during which something continues to happen or exist.", "opts": ["A: interval", "B: frequency", "C: duration", "D: era"], "a": "C", "h": "INTERVAL = a pause between events. FREQUENCY = how often something happens. ERA = a long historical period. Which word answers the question 'how long did it last?' in a neutral, formal way?"}, {"id": "voc020", "topic": "Time", "def": "The number of times that something happens during a particular period of time.", "opts": ["A: interval", "B: frequency", "C: duration", "D: lapse"], "a": "B", "h": "INTERVAL = the time between events. DURATION = how long something lasts. LAPSE = a brief failure or the passing of time. Which word answers 'how often does it happen?'"}, {"id": "voc021", "topic": "Movement", "def": "To move slowly and quietly so as not to be noticed.", "opts": ["A: crawl", "B: drift", "C: creep", "D: dash"], "a": "C", "h": "CRAWL = move on hands and knees. DRIFT = float slowly. DASH = run quickly. Which word describes deliberately quiet, slow movement to avoid detection — like a thief moving through a corridor?"}, {"id": "voc022", "topic": "Movement", "def": "To hold something firmly and tightly, especially because you are afraid or in pain.", "opts": ["A: grasp", "B: clench", "C: clutch", "D: clamber"], "a": "C", "h": "GRASP = hold or seize something firmly. CLENCH = close tightly, usually part of your body. CLAMBER = climb awkwardly. Which word implies holding on tightly out of emotion — fear, desperation, or not wanting to let go?"}, {"id": "voc023", "topic": "Movement", "def": "To run somewhere very quickly because you are in a hurry.", "opts": ["A: rush", "B: sprint", "C: dash", "D: accelerate"], "a": "C", "h": "RUSH = move hurriedly in general. SPRINT = run as fast as possible. ACCELERATE = increase speed. Which verb implies a short, sudden burst of speed to a particular place — often used informally?"}, {"id": "voc024", "topic": "Movement", "def": "To be pushed along slowly and gradually by the movement of air or water.", "opts": ["A: float", "B: drift", "C: glide", "D: flow"], "a": "B", "h": "FLOAT = stay on the surface without sinking. GLIDE = move smoothly and effortlessly. FLOW = move steadily in one direction. Which verb implies passive, aimless movement — carried by current or wind without direction?"}, {"id": "voc025", "topic": "Movement", "def": "To climb something difficult using your hands and feet, often awkwardly.", "opts": ["A: scramble", "B: scale", "C: clamber", "D: crawl"], "a": "C", "h": "SCRAMBLE = move quickly in a confused way. SCALE = climb a high vertical surface. CRAWL = move on all fours low to the ground. Which word emphasises difficulty and awkwardness in climbing — you use all four limbs but it's not elegant?"}, {"id": "voc026", "topic": "Work", "def": "Without a paid job; not currently in employment.", "opts": ["A: unemployed", "B: redundant", "C: retired", "D: dismissed"], "a": "A", "h": "REDUNDANT = specifically lost your job because the role no longer exists. RETIRED = stopped working due to age. Which of the remaining options is the broad, neutral term for anyone currently without paid work?"}, {"id": "voc027", "topic": "Work", "def": "A situation where there is no longer a need for a particular job, and the person doing it loses their position.", "opts": ["A: resignation", "B: retirement", "C: redundancy", "D: dismissal"], "a": "C", "h": "RESIGNATION = choosing to leave a job. RETIREMENT = stopping work at the end of a career. DISMISSAL = being sacked. Which word specifically describes losing a job because the role itself has been eliminated — not due to performance?"}, {"id": "voc028", "topic": "Work", "def": "To continue doing something in a determined way, even when it is difficult.", "opts": ["A: persist", "B: insist", "C: resist", "D: consist"], "a": "A", "h": "INSIST = demand firmly. RESIST = refuse to accept or fight against. CONSIST = be made up of. Which word describes continuing to try despite obstacles or opposition — you don't give up?"}, {"id": "voc029", "topic": "Work", "def": "Relating to a job done for pleasure rather than as a paid career.", "opts": ["A: voluntary", "B: amateur", "C: freelance", "D: casual"], "a": "B", "h": "VOLUNTARY = done without pay, often for charity. FREELANCE = self-employed, working for different companies. CASUAL = irregular, not permanent. Which word describes someone who does an activity for enjoyment and is not paid — the opposite of professional?"}, {"id": "voc030", "topic": "Work", "def": "The activity of buying and selling goods and services, especially internationally.", "opts": ["A: industry", "B: economy", "C: commerce", "D: enterprise"], "a": "C", "h": "INDUSTRY = a particular type of business or manufacturing. ECONOMY = the overall financial system of a country. ENTERPRISE = a business or bold initiative. Which word specifically refers to buying and selling activity, especially trade?"}, {"id": "voc031", "topic": "Technology", "def": "To move information from a larger computer system or the Internet to your own device.", "opts": ["A: upload", "B: transfer", "C: download", "D: access"], "a": "C", "h": "UPLOAD = send from your device to a server or the Internet. TRANSFER = move between locations (neutral). ACCESS = open or use something. Which direction-specific word means pulling data from a remote server onto your local device?"}, {"id": "voc032", "topic": "Technology", "def": "A set of instructions written in code that tell a computer what to do.", "opts": ["A: network", "B: file", "C: program", "D: data"], "a": "C", "h": "NETWORK = interconnected computers. FILE = a set of stored information. DATA = raw information. Which word specifically refers to the coded instructions — the software that runs on a machine?"}, {"id": "voc033", "topic": "Technology", "def": "Simple and at an early stage of development, compared to modern technology.", "opts": ["A: manual", "B: basic", "C: primitive", "D: obsolete"], "a": "C", "h": "MANUAL = operated by a person, not automated. BASIC = simple. OBSOLETE = no longer in use because something better exists. Which word suggests that something belongs to an early, undeveloped stage — like comparing a stone tool to a smartphone?"}, {"id": "voc034", "topic": "Technology", "def": "Accessible via the internet or a computer system; active or available on a network.", "opts": ["A: digital", "B: networked", "C: online", "D: connected"], "a": "C", "h": "DIGITAL = relating to electronic technology in general. NETWORKED = part of a computer network (technical). Which of the remaining words specifically describes being active or accessible via the internet?"}, {"id": "voc035", "topic": "Technology", "def": "Someone whose job is to write the coded instructions that make computer software work.", "opts": ["A: technician", "B: developer", "C: programmer", "D: engineer"], "a": "C", "h": "TECHNICIAN = someone who services equipment. DEVELOPER = a broader term that includes design and management. ENGINEER = someone who designs systems or machines. Which word specifically focuses on writing code — translating logic into a programming language?"}, {"id": "voc036", "topic": "Learning", "def": "Extremely thorough and concentrated, involving a lot of work or study in a short time.", "opts": ["A: rigorous", "B: intensive", "C: demanding", "D: comprehensive"], "a": "B", "h": "RIGOROUS = very careful and strict. DEMANDING = requiring a lot of effort. COMPREHENSIVE = covering everything. Which word specifically describes a course or programme that packs a lot into a short time — often used with language courses?"}, {"id": "voc037", "topic": "Learning", "def": "The subjects that students are taught at school or the content of a particular course.", "opts": ["A: syllabus", "B: curriculum", "C: timetable", "D: programme"], "a": "B", "h": "SYLLABUS = the list of topics for a specific exam or course. TIMETABLE = schedule of when lessons happen. PROGRAMME = general plan of activities. Which word refers to the full range of subjects offered at an educational institution?"}, {"id": "voc038", "topic": "Learning", "def": "Working hard and being careful to do things well and thoroughly.", "opts": ["A: academic", "B: dedicated", "C: conscientious", "D: disciplined"], "a": "C", "h": "ACADEMIC = relating to education or intellectually able. DEDICATED = committed to a cause. DISCIPLINED = controlled and orderly. Which word specifically describes a person's attitude to work — they care deeply about doing it properly and don't cut corners?"}, {"id": "voc039", "topic": "Learning", "def": "To prepare intensively for an exam in a very short period of time.", "opts": ["A: revise", "B: memorise", "C: cram", "D: study"], "a": "C", "h": "REVISE = go over material you have already learned. MEMORISE = commit something to memory deliberately. Which of the remaining words implies rushed, last-minute intensive learning done right before a test?"}, {"id": "voc040", "topic": "Learning", "def": "To take someone else's work or ideas and present them as your own.", "opts": ["A: copy", "B: imitate", "C: plagiarise", "D: reproduce"], "a": "C", "h": "COPY = reproduce something. IMITATE = mimic someone's style. REPRODUCE = make a copy. Which word specifically describes the academic offence of using someone else's intellectual work without credit — considered serious dishonesty?"}, {"id": "voc041", "topic": "Society", "def": "A statement or situation that seems contradictory but may actually be true.", "opts": ["A: dilemma", "B: notion", "C: paradox", "D: ideology"], "a": "C", "h": "DILEMMA = difficult choice between two options. NOTION = a vague idea. IDEOLOGY = a system of political beliefs. Which word describes an apparent contradiction that, on reflection, turns out to make sense — like 'less is more'?"}, {"id": "voc042", "topic": "Society", "def": "A system of ideas and principles forming the basis of an economic or political theory.", "opts": ["A: ideology", "B: paradox", "C: paradigm", "D: doctrine"], "a": "A", "h": "PARADOX = a contradiction. PARADIGM = a typical example or model. DOCTRINE = a specific set of rules or beliefs. Which word is the broadest term for a complete system of political or economic ideas that shapes how people view the world?"}, {"id": "voc043", "topic": "Society", "def": "To treat someone unfairly because of their race, religion or other personal characteristics.", "opts": ["A: persecute", "B: marginalise", "C: discriminate", "D: stereotype"], "a": "C", "h": "PERSECUTE = treat someone very badly because of who they are. MARGINALISE = push someone to the edges of society. STEREOTYPE = make assumptions based on group identity. Which word specifically refers to unfair treatment based on personal characteristics — the verb form of discrimination?"}, {"id": "voc044", "topic": "Society", "def": "Not having much experience of life and tending to trust other people too easily.", "opts": ["A: innocent", "B: naive", "C: gullible", "D: idealistic"], "a": "B", "h": "INNOCENT = not guilty, or not having done anything wrong. GULLIBLE = easily deceived. IDEALISTIC = believing the world should and could be perfect. Which word describes a person who lacks worldly experience and doesn't question what people tell them?"}, {"id": "voc045", "topic": "Society", "def": "To make a careful judgement about the quality, amount or worth of something.", "opts": ["A: evaluate", "B: assess", "C: estimate", "D: calculate"], "a": "B", "h": "EVALUATE = judge the value of. ESTIMATE = approximately calculate. CALCULATE = work out precisely with numbers. Which word is used specifically for a careful, considered judgement — often by a professional or expert — about quality, condition or suitability?"}, {"id": "voc046", "topic": "Change", "def": "To change something, especially a document, law or piece of work, in order to improve or correct it.", "opts": ["A: alter", "B: adapt", "C: amend", "D: modify"], "a": "C", "h": "ALTER = make changes generally. ADAPT = change to fit new conditions. MODIFY = make minor changes. Which word is used specifically for formal, official changes to legal or written documents — like laws or contracts?"}, {"id": "voc047", "topic": "Thinking", "def": "Likely to be true or reasonable; seeming honest and believable.", "opts": ["A: feasible", "B: plausible", "C: credible", "D: probable"], "a": "B", "h": "FEASIBLE = possible or practical. CREDIBLE = deserving trust or belief. PROBABLE = likely to happen. Which word describes an explanation or argument that seems reasonable and could easily be true — even if you can't be certain?"}, {"id": "voc048", "topic": "Technology", "def": "To connect a set of computers together so they can share and exchange information.", "opts": ["A: link", "B: network", "C: synchronise", "D: integrate"], "a": "B", "h": "LINK = connect (general). SYNCHRONISE = make systems work at the same time. INTEGRATE = combine systems together. Which word specifically means creating a system of connected computers — the infrastructure that allows information sharing?"}, {"id": "voc049", "topic": "Time", "def": "Belonging to an earlier period of history, long before modern times.", "opts": ["A: antique", "B: old-fashioned", "C: anachronistic", "D: ancient"], "a": "D", "h": "ANTIQUE = old and valuable as a collector's item. OLD-FASHIONED = no longer modern. ANACHRONISTIC = belonging to the wrong time period. Which word is the straightforward adjective for things that existed a very long time ago — ancient civilisations, ancient history?"}, {"id": "voc050", "topic": "Work", "def": "The process of stopping work permanently, especially at the end of a working life.", "opts": ["A: resignation", "B: redundancy", "C: dismissal", "D: retirement"], "a": "D", "h": "RESIGNATION = choosing to leave a job voluntarily. REDUNDANCY = losing a job because the role no longer exists. DISMISSAL = being sacked. Which word describes the planned end of a working life — typically at an age when you stop working for good?"}];
const IDM = [{"id": "idm001", "idiom": "a drop in the ocean", "sent": "The government's emergency funding, while welcome, was described as _______ given the scale of the crisis.", "opts": ["A: a drop in the ocean", "B: a flash in the pan", "C: a red herring", "D: a double-edged sword"], "a": "A", "h": "Think about something tiny added to something vast — it doesn't change anything. Which idiom means an amount so small it makes no real difference?", "topic": "Amounts & Scale"}, {"id": "idm002", "idiom": "Achilles' heel", "sent": "The CEO was a visionary leader, but her inability to delegate proved to be her _______.", "opts": ["A: saving grace", "B: blind spot", "C: Achilles' heel", "D: bread and butter"], "a": "C", "h": "In Greek myth, Achilles was invincible except for one spot. Which idiom means a single weakness that could bring down an otherwise capable person?", "topic": "Strength & Weakness"}, {"id": "idm003", "idiom": "add fuel to the fire", "sent": "His sarcastic reply only _______ and the argument quickly became far more heated.", "opts": ["A: broke the ice", "B: added fuel to the fire", "C: let the cat out of the bag", "D: threw in the towel"], "a": "B", "h": "Which idiom describes making an already bad or tense situation worse by doing or saying something provocative?", "topic": "Conflict & Tension"}, {"id": "idm004", "idiom": "break the mould", "sent": "Her debut novel _______, combining crime fiction with philosophical essay in a way no one had done before.", "opts": ["A: broke the mould", "B: broke even", "C: spilled the beans", "D: hit the nail on the head"], "a": "A", "h": "A mould is used to make identical copies. Which idiom means doing something completely different from what has always been done — changing the pattern?", "topic": "Innovation & Change"}, {"id": "idm005", "idiom": "bury your head in the sand", "sent": "Management's refusal to acknowledge the financial problems was seen as _______, and shareholders were furious.", "opts": ["A: playing devil's advocate", "B: burying their heads in the sand", "C: sitting on the fence", "D: barking up the wrong tree"], "a": "B", "h": "This idiom comes from the (false) idea that ostriches hide from danger this way. Which phrase means refusing to face an obvious problem?", "topic": "Avoidance & Denial"}, {"id": "idm006", "idiom": "get the wrong end of the stick", "sent": "When I said I was 'done with the project', he thought I was resigning — he had completely _______.", "opts": ["A: missed the boat", "B: put his foot in it", "C: got the wrong end of the stick", "D: jumped to conclusions"], "a": "C", "h": "If you pick up a stick from the wrong end, you hold the dirty or dangerous part. Which idiom means misunderstanding something completely?", "topic": "Understanding"}, {"id": "idm007", "idiom": "come rain or shine", "sent": "He ran five kilometres every morning, _______, and had done so for twenty years without missing a day.", "opts": ["A: sooner or later", "B: by hook or by crook", "C: come rain or shine", "D: from time to time"], "a": "C", "h": "Which idiom means always, regardless of circumstances — used to describe reliable, consistent behaviour that doesn't change with conditions?", "topic": "Reliability"}, {"id": "idm008", "idiom": "on the spur of the moment", "sent": "We hadn't planned to visit Florence at all — we just booked the tickets _______ when we saw a deal online.", "opts": ["A: in the long run", "B: on the spur of the moment", "C: at the drop of a hat", "D: in the nick of time"], "a": "B", "h": "A spur is used to make a horse move instantly. Which idiom means making a sudden, unplanned decision — without stopping to think first?", "topic": "Decisions & Actions"}, {"id": "idm009", "idiom": "at the drop of a hat", "sent": "She was always willing to help — she would drop everything and come over _______ if you called.", "opts": ["A: once in a blue moon", "B: at the drop of a hat", "C: on the spur of the moment", "D: in the nick of time"], "a": "B", "h": "Dropping a hat was once a signal for something to begin immediately. Which idiom means doing something instantly, without any hesitation or prior warning?", "topic": "Decisions & Actions"}, {"id": "idm010", "idiom": "in the nick of time", "sent": "The fire brigade arrived just as the flames reached the top floor — _______, preventing what could have been a catastrophe.", "opts": ["A: in the long run", "B: sooner or later", "C: in the nick of time", "D: at the last minute"], "a": "C", "h": "'Nick' here is an old word for the exact moment. Which idiom means arriving or acting at the last possible moment, just before something bad happens?", "topic": "Time & Timing"}, {"id": "idm011", "idiom": "let sleeping dogs lie", "sent": "I knew my colleague had made the mistake, but since it hadn't caused any damage, I decided to _______.", "opts": ["A: sit on the fence", "B: face the music", "C: let sleeping dogs lie", "D: bite the bullet"], "a": "C", "h": "Waking a sleeping dog risks getting bitten. Which idiom advises leaving a potentially troublesome situation alone rather than reviving it?", "topic": "Avoidance & Denial"}, {"id": "idm012", "idiom": "out of the blue", "sent": "After five years without any contact, she called me _______, wanting to meet for coffee.", "opts": ["A: at a loose end", "B: out of thin air", "C: once in a blue moon", "D: out of the blue"], "a": "D", "h": "'Out of a clear blue sky' — something sudden with no warning. Which idiom describes something that happens unexpectedly, with no connection to what came before?", "topic": "Surprise"}, {"id": "idm013", "idiom": "over the top", "sent": "The ceremony was spectacular, but many guests felt the level of decoration was somewhat _______ for what was essentially a small gathering.", "opts": ["A: over the moon", "B: over the top", "C: out of this world", "D: over and above"], "a": "B", "h": "In military terms, going 'over the top' meant leaving the trenches — a dramatic, extreme action. Which idiom means excessive or exaggerated, more than is needed or appropriate?", "topic": "Excess & Limits"}, {"id": "idm014", "idiom": "put your cards on the table", "sent": "After weeks of difficult negotiations, the union representative finally _______ and revealed exactly what terms they would accept.", "opts": ["A: played their trump card", "B: put their cards on the table", "C: kept their cards close to their chest", "D: changed their tune"], "a": "B", "h": "The opposite of hiding your cards in a game. Which idiom means being completely open and honest about your intentions, plans or position?", "topic": "Honesty & Trust"}, {"id": "idm015", "idiom": "see eye to eye", "sent": "Despite their mutual respect, the two directors rarely _______ on matters of company strategy.", "opts": ["A: saw eye to eye", "B: turned a blind eye", "C: looked the other way", "D: kept an eye on things"], "a": "A", "h": "When two people are face-to-face at the same height, they literally share the same perspective. Which idiom means agreeing with someone or sharing their views?", "topic": "Relationships"}, {"id": "idm016", "idiom": "stick to your guns", "sent": "Despite enormous pressure to revise her conclusions, the scientist _______ and published the original findings.", "opts": ["A: passed the buck", "B: stuck to her guns", "C: bit the bullet", "D: jumped the gun"], "a": "B", "h": "Soldiers were once trained to hold their positions and not retreat. Which idiom means refusing to change your position even when challenged or pressured?", "topic": "Conflict & Tension"}, {"id": "idm017", "idiom": "take stock of", "sent": "After the disastrous launch, the board decided to pause all new projects and _______ the company's situation before proceeding.", "opts": ["A: take stock of", "B: take the reins of", "C: come to terms with", "D: get to grips with"], "a": "A", "h": "A shop owner 'takes stock' by counting inventory. Which idiom means carefully reviewing and assessing your situation before deciding what to do next?", "topic": "Decisions & Actions"}, {"id": "idm018", "idiom": "have a change of heart", "sent": "He was firmly against the proposal at first, but after hearing the data, he _______ and voted in favour.", "opts": ["A: lost heart", "B: had a change of heart", "C: took heart", "D: set his heart on it"], "a": "B", "h": "Which idiom means changing your opinion or decision about something — often moving from opposition to acceptance?", "topic": "Change & Reversal"}, {"id": "idm019", "idiom": "know sth inside out", "sent": "After fifteen years in the industry, she _______ the market and could predict trends months in advance.", "opts": ["A: kept track of", "B: got to the bottom of", "C: knew it inside out", "D: had it down to a fine art"], "a": "C", "h": "To know something from every angle — all the way through, front and back. Which idiom means having complete, thorough knowledge of something?", "topic": "Understanding"}, {"id": "idm020", "idiom": "once in a blue moon", "sent": "Truly original ideas come along _______ — most so-called innovations are refinements of existing ones.", "opts": ["A: at the drop of a hat", "B: once in a blue moon", "C: from time to time", "D: sooner or later"], "a": "B", "h": "A 'blue moon' is a rare astronomical event. Which idiom means very rarely — almost never?", "topic": "Time & Timing"}, {"id": "idm021", "idiom": "speak volumes", "sent": "The empty stadium said more than any official statement could — it _______ about the club's declining popularity.", "opts": ["A: told the story", "B: broke the news", "C: spoke volumes", "D: said it all"], "a": "C", "h": "Which idiom means to express or convey a great deal of information — often about something negative — without words being necessary?", "topic": "Communication"}, {"id": "idm022", "idiom": "ring a bell", "sent": "The name didn't mean anything to me at first, but then it _______ — I had met him briefly at a conference years before.", "opts": ["A: struck a chord", "B: rang a bell", "C: struck me", "D: dawned on me"], "a": "B", "h": "Which idiom means that something sounds familiar — you've heard it or seen it before, though you can't quite place it?", "topic": "Memory & Recognition"}, {"id": "idm023", "idiom": "no rhyme or reason", "sent": "The redundancies seemed to follow _______ — senior staff were let go while new graduates were kept on.", "opts": ["A: no end in sight", "B: no rhyme or reason", "C: no strings attached", "D: no holds barred"], "a": "B", "h": "Rhyme and reason both imply pattern and logic. Which idiom means something lacks any clear logic or rational explanation?", "topic": "Logic & Reason"}, {"id": "idm024", "idiom": "turn over a new leaf", "sent": "After the scandal, the politician promised to _______ and govern with full transparency going forward.", "opts": ["A: clear the air", "B: start from scratch", "C: turn over a new leaf", "D: wipe the slate clean"], "a": "C", "h": "The 'leaf' here is a page — turning it suggests a fresh start. Which idiom means making a genuine change to your behaviour and committing to being better?", "topic": "Change & Reversal"}, {"id": "idm025", "idiom": "under sb's thumb", "sent": "It was clear that despite his title, the chairman was entirely _______ of the major investor and acted on her instructions.", "opts": ["A: in the pocket", "B: at the mercy", "C: under the thumb", "D: in the grip"], "a": "C", "h": "Being pressed under someone's thumb suggests being completely controlled. Which idiom means being dominated or controlled by another person?", "topic": "Power & Control"}, {"id": "idm026", "idiom": "let your hair down", "sent": "The annual conference was a formal affair, but the evening dinner was a chance for delegates to finally _______.", "opts": ["A: turn over a new leaf", "B: let their hair down", "C: come out of their shell", "D: loosen up"], "a": "B", "h": "Historically, formal hairstyles had to be kept up — letting them fall meant relaxing. Which idiom means to relax completely and enjoy yourself, free from usual restraints?", "topic": "Relaxation & Freedom"}, {"id": "idm027", "idiom": "draw the line at", "sent": "She was willing to work extra hours unpaid, but she _______ being expected to work weekends with no notice.", "opts": ["A: drew the line at", "B: put her foot down at", "C: took exception to", "D: had reservations about"], "a": "A", "h": "A line marks a boundary you will not cross. Which idiom means to say firmly that you will not accept or allow something — you have reached your limit?", "topic": "Limits & Boundaries"}, {"id": "idm028", "idiom": "give sth a miss", "sent": "Despite enjoying the annual gala in previous years, this time she decided to _______ and stay home.", "opts": ["A: give it a miss", "B: take a rain check", "C: pass on it", "D: call it off"], "a": "A", "h": "Which idiom means deciding not to do or attend something — often something you could have done but choose to skip?", "topic": "Avoidance & Denial"}, {"id": "idm029", "idiom": "set your heart on", "sent": "Ever since childhood, she had _______ becoming a surgeon, and nothing was going to stop her.", "opts": ["A: put her heart into", "B: set her heart on", "C: taken heart from", "D: followed her heart"], "a": "B", "h": "Which idiom means wanting something so much that you have committed to it emotionally — it's a firm, deep ambition?", "topic": "Ambition & Goals"}, {"id": "idm030", "idiom": "red tape", "sent": "The project was delayed for months because of excessive _______ — every minor decision required forms in triplicate.", "opts": ["A: red tape", "B: fine print", "C: bureaucracy", "D: paper trail"], "a": "A", "h": "From the red ribbon once used to tie official documents. Which idiom specifically refers to excessive official rules, forms and procedures that cause frustrating delays?", "topic": "Bureaucracy & Rules"}, {"id": "idm031", "idiom": "pride of place", "sent": "His grandmother's portrait was given _______ above the fireplace in the main hall.", "opts": ["A: pride of place", "B: pride of position", "C: centre stage", "D: the place of honour"], "a": "A", "h": "Which idiom means being given the most important, visible or central position — used for something that is treated as the most valued item?", "topic": "Status & Importance"}, {"id": "idm032", "idiom": "off the beaten track", "sent": "They preferred holidays _______ — obscure villages in rural regions rather than tourist hotspots.", "opts": ["A: in the middle of nowhere", "B: off the beaten track", "C: out in the sticks", "D: away from the crowds"], "a": "B", "h": "A 'beaten track' is a path worn smooth by many travellers. Which idiom means away from popular tourist routes or densely populated areas?", "topic": "Travel & Place"}, {"id": "idm033", "idiom": "get on like a house on fire", "sent": "Despite having completely different personalities, the two new colleagues immediately _______ and became firm friends.", "opts": ["A: hit it off", "B: saw eye to eye", "C: got on like a house on fire", "D: clicked instantly"], "a": "C", "h": "A house on fire burns rapidly and intensely. Which idiom means becoming friends very quickly and having an excellent, lively relationship?", "topic": "Relationships"}, {"id": "idm034", "idiom": "put sth in perspective", "sent": "Losing the contract was frustrating, but the serious illness of a colleague really _______ our problems.", "opts": ["A: put things in perspective", "B: brought things into focus", "C: made things clear", "D: shed new light on things"], "a": "A", "h": "Which idiom means helping to judge the real importance of something by comparing it with other things — usually showing it is not as serious as it seemed?", "topic": "Perspective"}, {"id": "idm035", "idiom": "be born with a silver spoon in your mouth", "sent": "Unlike many of his colleagues who had worked their way up from nothing, he had quite clearly _______ and had never struggled financially.", "opts": ["A: had everything on a plate", "B: been born with a silver spoon in his mouth", "C: had a head start", "D: been handed everything"], "a": "B", "h": "Silver spoons were once given to wealthy godchildren at christenings. Which idiom means being born into a rich or privileged family — having advantages from birth?", "topic": "Money & Privilege"}, {"id": "idm036", "idiom": "let nature take its course", "sent": "Rather than prescribing antibiotics for the mild infection, the doctor suggested they _______ and see if it cleared up on its own.", "opts": ["A: wait and see", "B: let nature take its course", "C: leave well alone", "D: do nothing"], "a": "B", "h": "Which idiom means allowing something to develop naturally without trying to control or interfere with it?", "topic": "Nature & Process"}, {"id": "idm037", "idiom": "fly off the handle", "sent": "She was usually calm in meetings, so everyone was shocked when she suddenly _______ at the intern's question.", "opts": ["A: flew off the handle", "B: lost the plot", "C: hit the roof", "D: blew a fuse"], "a": "A", "h": "An axe head flying off the handle loses all direction and control. Which idiom means suddenly becoming extremely angry, out of proportion to what has happened?", "topic": "Anger & Emotion"}, {"id": "idm038", "idiom": "recharge your batteries", "sent": "After a demanding three months on tour, the band took two weeks off to _______ before beginning work on their next album.", "opts": ["A: wind down", "B: take stock", "C: recharge their batteries", "D: take a back seat"], "a": "C", "h": "Like an electronic device needing to be plugged in. Which idiom means taking time off to rest and recover your energy after a period of hard work?", "topic": "Work & Energy"}, {"id": "idm039", "idiom": "put two and two together", "sent": "She didn't tell me she was pregnant, but when I saw her turning down wine twice and looking tired, I quickly _______.", "opts": ["A: read between the lines", "B: put two and two together", "C: connected the dots", "D: worked it out"], function shuffle(arr){
  var a=[...arr];
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=a[i];a[i]=a[j];a[j]=tmp;
  }
  return a;
}
const norm    = s => s.toLowerCase().replace(/\s+/g,' ').trim().replace(/['\u2019]/g,"'");
// Split answer string on / to get accepted variants (for P2/P3 with multiple answers)
const getAccepted = (q) => {
  if (q.accept) return q.accept.map(norm); // P4 has explicit accept array
  if (q.a) return q.a.split('/').map(s => norm(s.trim())); // P2/P3 slash-separated
  return [];
};
const lsGet = (k,d) => { try{ var v=JSON.parse(localStorage.getItem(k)); return v!==null&&v!==undefined?v:d; }catch(e){return d;} };
const lsSet = (k,v) => { try{ localStorage.setItem(k,JSON.stringify(v)) }catch{} };
// Get hint text - field is 'h' in P1/P2/P3, 'hint' in P4
const getHint = q => q.h || q.hint || '';


let G = { partId:null, qs:[], idx:0, score:0, done:false, val:'', hint:false, bests:lsGet('c1bests',{}), results:[], streak:0, maxStreak:0 };
var BANK = lsGet('c1bank',{});

function show(id){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

function updateBankBtn(){
  var wrongCount=Object.values(BANK).filter(function(e){return e.wrong;}).length;
  var hintCount=Object.values(BANK).filter(function(e){return !e.wrong&&e.hint;}).length;
  var total=wrongCount+hintCount;
  var btn=document.getElementById('bank-btn');
  var label=document.getElementById('bank-label');
  if(!btn) return;
  if(total>0){
    btn.style.display='flex';
    var parts=[];
    if(wrongCount>0) parts.push(wrongCount+' incorrect');
    if(hintCount>0) parts.push(hintCount+' hint-used');
    label.textContent=parts.join(' · ')+' saved for review';
  } else {
    btn.style.display='none';
  }
}

function startBankReview(filterFn){
  // Look up actual question objects from all pools
  var ALL={};
  [P1,P2,P3,P4,P5,COL,VOC].forEach(function(pool){
    pool.forEach(function(q){ ALL[q.id]=q; });
  });
  var ids=Object.keys(BANK).filter(filterFn||function(){return true;});
  var qs=ids.map(function(id){return ALL[id];}).filter(Boolean);
  if(!qs.length){ alert('No questions found.'); return; }
  // Determine partId from first question (mixed sessions use first part)
  var firstEntry=BANK[ids[0]];
  G.partId=firstEntry?firstEntry.partId:1;
  // For mixed parts, we need to handle rendering — set partId per question
  G.qs=qs.map(function(q){
    var entry=BANK[q.id];
    return Object.assign({},q,{_partId:entry?entry.partId:G.partId});
  });
  G.idx=0; G.score=0; G.done=false; G.val=''; G.hint=false; G.hintUsed=false; G.results=[]; G.streak=0; G.maxStreak=0;
  G.bankMode=true;
  renderQ(); show('s-question');
}

  const p=PARTS.find(x=>x.id===partId), c=`var(${p.c})`;

    }).join('');
    document.getElementById('cntbtns').innerHTML=topicBtns;
  } else {
    var ns=[5,10,20,pool.length].filter(function(n,i,a){return a.indexOf(n)===i&&n<=pool.length;});

      var lbl=n===pool.length?'All '+n+' questions':n+' questions';
      return '<button class="cnt-btn" style="color:'+c+';background:rgba(128,128,128,.08);border-color:rgba(128,128,128,.25)" onclick="startSession('+partId+','+n+')">'+lbl+'</button>';

function startTopicSession(topic){
  var filtered=VOC.filter(function(q){return q.topic===topic;});
  G.partId=7; G.qs=shuffle(filtered);
  G.idx=0; G.score=0; G.done=false; G.val=''; G.hint=false; G.hintUsed=false; G.results=[]; G.streak=0; G.maxStreak=0; G.bankMode=false;
  renderQ(); show('s-question');
}

function startSession(partId,n){
  G.partId=partId;
  var pool=POOLS[partId];
  var SEEN=lsGet('c1seen',{});
  // Weight each question: unseen=4, wrong/hint-used=3, seen-correct-once=2, seen-correct-multiple=1
  var weighted=[];
  pool.forEach(function(q){
    var bankEntry=BANK[q.id];
    var seenCount=SEEN[q.id]||0;
    var w;
    if(bankEntry&&bankEntry.wrong) w=3;        // previously wrong — keep showing
    else if(bankEntry&&bankEntry.hint) w=2;    // correct but needed hint
    else if(seenCount===0) w=4;                // never seen — prioritise
    else if(seenCount===1) w=2;               // seen once correctly
    else w=1;                                  // seen correctly multiple times — rare
    for(var i=0;i<w;i++) weighted.push(q);
  });
  // Shuffle weighted pool, deduplicate preserving order, take n
  var seen={}; var deduped=[];
  shuffle(weighted).forEach(function(q){
    if(!seen[q.id]){seen[q.id]=true;deduped.push(q);}
  });
  G.qs=deduped.slice(0,n);
  G.idx=0; G.score=0; G.done=false; G.val=''; G.hint=false; G.hintUsed=false; G.results=[]; G.streak=0; G.maxStreak=0; G.bankMode=false;
  renderQ(); show('s-question');
}

function renderQ(){
  const q=G.qs[G.idx], effectivePartId=G.bankMode&&q._partId?q._partId:G.partId, p=PARTS.find(x=>x.id===effectivePartId)||PARTS[0], c=`var(${p.c})`;
  const total=G.qs.length, sMax=G.partId===4?G.idx*2:G.idx;
  document.getElementById('pfill').style.cssText=`width:${(G.idx/total)*100}%;background:${c}`;
  document.getElementById('qctr').style.color=c;
  document.getElementById('qctr').textContent=`${G.idx+1}/${total}`;
  document.getElementById('qscr').textContent=`${G.score}/${sMax}`;
  let html='<div class="ptag" style="color:'+c+'">'+(p.label?p.label+' &middot; ':'')+p.name+'</div>';
  var rPart=G.bankMode&&q._partId?q._partId:G.partId;
  if(rPart===1) html+=htmlP1(q);
  else if(rPart===2) html+=htmlP2(q);
  else if(rPart===3) html+=htmlP3(q);
  else if(rPart===4) html+=htmlP4(q);
  else if(rPart===5) html+=htmlP5(q);
  else if(rPart===6) html+=htmlCOL(q);
  else if(rPart===8) html+=htmlIDM(q);
  else html+=htmlVOC(q);
  html+=htmlHint(q);
  document.getElementById('qbody').innerHTML=html;
  document.getElementById('qbody').scrollTop=0;
  renderBot();
  if(G.partId!==1) setTimeout(()=>{const i=document.getElementById('tin');if(i)i.focus();},80);
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function htmlP1(q){
  const pts=q.sent.split('_______');
  return `<div class="sent">${esc(pts[0])}<span class="gap" id="gap">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>${esc(pts[1]||'')}</div>
  <div class="opts">${shuffle(q.opts).map(function(o,i){var lbl=String.fromCharCode(65+i);return `<button class="opt" data-l="${o[0]}" onclick="pickP1('${o[0]}')">${lbl}: ${esc(o.slice(3))}</button>`;}).join('')}</div>`;
}

function htmlP2(q){

  <div class="kbadge"><span class="klabel">KEY WORD</span><span class="kword">${esc(q.key)}</span></div>

  <input class="tin" id="tin" type="text" autocomplete="off" spellcheck="false" placeholder="2\u20135 words including the key word" oninput="G.val=this.value;updTgap()" onkeydown="if(event.key==='Enter'&&G.val.trim())chk()">`;
}

function htmlP5(q){
  // Highlight the phrasal verb within the sentence (handles inflected forms)
  var sentEsc = esc(q.sent);
  var pvParts = q.pv.toLowerCase().split(' ');
  var verb = pvParts[0]; // e.g. 'add', 'blow', 'bring'
  var particles = pvParts.slice(1).join(' '); // e.g. 'up to', 'off'
  // Try exact match first
  var highlighted = sentEsc;
  if(sentEsc.toLowerCase().indexOf(q.pv.toLowerCase()) >= 0){
    highlighted = sentEsc.replace(new RegExp(esc(q.pv).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'i'),
      '<span style="color:var(--p5);font-weight:500;border-bottom:2px solid var(--p5);padding-bottom:1px">$&</span>');
  } else {
    // Find the particle(s) in the sentence and highlight the surrounding verb+particle
    var particlePat = new RegExp('(\\w+(?:n\'t|s|ed|ing|d)?)\\s+('+esc(particles).replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'(?:\\s+\\w+)?)','i');
    highlighted = sentEsc.replace(particlePat,
      '<span style="color:var(--p5);font-weight:500;border-bottom:2px solid var(--p5);padding-bottom:1px">$1 $2</span>');
  }
  return '<div class="sent">'+highlighted+'</div>'
    +'<div class="opts" id="p5opts">'+shuffle(q.opts).map(function(o,i){var lbl=String.fromCharCode(65+i);
      return '<button class="opt" data-l="'+o[0]+'" onclick="pickP5(this.dataset.l)">'+lbl+': '+esc(o.slice(3))+'</button>';
    }).join('')+'</div>';
}

function pickP5(letter){
  if(G.done) return;
  var q=G.qs[G.idx];
  var correct=letter===q.a;
  G.score+=correct?1:0;
  G.done=true;
  G.results.push({idx:G.idx,correct:correct,skipped:false,hint:G.hintUsed});
  if(correct){G.streak++;G.maxStreak=Math.max(G.maxStreak,G.streak);}else{G.streak=0;}
  document.querySelectorAll('.opt').forEach(function(btn){
    btn.disabled=true;
    if(btn.dataset.l===q.a) btn.classList.add('ok');
    else if(btn.dataset.l===letter&&!correct) btn.classList.add('bad');
  });
  if(correct){
    renderBot();
  } else {
    G.hint=true; G.hintUsed=true;
    var hb=document.getElementById('hbox'),hbtn=document.getElementById('hbtn');
    if(hb) hb.style.display='block';
    if(hbtn) hbtn.textContent='Hide hint';
    renderBot();
  }
}
