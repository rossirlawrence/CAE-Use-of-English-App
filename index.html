  {"id": "t042", "orig": "The film was not as good as people had expected.", "key": "FALL", "before": "The film", "after": "expectations.", "ans": "fell short of", "accept": ["fell short of"], "chunk1": "fell short", "chunk2": "of", "p1": "fell short (not fell below/behind)", "p2": "of (preposition \u2014 fell short OF)", "hint": "FALL SHORT OF + noun = fail to meet. 'Not as good as expected' \u2192 'fell short of...'. What preposition follows 'fell short'?"},
  {"id": "t043", "orig": "The holiday was a disappointment \u2014 it wasn't as good as we'd hoped.", "key": "LIVE", "before": "The holiday", "after": "expectations.", "ans": "didn't live up to", "accept": ["didn't live up to", "did not live up to"], "chunk1": "didn't live up", "chunk2": "to", "p1": "didn't live up (phrasal verb)", "p2": "to (preposition \u2014 live up TO)", "hint": "LIVE UP TO + noun = meet expectations. 'Wasn't as good as hoped' \u2192 'didn't live up to...'. What is the object?"},
  {"id": "t044", "orig": "She doesn't mind whether we go by train or bus.", "key": "DIFFERENCE", "before": "It makes", "after": "whether we go.", "ans": "no difference to her", "accept": ["no difference to her"], "chunk1": "no difference", "chunk2": "to her", "p1": "no difference (not any difference)", "p2": "to her (not for her)", "hint": "MAKE NO DIFFERENCE TO: 'doesn't mind' \u2192 'makes no difference to'. The preposition is 'to', not 'for'."},
  {"id": "t045", "orig": "Working night shifts was strange at first, but I've adapted.", "key": "USED", "before": "I have", "after": "night shifts.", "ans": "got used to working", "accept": ["got used to working"], "chunk1": "got used to", "chunk2": "working", "p1": "got used to (become accustomed)", "p2": "working (gerund not work/to work)", "hint": "GOT USED TO + gerund = became accustomed to. 'Adapted' \u2192 'got used to'. 'To' here is a preposition \u2014 it needs a gerund, not an infinitive."},
  {"id": "t046", "orig": "She spent so long working abroad that she lost touch with old friends.", "key": "RESULT", "before": "Spending so long working abroad", "after": "old friends.", "ans": "resulted in her losing touch with", "accept": ["resulted in her losing touch with", "resulted in her losing touch with"], "chunk1": "resulted in her", "chunk2": "losing touch with", "p1": "result in + object + gerund", "p2": "losing touch with (gerund phrase — not 'losing touch of')", "hint": "SPENT SO LONG → RESULTED IN HER LOSING TOUCH WITH. Result in + object + gerund."},
  {"id": "t047", "orig": "He worked so hard that he eventually collapsed from exhaustion.", "key": "RESULT", "before": "His overwork", "after": "from exhaustion.", "ans": "resulted in him collapsing", "accept": ["resulted in him collapsing", "resulted in his collapsing"], "chunk1": "resulted in", "chunk2": "him collapsing", "p1": "resulted in (phrasal verb)", "p2": "him/his collapsing (gerund with possessive/object)", "hint": "RESULT IN + object + gerund: 'worked so hard that he collapsed' \u2192 'resulted in him/his + gerund'. What gerund form do you need?"},
  {"id": "t048", "orig": "No sooner had we sat down than the fire alarm went off.", "key": "IMMEDIATELY", "before": "The fire alarm went off", "after": "down.", "ans": "immediately after we had sat", "accept": ["immediately after we had sat", "immediately after we sat"], "chunk1": "immediately after", "chunk2": "we had sat", "p1": "immediately after (not immediately when)", "p2": "we had sat (past perfect)", "hint": "IMMEDIATELY AFTER + past perfect: 'no sooner had X than Y' \u2192 'immediately after + subject + had + past participle'."},
  {"id": "t049", "orig": "It was only after she arrived home that she noticed her phone was missing.", "key": "NOT", "before": "She did", "after": "she arrived home.", "ans": "not notice until", "accept": ["not notice until", "not notice her phone was missing until"], "chunk1": "not notice", "chunk2": "until", "p1": "not + verb (negation of notice)", "p2": "until (time conjunction replacing 'only after')", "hint": "ONLY AFTER X THAT Y → DID NOT NOTICE UNTIL X. Simple negation + 'until'."},
  {"id": "t050", "orig": "She had barely sat down when the phone rang.", "key": "SOONER", "before": "No sooner had she", "after": "the phone rang.", "ans": "sat down than", "accept": ["sat down than"], "chunk1": "sat down", "chunk2": "than", "p1": "sat down (past participle after 'had she')", "p2": "than (not when — critical: no sooner...than)", "hint": "BARELY SAT DOWN WHEN → NO SOONER HAD SHE SAT DOWN THAN. Critical: 'than' not 'when'."},
  {"id": "t051", "orig": "I would prefer you not to mention this to anyone.", "key": "RATHER", "before": "I would rather you", "after": "this to anyone.", "ans": "didn't mention", "accept": ["didn't mention", "did not mention"], "chunk1": "didn't", "chunk2": "mention", "p1": "didn't (past subjunctive after would rather)", "p2": "mention (not say/tell — mention this to)", "hint": "PREFER YOU NOT TO MENTION → RATHER YOU DIDN'T MENTION. Past subjunctive."},
  {"id": "t052", "orig": "I regret agreeing to help him \u2014 it took all weekend.", "key": "RATHER", "before": "I would", "after": "to help him.", "ans": "rather not have agreed", "accept": ["rather not have agreed"], "chunk1": "rather not have", "chunk2": "agreed", "p1": "rather not have (past regret: would rather not have)", "p2": "agreed (past participle)", "hint": "WOULD RATHER NOT HAVE + past participle = past regret. 'I regret agreeing' \u2192 'I would rather not have...'. What past participle?"},
  {"id": "t053", "orig": "People say that the company has been cutting corners on safety.", "key": "SAID", "before": "The company is said to", "after": "corners on safety.", "ans": "have been cutting", "accept": ["have been cutting"], "chunk1": "have been", "chunk2": "cutting", "p1": "have been (perfect continuous infinitive)", "p2": "cutting (continuous aspect — not cut)", "hint": "PEOPLE SAY IT HAS BEEN CUTTING → IS SAID TO HAVE BEEN CUTTING. Perfect continuous infinitive."},
  {"id": "t054", "orig": "She arrived at the theatre after the performance had started.", "key": "TIME", "before": "By the", "after": "had already started.", "ans": "time she arrived, the performance", "accept": ["time she arrived, the performance", "time she arrived the performance"], "chunk1": "time she arrived", "chunk2": "the performance", "p1": "time she arrived (by the time + past simple)", "p2": "the performance (subject of main clause)", "hint": "BY THE TIME + past simple \u2192 past perfect in main clause. What is the subject of the second clause that 'had already started'?"},
  {"id": "t055", "orig": "Nobody has used this equipment for over a year.", "key": "OUT", "before": "This equipment has been", "after": "over a year.", "ans": "out of use for", "accept": ["out of use for", "out of action for"], "chunk1": "out of use", "chunk2": "for", "p1": "out of use/action (fixed phrase)", "p2": "for (duration not since/in)", "hint": "OUT OF USE/ACTION + FOR: 'nobody has used it' \u2192 'has been out of [noun phrase] for'. What noun phrase means not being used?"},
  {"id": "t056", "orig": "The repairs will cost more than we can afford.", "key": "BEYOND", "before": "The cost of the repairs is", "after": ".", "ans": "beyond our means", "accept": ["beyond our means"], "chunk1": "beyond", "chunk2": "our means", "p1": "beyond (not above/outside)", "p2": "our means (financial capacity \u2014 fixed phrase)", "hint": "BEYOND ONE'S MEANS = too expensive to afford. Fixed idiom. What possessive determiner completes 'beyond...'?"},
  {"id": "t057", "orig": "The queue was so long that we decided to leave.", "key": "SUCH", "before": "It was", "after": "we decided to leave.", "ans": "such a long queue that", "accept": ["such a long queue that"], "chunk1": "such a long queue", "chunk2": "that", "p1": "such a long queue (such + a + adj + noun)", "p2": "that (result clause)", "hint": "SUCH + article + adjective + noun + THAT: 'so + adjective + that' \u2192 'such a + adjective + noun + that'. Include the article 'a'."},
  {"id": "t058", "orig": "She was so exhausted after the marathon that she slept for twelve hours.", "key": "SUCH", "before": "She was in", "after": "she slept for twelve hours.", "ans": "such a state of exhaustion that", "accept": ["such a state of exhaustion that"], "chunk1": "such a state of", "chunk2": "exhaustion that", "p1": "such + a + noun phrase (state of exhaustion)", "p2": "that (result clause — obligatory)", "hint": "SO EXHAUSTED → IN SUCH A STATE OF EXHAUSTION THAT. Tests 'such a state of X that' — noun phrase variant."},
  {"id": "t059", "orig": "The builders were expected to finish the project by June.", "key": "SUPPOSED", "before": "The builders", "after": "the project by June.", "ans": "were supposed to finish", "accept": ["were supposed to finish"], "chunk1": "were supposed", "chunk2": "to finish", "p1": "were supposed (past passive)", "p2": "to finish (infinitive)", "hint": "WERE SUPPOSED TO + infinitive = a formal synonym of 'were expected to'. Passive modal \u2014 same infinitive follows."},
  {"id": "t060", "orig": "She insisted that everyone should submit their reports by Friday.", "key": "INSISTED", "before": "She", "after": "their reports by Friday.", "ans": "insisted on everyone submitting", "accept": ["insisted on everyone submitting", "insisted on everybody submitting"], "chunk1": "insisted on", "chunk2": "everyone submitting", "p1": "insisted on (insist on + gerund)", "p2": "everyone submitting (possessive/object + gerund)", "hint": "INSIST ON + object + gerund: 'insisted that everyone should submit' \u2192 'insisted on everyone/everybody + gerund'. Preposition 'on' requires a gerund."},
  {"id": "t061", "orig": "The council decided not to build any more car parks in the city centre.", "key": "DECISION", "before": "The council", "after": "any more car parks in the city centre.", "ans": "made the decision not to build", "accept": ["made the decision not to build"], "chunk1": "made the decision", "chunk2": "not to build", "p1": "made the decision (collocation: make a decision)", "p2": "not to build (negative infinitive)", "hint": "DECIDED NOT TO → MADE THE DECISION NOT TO BUILD. Nominalisation of verb 'decide'."},
  {"id": "t062", "orig": "The new drug proved to be less effective than expected.", "key": "OUT", "before": "The new drug turned", "after": "less effective than expected.", "ans": "out to be", "accept": ["out to be"], "chunk1": "out to", "chunk2": "be", "p1": "out to (phrasal verb: turn out to)", "p2": "be (infinitive — not been/being)", "hint": "PROVED TO BE → TURNED OUT TO BE. Direct phrasal verb synonym."},
  {"id": "t063", "orig": "She is not only a talented musician but also an accomplished painter.", "key": "ADDITION", "before": "In", "after": "a talented musician, she is also an accomplished painter.", "ans": "addition to being", "accept": ["addition to being"], "chunk1": "addition to", "chunk2": "being", "p1": "addition to (in addition to = as well as)", "p2": "being (gerund not she is/to be)", "hint": "IN ADDITION TO + gerund: 'not only X but also Y' \u2192 'in addition to being X'. The preposition 'to' must be followed by a gerund."},
  {"id": "t064", "orig": "My advice would be to book early to avoid disappointment.", "key": "STRONGLY", "before": "I would", "after": "early to avoid disappointment.", "ans": "strongly advise you to book", "accept": ["strongly advise you to book"], "chunk1": "strongly advise you", "chunk2": "to book", "p1": "strongly advise you (advise + object, not recommend you to)", "p2": "to book (infinitive)", "hint": "STRONGLY ADVISE + object + TO + infinitive: 'my advice would be to' \u2192 'I would strongly advise you to'. Object is required."},
  {"id": "t065", "orig": "She can't afford a new car, and she definitely can't afford a sports car.", "key": "ALONE", "before": "She can't afford a new car,", "after": "a sports car.", "ans": "let alone", "accept": ["let alone"], "chunk1": "let", "chunk2": "alone", "p1": "let (part of fixed phrase)", "p2": "alone (let alone = never mind/much less)", "hint": "LET ALONE = not to mention, much less. Fixed phrase used to intensify a negative: can't afford X, let alone Y (the more extreme one)."},
  {"id": "t066", "orig": "The concert was just starting when we arrived.", "key": "ABOUT", "before": "The concert was", "after": "when we arrived.", "ans": "about to start", "accept": ["about to start", "about to begin"], "chunk1": "about to", "chunk2": "start", "p1": "about to (be on the verge of)", "p2": "start/begin (infinitive)", "hint": "ABOUT TO + infinitive = on the verge of doing. 'Was just starting' \u2192 'was about to'. Present continuous \u2192 'about to + infinitive'."},
  {"id": "t067", "orig": "When I was young, I walked to school every day.", "key": "USED", "before": "I", "after": "to school every day when I was young.", "ans": "used to walk", "accept": ["used to walk"], "chunk1": "used to", "chunk2": "walk", "p1": "used to (past habit discontinued)", "p2": "walk (bare infinitive — not walking/to walk)", "hint": "WALKED (past habit) → USED TO WALK. Discontinued past habit uses 'used to + bare infinitive'."},
  {"id": "t068", "orig": "The organisation gave financial help to the families affected.", "key": "PROVIDED", "before": "The organisation", "after": "the families affected.", "ans": "provided financial assistance to", "accept": ["provided financial assistance to", "provided financial support to"], "chunk1": "provided financial assistance", "chunk2": "to", "p1": "provided financial assistance/support (not gave help)", "p2": "to (not for/with)", "hint": "PROVIDED + noun + TO: 'gave help to' \u2192 'provided [formal noun] to'. What more formal noun replaces 'help'? And which preposition follows?"},
  {"id": "t069", "orig": "He behaved badly, which made it seem like he didn't care.", "key": "IF", "before": "He behaved", "after": "didn't care.", "ans": "as if he", "accept": ["as if he"], "chunk1": "as if", "chunk2": "he", "p1": "as if (not as like/like)", "p2": "he (subject of subordinate clause)", "hint": "AS IF + past simple = unreal comparison. 'Made it seem like he didn't care' \u2192 'behaved as if he...' Same tense."},
  {"id": "t070", "orig": "I think the government should take action on this immediately.", "key": "TIME", "before": "It is", "after": "action on this.", "ans": "high time the government took", "accept": ["high time the government took"], "chunk1": "high time", "chunk2": "the government took", "p1": "high time (it's high time = overdue)", "p2": "the government took (past subjunctive)", "hint": "HIGH TIME + past subjunctive: 'should take action' \u2192 'it is high time + subject + past simple'. The past simple here is a subjunctive."},
];

const P5 = [
  {"id": "pv001", "sent": "The journalist's investigation brought about a complete overhaul of the planning regulations.", "pv": "brought about", "opts": ["A: delayed", "B: caused to happen", "C: reported on", "D: argued against"], "a": "B", "h": "BRING ABOUT = cause something to happen, especially a significant change. It always implies the change was caused by deliberate action."},
  {"id": "pv002", "sent": "She was brought up to believe that education was the key to a better life.", "pv": "brought up", "opts": ["A: encouraged", "B: taught formally", "C: raised and instilled with values", "D: persuaded"], "a": "C", "h": "BRING UP (a child) = raise, instil values during childhood. Different from 'bring up' meaning 'mention a topic'."},
  {"id": "pv003", "sent": "The new management team brought in a series of radical cost-cutting measures.", "pv": "brought in", "opts": ["A: removed", "B: officially introduced", "C: debated", "D: rejected"], "a": "B", "h": "BRING IN = officially introduce a law, rule, or policy. Often used for legislation and workplace changes."},
  {"id": "pv004", "sent": "Her autobiography brought back painful memories of her difficult childhood.", "pv": "brought back", "opts": ["A: returned", "B: reintroduced", "C: caused to be remembered", "D: revived"], "a": "C", "h": "BRING BACK = cause memories or feelings to return to mind. Note: also means 'reintroduce' in a different context."},
  {"id": "pv005", "sent": "The crisis brought out the best in people, with communities rallying to support one another.", "pv": "brought out", "opts": ["A: removed", "B: revealed or caused to appear", "C: published", "D: celebrated"], "a": "B", "h": "BRING OUT = reveal a quality that was previously hidden, or cause it to appear. 'Bring out the best/worst in someone.'"},
  {"id": "pv006", "sent": "The union called off the strike after reaching a last-minute agreement with management.", "pv": "called off", "opts": ["A: postponed", "B: cancelled", "C: ended early", "D: announced"], "a": "B", "h": "CALL OFF = cancel something that had been planned. Stronger than 'postpone' — it means it won't happen at all."},
  {"id": "pv007", "sent": "The government was called upon to explain its handling of the financial crisis.", "pv": "called upon", "opts": ["A: criticised", "B: formally requested or asked", "C: blamed", "D: questioned"], "a": "B", "h": "CALL UPON = formally ask or request someone to do something. More formal than 'ask'; used in official or public contexts."},
  {"id": "pv008", "sent": "Critics called into question the reliability of the data used in the report.", "pv": "called into question", "opts": ["A: debated", "B: cast doubt on", "C: rejected entirely", "D: examined carefully"], "a": "B", "h": "CALL INTO QUESTION = cause something to be doubted or challenged. Fixed phrase — always 'call X into question'."},
  {"id": "pv009", "sent": "Despite the setbacks, the research team carried on with their work throughout the winter.", "pv": "carried on", "opts": ["A: finished", "B: continued", "C: struggled", "D: improved"], "a": "B", "h": "CARRY ON = continue doing something, especially despite difficulties. More informal than 'continue' but common at C1."},
  {"id": "pv010", "sent": "The recommendations of the report were fully carried out by the new administration.", "pv": "carried out", "opts": ["A: discussed", "B: rejected", "C: implemented or completed", "D: published"], "a": "C", "h": "CARRY OUT = implement, complete or perform a task, instruction or plan. Standard formal collocation."},
  {"id": "pv011", "sent": "Her passion for justice carried her through the most difficult periods of the legal battle.", "pv": "carried through", "opts": ["A: transported", "B: sustained or helped to survive", "C: completed", "D: strengthened"], "a": "B", "h": "CARRY THROUGH = sustain someone during a difficult period, or bring something to a successful conclusion."},
  {"id": "pv012", "sent": "A solution to the funding crisis finally came about after months of negotiation.", "pv": "came about", "opts": ["A: was discussed", "B: happened or developed", "C: was discovered", "D: was proposed"], "a": "B", "h": "COME ABOUT = happen or develop, often gradually or unexpectedly. Describes how a situation arose."},
  {"id": "pv013", "sent": "The missing documents came to light during a routine audit of the company's finances.", "pv": "came to light", "opts": ["A: were found by chance", "B: became known or were revealed", "C: were returned", "D: were confirmed"], "a": "B", "h": "COME TO LIGHT = become known, especially something that was previously hidden or unknown."},
  {"id": "pv014", "sent": "Several unexpected complications came up during the planning phase of the project.", "pv": "came up", "opts": ["A: were noticed", "B: arose or occurred unexpectedly", "C: were discussed", "D: were solved"], "a": "B", "h": "COME UP = arise or occur, especially unexpectedly. Often used for problems, issues, or topics that appear."},
  {"id": "pv015", "sent": "Despite initial optimism, the scheme did not come up to the expectations of investors.", "pv": "come up to", "opts": ["A: reach", "B: meet or match a standard", "C: approach", "D: exceed"], "a": "B", "h": "COME UP TO = reach or match a required standard or level. Often used negatively: 'didn't come up to expectations'."},
  {"id": "pv016", "sent": "The accused came across as calm and confident throughout the trial.", "pv": "came across", "opts": ["A: behaved", "B: was perceived or seemed", "C: appeared physically", "D: spoke"], "a": "B", "h": "COME ACROSS (as) = give a particular impression to others. How you seem or appear to other people."},
  {"id": "pv017", "sent": "She came into a considerable fortune when her aunt passed away.", "pv": "came into", "opts": ["A: earned", "B: inherited or received", "C: discovered", "D: invested"], "a": "B", "h": "COME INTO (money/a fortune) = inherit or receive money or property. Fixed phrase with financial contexts."},
  {"id": "pv018", "sent": "The new legislation cut across party lines, with politicians from all sides voting in favour.", "pv": "cut across", "opts": ["A: divided", "B: ignored", "C: went beyond or transcended", "D: affected"], "a": "C", "h": "CUT ACROSS = go beyond usual boundaries or divisions. When something applies to multiple groups that normally disagree."},
  {"id": "pv019", "sent": "The funding cuts meant the charity had to cut back on the services it offered.", "pv": "cut back on", "opts": ["A: improve", "B: reduce the amount of", "C: change", "D: stop completely"], "a": "B", "h": "CUT BACK ON = reduce the amount, size or cost of something. Less extreme than stopping entirely."},
  {"id": "pv020", "sent": "Her microphone cut out just as she was about to announce the winner.", "pv": "cut out", "opts": ["A: broke", "B: stopped working suddenly", "C: was removed", "D: failed gradually"], "a": "B", "h": "CUT OUT = stop working suddenly (for a machine, engine, or electrical device). Always sudden, not gradual."},
  {"id": "pv021", "sent": "The lengthy court case drew on the resources of both legal teams considerably.", "pv": "drew on", "opts": ["A: depended on", "B: used up or made use of", "C: extended", "D: highlighted"], "a": "B", "h": "DRAW ON = make use of a source, skill, or resource. Often implies drawing on experience, funds, or creativity."},
  {"id": "pv022", "sent": "The police drew up a detailed plan for managing the crowd at the event.", "pv": "drew up", "opts": ["A: presented", "B: prepared or formulated formally", "C: published", "D: discussed"], "a": "B", "h": "DRAW UP = prepare or write a formal document, plan, or agreement. Always implies a formal, written output."},
  {"id": "pv023", "sent": "The case drew out over several months, exhausting both parties involved.", "pv": "drew out", "opts": ["A: attracted", "B: became unnecessarily long", "C: revealed", "D: concluded"], "a": "B", "h": "DRAW OUT = make something last longer than necessary, or cause a process to be prolonged."},
  {"id": "pv024", "sent": "Sales fell off sharply in the final quarter of the year due to consumer uncertainty.", "pv": "fell off", "opts": ["A: decreased", "B: dropped suddenly and significantly", "C: collapsed", "D: were reported"], "a": "B", "h": "FALL OFF = decrease, especially sharply or notably. Often used for sales, demand, attendance, or standards."},
  {"id": "pv025", "sent": "The deal fell through at the last minute when the buyer withdrew their offer.", "pv": "fell through", "opts": ["A: was rejected", "B: failed to happen as planned", "C: was renegotiated", "D: collapsed financially"], "a": "B", "h": "FALL THROUGH = fail to happen, especially a deal, plan, or arrangement. Always implies complete failure."},
  {"id": "pv026", "sent": "The scheme fell foul of strict data protection regulations and had to be abandoned.", "pv": "fell foul of", "opts": ["A: was criticised by", "B: came into conflict with", "C: was investigated by", "D: was rejected by"], "a": "B", "h": "FALL FOUL OF = come into conflict with a rule, law, or person; get into trouble because of something."},
  {"id": "pv027", "sent": "Responsibility for the error fell squarely on the shoulders of the project manager.", "pv": "fell on", "opts": ["A: was blamed on", "B: became the responsibility of", "C: was reported to", "D: was noticed by"], "a": "B", "h": "FALL ON (someone) = become the responsibility or burden of a particular person. Often used with 'responsibility' or 'burden'."},
  {"id": "pv028", "sent": "It took years before she got over the trauma of losing her business.", "pv": "got over", "opts": ["A: forgot", "B: recovered from", "C: accepted", "D: moved away from"], "a": "B", "h": "GET OVER = recover from something difficult — an illness, loss, shock, or disappointment."},
  {"id": "pv029", "sent": "The committee got around the legal restriction by redefining the terms of the contract.", "pv": "got around", "opts": ["A: discussed", "B: found a way to avoid", "C: challenged", "D: publicised"], "a": "B", "h": "GET AROUND = find a way to avoid or overcome a rule, restriction, or problem without directly confronting it."},
  {"id": "pv030", "sent": "The message that the company was struggling to survive finally got through to shareholders.", "pv": "got through to", "opts": ["A: was communicated to", "B: was understood by", "C: reached", "D: was accepted by"], "a": "B", "h": "GET THROUGH TO = succeed in making someone understand something. Implies the communication was difficult."},
  {"id": "pv031", "sent": "She got away with submitting the report late because her manager was on leave.", "pv": "got away with", "opts": ["A: escaped", "B: succeeded in avoiding punishment for", "C: benefited from", "D: managed to do"], "a": "B", "h": "GET AWAY WITH = avoid punishment or negative consequences for something wrong or against the rules."},
  {"id": "pv032", "sent": "After hours of negotiation, the management gave in to the union's demands.", "pv": "gave in", "opts": ["A: agreed", "B: surrendered or yielded", "C: responded", "D: compromised"], "a": "B", "h": "GIVE IN = surrender or stop resisting; yield to pressure or demands. Similar to 'give way' but more personal."},
  {"id": "pv033", "sent": "The company gave up trying to enter the Asian market after three unsuccessful attempts.", "pv": "gave up", "opts": ["A: decided", "B: stopped trying", "C: failed", "D: withdrew"], "a": "B", "h": "GIVE UP = stop doing something, especially because it's too difficult. Implies a definitive end to the effort."},
  {"id": "pv034", "sent": "The scandal gave rise to calls for a thorough reform of the electoral system.", "pv": "gave rise to", "opts": ["A: caused or led to", "B: highlighted", "C: resulted from", "D: was connected to"], "a": "A", "h": "GIVE RISE TO = cause something to happen or develop, especially something abstract like a controversy or movement."},
  {"id": "pv035", "sent": "The minister held back information that could have been crucial to the investigation.", "pv": "held back", "opts": ["A: destroyed", "B: kept secret or refused to reveal", "C: delayed", "D: lost"], "a": "B", "h": "HOLD BACK = deliberately not reveal or share information. Also means to prevent progress or restrain someone."},
  {"id": "pv036", "sent": "Progress on the construction project was held up by a series of planning disputes.", "pv": "held up", "opts": ["A: supported", "B: delayed or obstructed", "C: halted permanently", "D: slowed"], "a": "B", "h": "HOLD UP = delay or obstruct progress. Note: also means 'rob' in a different context, so the sentence matters."},
  {"id": "pv037", "sent": "The theory has held up well under scrutiny from the wider scientific community.", "pv": "held up", "opts": ["A: been defended", "B: remained valid or strong", "C: been supported", "D: been published"], "a": "B", "h": "HOLD UP (under scrutiny/criticism) = remain valid or strong when tested or examined. A different meaning from 'delay'."},
  {"id": "pv038", "sent": "Analysts are looking to a recovery in consumer spending to drive economic growth.", "pv": "looking to", "opts": ["A: expecting", "B: relying on or hoping for", "C: predicting", "D: planning for"], "a": "B", "h": "LOOK TO = rely on or expect something to provide what is needed. Often followed by a noun or gerund."},
  {"id": "pv039", "sent": "The board is looking into allegations of financial misconduct at the company.", "pv": "looking into", "opts": ["A: reading about", "B: investigating", "C: discussing", "D: ignoring"], "a": "B", "h": "LOOK INTO = investigate or examine something carefully. Used for formal or official investigations."},
  {"id": "pv040", "sent": "She looked back on her years in the diplomatic service with great fondness.", "pv": "looked back on", "opts": ["A: reviewed", "B: reflected on or thought about the past", "C: remembered", "D: regretted"], "a": "B", "h": "LOOK BACK ON = reflect on a past period or experience. Implies distance in time and a degree of contemplation."},
  {"id": "pv041", "sent": "It was difficult to make out what she was trying to say through the poor telephone connection.", "pv": "make out", "opts": ["A: understand", "B: hear or see clearly enough to understand", "C: interpret", "D: decode"], "a": "B", "h": "MAKE OUT = manage to hear, see or understand something with difficulty. Implies the challenge of perception."},
  {"id": "pv042", "sent": "The press release made out that the company had been fully transparent throughout.", "pv": "made out", "opts": ["A: proved", "B: claimed or portrayed, often misleadingly", "C: stated", "D: confirmed"], "a": "B", "h": "MAKE OUT (that) = claim or suggest something, often implying the claim is exaggerated or misleading."},
  {"id": "pv043", "sent": "The new director is determined to make up for the years of underinvestment in staff training.", "pv": "make up for", "opts": ["A: explain", "B: compensate for", "C: correct", "D: report on"], "a": "B", "h": "MAKE UP FOR = compensate for a loss, mistake, or period of neglect. Implies actively correcting an imbalance."},
  {"id": "pv044", "sent": "The minister put forward a series of proposals aimed at reducing carbon emissions.", "pv": "put forward", "opts": ["A: introduced", "B: suggested or proposed formally", "C: defended", "D: published"], "a": "B", "h": "PUT FORWARD = suggest or propose an idea, plan, or candidate formally. Often used in professional or political contexts."},
  {"id": "pv045", "sent": "Many residents put up with years of noise pollution before the factory was finally closed.", "pv": "put up with", "opts": ["A: complained about", "B: tolerated", "C: opposed", "D: ignored"], "a": "B", "h": "PUT UP WITH = tolerate something unpleasant without complaining. Implies endurance over time."},
  {"id": "pv046", "sent": "The board put off making a decision until a full financial review had been completed.", "pv": "put off", "opts": ["A: cancelled", "B: delayed or postponed", "C: avoided", "D: refused"], "a": "B", "h": "PUT OFF = postpone or delay. Unlike 'cancel', it implies the thing will happen eventually, just not now."},
  {"id": "pv047", "sent": "The experience put her off applying for similar positions in the future.", "pv": "put off", "opts": ["A: discouraged", "B: prevented", "C: stopped", "D: warned"], "a": "A", "h": "PUT OFF (someone) = discourage or cause someone to lose interest or enthusiasm. A different meaning from 'postpone'."},
  {"id": "pv048", "sent": "The charity's operating costs have run up considerably since they expanded their services.", "pv": "run up", "opts": ["A: increased rapidly", "B: accumulated", "C: become unmanageable", "D: been reported"], "a": "B", "h": "RUN UP = accumulate a large amount of something, especially costs, debts, or bills, over time."},
  {"id": "pv049", "sent": "The negotiations ran into serious difficulties when both sides refused to compromise.", "pv": "ran into", "opts": ["A: faced unexpectedly", "B: encountered or experienced", "C: created", "D: caused"], "a": "B", "h": "RUN INTO = encounter or experience problems, difficulties, or opposition unexpectedly."},
  {"id": "pv050", "sent": "Time is running out for the government to reach a deal before the deadline.", "pv": "running out", "opts": ["A: being wasted", "B: decreasing and nearly gone", "C: passing", "D: being lost"], "a": "B", "h": "RUN OUT = be used up or come to an end. 'Time is running out' = there is very little time left."},
  {"id": "pv051", "sent": "The scandal set back efforts to rebuild public trust in the institution by years.", "pv": "set back", "opts": ["A: delayed or hindered", "B: damaged", "C: reversed", "D: prevented"], "a": "A", "h": "SET BACK = delay or hinder progress. Can also refer to a specific 'setback' (noun form) in a process."},
  {"id": "pv052", "sent": "The documentary set out to challenge widely held assumptions about urban poverty.", "pv": "set out", "opts": ["A: managed", "B: aimed or intended", "C: began", "D: tried"], "a": "B", "h": "SET OUT TO = have as one's aim or intention from the beginning. 'Set out to do X' = began with the purpose of doing X."},
  {"id": "pv053", "sent": "The committee was set up specifically to oversee the implementation of the new policy.", "pv": "set up", "opts": ["A: created or established", "B: empowered", "C: instructed", "D: selected"], "a": "A", "h": "SET UP = create or establish an organisation, system, or arrangement. Very common in formal/institutional contexts."},
  {"id": "pv054", "sent": "The compromise proposal stood out as the most viable solution on the table.", "pv": "stood out", "opts": ["A: was noticed", "B: was clearly better or more noticeable", "C: was selected", "D: was supported"], "a": "B", "h": "STAND OUT = be noticeably better, more impressive, or more distinctive than others."},
  {"id": "pv055", "sent": "The minister stood by her decision despite intense criticism from all sides.", "pv": "stood by", "opts": ["A: defended", "B: refused to change", "C: continued to support", "D: explained"], "a": "C", "h": "STAND BY = continue to support a decision, person, or statement, especially under pressure."},
  {"id": "pv056", "sent": "It took a while for the new employees to take in all the information from the training session.", "pv": "take in", "opts": ["A: note", "B: absorb or fully understand", "C: learn", "D: remember"], "a": "B", "h": "TAKE IN = fully absorb, understand, or process information, especially when there is a lot of it."},
  {"id": "pv057", "sent": "The opposition took up the issue of housing affordability in the parliamentary debate.", "pv": "took up", "opts": ["A: raised or addressed", "B: began discussing", "C: challenged", "D: used"], "a": "A", "h": "TAKE UP = raise or begin to address an issue. Also means 'occupy time/space' or 'begin a hobby' in other contexts."},
  {"id": "pv058", "sent": "The board took on additional staff to cope with the increased workload.", "pv": "took on", "opts": ["A: employed", "B: confronted", "C: acquired", "D: challenged"], "a": "A", "h": "TAKE ON = employ or hire new staff. Also means 'accept a responsibility' or 'confront' in different contexts."},
  {"id": "pv059", "sent": "The new CEO has taken over a company that is heavily in debt.", "pv": "taken over", "opts": ["A: been given", "B: assumed control of", "C: purchased", "D: inherited"], "a": "B", "h": "TAKE OVER = assume control of a company, position, or responsibility, often from someone else."},
  {"id": "pv060", "sent": "She took the criticism on board and revised her approach accordingly.", "pv": "took on board", "opts": ["A: accepted and considered seriously", "B: agreed with", "C: noted", "D: discussed"], "a": "A", "h": "TAKE ON BOARD = accept and seriously consider feedback, a criticism, or a suggestion. Implies acting on it."},
  {"id": "pv061", "sent": "The evening turned out to be far more successful than anyone had dared to hope.", "pv": "turned out", "opts": ["A: ended", "B: proved to be or resulted in", "C: became", "D: was revealed"], "a": "B", "h": "TURN OUT (to be) = prove to be, or result in a particular way. Often used when the outcome was surprising."},
  {"id": "pv062", "sent": "The government has turned a blind eye to the growing problem of corruption in local authorities.", "pv": "turned a blind eye to", "opts": ["A: investigated", "B: deliberately ignored", "C: denied", "D: dismissed"], "a": "B", "h": "TURN A BLIND EYE TO = deliberately ignore something you know is wrong. Fixed idiom — the phrasing is always the same."},
  {"id": "pv063", "sent": "The local community turned against the development project after the environmental report was published.", "pv": "turned against", "opts": ["A: protested", "B: changed to opposing", "C: rejected", "D: criticised"], "a": "B", "h": "TURN AGAINST = change from supporting to opposing someone or something. Implies a reversal of attitude."},
  {"id": "pv064", "sent": "The inquiry wound up after six months without reaching a definitive conclusion.", "pv": "wound up", "opts": ["A: was stopped", "B: came to an end", "C: was abandoned", "D: failed"], "a": "B", "h": "WIND UP = come to an end, or bring something to an end. Also used for companies going out of business."},
  {"id": "pv065", "sent": "The details of the new contract were worked out after a series of tough negotiations.", "pv": "worked out", "opts": ["A: agreed upon", "B: calculated or resolved through discussion", "C: signed", "D: presented"], "a": "B", "h": "WORK OUT = resolve, calculate, or figure out something through effort or negotiation."},
  {"id": "pv066", "sent": "The protestors' demands were brushed aside by the government without any formal response.", "pv": "brushed aside", "opts": ["A: rejected politely", "B: dismissed without serious consideration", "C: refused", "D: debated"], "a": "B", "h": "BRUSH ASIDE = dismiss or refuse to consider something seriously. Implies the dismissal was casual or contemptuous."},
  {"id": "pv067", "sent": "The merger talks broke down after the two companies failed to agree on a fair valuation.", "pv": "broke down", "opts": ["A: ended in disagreement", "B: failed completely", "C: were cancelled", "D: were postponed"], "a": "B", "h": "BREAK DOWN = fail completely, especially negotiations, relationships, or communications."},
  {"id": "pv068", "sent": "The new regulations are expected to phase out the use of single-use plastics by 2030.", "pv": "phase out", "opts": ["A: ban suddenly", "B: reduce and eliminate gradually", "C: stop", "D: replace"], "a": "B", "h": "PHASE OUT = gradually reduce and eventually eliminate something over a period of time."},
  {"id": "pv069", "sent": "The prime minister's comments sparked off a fierce debate about immigration policy.", "pv": "sparked off", "opts": ["A: started", "B: caused to begin suddenly", "C: encouraged", "D: provoked"], "a": "B", "h": "SPARK OFF = cause something to begin suddenly — especially a debate, conflict, or controversy."},
  {"id": "pv070", "sent": "The opposition party is pressing ahead with its plans to reform the tax system.", "pv": "pressing ahead", "opts": ["A: continuing despite difficulties", "B: hurrying", "C: planning", "D: publishing"], "a": "A", "h": "PRESS AHEAD (with) = continue with a plan despite difficulties, opposition, or delays."},
  {"id": "pv071", "sent": "The documentary glossed over some of the most controversial aspects of the politician's record.", "pv": "glossed over", "opts": ["A: avoided", "B: treated superficially or failed to examine", "C: denied", "D: mentioned briefly"], "a": "B", "h": "GLOSS OVER = treat something superficially, intentionally avoiding difficult or embarrassing details."},
  {"id": "pv072", "sent": "The strike dragged on for three weeks before an agreement was finally reached.", "pv": "dragged on", "opts": ["A: continued too long", "B: became more serious", "C: was extended", "D: was delayed"], "a": "A", "h": "DRAG ON = continue for longer than expected or desired. Implies tedium or frustration at the length."},
  {"id": "pv073", "sent": "The new policy has driven up the cost of housing in the city centre considerably.", "pv": "driven up", "opts": ["A: caused", "B: increased significantly", "C: raised artificially", "D: created"], "a": "B", "h": "DRIVE UP = cause prices, costs, or numbers to increase significantly. Often implies an unwanted increase."},
  {"id": "pv074", "sent": "Several key witnesses failed to show up for the hearing, causing significant delays.", "pv": "show up", "opts": ["A: appear as expected", "B: be visible", "C: arrive", "D: perform well"], "a": "A", "h": "SHOW UP = arrive or appear at a place where you are expected. Often used when attendance is in question."},
  {"id": "pv075", "sent": "The scandal has cast doubt on whether the minister will be able to ride out the political storm.", "pv": "ride out", "opts": ["A: survive", "B: endure and survive a difficult period", "C: escape", "D: manage"], "a": "B", "h": "RIDE OUT = endure and survive a difficult period or situation, especially in politics or business."},

const COL = [
  {"id": "col001", "prompt": "Which word does NOT collocate with DECISION?", "key": "DECISION", "opts": ["A: make", "B: reach", "C: take", "D: do"], "a": "D", "h": "You make, reach, or take a decision — but you don't 'do' a decision. 'Do' doesn't collocate with abstract nouns like this."},
  {"id": "col002", "prompt": "Which word does NOT collocate with ATTENTION?", "key": "ATTENTION", "opts": ["A: draw", "B: pay", "C: attract", "D: do"], "a": "D", "h": "You draw, pay, or attract attention — but 'do attention' is not a collocation. 'Do' rarely collocates with abstract nouns."},
  {"id": "col003", "prompt": "Which word does NOT collocate with PROGRESS?", "key": "PROGRESS", "opts": ["A: make", "B: achieve", "C: do", "D: monitor"], "a": "C", "h": "You make, achieve, or monitor progress — but 'do progress' is not standard. 'Make progress' is the dominant collocation."},
  {"id": "col004", "prompt": "Which word does NOT collocate with DAMAGE?", "key": "DAMAGE", "opts": ["A: cause", "B: suffer", "C: sustain", "D: make"], "a": "D", "h": "You cause, suffer, or sustain damage — but 'make damage' is not English. Compare: 'make a mistake' works, but not with 'damage'."},
  {"id": "col005", "prompt": "Which word does NOT collocate with MISTAKE?", "key": "MISTAKE", "opts": ["A: make", "B: admit", "C: do", "D: correct"], "a": "C", "h": "You make, admit, or correct a mistake — but 'do a mistake' is a common learner error. Only 'make a mistake' is correct."},
  {"id": "col006", "prompt": "Which word does NOT collocate with RISK?", "key": "RISK", "opts": ["A: take", "B: run", "C: pose", "D: do"], "a": "D", "h": "You take, run, or pose a risk — but 'do a risk' is not a collocation. All three others are valid: 'take a risk', 'run a risk', 'pose a risk'."},
  {"id": "col007", "prompt": "Which word does NOT collocate with EFFORT?", "key": "EFFORT", "opts": ["A: make", "B: put in", "C: require", "D: do"], "a": "D", "h": "You make an effort, put in effort, or something requires effort — but 'do effort' is not standard English."},
  {"id": "col008", "prompt": "Which word does NOT collocate with RESPONSIBILITY?", "key": "RESPONSIBILITY", "opts": ["A: take", "B: accept", "C: bear", "D: make"], "a": "D", "h": "You take, accept, or bear responsibility — but 'make responsibility' is not a collocation. Note: you 'make a commitment' but not responsibility."},
  {"id": "col009", "prompt": "Which word does NOT collocate with SPEECH?", "key": "SPEECH", "opts": ["A: give", "B: deliver", "C: make", "D: do"], "a": "D", "h": "You give, deliver, or make a speech — but 'do a speech' sounds unnatural. All three others are standard collocations."},
  {"id": "col010", "prompt": "Which word does NOT collocate with RESEARCH?", "key": "RESEARCH", "opts": ["A: conduct", "B: carry out", "C: do", "D: make"], "a": "D", "h": "You conduct, carry out, or do research — but 'make research' is not standard. 'Do research' is accepted informally; 'make research' is not."},
  {"id": "col011", "prompt": "Which adjective does NOT collocate with IMPACT?", "key": "IMPACT", "opts": ["A: significant", "B: profound", "C: major", "D: strong"], "a": "D", "h": "You can have a significant, profound, or major impact — but 'a strong impact' is unusual. 'Strong' collocates with 'influence', 'evidence', and 'argument', not 'impact'."},
  {"id": "col012", "prompt": "Which adjective does NOT collocate with EVIDENCE?", "key": "EVIDENCE", "opts": ["A: strong", "B: compelling", "C: hard", "D: heavy"], "a": "D", "h": "Strong, compelling, or hard evidence are all natural — but 'heavy evidence' is not. 'Heavy' collocates with 'traffic', 'rain', 'burden' — not 'evidence'."},
  {"id": "col013", "prompt": "Which adjective does NOT collocate with INCREASE?", "key": "INCREASE", "opts": ["A: sharp", "B: dramatic", "C: steady", "D: strong"], "a": "D", "h": "A sharp, dramatic, or steady increase are all standard — but 'a strong increase' is not natural. Use 'strong' with 'performance', 'growth', or 'demand', not 'increase'."},
  {"id": "col014", "prompt": "Which adjective does NOT collocate with CRITICISM?", "key": "CRITICISM", "opts": ["A: fierce", "B: harsh", "C: heavy", "D: big"], "a": "D", "h": "Fierce, harsh, or heavy criticism are all natural C1 collocations — but 'big criticism' sounds wrong. Size adjectives like 'big' and 'large' rarely collocate with abstract nouns."},
  {"id": "col015", "prompt": "Which adjective does NOT collocate with KNOWLEDGE?", "key": "KNOWLEDGE", "opts": ["A: thorough", "B: extensive", "C: deep", "D: strong"], "a": "D", "h": "Thorough, extensive, or deep knowledge are all natural — but 'strong knowledge' is not standard. Use 'strong' with 'performance' or 'skills', not 'knowledge'."},
  {"id": "col016", "prompt": "Which adjective does NOT collocate with DIFFERENCE?", "key": "DIFFERENCE", "opts": ["A: significant", "B: marked", "C: striking", "D: intense"], "a": "D", "h": "A significant, marked, or striking difference are all correct — but 'an intense difference' is not a collocation. 'Intense' collocates with 'pressure', 'emotion', 'debate'."},
  {"id": "col017", "prompt": "Which adjective does NOT collocate with MAJORITY?", "key": "MAJORITY", "opts": ["A: vast", "B: overwhelming", "C: clear", "D: strong"], "a": "D", "h": "A vast, overwhelming, or clear majority are standard collocations — but 'a strong majority' is less natural. 'Strong' is used with 'majority' in politics but it's not the dominant form."},
  {"id": "col018", "prompt": "Which adjective does NOT collocate with CONCERN?", "key": "CONCERN", "opts": ["A: growing", "B: serious", "C: deep", "D: heavy"], "a": "D", "h": "Growing, serious, or deep concern are all natural — but 'heavy concern' is not standard. 'Heavy' works with physical or weather-related nouns, not abstract ones like 'concern'."},
  {"id": "col019", "prompt": "Which adjective does NOT collocate with DEBATE?", "key": "DEBATE", "opts": ["A: fierce", "B: heated", "C: lively", "D: strong"], "a": "D", "h": "A fierce, heated, or lively debate are all correct — but 'a strong debate' is unusual. Use 'strong' for arguments, evidence, or performance — not debates."},
  {"id": "col020", "prompt": "Which adjective does NOT collocate with FAILURE?", "key": "FAILURE", "opts": ["A: complete", "B: total", "C: utter", "D: full"], "a": "D", "h": "Complete, total, or utter failure are all intensified forms — but 'full failure' is not standard. 'Full' collocates with 'potential', 'capacity', 'support' — not 'failure'."},
  {"id": "col021", "prompt": "Which word does NOT collocate with POLICY?", "key": "POLICY", "opts": ["A: implement", "B: adopt", "C: pursue", "D: make"], "a": "D", "h": "You implement, adopt, or pursue a policy — but 'make a policy' is unusual in formal writing. You 'make a decision' or 'make a law', but policies are 'adopted' or 'implemented'."},
  {"id": "col022", "prompt": "Which word does NOT collocate with AGREEMENT?", "key": "AGREEMENT", "opts": ["A: reach", "B: sign", "C: broker", "D: make"], "a": "D", "h": "You reach, sign, or broker an agreement — but 'make an agreement' is less formal. In written C1 contexts, 'reach' or 'sign' are preferred."},
  {"id": "col023", "prompt": "Which word does NOT collocate with CONCLUSION?", "key": "CONCLUSION", "opts": ["A: draw", "B: reach", "C: come to", "D: make"], "a": "D", "h": "You draw, reach, or come to a conclusion — but 'make a conclusion' is not standard. This is a very common learner error."},
  {"id": "col024", "prompt": "Which word does NOT collocate with ARGUMENT?", "key": "ARGUMENT", "opts": ["A: put forward", "B: make", "C: advance", "D: do"], "a": "D", "h": "You put forward, make, or advance an argument — but 'do an argument' is not correct. 'Do' rarely collocates with abstract intellectual nouns."},
  {"id": "col025", "prompt": "Which word does NOT collocate with APPOINTMENT?", "key": "APPOINTMENT", "opts": ["A: make", "B: keep", "C: miss", "D: reach"], "a": "D", "h": "You make, keep, or miss an appointment — but 'reach an appointment' is not standard. 'Reach' collocates with agreements, conclusions, and decisions."},
  {"id": "col026", "prompt": "Which preposition does NOT collocate with RESULT?", "key": "RESULT", "opts": ["A: as a result of", "B: result in", "C: result from", "D: result by"], "a": "D", "h": "'As a result of', 'result in', and 'result from' are all correct — but 'result by' is not a standard prepositional collocation."},

// Get hint text - field is 'h' in P1/P2/P3, 'hint' in P4
const getHint = q => q.h || q.hint || '';


let G = { partId:null, qs:[], idx:0, score:0, done:false, val:'', hint:false, bests:lsGet('c1bests',{}), results:[], streak:0, maxStreak:0 };
var BANK = lsGet('c1bank',{});

function show(id){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

function updateBankBtn(){
  var wrongCount=Object.values(BANK).filter(function(e){return e.wrong;}).length;
  var hintCount=Object.values(BANK).filter(function(e){return !e.wrong&&e.hint;}).length;
  var total=wrongCount+hintCount;
  var btn=document.getElementById('bank-btn');
  var label=document.getElementById('bank-label');
  if(!btn) return;
  if(total>0){
    btn.style.display='flex';
    var parts=[];
    if(wrongCount>0) parts.push(wrongCount+' incorrect');
    if(hintCount>0) parts.push(hintCount+' hint-assisted');
    label.textContent=parts.join(' · ')+' saved for review';
  } else {
    btn.style.display='none';
  }
}

function startBankReview(filterFn){
  // Look up actual question objects from all pools
  var ALL={};
  [P1,P2,P3,P4,P5,COL,VOC].forEach(function(pool){
    pool.forEach(function(q){ ALL[q.id]=q; });
  });
  var ids=Object.keys(BANK).filter(filterFn||function(){return true;});
  var qs=ids.map(function(id){return ALL[id];}).filter(Boolean);
  if(!qs.length){ alert('No questions found.'); return; }
  // Determine partId from first question (mixed sessions use first part)
  var firstEntry=BANK[ids[0]];
  G.partId=firstEntry?firstEntry.partId:1;
  // For mixed parts, we need to handle rendering — set partId per question
  G.qs=qs.map(function(q){
    var entry=BANK[q.id];
    return Object.assign({},q,{_partId:entry?entry.partId:G.partId});
  });
  G.idx=0; G.score=0; G.done=false; G.val=''; G.hint=false; G.hintUsed=false; G.results=[]; G.streak=0; G.maxStreak=0;
  G.bankMode=true;
  renderQ(); show('s-question');
}

function buildHome(){
  updateBankBtn();
  document.getElementById('tiles').innerHTML = PARTS.map(p=>{
    const c=`var(${p.c})`, best=G.bests['p'+p.id];
    const bHtml=best!=null?`<div class="bbadge" style="color:${c};background:rgba(128,128,128,.12)">${best}%</div>`:'';
    var labelHtml = p.label ? '<div class="tag" style="color:'+c+'">'+p.label+'</div>' : '<div class="tag" style="color:'+c+'">Extra Practice</div>';
    return '<button class="tile" onclick="openSetup('+p.id+')">'
      +'<div style="flex:1">'+labelHtml
      +'<div class="tname">'+p.name+'</div>'
      +'<div class="tsub">'+p.sub+'</div>'
      +'</div>'
      +'<div class="tile-r">'+bHtml+'<div class="arrow" style="background:rgba(128,128,128,.12);color:'+c+'">&rsaquo;</div></div>'
      +'</button>';
  }).join('');
}

function openSetup(partId){
  G.partId=partId;
  const p=PARTS.find(x=>x.id===partId), c=`var(${p.c})`;
  document.getElementById('stag').style.color=c;
  document.getElementById('stag').textContent=p.label||'Extra Practice';
  document.getElementById('stitle').textContent=p.name;
  document.getElementById('p4note').style.display=partId===4?'block':'none';
  const pool=POOLS[partId];
  // Vocab: show topic filter buttons then count buttons
  if(partId===7){
    var topics=[...new Set(pool.map(function(q){return q.topic;}))];
    var topicBtns=topics.map(function(t){
      return '<button class="cnt-btn" style="color:'+c+';background:rgba(128,128,128,.08);border-color:rgba(128,128,128,.25)" data-topic="'+t+'" onclick="startTopicSession(this.dataset.topic)">'
        +t+'</button>';
    }).join('');
    topicBtns+='<div style="margin-top:14px;font-size:10px;color:var(--dim)">— or mixed —</div>';
    var ns=[10,20,pool.length].filter(function(n,i,a){return a.indexOf(n)===i&&n<=pool.length;});
    topicBtns+=ns.map(function(n){
      var lbl=n===pool.length?'All '+n+' questions':n+' mixed questions';
      return '<button class="cnt-btn" style="color:'+c+';background:rgba(128,128,128,.08);border-color:rgba(128,128,128,.25)" onclick="startSession(7,'+n+')" >'+lbl+'</button>';
    }).join('');
    document.getElementById('cntbtns').innerHTML=topicBtns;
  } else {
    var ns=[5,10,20,pool.length].filter(function(n,i,a){return a.indexOf(n)===i&&n<=pool.length;});
    document.getElementById('cntbtns').innerHTML=ns.map(function(n){
      var lbl=n===pool.length?'All '+n+' questions':n+' questions';
      return '<button class="cnt-btn" style="color:'+c+';background:rgba(128,128,128,.08);border-color:rgba(128,128,128,.25)" onclick="startSession('+partId+','+n+')">'+lbl+'</button>';
    }).join('');
  }
  show('s-setup');
}

function startTopicSession(topic){
  var filtered=VOC.filter(function(q){return q.topic===topic;});
  G.partId=7; G.qs=shuffle(filtered);
  G.idx=0; G.score=0; G.done=false; G.val=''; G.hint=false; G.hintUsed=false; G.results=[]; G.streak=0; G.maxStreak=0; G.bankMode=false;
  renderQ(); show('s-question');
}

function startSession(partId,n){
  G.partId=partId; G.qs=shuffle(POOLS[partId]).slice(0,n);
  G.idx=0; G.score=0; G.done=false; G.val=''; G.hint=false; G.hintUsed=false; G.results=[]; G.streak=0; G.maxStreak=0; G.bankMode=false;
  renderQ(); show('s-question');
}

function renderQ(){
  const q=G.qs[G.idx], effectivePartId=G.bankMode&&q._partId?q._partId:G.partId, p=PARTS.find(x=>x.id===effectivePartId)||PARTS[0], c=`var(${p.c})`;
  const total=G.qs.length, sMax=G.partId===4?G.idx*2:G.idx;
  document.getElementById('pfill').style.cssText=`width:${(G.idx/total)*100}%;background:${c}`;
  document.getElementById('qctr').style.color=c;
  document.getElementById('qctr').textContent=`${G.idx+1}/${total}`;
  document.getElementById('qscr').textContent=`${G.score}/${sMax}`;
  let html='<div class="ptag" style="color:'+c+'">'+(p.label?p.label+' &middot; ':'')+p.name+'</div>';
  var rPart=G.bankMode&&q._partId?q._partId:G.partId;
  if(rPart===1) html+=htmlP1(q);
  else if(rPart===2) html+=htmlP2(q);
  else if(rPart===3) html+=htmlP3(q);
  else if(rPart===4) html+=htmlP4(q);
  else if(rPart===5) html+=htmlP5(q);
  else if(rPart===6) html+=htmlCOL(q);
  else html+=htmlVOC(q);
  html+=htmlHint(q);
  document.getElementById('qbody').innerHTML=html;
  document.getElementById('qbody').scrollTop=0;
  renderBot();
  if(G.partId!==1) setTimeout(()=>{const i=document.getElementById('tin');if(i)i.focus();},80);
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function htmlP1(q){
  const pts=q.sent.split('_______');
  return `<div class="sent">${esc(pts[0])}<span class="gap" id="gap">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>${esc(pts[1]||'')}</div>
  <div class="opts">${q.opts.map(o=>`<button class="opt" data-l="${o[0]}" onclick="pickP1('${o[0]}')">${esc(o)}</button>`).join('')}</div>`;
}

function htmlP2(q){
  const pts=q.sent.split('_______');
  return `<div class="sent">${esc(pts[0])}<span class="gap" id="gap">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>${esc(pts[1]||'')}</div>
  <input class="tin" id="tin" type="text" autocomplete="off" spellcheck="false" placeholder="Type the missing word\u2026" oninput="G.val=this.value;updBot()" onkeydown="if(event.key==='Enter'&&G.val.trim())chk()">`;
}

function htmlP3(q){
  const pts=q.sent.split('['+q.root+']');
  return `<div class="rbadge"><span class="rlabel">ROOT</span><span class="rword">${esc(q.root)}</span></div>
  <div class="sent">${esc(pts[0])}<span class="gap" id="gap">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>${esc(pts[1]||'')}</div>
  <input class="tin" id="tin" type="text" autocomplete="off" spellcheck="false" placeholder="Type the correct word form\u2026" oninput="G.val=this.value;updBot()" onkeydown="if(event.key==='Enter'&&G.val.trim())chk()">`;
}

function htmlP4(q){
  return `<div class="origbox"><div class="origlbl">REWRITE THIS SENTENCE</div><div class="origtxt">${esc(q.orig)}</div></div>
  <div class="kbadge"><span class="klabel">KEY WORD</span><span class="kword">${esc(q.key)}</span></div>
  <div class="trow">${esc(q.before)} <span class="tgap" id="tgap">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span> ${esc(q.after)}</div>
  <input class="tin" id="tin" type="text" autocomplete="off" spellcheck="false" placeholder="2\u20135 words including the key word" oninput="G.val=this.value;updTgap()" onkeydown="if(event.key==='Enter'&&G.val.trim())chk()">`;
}

function htmlP5(q){
  // Highlight the phrasal verb within the sentence
  var highlighted = esc(q.sent).replace(
    esc(q.pv),
    '<span style="color:var(--p5);font-weight:500;border-bottom:2px solid var(--p5);padding-bottom:1px">'+esc(q.pv)+'</span>'
  );
  return '<div class="sent">'+highlighted+'</div>'
    +'<div class="opts" id="p5opts">'+q.opts.map(function(o){
      return '<button class="opt" data-l="'+o[0]+'" onclick="pickP5(this.dataset.l)">'+esc(o)+'</button>';
    }).join('')+'</div>';
}

function pickP5(letter){
  if(G.done) return;
  var q=G.qs[G.idx];
  var correct=letter===q.a;
  G.score+=correct?1:0;
  G.done=true;
  G.results.push({idx:G.idx,correct:correct,skipped:false,hint:G.hintUsed});
  if(correct){G.streak++;G.maxStreak=Math.max(G.maxStreak,G.streak);}else{G.streak=0;}
  document.querySelectorAll('.opt').forEach(function(btn){
    btn.disabled=true;
    if(btn.dataset.l===q.a) btn.classList.add('ok');
    else if(btn.dataset.l===letter&&!correct) btn.classList.add('bad');
  });
  if(correct){
    renderBot();
    setTimeout(function(){ if(G.done) nxt(); },1000);
  } else {
    G.hint=true; G.hintUsed=true;
    var hb=document.getElementById('hbox'),hbtn=document.getElementById('hbtn');
    if(hb) hb.style.display='block';
    if(hbtn) hbtn.textContent='Hide hint';
    renderBot();
  }
}

function htmlCOL(q){
  // Collocations odd-one-out: show key word as badge + prompt question
  var html='<div style="display:inline-flex;align-items:center;gap:7px;margin-bottom:16px;background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.25);border-radius:7px;padding:5px 12px">'
    +'<span style="font-size:10px;color:var(--p6);letter-spacing:.1em;font-weight:500">KEY WORD</span>'
    +'<span style="font-family:monospace;font-size:.95rem;color:#c4b5fd;font-weight:500">'+esc(q.key)+'</span>'
    +'</div>';
  html+='<div style="font-size:1.07rem;line-height:1.7;margin-bottom:22px;color:var(--tx)">'+esc(q.prompt)+'</div>';
  html+='<div class="opts">'+q.opts.map(function(o){
    return '<button class="opt" data-l="'+o[0]+'" onclick="pickMC(this.dataset.l)">'+esc(o)+'</button>';
  }).join('')+'</div>';
  return html;
}

function htmlVOC(q){
  // Vocab: show topic badge + definition, choose the word
  var c='var(--p7)';
  var html='<div style="display:inline-flex;align-items:center;gap:6px;margin-bottom:16px;background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.25);border-radius:7px;padding:4px 11px">'
    +'<span style="font-size:10px;color:var(--p7);letter-spacing:.1em;font-weight:500">'+esc(q.topic).toUpperCase()+'</span>'
    +'</div>';
  html+='<div style="font-size:1.07rem;line-height:1.7;margin-bottom:24px;color:var(--tx)">'+esc(q.def)+'</div>';
  html+='<div class="opts">'+q.opts.map(function(o){
    return '<button class="opt" data-l="'+o[0]+'" onclick="pickMC(this.dataset.l)">'+esc(o)+'</button>';
  }).join('')+'</div>';
  return html;
}

function pickMC(letter){
  // Generic MC handler for COL and VOC (and could be used by P1/P5 too)
  if(G.done) return;
  var q=G.qs[G.idx];
  var correct=letter===q.a;
  G.score+=correct?1:0;
  G.done=true;
  G.results.push({idx:G.idx,correct:correct,skipped:false,hint:G.hintUsed});
  if(correct){G.streak++;G.maxStreak=Math.max(G.maxStreak,G.streak);}else{G.streak=0;}
  document.querySelectorAll('.opt').forEach(function(btn){
    btn.disabled=true;
    if(btn.dataset.l===q.a) btn.classList.add('ok');
    else if(btn.dataset.l===letter&&!correct) btn.classList.add('bad');
  });
  if(correct){
    renderBot();
    setTimeout(function(){ if(G.done) nxt(); },1000);
  } else {
    G.hint=true; G.hintUsed=true;
    var hb=document.getElementById('hbox'),hbtn=document.getElementById('hbtn');
    if(hb) hb.style.display='block';
    if(hbtn) hbtn.textContent='Hide hint';
    renderBot();
  }
}

function htmlHint(q){
  const hint=getHint(q);
  if(!hint) return '';
  return `<div class="harea"><button class="hbtn" id="hbtn" onclick="togHint()">${G.hint?'Hide hint':'Show hint'}</button>
  <div class="hbox" id="hbox" style="${G.hint?'':'display:none'}"><div class="htag">HINT</div><div class="htxt">${esc(hint)}</div></div></div>`;
}

function togHint(){
  G.hint=!G.hint;
  if(G.hint) G.hintUsed=true;
  const b=document.getElementById('hbox'),btn=document.getElementById('hbtn');
  if(b) b.style.display=G.hint?'block':'none';
  if(btn) btn.textContent=G.hint?'Hide hint':'Show hint';
}

function updTgap(){
  const g=document.getElementById('tgap');
  if(g) g.textContent=G.val||'\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0\u00a0';
  updBot();
}

function renderBot(){
  const p=PARTS.find(x=>x.id===G.partId),c=`var(${p.c})`;
  const isLast=G.idx===G.qs.length-1;
  const el=document.getElementById('qbot');
  if(G.done){
    el.innerHTML=`<button class="nxtbtn" style="background:${c}" onclick="nxt()">${isLast?'See Results &rarr;':'Next &rarr;'}</button>`;
  } else if([1,5,6,7].indexOf(G.bankMode&&G.qs[G.idx]&&G.qs[G.idx]._partId?G.qs[G.idx]._partId:G.partId)>=0){
    el.innerHTML='';
  } else {
    const active=G.val.trim().length>0;
    el.innerHTML=`<button class="chkbtn" id="chkbtn" onclick="chk()" style="background:${active?c:'var(--bd)'};color:${active?'#0d0f1a':'var(--dimmer)'};cursor:${active?'pointer':'default'}">Check</button>
    <button class="skipbtn" onclick="doSkip()">Skip &rarr;</button>`;
  }
}

function updBot(){
  if(G.done) return;
  const p=PARTS.find(x=>x.id===G.partId),c=`var(${p.c})`;
  const btn=document.getElementById('chkbtn');
  if(!btn) return;
  const active=G.val.trim().length>0;
  btn.style.background=active?c:'var(--bd)';
  btn.style.color=active?'#0d0f1a':'var(--dimmer)';
  btn.style.cursor=active?'pointer':'default';
}

function pickP1(letter){
  if(G.done) return;
  const q=G.qs[G.idx];
  const correct=letter===q.a;
  G.score+=correct?1:0;
  G.done=true;
  G.results.push({idx:G.idx,correct:correct,skipped:false,hint:G.hintUsed});
  if(correct){G.streak++;G.maxStreak=Math.max(G.maxStreak,G.streak);}else{G.streak=0;}
  document.querySelectorAll('.opt').forEach(btn=>{
    btn.disabled=true;
    if(btn.dataset.l===q.a) btn.classList.add('ok');
    else if(btn.dataset.l===letter&&!correct) btn.classList.add('bad');
  });
  const ansText=q.opts.find(o=>o[0]===q.a);
  const gap=document.getElementById('gap');
  if(gap&&ansText){gap.textContent=ansText.slice(3);gap.style.color='var(--green)';gap.style.borderColor='var(--green)';}
  if(correct){
    renderBot();
    setTimeout(()=>{ if(G.done) nxt(); },1000);
  } else {
    G.hint=true;
    const hb=document.getElementById('hbox'),hbtn=document.getElementById('hbtn');
    if(hb) hb.style.display='block';
    if(hbtn) hbtn.textContent='Hide hint';
    renderBot();
  }
}

function chk(){
  if(G.done||!G.val.trim()) return;
  const q=G.qs[G.idx], gn=norm(G.val);
  let gained=0, status='wrong';

  if(G.partId===4){
    const accepted=q.accept.map(norm);
    const fullyOk=accepted.includes(gn);
    if(fullyOk){gained=2;status='correct';}
    else{
      const h1=gn.includes(norm(q.chunk1)), h2=gn.includes(norm(q.chunk2));
      gained=(h1?1:0)+(h2?1:0);
      status=gained===2?'correct':gained===1?'partial':'wrong';
    }
  } else {
    // P2/P3: split 'a' field on '/' for multiple accepted answers
    const accepted=getAccepted(q);
    const ok=accepted.includes(gn);
    gained=ok?1:0; status=ok?'correct':'wrong';
  }

  G.score+=gained;
  G.done=true;
  G.results.push({idx:G.idx,correct:status==='correct',skipped:false,hint:G.hintUsed});
  if(status==='correct'){G.streak++;G.maxStreak=Math.max(G.maxStreak,G.streak);}else{G.streak=0;}
  const sc=status==='correct'?'var(--green)':status==='partial'?'var(--amber)':'var(--red)';
  const inp=document.getElementById('tin');
  if(inp){inp.readOnly=true;inp.style.borderColor=sc;inp.style.color=sc;}
  const tg=document.getElementById('tgap');
  if(tg){tg.style.borderColor=sc;tg.style.color=sc;}
  const gap=document.getElementById('gap');
  // Show canonical correct answer in gap
  const canonAns = q.accept ? q.accept[0] : (q.a ? q.a.split('/')[0] : '');
  if(gap){gap.textContent=canonAns;gap.style.color='var(--green)';gap.style.borderColor='var(--green)';}

  let fb='';
  if(G.partId===4){
    if(status==='correct') fb=`<div class="fb ok"><div class="fbm ok">&#10003; +2 marks &mdash; ${esc(q.accept[0])}</div></div>`;
    else if(status==='partial') fb=`<div class="fb mid"><div class="fbm mid">&#126; +1 mark &mdash; one point correct</div><div class="fbs">Full answer: ${esc(q.accept[0])}</div></div>`;
    else fb=`<div class="fb bad"><div class="fbm bad">&#10007; 0 marks</div><div class="fbs">Correct: ${esc(q.accept[0])}</div></div>`;
    fb+=`<div class="mbox"><div class="mlbl">MARKING POINTS</div><div class="mrow">&#9312; ${esc(q.p1)}<br>&#9313; ${esc(q.p2)}</div></div>`;
  } else {
    if(status==='correct'){
      fb=`<div class="fb ok"><div class="fbm ok">&#10003; Correct</div></div>`;
    } else {
      const accepted=getAccepted(q);
      const displayAns=accepted.join(' / ');
      fb=`<div class="fb bad"><div class="fbm bad">&#10007; &nbsp;Correct: <span style="color:var(--green)">${esc(displayAns)}</span></div></div>`;
    }
  }

  const ha=document.querySelector('.harea');
  if(ha) ha.insertAdjacentHTML('beforebegin',fb);
  G.hint=true; G.hintUsed=true;
  const hb=document.getElementById('hbox'),hbtn=document.getElementById('hbtn');
  if(hb) hb.style.display='block';
  if(hbtn) hbtn.textContent='Hide hint';
  renderBot();
}

function nxt(){
  if(G.idx>=G.qs.length-1){endSession();return;}
  G.idx++;G.done=false;G.val='';G.hint=false;G.hintUsed=false;renderQ();
}

function endSession(){
  const answered = G.done ? G.idx+1 : G.idx;
  const sMax = G.partId===4 ? answered*2 : answered;
  const pct = sMax>0 ? Math.round((G.score/sMax)*100) : 0;
  const k='p'+G.partId, prev=G.bests[k]||0;
  if(pct>prev){G.bests[k]=pct;lsSet('c1bests',G.bests);}
  // Update persistent question bank
  G.results.forEach(function(r){
    if(r.skipped) return;
    var q=G.qs[r.idx];
    if(!q) return;
    if(!r.correct){
      // Wrong — add/keep in bank as wrong
      BANK[q.id]={wrong:true,hint:r.hint,partId:G.partId};
    } else if(r.hint){
      // Correct but needed hint — add to bank unless already marked wrong
      if(!BANK[q.id]||!BANK[q.id].wrong){
        BANK[q.id]={wrong:false,hint:true,partId:G.partId};
      }
    } else {
      // Correct without hint — remove from bank entirely
      delete BANK[q.id];
    }
  });
  lsSet('c1bank',BANK);
  updateBankBtn();
  showResults();
}

function showResults(){
  const p=PARTS.find(x=>x.id===G.partId), c=`var(${p.c})`;
  const answered=G.done?G.idx+1:G.idx;
  const sMax=G.partId===4?answered*2:answered;
  const pct=sMax>0?Math.round((G.score/sMax)*100):0;
  const [grd,gc]=pct>=80?['Excellent','var(--green)']:pct>=60?['Good','var(--amber)']:['Keep Practising','var(--red)'];

  document.getElementById('rtag').style.color=c;
  document.getElementById('rtag').textContent=p.label+' \u00b7 '+answered+' question'+(answered!==1?'s':'');

  document.getElementById('rcrd').innerHTML=`<div class="rscore">${G.score}/${sMax}</div>
    <div class="rpct">${pct}%</div>
    <div class="rgrade" style="color:${gc};background:rgba(128,128,128,.1);border:1px solid rgba(128,128,128,.2)">${grd}</div>
    ${G.partId===4?'<div class="rnote">2 marks per question</div>':''}`;

  // Best score
  const best=G.bests['p'+G.partId];
  const isNew=best===pct&&pct>0;
  const rb=document.getElementById('rbest');
  rb.style.color=isNew?c:'var(--dimmer)';
  const hintCount=G.results.filter(r=>r.hint&&!r.skipped).length;
  let bestTxt=best!=null?(isNew?'\uD83C\uDF89 New personal best!':'Personal best: '+best+'%'):'';
  if(hintCount>0) bestTxt+=(bestTxt?' \u00b7 ':'')+hintCount+' hint'+(hintCount!==1?'s':'')+' used';
  if(G.maxStreak>1) bestTxt+=(bestTxt?' \u00b7 ':'')+'\uD83D\uDD25 Best streak: '+G.maxStreak;
  rb.textContent=bestTxt;

  // Breakdown dots
  const bd=document.getElementById('rbreakdown');
  if(G.results.length>0){
    bd.innerHTML=G.results.map((r,i)=>{
      const cls=r.skipped?'skip':r.correct?'ok':'bad';
      const sym=r.skipped?'–':r.correct?'✓':'✗';
      const hintMark=r.hint&&!r.skipped?' style="opacity:.6;font-style:italic"':'';
      const title='Q'+(i+1)+(r.hint?' (hint used)':'');
      return '<div class="rdot '+cls+'" title="'+title+'"'+hintMark+'>'+sym+'</div>';
    }).join('');
  } else { bd.innerHTML=''; }

  // Wrong answers review button
  const wrongQs=G.results.filter(r=>!r.correct);
  const hintQs=G.results.filter(r=>r.correct&&r.hint&&!r.skipped);
  const reviewBtn=document.getElementById('rreview');
  const reviewHintBtn=document.getElementById('rreviewhint');
  if(wrongQs.length>0){
    reviewBtn.style.display='block';
    reviewBtn.style.background=c;
    reviewBtn.textContent='Review '+wrongQs.length+' Mistake'+(wrongQs.length!==1?'s':'');
    reviewBtn.onclick=()=>startReview(wrongQs);
  } else {
    reviewBtn.style.display='none';
  }
  if(hintQs.length>0){
    reviewHintBtn.style.display='block';
    reviewHintBtn.style.background='rgba(108,142,191,.2)';
    reviewHintBtn.style.border='1.5px solid var(--blue)';
    reviewHintBtn.style.color='var(--blue)';
    reviewHintBtn.textContent='Revisit '+hintQs.length+' Hint-Assisted';
    reviewHintBtn.onclick=()=>startReview(hintQs);
  } else {
    reviewHintBtn.style.display='none';
  }

  const btn=document.getElementById('ragain');
  btn.style.background='transparent';
  btn.style.border='1.5px solid var(--bd)';
  btn.style.color='var(--tx)';
  btn.style.fontWeight='400';
  btn.style.fontSize='.94rem';
  btn.onclick=()=>startSession(G.partId,G.qs.length);

  show('s-results');
}

function startReview(wrongResults){
  // Re-run only the wrong questions from the last session
  const wrongQs=wrongResults.map(r=>G.qs[r.idx]);
  G.qs=wrongQs;
  G.idx=0; G.score=0; G.done=false; G.val=''; G.hint=false; G.hintUsed=false; G.results=[]; G.streak=0; G.maxStreak=0; G.bankMode=false;
  renderQ(); show('s-question');
}


function confirmStop(){
  if(G.idx===0 && !G.done){
    // Haven't answered anything yet — just go back quietly
    show('s-setup'); return;
  }
  // Show inline confirm inside the top bar rather than a browser dialog
  const bar=document.getElementById('qbot');
  if(document.getElementById('stop-confirm')) return; // already showing
  const p=PARTS.find(x=>x.id===G.partId), c=`var(${p.c})`;
  bar.insertAdjacentHTML('afterbegin',
    `<div id="stop-confirm" style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;background:rgba(251,113,133,.08);border:1px solid rgba(251,113,133,.25);border-radius:10px;padding:12px 14px">
      <span style="font-size:.85rem;color:var(--dim)">Stop and see results so far?</span>
      <div style="display:flex;gap:8px">
        <button onclick="document.getElementById('stop-confirm').remove()" style="background:transparent;border:1px solid var(--bd);color:var(--dim);border-radius:8px;padding:6px 14px;font-size:.82rem;cursor:pointer">Keep going</button>
        <button onclick="endSession()" style="background:var(--red);border:none;color:#0d0f1a;border-radius:8px;padding:6px 14px;font-size:.82rem;font-weight:700;cursor:pointer">Stop</button>
      </div>
    </div>`
  );
}

function doSkip(){
  if(G.done) return;
  const q=G.qs[G.idx];
  G.done=true;
  G.streak=0;
  G.results.push({idx:G.idx,correct:false,skipped:true});
  // Show the correct answer
  const canonAns=q.accept?q.accept[0]:(q.a?q.a.split('/')[0]:'');
  const gap=document.getElementById('gap');
  if(gap){gap.textContent=canonAns;gap.style.color='var(--green)';gap.style.borderColor='var(--green)';}
  const tg=document.getElementById('tgap');
  if(tg){tg.textContent=canonAns;tg.style.borderColor='var(--green)';tg.style.color='var(--green)';}
  const inp=document.getElementById('tin');
  if(inp){inp.readOnly=true;inp.style.borderColor='var(--bd)';}
  let fb='<div class="fb bad"><div class="fbm bad">&#8212; Skipped</div><div class="fbs">Answer: '+esc(canonAns)+'</div></div>';
  if(G.partId===4) fb+='<div class="mbox"><div class="mlbl">MARKING POINTS</div><div class="mrow">&#9312; '+esc(q.p1)+'<br>&#9313; '+esc(q.p2)+'</div></div>';
  const ha=document.querySelector('.harea');
  if(ha) ha.insertAdjacentHTML('beforebegin',fb);
  G.hint=true; G.hintUsed=true;
  const hb=document.getElementById('hbox'),hbtn=document.getElementById('hbtn');
  if(hb) hb.style.display='block';
  if(hbtn) hbtn.textContent='Hide hint';
  renderBot();
}

// Theme
var isLight = lsGet('c1theme', false);
function showBankMenu(){
  var wrongCount=Object.values(BANK).filter(function(e){return e.wrong;}).length;
  var hintCount=Object.values(BANK).filter(function(e){return !e.wrong&&e.hint;}).length;
  var total=wrongCount+hintCount;
  // Build a simple overlay menu
  var existing=document.getElementById('bank-menu');
  if(existing){ existing.remove(); return; }
  var menu=document.createElement('div');
  menu.id='bank-menu';
  menu.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding-bottom:32px';
  var inner='<div style="background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:24px 20px;width:min(440px,92vw);display:flex;flex-direction:column;gap:10px">'
    +'<div style="font-size:10px;color:var(--blue);letter-spacing:.1em;margin-bottom:6px">REVIEW BANK — '+total+' question'+(total!==1?'s':'')+' saved</div>';
  var bsBase='border-radius:10px;padding:14px;font-weight:700;font-size:.95rem;cursor:pointer;text-align:left;width:100%';
  if(total>0) inner+='<button data-action="all" style="background:var(--blue);color:#fff;border:none;'+bsBase+'">Review all '+total+' questions</button>';
  if(wrongCount>0) inner+='<button data-action="wrong" style="background:rgba(251,113,133,.12);color:var(--red);border:1.5px solid rgba(251,113,133,.3);'+bsBase+'">Incorrect only — '+wrongCount+'</button>';
  if(hintCount>0) inner+='<button data-action="hint" style="background:rgba(108,142,191,.1);color:var(--blue);border:1.5px solid rgba(108,142,191,.3);'+bsBase+'">Hint-assisted only — '+hintCount+'</button>';
  inner+='<button data-action="clear" style="background:transparent;border:1px solid var(--bd);color:var(--dim);border-radius:10px;padding:12px;font-size:.85rem;cursor:pointer;width:100%">Clear bank</button>';
  inner+='</div>';
  menu.innerHTML=inner;
  menu.addEventListener('click',function(e){
    if(e.target===menu){ menu.remove(); return; }
    var action=e.target.dataset.action;
    if(action==='all'){ menu.remove(); startBankReview(); }
    else if(action==='wrong'){ menu.remove(); startBankReview(function(id){return BANK[id].wrong;}); }
    else if(action==='hint'){ menu.remove(); startBankReview(function(id){return !BANK[id].wrong&&BANK[id].hint;}); }
    else if(action==='clear'){
      if(confirm('Clear the review bank?')){
        Object.keys(BANK).forEach(function(k){delete BANK[k];});
        lsSet('c1bank',BANK); updateBankBtn(); menu.remove();
      }
    }
  });
  document.body.appendChild(menu);
}

function applyTheme(){
  document.body.classList.toggle('light', isLight);
  var tb = document.getElementById('theme-toggle');
  if(tb) tb.textContent = isLight ? '\u263D' : '\u2600';
}
function toggleTheme(){
  isLight = !isLight;
  lsSet('c1theme', isLight);
  applyTheme();
}
applyTheme();

buildHome();
