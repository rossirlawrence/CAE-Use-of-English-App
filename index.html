_____ long as you sign the register and return it before five o'clock.", "a": "as", "h": "Fixed conjunction of condition: '___ long as' = provided that / on the condition that. The missing word is repeated — 'as ___ as'."}, {"id": "p2_n27", "sent": "_______ the fact that she had no prior experience, she was offered the position on the strength of her interview performance.", "a": "despite", "h": "This concessive preposition is followed by 'the fact that' when the contrast involves a full clause. Not 'although' — that introduces a clause directly without 'the fact that'."}, {"id": "p2_n28", "sent": "_______ it not been for the intervention of a passing motorist, the outcome could have been very much worse.", "a": "had", "h": "Formal inverted conditional — an alternative to 'if it had not been for'. The auxiliary moves to the front of the clause. Which auxiliary?"}, {"id": "p2_n29", "sent": "The conditions in the cave were _______ cramped that some members of the team had to wait outside while others surveyed.", "a": "so", "h": "Fixed intensifier structure: '___ + adjective + that' introduces a result clause. Not 'such' — that requires a noun phrase ('such a cramped space')."}, {"id": "p2_n30", "sent": "The discovery was _______ only significant for historians but also had major implications for our understanding of ancient trade routes.", "a": "not", "h": "Fixed correlative conjunction: '___ only X but also Y'. The missing word begins the first half of this additive emphatic structure."}, {"id": "p2_n31", "sent": "The journey takes about three hours, _______ or take, depending on traffic conditions and the route you choose.", "a": "give", "h": "Fixed idiomatic phrase meaning 'approximately, with a small margin of error'. It always uses two verbs — one of them is 'take'. Which verb comes first?"}, {"id": "p2_n32", "sent": "_______ the event of a fire, all staff must evacuate the building immediately and report to the assembly point.", "a": "in", "h": "Fixed prepositional phrase: '___ the event of' = if something happens. Which preposition begins this formal conditional phrase found on safety notices?"}, {"id": "p2_n33", "sent": "No sooner had she begun to relax _______ a new problem emerged that demanded her immediate attention.", "a": "than", "h": "Fixed correlative: 'no sooner...___'. Not 'when' — that pairs with 'hardly'. Which word always follows 'no sooner' in this construction?"}, {"id": "p2_n34", "sent": "_______ is worth pointing out that the figures quoted in the report refer only to the twelve months prior to the survey.", "a": "it", "h": "Fixed structure: '___ is worth + gerund'. The missing word is the dummy subject that begins this common evaluative phrase."}, {"id": "p2_n35", "sent": "_______ a matter of fact, the two companies had been in talks for several months before any announcement was made.", "a": "as", "h": "Fixed phrase: '___ a matter of fact' = in reality / actually. It is used to introduce information that corrects or refines what has been said. Which preposition begins it?"}, {"id": "p2_n36", "sent": "The details have been simplified here _______ the sake of clarity, though the full methodology is available in the appendix.", "a": "for", "h": "Fixed prepositional phrase: '___ the sake of + noun'. Which preposition begins this phrase meaning 'in order to achieve'?"}, {"id": "p2_n37", "sent": "The company can barely afford to cover its running costs, _______ alone invest in new equipment or staff training.", "a": "let", "h": "Fixed phrase meaning 'much less / never mind'. Used after a negative to introduce something even more extreme. Which verb begins this two-word idiom?"}, {"id": "p2_n38", "sent": "If current trends continue, there is _______ to be a significant shortage of skilled workers in the construction sector.", "a": "bound", "h": "Fixed phrase: 'there is ___ to be' = it is certain that there will be. Which adjective completes this structure expressing near-certainty?"}, {"id": "p2_n39", "sent": "The company has prioritised rapid growth _______ the expense of staff wellbeing, and the consequences are now becoming clear.", "a": "at", "h": "Fixed phrase: '___ the expense of' = to the detriment of / at the cost of. Which preposition begins this phrase?"}, {"id": "p2_n40", "sent": "She was determined to finish the race, _______ what may, even if it meant pushing through considerable pain.", "a": "come", "h": "Fixed idiom meaning 'whatever happens / regardless of circumstances'. It is a set phrase using an unusual inversion. Which verb begins it?"}, {"id": "p2_n41", "sent": "_______ it not for the strict regulations governing the industry, the situation could easily have been far more serious.", "a": "were", "h": "Formal inverted conditional in the present/unreal — alternative to 'if it were not for'. Which auxiliary moves to the front in this formal structure?"}, {"id": "p2_n42", "sent": "With resources severely stretched, the team had to make _______ with the equipment already available to them.", "a": "do", "h": "Fixed phrasal verb: 'make ___ with' = manage using what is available, despite it not being ideal. Which verb completes this three-part idiom?"}, {"id": "p2_n43", "sent": "What initially seemed like a setback eventually turned _______ to be one of the most valuable experiences of her career.", "a": "out", "h": "Phrasal verb: 'turn ___ to be' = prove to be / be discovered to be. Which particle completes this common expression of unexpected outcome?"}, {"id": "p2_n44", "sent": "This was _______ far the most ambitious project the organisation had ever undertaken, and the risks were considerable.", "a": "by", "h": "Fixed intensifier: '___ far the most / least + superlative'. Which preposition begins this expression meaning 'to a very large degree'?"}, {"id": "p2_n45", "sent": "The design of the new building is, broadly speaking, _______ keeping with the architectural style of the surrounding area.", "a": "in", "h": "Fixed phrase: '___ keeping with' = consistent with / in harmony with. Which preposition begins this expression?"}, {"id": "p2_n46", "sent": "The process of negotiating the agreement was _______ but straightforward, with talks breaking down on three separate occasions.", "a": "anything", "h": "Fixed phrase meaning 'not at all / far from'. The phrase '___ but + adjective' is an emphatic negative. Not 'far' — that would require 'from'. Which word goes here?"}, {"id": "p2_n47", "sent": "_______ by the response of the audience, the production was a considerable success, despite the mixed critical reviews.", "a": "judging", "h": "Fixed participial phrase: '___ by' = based on the evidence of. It introduces an inference drawn from observable evidence. Which participle begins it?"}, {"id": "p2_n48", "sent": "_______ as neither side showed any willingness to compromise, the mediator called a recess to allow tempers to cool.", "a": "seeing", "h": "Fixed causal conjunction meaning 'given that / since'. It is informal-to-neutral in register and introduces a reason. Which participle begins it?"}, {"id": "p2_n49", "sent": "All applicants must submit their documentation _______ to the closing date, as late applications will not be considered.", "a": "prior", "h": "Formal prepositional phrase: '___ to' = before. It is more formal than 'before' and is common in official instructions. Which adjective forms it?"}, {"id": "p2_n50", "sent": "_______ from resolving the underlying tensions, the new agreement appears only to have deepened them.", "a": "far", "h": "Fixed phrase: '___ from + gerund' = instead of / rather than — often introducing an ironic contrast. Which adverb begins this construction?"}, {"id": "p2_n51", "sent": "The evidence against the theory is considerable. _______ the same, a number of researchers continue to defend it.", "a": "all", "h": "Fixed phrase meaning 'nevertheless / in spite of this'. It introduces a concession after acknowledging something. Which word begins this two-word discourse marker?"}, {"id": "p2_n52", "sent": "With so many jobs _______ stake, the unions were determined not to accept any compromise on the key terms.", "a": "at", "h": "Fixed phrase: '___ stake' = at risk / in jeopardy. Which preposition begins this phrase meaning something important is in danger of being lost?"}, {"id": "p2_n53", "sent": "The final results fell _______ of the targets that had been set, despite the considerable effort invested by the team.", "a": "short", "h": "Fixed phrasal verb: 'fall ___ of' = fail to reach or meet a standard. Which adjective completes this three-part expression?"}, {"id": "p2_n54", "sent": "_______ the light of the new evidence, the committee has decided to reopen the investigation into the original decision.", "a": "in", "h": "Fixed phrase: '___ the light of' = taking into account / as a result of. Which preposition begins this formal expression used when new information changes a situation?"}, {"id": "p2_n55", "sent": "_______ it stands, the proposal does not have sufficient support to pass, and amendments will need to be agreed.", "a": "as", "h": "Fixed phrase: '___ it stands' = in its current form / at the moment. Which conjunction begins this expression describing the current state of affairs?"}];
const P3 = [{"id": "p3_001", "sent": "The company's [FAIL] to adapt to changing market conditions ultimately led to its collapse.", "root": "FAIL", "a": "failure", "h": "You need a NOUN. Think about what happens when someone 'fails to do' something — what is that event called?"}, {"id": "p3_002", "sent": "The [PUBLISH] of the leaked documents caused a major political controversy.", "root": "PUBLISH", "a": "publication", "h": "You need a NOUN for 'the ___ of documents'. What do you call the act of making something public? Watch the spelling."}, {"id": "p3_003", "sent": "Many young people feel [OVERWHELM] by the sheer scale of the environmental challenges ahead.", "root": "OVERWHELM", "a": "overwhelmed", "h": "You need an ADJECTIVE (or past participle used as adjective) after 'feel'. Does the context suggest positive or negative — are they coping?"}, {"id": "p3_004", "sent": "The minister gave an [ACCURATE] account of events, which directly contradicted what witnesses had said.", "root": "ACCURATE", "a": "inaccurate", "h": "Look at the context: the account 'contradicted' witnesses. You need an ADJECTIVE — and the meaning must be the opposite of the root word."}, {"id": "p3_005", "sent": "The committee's [REJECT] of the proposal came as a surprise to many who expected it to be approved.", "root": "REJECT", "a": "rejection", "h": "You need a NOUN to follow 'The committee's ___ of the proposal'. What noun means the act of rejecting something?"}, {"id": "p3_006", "sent": "She was known for her [FORESEE], always anticipating problems long before they arose.", "root": "FORESEE", "a": "foresight", "h": "You need a NOUN. The root is a verb meaning 'to see ahead'. The noun form is irregular — it does not end in -ing or -ance."}, {"id": "p3_007", "sent": "The council has a legal [OBLIGE] to ensure that all public buildings meet accessibility standards.", "root": "OBLIGE", "a": "obligation", "h": "You need a NOUN: 'the council has a legal ___'. The noun means a duty imposed by law. Note the spelling change from the root."}, {"id": "p3_008", "sent": "The new treatment has shown highly [PROMISE] results in early clinical trials.", "root": "PROMISE", "a": "promising", "h": "You need an ADJECTIVE before 'results'. The context says results are positive and show potential. Add a suffix to turn the root into a descriptive word."}, {"id": "p3_009", "sent": "She demonstrated remarkable [PERSEVERE] throughout the gruelling eighteen-month training programme.", "root": "PERSEVERE", "a": "perseverance", "h": "You need a NOUN. The root is a verb meaning to keep trying despite difficulty. What abstract noun describes that quality? Note the spelling."}, {"id": "p3_010", "sent": "The [MERGE] of the two rival companies was announced at a press conference yesterday morning.", "root": "MERGE", "a": "merger", "h": "You need a NOUN meaning the event of two companies combining. It is a single-word noun, not the verb form."}, {"id": "p3_011", "sent": "He made several [SUCCEED] attempts to access the system before his account was permanently locked.", "root": "SUCCEED", "a": "unsuccessful", "h": "You need an ADJECTIVE. The context is negative — the attempts were not successful. You need a prefix AND a suffix applied to a form of the root."}, {"id": "p3_012", "sent": "The team's [ACHIEVE] in reaching the final was celebrated by supporters across the country.", "root": "ACHIEVE", "a": "achievement", "h": "You need a NOUN meaning something accomplished. The suffix is common and does not alter the spelling of the root significantly."}, {"id": "p3_013", "sent": "The [WEAK] of the building's foundations was only discovered during renovation work.", "root": "WEAK", "a": "weakness", "h": "You need a NOUN. The foundations had a structural problem. What noun describes the state of being weak?"}, {"id": "p3_014", "sent": "Her [WILL] to accept criticism made it very difficult for colleagues to work with her.", "root": "WILL", "a": "unwillingness", "h": "You need a NOUN. The context is negative — she was not willing to accept criticism. You need multiple affixes: one negative prefix, one adjective suffix, one noun suffix."}, {"id": "p3_015", "sent": "The report highlighted the [ADEQUATE] of existing legislation in dealing with online financial fraud.", "root": "ADEQUATE", "a": "inadequacy", "h": "You need a NOUN. The legislation was not adequate — the report highlighted its ___. You need a negative prefix and a noun suffix; the spelling changes."}, {"id": "p3_016", "sent": "Her research has received [WIDE] recognition across the international scientific community.", "root": "WIDE", "a": "widespread", "h": "You need an ADJECTIVE — it must modify the noun 'recognition'. Think about a compound adjective built from the root and another common word."}, {"id": "p3_017", "sent": "The school was praised for its [INNOVATE] approach to addressing underachievement among disadvantaged pupils.", "root": "INNOVATE", "a": "innovative", "h": "You need an ADJECTIVE describing an approach. The root is a verb. Which suffix turns it into a word meaning 'characterised by new ideas'?"}, {"id": "p3_018", "sent": "The [DISCOVER] of the ancient burial site has significant implications for our understanding of the period.", "root": "DISCOVER", "a": "discovery", "h": "You need a NOUN for 'The ___ of the burial site'. What noun means the act or event of discovering something? Note the spelling change."}, {"id": "p3_019", "sent": "Many staff felt [VALUE] by the management's failure to consult them before implementing the changes.", "root": "VALUE", "a": "undervalued", "h": "You need an ADJECTIVE (past participle). The staff were not given enough value. A prefix meaning 'insufficiently' can be added. The word describes a feeling."}, {"id": "p3_020", "sent": "The regeneration project has greatly improved the [ACCESSIBLE] of the city's outer districts.", "root": "ACCESSIBLE", "a": "accessibility", "h": "You need a NOUN. The root is an adjective. To turn it into a noun meaning 'the quality of being accessible', the ending changes considerably."}, {"id": "p3_021", "sent": "She handled the delicate diplomatic situation with great [SENSITIVE] and tact.", "root": "SENSITIVE", "a": "sensitivity", "h": "You need a NOUN: 'with great ___'. The root is an adjective. What abstract noun describes the quality of being sensitive to a situation?"}, {"id": "p3_022", "sent": "Researchers were surprised by the [RELUCTANT] of many participants to engage openly with the study.", "root": "RELUCTANT", "a": "reluctance", "h": "You need a NOUN: 'the ___ of many participants'. The root is an adjective. The noun form ends in a different suffix than the adjective."}, {"id": "p3_023", "sent": "The [IMPLEMENT] of the new IT system took far longer than expected and caused significant disruption.", "root": "IMPLEMENT", "a": "implementation", "h": "You need a NOUN for 'The ___ of the new IT system'. What noun describes the process of implementing something? Note the spelling."}, {"id": "p3_024", "sent": "The ambassador's formal [ENDORSE] of the agreement was widely seen as a diplomatic breakthrough.", "root": "ENDORSE", "a": "endorsement", "h": "You need a NOUN: 'the ambassador's formal ___'. What noun means an official act of endorsing something? A common suffix applies here."}, {"id": "p3_025", "sent": "She was [REFRESH] candid about the difficulties she had encountered during the research process.", "root": "REFRESH", "a": "refreshingly", "h": "You need an ADVERB modifying 'candid'. The root is a verb. You need to go via an adjective before adding the adverb suffix."}, {"id": "p3_026", "sent": "The council adopted a [CONSULT] approach, holding several public meetings before finalising the plans.", "root": "CONSULT", "a": "consultative", "h": "You need an ADJECTIVE for 'a ___ approach'. The root is a verb. The suffix indicates something that involves the action described by the root."}, {"id": "p3_027", "sent": "A serious [COMMUNICATE] between the two project teams led to significant and costly delays.", "root": "COMMUNICATE", "a": "miscommunication", "h": "You need a NOUN. The teams failed to communicate properly — this caused delays. A prefix meaning 'wrongly' applies here, and the noun suffix follows."}, {"id": "p3_028", "sent": "The success of the fundraising campaign was [LARGE] dependent on the goodwill of local volunteers.", "root": "LARGE", "a": "largely", "h": "You need an ADVERB. It modifies 'dependent'. The root is an adjective. The change from adjective to adverb is straightforward."}, {"id": "p3_029", "sent": "Her [DETERMINE] to complete the novel despite her illness was an inspiration to everyone who knew her.", "root": "DETERMINE", "a": "determination", "h": "You need a NOUN: 'Her ___ to finish the novel'. What abstract noun expresses the quality of being determined? Note the spelling change from the root."}, {"id": "p3_030", "sent": "The bridge was declared [SAFE] and closed to all vehicles immediately after the inspection.", "root": "SAFE", "a": "unsafe", "h": "You need an ADJECTIVE. The bridge was closed — this tells you whether the meaning should be positive or negative relative to the root."}, {"id": "p3_031", "sent": "A solid understanding of the [FOUND] of scientific method is essential for all research students.", "root": "FOUND", "a": "foundations", "h": "You need a PLURAL NOUN: 'a solid understanding of the ___'. This word refers to fundamental principles or physical base structures. Don't use the singular."}, {"id": "p3_032", "sent": "The new measures have been [BROAD] welcomed by businesses, though some concerns remain.", "root": "BROAD", "a": "broadly", "h": "You need an ADVERB modifying 'welcomed'. The root is an adjective. Converting it to an adverb is straightforward — but think about whether the adjective form or a modified version takes the suffix. There is no spelling change."}, {"id": "p3_033", "sent": "The [DEVASTATE] effects of the financial crash continued to be felt for over a decade.", "root": "DEVASTATE", "a": "devastating", "h": "You need an ADJECTIVE modifying 'effects'. The root is a verb. Which suffix makes it descriptive — meaning it causes great destruction?"}, {"id": "p3_034", "sent": "The level of [CONTAMINATE] in the city's water supply was found to be within acceptable limits.", "root": "CONTAMINATE", "a": "contamination", "h": "You need a NOUN: 'the level of ___'. The root is a verb. What noun means the state or process of contaminating something?"}, {"id": "p3_035", "sent": "Her [RESILIENT] in the face of repeated setbacks earned the admiration of her colleagues.", "root": "RESILIENT", "a": "resilience", "h": "You need a NOUN: 'Her ___ in the face of setbacks'. The root is an adjective. The noun form changes the ending — it does not simply add -ness."}, {"id": "p3_036", "sent": "The [AUTHENTIC] of the ancient manuscript had been disputed for many years before new tests resolved the matter.", "root": "AUTHENTIC", "a": "authenticity", "h": "You need a NOUN: 'The ___ of the manuscript'. The root is an adjective meaning genuine. What abstract noun means 'the quality of being authentic'?"}, {"id": "p3_037", "sent": "He showed great [FLEXIBLE] in managing the conflicting demands of his many clients simultaneously.", "root": "FLEXIBLE", "a": "flexibility", "h": "You need a NOUN: 'He showed great ___'. The root is an adjective. The noun form requires a spelling change at the end of the root."}, {"id": "p3_038", "sent": "The [INTRODUCE] of the new bus routes has transformed commuting for thousands of residents.", "root": "INTRODUCE", "a": "introduction", "h": "You need a NOUN: 'The ___ of the new bus routes'. The root is a verb. What noun describes the act of introducing something? Note the internal spelling change."}, {"id": "p3_039", "sent": "The company made an [UNWAVER] commitment to achieving carbon neutrality before the end of the decade.", "root": "UNWAVER", "a": "unwavering", "h": "You need an ADJECTIVE meaning steady and resolut nded / sensible to do'. There is a spelling trap — when you add the suffix, the silent E at the end of the root behaves in a specific way. Think carefully before writing."}, {"id": "p3_n07", "sent": "The initial response from investors was deeply [COURAGE], with several withdrawing their funding within days.", "root": "COURAGE", "a": "discouraging", "h": "You need an ADJECTIVE meaning 'causing loss of confidence or hope'. You need BOTH a negative prefix AND a suffix. The prefix is not the obvious one — it doesn't mean 'not courageous'."}, {"id": "p3_n08", "sent": "The crossing required extraordinary levels of physical [ENDURE] from every member of the crew.", "root": "ENDURE", "a": "endurance", "h": "You need a NOUN meaning 'the ability to sustain effort over a long time'. The suffix is -ANCE, but the spelling of the root changes slightly when the suffix is added."}, {"id": "p3_n09", "sent": "After months of rehabilitation, she was finally able to [GAIN] full use of her injured hand.", "root": "GAIN", "a": "regain", "h": "You need a VERB meaning 'get back something that was lost'. A prefix is needed — and it's not a negative one. Think about what prefix means 'again' or 'back to a previous state'."}, {"id": "p3_n10", "sent": "The system proved far less [RELY] in tropical conditions than the manufacturer had claimed.", "root": "RELY", "a": "reliable", "h": "You need an ADJECTIVE meaning 'dependable / can be trusted'. There is a spelling trap — adding the suffix requires a change to the final letter of the root before -ABLE is added."}, {"id": "p3_n11", "sent": "Progress across different sectors of the economy has been deeply [EVEN], with some regions thriving while others stagnate.", "root": "EVEN", "a": "uneven", "h": "You need an ADJECTIVE meaning 'not consistent / irregular'. A prefix is needed to reverse the meaning. Note the context: some regions are doing well while others are not — so the overall picture is not balanced."}, {"id": "p3_n12", "sent": "The organisation relies heavily on customer [FEED] to improve its service, and reviews are read by senior management.", "root": "FEED", "a": "feedback", "h": "You need a NOUN. The answer is a compound word — two smaller words joined together. One of them is the root. The other part relates to returning or going back to the source."}, {"id": "p3_n13", "sent": "A detailed [ANALYSE] of the data revealed a strong correlation between sleep deprivation and workplace errors.", "root": "ANALYSE", "a": "analysis", "h": "You need a NOUN meaning 'careful examination of data or evidence'. The noun form does NOT follow the -ATION or -MENT pattern. It uses a less common suffix and the ending of the root itself changes."}, {"id": "p3_n14", "sent": "The documentary included [EDIT] footage that had not been broadcast at the time of the original transmission.", "root": "EDIT", "a": "unedited", "h": "You need an ADJECTIVE meaning 'not altered or cut before publishing/broadcasting'. You need both a prefix (meaning NOT) and a suffix that makes the verb into a participial adjective."}, {"id": "p3_n15", "sent": "The inspector's [RECOMMEND] was that all affected vehicles be withdrawn from service with immediate effect.", "root": "RECOMMEND", "a": "recommendation", "h": "You need a NOUN meaning 'a formal suggestion or piece of advice'. The suffix is -ATION, but watch the spelling carefully — the root itself contains a double consonant that must be preserved."}, {"id": "p3_n16", "sent": "The scientists went to considerable [LONG] to verify their data before publishing, running the experiments three times.", "root": "LONG", "a": "lengths", "h": "You need a PLURAL NOUN for a fixed idiom meaning 'great effort'. The derivation from this adjective is entirely irregular — no standard suffix applies."}, {"id": "p3_n17", "sent": "His [APPLY] for a research grant was turned down for the second consecutive year, despite strong references.", "root": "APPLY", "a": "application", "h": "You need a NOUN. The root is sual way here. Think carefully about the spelling."}, {"id": "p3_n35", "sent": "The decision requires careful [JUDGE], as the consequences of getting it wrong could be significant for all involved.", "root": "JUDGE", "a": "judgement", "h": "You need a NOUN. The suffix -MENT is standard. However, there are two accepted spellings of this word — both are correct, but one is more common in British English."}, {"id": "p3_n36", "sent": "The remote community has become largely [SUFFICIENT], generating its own electricity and growing most of its own food.", "root": "SUFFICIENT", "a": "self-sufficient", "h": "You need a COMPOUND ADJECTIVE meaning 'able to provide for oneself without outside help'. The prefix is a reflexive one that implies the action applies back to the subject."}, {"id": "p3_n37", "sent": "The proposal was [AMBITION] in scope, aiming to transform the entire public transport network within a decade.", "root": "AMBITION", "a": "ambitious", "h": "You need an ADJECTIVE. The root is a NOUN. The suffix -IOUS is added, but the ending of the noun changes before the suffix — it does not simply attach -IOUS to the full noun form."}, {"id": "p3_n38", "sent": "Critics argued that decades of [GOVERN] had left the country's infrastructure in a state of serious disrepair.", "root": "GOVERN", "a": "misgovernment", "h": "You need a NOUN with a negative prefix meaning 'bad or corrupt governing'. The prefix implies something has been done wrongly or badly. What is that prefix?"}, {"id": "p3_n39", "sent": "The exhibition traces the development of [CIVILISE] from its earliest origins in Mesopotamia to the present day.", "root": "CIVILISE", "a": "civilisation", "h": "You need a NOUN. The suffix is -ATION, but the spelling of the root changes when it is added — the final letters of the verb do not simply carry over unchanged."}, {"id": "p3_n40", "sent": "Rising [EMPLOY] has become one of the most pressing concerns facing policymakers across the developed world.", "root": "EMPLOY", "a": "unemployment", "h": "You need a NOUN. The context is negative — more people are out of work. You need a prefix meaning NOT, then the standard verb-to-noun suffix. Watch the final spelling."}, {"id": "p3_n41", "sent": "The charity provides [HOUSE] for families who have been made homeless following domestic violence.", "root": "HOUSE", "a": "housing", "h": "You need a NOUN (uncountable) meaning accommodation provided for people in need. It is not simply a gerund — it is a fixed noun in social-policy language."}, {"id": "p3_n42", "sent": "The author writes with [REMARK] clarity about subjects that other writers find impossibly difficult to explain.", "root": "REMARK", "a": "remarkable", "h": "You need an ADJECTIVE. The root is a NOUN. Wait — the adverb 'remarkably' is also possible. But 'writes with ___ clarity' needs an adjective to modify the noun that follows, not an adverb. Check the grammar."}, {"id": "p3_n43", "sent": "The government's [SHIFT] of resources away from preventive care has had serious long-term consequences.", "root": "SHIFT", "a": "shifting", "h": "You need a NOUN or GERUND. The root word is both a noun and a verb — but in this context, which form fits: 'The government's ___ of resources'? Think about what word class follows a possessive."}, {"id": "p3_n44", "sent": "The company was heavily criticised for its [TREAT] of workers in its overseas manufacturing facilities.", "root": "TREAT", "a": "treatment", "h": "You need a NOUN meaning 'the way someone is treated'. The suffix is common — check the spelling to make sure no letters are dropped or changed."}, {"id": "p3_n45", "sent": "The committee acknowledged that the original decision had been [INFORM] by incomplete data and flawed assumptions.", "root": "INFORM", "a": "informed", "h": "You need a PAST PARTICIPLE used as an adjective in a passive construction. 'Had been ___ by' — what does the data do to the decision? No affix is needed beyond the standard verb ending."}, {"id": "p3_n46", "se
