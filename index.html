<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>C1 Advanced — Use of English</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0f1a;--s1:#13152a;--bd:#1e2235;--tx:#eeeef5;--dim:rgba(238,238,245,.38);--dimmer:rgba(238,238,245,.18);--p1:#f59e0b;--p2:#34d399;--p3:#818cf8;--p4:#fb7185;--p5:#06b6d4;--p6:#8b5cf6;--p7:#f97316;--green:#34d399;--red:#fb7185;--amber:#f59e0b;--blue:#6c8ebf}
.light{--bg:#f5f4f0;--s1:#ffffff;--bd:#dddbd4;--tx:#1a1a18;--dim:rgba(26,26,24,.65);--dimmer:rgba(26,26,24,.45);--p1:#b8860b;--p2:#1a7a50;--p3:#4c3fbf;--p4:#b5253a;--p5:#0891b2;--p6:#6d28d9;--p7:#c2410c;--green:#1a7a50;--red:#b5253a;--amber:#b8860b;--blue:#2a5a9f}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif}
input,button{font-family:inherit}
input:focus{outline:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#2a2d3e;border-radius:2px}
.scr{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;transform:translateY(12px);overflow:hidden}
.scr.on{opacity:1;pointer-events:all;transform:none}
#s-home{overflow-y:auto}
.home-pad{padding:44px 20px 20px}
.eyebrow{font-family:'DM Mono',monospace;font-size:10px;color:var(--p1);letter-spacing:.14em;margin-bottom:10px}
.h1{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1.9rem,8vw,2.8rem);line-height:1.1;margin-bottom:6px}
.sub{color:var(--dim);font-size:.88rem;font-weight:300;margin-bottom:36px}
.tiles{padding:0 16px 48px;display:flex;flex-direction:column;gap:11px}
.tile{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background .12s,border-color .12s,transform .12s;text-align:left;width:100%;-webkit-appearance:none}
.tile:active{transform:scale(.97);background:#1a1d2e}
.tag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;margin-bottom:5px}
.tname{font-family:'Syne',sans-serif;font-weight:700;font-size:1.05rem;color:var(--tx);margin-bottom:2px}
.tsub{font-size:.76rem;color:var(--dimmer);font-weight:300}
.tile-r{display:flex;flex-direction:column;align-items:flex-end;gap:5px;margin-left:10px}
.bbadge{font-family:'DM Mono',monospace;font-size:11px;border-radius:6px;padding:3px 8px}
.arrow{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.15rem;line-height:1;flex-shrink:0}
#s-setup{overflow-y:auto;padding:0 20px 48px}
.setup-head{padding:36px 0 18px;display:flex;align-items:center;gap:12px}
.bk{background:none;border:none;color:var(--dimmer);font-size:1.5rem;padding:4px 8px;cursor:pointer;line-height:1}
.setup-head h2{font-family:'Syne',sans-serif;font-weight:700;font-size:1.35rem}
.p4note{color:var(--dim);font-size:.83rem;margin-bottom:22px;line-height:1.7;font-weight:300;background:rgba(251,113,133,.06);border:1px solid rgba(251,113,133,.2);border-radius:10px;padding:12px 15px}
.p4note strong{color:var(--red)}
.cnt-btns{display:flex;flex-direction:column;gap:10px}
.cnt-btn{border-radius:12px;padding:17px 20px;font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;text-align:left;cursor:pointer;transition:background .1s,color .1s,transform .1s;border:1.5px solid transparent;-webkit-appearance:none}
.cnt-btn:active{transform:scale(.97)}
#s-question{display:flex;flex-direction:column}
.qtop{padding:13px 18px 11px;border-bottom:1px solid var(--bd);flex-shrink:0}
.qtop-row{display:flex;align-items:center;gap:10px}
.stop-btn{background:none;border:none;color:var(--dim);font-size:1rem;padding:4px 6px;cursor:pointer;line-height:1;flex-shrink:0;border-radius:6px;transition:color .15s}
.stop-btn:hover{color:var(--red)}
.pbar{flex:1;height:5px;background:var(--bd);border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px;transition:width .4s}
.qctr{font-family:'DM Mono',monospace;font-size:12px;flex-shrink:0}
.qscr{font-family:'DM Mono',monospace;font-size:12px;color:var(--dim);flex-shrink:0}
.qbody{flex:1;overflow-y:auto;padding:22px 20px 14px;-webkit-overflow-scrolling:touch}
.ptag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;margin-bottom:16px}
.sent{font-size:1.07rem;line-height:1.85;margin-bottom:24px;color:var(--tx)}
.gap{display:inline-block;min-width:80px;border-bottom:2px solid rgba(238,238,245,.25);margin:0 4px;vertical-align:bottom;font-family:'DM Mono',monospace;font-size:.84rem;padding:0 3px;transition:color .2s,border-color .2s}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{background:var(--s1);border:1.5px solid var(--bd);border-radius:12px;padding:14px 18px;font-size:.93rem;text-align:left;cursor:pointer;transition:background .1s,border-color .1s,transform .1s;width:100%;-webkit-appearance:none;color:var(--tx)}
.opt:active:not(:disabled){transform:scale(.97)}
.opt.ok{background:rgba(52,211,153,.1)!important;border-color:var(--green)!important;color:var(--green)!important}
.opt.bad{background:rgba(251,113,133,.1)!important;border-color:var(--red)!important;color:var(--red)!important}
.tin{width:100%;background:var(--s1);border:1.5px solid var(--bd);border-radius:12px;padding:15px 18px;font-size:1rem;color:var(--tx);font-family:'DM Mono',monospace;-webkit-appearance:none;transition:border-color .2s}
.tin:focus{border-color:var(--blue)}
.rbadge{display:inline-flex;align-items:center;gap:7px;margin-bottom:16px;background:rgba(129,140,248,.1);border:1px solid rgba(129,140,248,.25);border-radius:7px;padding:5px 12px}
.rlabel{font-family:'DM Mono',monospace;font-size:10px;color:#818cf8;letter-spacing:.1em}
.rword{font-family:'DM Mono',monospace;font-size:.95rem;color:#c7d2fe;font-weight:500}
.origbox{background:var(--s1);border:1px solid var(--bd);border-radius:11px;padding:14px 17px;margin-bottom:14px}
.origlbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--dimmer);letter-spacing:.08em;margin-bottom:7px}
.origtxt{font-size:.93rem;color:var(--dim);line-height:1.65;font-style:italic}
.kbadge{display:inline-flex;align-items:center;gap:7px;margin-bottom:14px;background:rgba(251,113,133,.1);border:1px solid rgba(251,113,133,.25);border-radius:7px;padding:5px 12px}
.klabel{font-family:'DM Mono',monospace;font-size:10px;color:var(--red);letter-spacing:.1em}
.kword{font-family:'DM Mono',monospace;font-size:.95rem;color:#fda4af;font-weight:500}
.trow{font-size:.97rem;line-height:2;margin-bottom:12px}
.tgap{font-family:'DM Mono',monospace;font-size:.83rem;display:inline-block;min-width:140px;border-bottom:2px solid var(--bd);vertical-align:bottom;padding:0 3px;transition:color .2s,border-color .2s}
.fb{border-radius:10px;padding:12px 14px;margin-top:13px}
.fb.ok{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.25)}
.fb.bad{background:rgba(251,113,133,.08);border:1px solid rgba(251,113,133,.25)}
.fb.mid{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25)}
.fbm{font-family:'DM Mono',monospace;font-size:.84rem}
.fbm.ok{color:var(--green)}.fbm.bad{color:var(--red)}.fbm.mid{color:var(--amber)}
.fbs{font-size:.79rem;color:var(--dim);margin-top:4px}
.mbox{background:rgba(251,113,133,.05);border:1px solid rgba(251,113,133,.17);border-radius:10px;padding:12px 14px;margin-top:10px}
.mlbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--red);letter-spacing:.1em;margin-bottom:7px}
.mrow{font-size:.79rem;color:var(--tx);opacity:.75;line-height:1.8}
.harea{margin-top:16px}
.hbtn{background:transparent;border:1px dashed var(--bd);color:var(--dim);border-radius:8px;padding:7px 14px;font-size:.77rem;cursor:pointer;-webkit-appearance:none}
.hbox{background:rgba(108,142,191,.07);border:1px solid rgba(108,142,191,.18);border-radius:9px;padding:11px 13px;margin-top:10px}
.htag{font-family:'DM Mono',monospace;font-size:10px;color:var(--blue);letter-spacing:.1em;margin-bottom:5px}
.htxt{font-size:.82rem;color:var(--tx);opacity:.85;line-height:1.65}
.qbot{flex-shrink:0;border-top:1px solid var(--bd);padding:11px 18px 32px}
.chkbtn{width:100%;border:none;border-radius:12px;padding:15px;font-family:'Syne',sans-serif;font-weight:700;font-size:.97rem;cursor:pointer;transition:background .15s,color .15s;-webkit-appearance:none}
.skipbtn{width:100%;background:transparent;border:1.5px solid var(--bd);border-radius:12px;padding:10px;font-family:'DM Sans',sans-serif;font-size:.85rem;color:var(--dim);cursor:pointer;margin-top:8px;-webkit-appearance:none;transition:border-color .15s,color .15s}
.skipbtn:hover{border-color:var(--dim);color:var(--dim)}
.nxtbtn{width:100%;border:none;border-radius:12px;padding:15px;font-family:'Syne',sans-serif;font-weight:700;font-size:.97rem;cursor:pointer;color:#0d0f1a;-webkit-appearance:none}
#s-results{overflow-y:auto;padding:36px 22px 48px;display:flex;flex-direction:column}
.rcrd{background:var(--s1);border-radius:14px;padding:32px 22px;text-align:center;margin-bottom:16px}
.rscore{font-family:'Syne',sans-serif;font-weight:800;font-size:4rem;line-height:1;margin-bottom:4px}
.rpct{font-family:'DM Mono',monospace;font-size:.84rem;color:var(--dim);margin-bottom:14px}
.rgrade{font-family:'DM Mono',monospace;font-size:.77rem;border-radius:5px;padding:5px 14px;display:inline-block}
.rnote{font-family:'DM Mono',monospace;font-size:.67rem;color:var(--dim);margin-top:9px}
.rbest{text-align:center;font-family:'DM Mono',monospace;font-size:.74rem;color:var(--dim);margin-bottom:14px}
.rbreakdown{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-bottom:20px;padding:0 4px}
.rdot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-family:'DM Mono',monospace;font-weight:500;flex-shrink:0}
.rdot.ok{background:rgba(52,211,153,.15);color:var(--green)}
.rdot.bad{background:rgba(251,113,133,.15);color:var(--red)}
.rdot.skip{background:var(--bd);color:var(--dim)}
.streak-info{text-align:center;font-family:'DM Mono',monospace;font-size:.72rem;color:var(--dimmer);margin-bottom:4px}
.rbtns{display:flex;flex-direction:column;gap:10px;margin-top:auto;padding-top:20px}
.rpri{border:none;border-radius:12px;padding:15px;font-family:'Syne',sans-serif;font-weight:700;font-size:.97rem;cursor:pointer;color:#0d0f1a;-webkit-appearance:none}
.rpri.hint-review{background:transparent!important;border:1.5px solid var(--blue)!important;color:var(--blue)!important;font-weight:500}
.rghost{background:transparent;border:1.5px solid var(--bd);border-radius:12px;padding:15px;font-family:'DM Sans',sans-serif;font-size:.94rem;cursor:pointer;color:var(--tx);-webkit-appearance:none}
.footer{position:fixed;bottom:0;left:0;right:0;text-align:center;padding:7px;font-family:'DM Mono',monospace;font-size:10px;color:var(--dimmer);pointer-events:none;z-index:99;letter-spacing:.06em}
.footer{position:fixed;bottom:0;left:0;right:0;text-align:center;padding:7px 80px 7px 7px;font-family:'DM Mono',monospace;font-size:10px;color:rgba(128,128,128,.35);pointer-events:none;z-index:99;letter-spacing:.04em}
.light .footer{color:rgba(26,26,24,.25)}
.theme-toggle{position:fixed;bottom:4px;right:10px;background:transparent;border:1px solid var(--bd);border-radius:20px;padding:3px 10px;font-size:14px;cursor:pointer;z-index:100;color:var(--dim);transition:all .2s;-webkit-appearance:none}
.theme-toggle{color:var(--dim)}.theme-toggle:hover{border-color:var(--p1);color:var(--p1)}
</style>
</head>
<body>
<div class="scr on" id="s-home">
  <div class="home-pad">
    <div class="eyebrow">CAMBRIDGE C1 ADVANCED</div>
    <h1 class="h1">Use of English</h1>
    <p class="sub">Reading &amp; Use of English &middot; Parts 1&ndash;4</p>
  </div>
  <div id="bank-btn" style="display:none;margin:0 16px 20px;background:rgba(108,142,191,.08);border:1.5px solid rgba(108,142,191,.3);border-radius:12px;padding:14px 18px;cursor:pointer;align-items:center;justify-content:space-between;gap:12px" onclick="showBankMenu()">
    <div>
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--blue);letter-spacing:.1em;margin-bottom:4px">REVIEW BANK</div>
      <div style="font-size:.88rem;color:var(--tx)" id="bank-label"></div>
    </div>
    <div style="color:var(--blue);font-size:1.2rem">&rsaquo;</div>
  </div>
  <div class="tiles" id="tiles"></div>
</div>
<div class="scr" id="s-setup">
  <div class="setup-head">
    <button class="bk" onclick="show('s-home')">&#8249;</button>
    <div><div class="eyebrow" id="stag"></div><h2 id="stitle"></h2></div>
  </div>
  <div class="p4note" id="p4note" style="display:none">
    Each question is worth <strong>2 marks</strong>. Score 1 mark for getting one transformation point right, 2 marks for a fully correct answer.
  </div>
  <div class="cnt-btns" id="cntbtns"></div>
</div>
<div class="scr" id="s-question">
  <div class="qtop"><div class="qtop-row">
    <button class="stop-btn" onclick="confirmStop()" title="Stop session">&#10005;</button>
    <div class="pbar"><div class="pfill" id="pfill"></div></div>
    <div class="qctr" id="qctr"></div>
    <div class="qscr" id="qscr"></div>
  </div></div>
  <div class="qbody" id="qbody"></div>
  <div class="qbot" id="qbot"></div>
</div>
<div class="scr" id="s-results">
  <div class="eyebrow" id="rtag"></div>
  <div class="rcrd" id="rcrd"></div>
  <div class="rbest" id="rbest"></div>
  <div class="rbreakdown" id="rbreakdown"></div>
  <div class="rbtns">
    <button class="rpri" id="ragain">Try Again</button>
    <button class="rpri" id="rreview" style="display:none">Review Mistakes</button>
    <button class="rpri" id="rreviewhint" style="display:none">Review Hint-Assisted</button>
    <button class="rghost" onclick="show('s-home')">Home</button>
  </div>
</div>
<button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">&#9788;</button>
<script>
const P1 = [
  {"id": "p1_001", "sent": "The board of directors finally _______ to the pressure from shareholders and agreed to restructure.", "opts": ["A: yielded", "B: submitted", "C: conceded", "D: surrendered"], "a": "A", "h": "YIELD TO pressure is the natural collocation. 'Submit to authority' is correct but 'submit to pressure' is less natural. 'Concede' and 'surrender' don't collocate with 'to pressure' in this way."},
  {"id": "p1_002", "sent": "The regulations will come into _______ immediately, with no transition period for businesses to prepare.", "opts": ["A: force", "B: practice", "C: operation", "D: use"], "a": "A", "h": "COME INTO FORCE = (of a law or rule) begin to apply. The others — practice, operation, use — do not collocate with 'come into' in a legal/regulatory context."},
  {"id": "p1_003", "sent": "The documentary drew _______ to the plight of refugees living in overcrowded camps.", "opts": ["A: notice", "B: focus", "C: attention", "D: awareness"], "a": "C", "h": "DRAW ATTENTION TO is the fixed collocation. You 'raise awareness', 'bring to notice', 'shift focus' — but you always 'draw attention to' an issue."},
  {"id": "p1_004", "sent": "After months of negotiations, the two sides finally _______ a settlement that satisfied both parties.", "opts": ["A: arrived at", "B: made", "C: got", "D: found"], "a": "A", "h": "ARRIVE AT a settlement/agreement/conclusion is the formal collocation. 'Reach' is also correct but not offered. 'Made a settlement' is not natural; 'got' and 'found' are too informal."},
  {"id": "p1_005", "sent": "The prime minister _______ blame for the economic crisis squarely on the previous administration.", "opts": ["A: put", "B: placed", "C: laid", "D: set"], "a": "C", "h": "LAY BLAME ON is the fixed idiomatic phrase. 'Put the blame on' is also used informally, but 'lay blame on' is the standard written form. 'Placed' and 'set' don't collocate with 'blame on'."},
  {"id": "p1_006", "sent": "The management turned a blind _______ to health and safety violations for years.", "opts": ["A: side", "B: eye", "C: face", "D: view"], "a": "B", "h": "TURN A BLIND EYE TO = deliberately ignore. Completely fixed idiom — only 'eye' works."},
  {"id": "p1_007", "sent": "New research has shed _______ on the long-term effects of social media use on adolescent wellbeing.", "opts": ["A: understanding", "B: light", "C: clarity", "D: insight"], "a": "B", "h": "SHED LIGHT ON = reveal or explain. Fixed idiom. You cannot 'shed understanding/clarity/insight on' something."},
  {"id": "p1_008", "sent": "She has a remarkable _______ for mimicry and can imitate any accent she hears within minutes.", "opts": ["A: talent", "B: skill", "C: gift", "D: flair"], "a": "D", "h": "FLAIR FOR = a natural, instinctive aptitude, especially for performance or creative skill. 'Talent for' and 'gift for' suggest more general ability; 'flair for mimicry' is the precise C1 collocation."},
  {"id": "p1_009", "sent": "The launch of the product was put _______ indefinitely after problems emerged during testing.", "opts": ["A: away", "B: aside", "C: off", "D: back"], "a": "C", "h": "PUT OFF = postpone. 'Put back' also means delay but suggests rescheduling to a specific later date. 'Put off indefinitely' means with no new date set. 'Put away/aside' have completely different meanings."},
  {"id": "p1_010", "sent": "The charity's report _______ serious concerns about the long-term sustainability of current funding.", "opts": ["A: lifted", "B: raised", "C: voiced", "D: expressed"], "a": "B", "h": "RAISE CONCERNS = bring worries to people's attention in writing or speech. 'Voice' and 'express' concerns are also correct but typically used with a human subject speaking, not a report."},
  {"id": "p1_011", "sent": "The government's handling of the crisis has come under _______ scrutiny from opposition parties.", "opts": ["A: close", "B: severe", "C: tight", "D: sharp"], "a": "A", "h": "UNDER CLOSE SCRUTINY = examined carefully and critically. This is a fixed phrase. 'Severe', 'tight', and 'sharp' all collocate with other nouns but not 'scrutiny'."},
  {"id": "p1_012", "sent": "His sudden decision to resign came as a complete _______ to everyone who had worked with him.", "opts": ["A: surprise", "B: wonder", "C: revelation", "D: astonishment"], "a": "A", "h": "CAME AS A SURPRISE = was unexpected. 'Came as a complete surprise' is the fixed phrase. 'Astonishment', 'wonder', and 'revelation' don't follow 'came as a complete ___' naturally."},
  {"id": "p1_013", "sent": "A team of independent experts was asked to _______ a thorough investigation into the allegations.", "opts": ["A: make", "B: do", "C: carry out", "D: hold"], "a": "C", "h": "CARRY OUT AN INVESTIGATION = conduct formally. This is the standard phrasal verb collocation. 'Hold an investigation' is less natural; 'make/do an investigation' are not standard."},
  {"id": "p1_014", "sent": "The reforms were _______ to fail from the outset given the lack of any real political will to implement them.", "opts": ["A: certain", "B: bound", "C: likely", "D: destined"], "a": "B", "h": "BOUND TO = certain to happen, especially something negative or inevitable. 'Certain to' is also correct but 'bound to fail' is the stronger, more idiomatic expression at C1."},
  {"id": "p1_015", "sent": "The revelations cast a long _______ over what had previously been considered a successful administration.", "opts": ["A: darkness", "B: shade", "C: shadow", "D: cloud"], "a": "C", "h": "CAST A SHADOW OVER = damage the reputation of. Fixed idiom. 'Cast a cloud over' is also used — but only 'shadow' collocates with 'cast a long ___'."},
  {"id": "p1_016", "sent": "She was _______ aware of the risks but decided to invest anyway, convinced the returns would be worth it.", "opts": ["A: full", "B: deeply", "C: fully", "D: highly"], "a": "C", "h": "FULLY AWARE = completely aware of all aspects. 'Full aware' is grammatically wrong (adverb needed). 'Deeply aware' is non-standard. 'Highly aware' is not a natural collocation."},
  {"id": "p1_017", "sent": "The reforms were _______ welcomed, though unions insisted they did not go far enough.", "opts": ["A: broadly", "B: warmly", "C: fully", "D: deeply"], "a": "A", "h": "BROADLY WELCOMED = accepted by most without fundamental objection, but with reservations. 'Warmly' implies enthusiasm without qualification. 'Fully' means completely. 'Deeply' doesn't collocate with 'welcomed'. 'Broadly' precisely matches the qualified reaction described."},
  {"id": "p1_018", "sent": "The report was _______ critical of the minister's conduct, demanding a full public inquiry.", "opts": ["A: openly", "B: bitterly", "C: sharply", "D: intensely"], "a": "C", "h": "SHARPLY CRITICAL = critical in a precise, incisive way. 'Bitterly critical' implies personal resentment. 'Intensely critical' is non-standard. 'Openly critical' means doing so publicly. 'Sharply critical' is the standard formal collocation for analytical criticism."},
  {"id": "p1_019", "sent": "She _______ a brave face throughout the ordeal, though everyone could see she was struggling.", "opts": ["A: made", "B: kept", "C: put on", "D: wore"], "a": "C", "h": "PUT ON A BRAVE FACE = pretend to be cheerful. Fixed idiom. 'Keep a brave face' and 'wear a brave face' are not standard. 'Make a brave face' is incorrect."},
  {"id": "p1_020", "sent": "The new bypass is _______ to reduce journey times between the two towns by up to twenty minutes.", "opts": ["A: expected", "B: aimed", "C: set", "D: planned"], "a": "C", "h": "SET TO = on course to, about to. 'Is set to reduce' is journalistic and means 'will imminently'. 'Expected to' and 'planned to' are possible but weaker. 'Aimed to' requires 'aimed at reducing'."},
  {"id": "p1_021", "sent": "The artist's later work was _______ by his turbulent personal life during those years.", "opts": ["A: inspired", "B: informed", "C: driven", "D: fuelled"], "a": "B", "h": "INFORMED BY = shaped and given depth by. 'Inspired by' suggests the source of ideas but not deep influence. 'Driven by' implies motivation rather than influence. 'Informed by experience' is the precise C1 collocation for artistic/intellectual work."},
  {"id": "p1_022", "sent": "The manager's handling of the dispute has _______ her reputation considerably.", "opts": ["A: damaged", "B: harmed", "C: tarnished", "D: sullied"], "a": "C", "h": "TARNISHED = slightly damaged something previously bright and admirable. More precise than 'damaged' or 'harmed' for reputation. 'Sullied' is also used but is more literary; 'tarnished reputation' is the standard C1 collocation."},
  {"id": "p1_023", "sent": "The organisation relies _______ on government grants and would not survive without them.", "opts": ["A: deeply", "B: heavily", "C: greatly", "D: strongly"], "a": "B", "h": "RELY HEAVILY ON = depend to a great degree on. Fixed adverb collocating with 'rely'. The others are wrong: you don't 'rely deeply/greatly/strongly on' something."},
  {"id": "p1_024", "sent": "The government's refusal to act has _______ the problem and made it far harder to address.", "opts": ["A: worsened", "B: deepened", "C: compounded", "D: intensified"], "a": "C", "h": "COMPOUNDED THE PROBLEM = made worse by adding to it; implies accumulation. 'Worsened' and 'intensified' are general. 'Deepened' suggests going to a deeper level. 'Compounded' is precise — the refusal added to an already existing problem."},
  {"id": "p1_025", "sent": "The new filtration system is _______ to remove up to ninety-nine percent of waterborne contaminants.", "opts": ["A: capable", "B: designed", "C: able", "D: built"], "a": "B", "h": "DESIGNED TO = engineered or constructed for a specific purpose. 'Capable of' needs 'of removing', not 'to remove'. 'Able to' requires an animate subject. 'Built to' is possible but 'designed to' is the standard technical collocation."},
  {"id": "p1_026", "sent": "The journalist had spent months trying to _______ an interview with the famously private CEO.", "opts": ["A: obtain", "B: secure", "C: gain", "D: win"], "a": "B", "h": "SECURE AN INTERVIEW = achieve through effort and competition. 'Secure' implies that access was difficult and the outcome not guaranteed. 'Obtain' and 'gain' are more neutral; 'win an interview' is not standard."},
  {"id": "p1_027", "sent": "The prime minister's apology simply didn't _______ with a public already deeply sceptical of his sincerity.", "opts": ["A: connect", "B: register", "C: resonate", "D: land"], "a": "C", "h": "RESONATE WITH = have emotional or intellectual meaning for an audience. 'Resonate with the public' is the fixed C1 collocation. 'Land' is too informal. 'Register with' and 'connect with' imply different kinds of impact."},
  {"id": "p1_028", "sent": "The board resolved to _______ any decision on the acquisition until a full due diligence report had been completed.", "opts": ["A: withhold", "B: defer", "C: delay", "D: postpone"], "a": "B", "h": "DEFER A DECISION = formally put off to a later occasion, used specifically in boardroom and committee language. 'Postpone' is general. 'Delay' implies passive obstruction. 'Withhold a decision' is not standard. Only 'defer' fits formal board/committee register."},
  {"id": "p1_029", "sent": "She took the unexpected demotion in her _______, choosing to focus on what lay ahead.", "opts": ["A: step", "B: pace", "C: stride", "D: walk"], "a": "C", "h": "TAKE IN ONE'S STRIDE = accept calmly without being upset. Fixed idiom — only 'stride' works."},
  {"id": "p1_030", "sent": "The decision is likely to have _______ consequences for the region's agricultural sector.", "opts": ["A: broad", "B: wide", "C: far-reaching", "D: sweeping"], "a": "C", "h": "FAR-REACHING CONSEQUENCES = effects that extend widely and affect many areas. 'Far-reaching' specifically collocates with 'consequences' and 'implications'. 'Sweeping' collocates with 'changes' or 'reforms', not consequences."},
  {"id": "p1_031", "sent": "When it comes to attention to detail, her work is second to _______ in the entire department.", "opts": ["A: all", "B: none", "C: any", "D: nothing"], "a": "B", "h": "SECOND TO NONE = the best of all. Completely fixed superlative idiom — only 'none' works."},
  {"id": "p1_032", "sent": "The committee has been _______ on announcing a decision, citing the need for further consultation.", "opts": ["A: slow", "B: reluctant", "C: holding back", "D: sitting"], "a": "C", "h": "HOLDING BACK ON = deliberately delaying or withholding. The phrasal verb is needed here. 'Slow to announce' would require 'to'. 'Reluctant to announce' also needs 'to'. 'Sitting on a decision' is informal but 'sitting on announcing' is not natural."},
  {"id": "p1_033", "sent": "The new legislation is expected to have a profound _______ on the way universities allocate funding.", "opts": ["A: effect", "B: impact", "C: result", "D: consequence"], "a": "B", "h": "PROFOUND IMPACT ON = a powerful, far-reaching effect. 'Profound impact' is the dominant collocation. 'Profound effect' is also used but 'effect' alone is weaker here. 'Result' and 'consequence' require different prepositions and constructions."},
  {"id": "p1_034", "sent": "The anonymous tip-off _______ serious doubts over the integrity of the selection process.", "opts": ["A: raised", "B: cast", "C: threw", "D: placed"], "a": "B", "h": "CAST DOUBT ON = make something seem uncertain. Fixed idiom. 'Cast doubts over' is also standard. 'Raise doubts' is possible but less idiomatic here. 'Threw doubt' and 'placed doubt' are not standard."},
  {"id": "p1_035", "sent": "Several prominent academics _______ their concerns about the proposed changes to the curriculum.", "opts": ["A: voiced", "B: said", "C: spoke", "D: told"], "a": "A", "h": "VOICE CONCERNS = publicly and formally express worries. 'Said' and 'told' require direct objects or clauses. 'Spoke concerns' is not standard. 'Voice' is the precise verb for publicly expressing concerns."},
  {"id": "p1_036", "sent": "The original structure of the building has _______ largely intact despite decades of heavy use.", "opts": ["A: lasted", "B: remained", "C: stayed", "D: kept"], "a": "B", "h": "REMAINED INTACT = continued to be in a particular state. 'Remained' + adjective/adverb phrase is the standard formal construction. 'Stayed intact' is possible but less formal. 'Lasted intact' and 'kept intact' are not standard."},
  {"id": "p1_037", "sent": "Despite fierce opposition, the council _______ with its controversial redevelopment scheme.", "opts": ["A: carried on", "B: went ahead", "C: moved forward", "D: followed through"], "a": "B", "h": "WENT AHEAD WITH = proceeded with a plan despite opposition. The fixed phrase for official plans proceeding. 'Followed through with' is close but less formal. 'Moved forward with' is too informal. 'Carried on with' lacks the sense of a deliberate decision to proceed."},
  {"id": "p1_038", "sent": "The bursary scheme _______ students from disadvantaged backgrounds the opportunity to study abroad.", "opts": ["A: gives", "B: affords", "C: offers", "D: grants"], "a": "B", "h": "AFFORDS = provides or makes possible, especially in formal written English. 'Afford someone the opportunity' is a fixed formal collocation. 'Grant an opportunity' is also formal but implies authority giving permission. 'Gives' and 'offers' are too informal for this register."},
  {"id": "p1_039", "sent": "The new planning restrictions were _______ in specifically to protect areas of outstanding natural beauty.", "opts": ["A: brought", "B: pushed", "C: written", "D: built"], "a": "A", "h": "BROUGHT IN = officially introduced (legislation, rules, measures). Fixed phrasal verb for introducing policy. 'Written in' means included in a document. 'Pushed through' suggests force. Only 'brought in' means officially enacted."},
  {"id": "p1_040", "sent": "The researchers claim their method has _______ new ground in the treatment of antibiotic-resistant infections.", "opts": ["A: covered", "B: broken", "C: opened", "D: cleared"], "a": "B", "h": "BROKEN NEW GROUND = done something innovative or pioneering. Fixed idiom. You cannot 'cover/open/clear new ground' in this metaphorical sense."},
  {"id": "p1_041", "sent": "Membership of the association has been _______ steadily, raising concerns about its long-term viability.", "opts": ["A: declining", "B: reducing", "C: shrinking", "D: lessening"], "a": "A", "h": "DECLINING = decreasing gradually over time, especially for measured quantities like membership, confidence, or performance. 'Declining membership' is the standard formal collocation. 'Shrinking' is informal. 'Reducing' is transitive. 'Lessening' is archaic."},
  {"id": "p1_042", "sent": "She was _______ by the scale of the task ahead of her but determined not to show it.", "opts": ["A: nervous", "B: daunted", "C: frightened", "D: overwhelmed"], "a": "B", "h": "DAUNTED = intimidated or discouraged by the scale of a challenge. More precise than 'nervous' (which implies anxiety) or 'frightened' (which suggests fear). 'Overwhelmed' means unable to cope — but the sentence implies she was coping."},
  {"id": "p1_043", "sent": "The construction work caused considerable _______ to commuters travelling through the city centre.", "opts": ["A: disturbance", "B: disruption", "C: interference", "D: inconvenience"], "a": "B", "h": "DISRUPTION = serious interruption to a system or service. 'Disruption to commuters/traffic/services' is the standard collocation. 'Inconvenience' is too mild. 'Disturbance' is used for noise or public order. 'Interference' takes a different preposition."},
  {"id": "p1_044", "sent": "The chairperson made it _______ that any proposal involving additional borrowing would be vetoed.", "opts": ["A: obvious", "B: apparent", "C: known", "D: clear"], "a": "C", "h": "MADE IT KNOWN = formally communicated a position or intention, especially in official contexts. 'Made it known that X would be vetoed' is the standard phrase for broadcasting an institutional position. 'Made it clear' works too, but 'known' better captures the public announcement register."},
  {"id": "p1_045", "sent": "The updated software has _______ a marked improvement in processing speed across all platforms.", "opts": ["A: produced", "B: resulted in", "C: delivered", "D: yielded"], "a": "D", "h": "YIELDED = produced as a measurable result, especially in technical or scientific contexts. 'Yield a result/improvement/return' is the precise formal collocation. 'Delivered an improvement' implies intentional service. 'Produced' is general. 'Resulted in' needs a different construction."},
  {"id": "p1_046", "sent": "The children were _______ to treat others with respect and to take responsibility for their actions.", "opts": ["A: raised", "B: taught", "C: brought up", "D: educated"], "a": "C", "h": "BROUGHT UP TO = instilled with values during childhood as part of upbringing. In British English this is the standard phrasal verb. 'Raised' is primarily American English. 'Taught' and 'educated' suggest formal instruction, not upbringing."},
  {"id": "p1_047", "sent": "The company was found to have systematically _______ its obligations under the terms of the contract.", "opts": ["A: broken", "B: infringed", "C: violated", "D: breached"], "a": "D", "h": "BREACHED OBLIGATIONS/CONTRACT = failed to fulfil a legal requirement. 'Breach' is the most precise legal term for failing to meet contractual or regulatory obligations. 'Violate' works for laws and rights; 'breach' is specific to contracts and duties."},
  {"id": "p1_048", "sent": "As the deadline approached, the team _______ themselves for what promised to be a gruelling final push.", "opts": ["A: prepared", "B: braced", "C: readied", "D: steeled"], "a": "D", "h": "STEELED THEMSELVES FOR = mentally hardened themselves in preparation for something difficult. 'Braced themselves for' implies preparing for an impact or shock. 'Steel yourself' specifically suggests mental toughening for prolonged effort."},
  {"id": "p1_049", "sent": "The revelation _______ an immediate storm of controversy, with the opposition calling for a full inquiry.", "opts": ["A: stirred up", "B: created", "C: sparked", "D: prompted"], "a": "C", "h": "SPARKED = caused a controversy to begin suddenly and dramatically. 'Spark a storm of controversy' is the vivid, established journalistic collocation. 'Stirred up' is informal. 'Prompted' suggests a more measured response. 'Created' is too neutral."},
  {"id": "p1_050", "sent": "The application was _______ on the grounds that the proposed development would harm the local environment.", "opts": ["A: dismissed", "B: rejected", "C: overturned", "D: refused"], "a": "B", "h": "REJECTED ON THE GROUNDS THAT = officially refused citing specific stated reasons. 'Rejected' implies a formal decision with reasons given. 'Dismissed' suggests the application wasn't taken seriously. 'Refused' and 'overturned' imply different processes."},
];
const P2 = [
  {"id": "p2_001", "sent": "The committee reached a decision _______ which all members could agree.", "a": "on", "h": "Which preposition follows 'decision' when you specify what it's about? Think: a decision ___ something."},
  {"id": "p2_002", "sent": "_______ having studied for weeks, she still found the exam extremely difficult.", "a": "despite", "h": "Which preposition or conjunction introduces a concessive clause followed by a gerund? ___ having studied..."},
  {"id": "p2_003", "sent": "The results were _______ better than expected, surprising even the most optimistic researchers.", "a": "far", "h": "Which single word intensifies a comparative adjective? ___ better, ___ worse, ___ more interesting."},
  {"id": "p2_004", "sent": "It was not _______ she arrived home that she realised her keys were missing.", "a": "until", "h": "Fixed negative time structure: 'It was not ___ she arrived that she realised.' Which conjunction?"},
  {"id": "p2_005", "sent": "The new law, _______ comes into force next month, will affect millions of workers.", "a": "which", "h": "Which relative pronoun introduces a non-defining relative clause? Remember: 'that' cannot be used with commas."},
  {"id": "p2_006", "sent": "She speaks French so fluently _______ she could easily pass for a native speaker.", "a": "that", "h": "What word introduces the result clause in 'so fluently ___ she could pass for a native speaker'?"},
  {"id": "p2_007", "sent": "The proposal was met _______ considerable resistance from local residents.", "a": "with", "h": "Which preposition completes 'met ___ resistance'? Think about what you 'meet with' in formal English."},
  {"id": "p2_008", "sent": "_______ few people realise is that the brain consumes twenty percent of the body's total energy.", "a": "what", "h": "Which question word introduces a nominal clause as subject? '___ few people realise is that...'"},
  {"id": "p2_009", "sent": "The conference will go _______ regardless of whether the keynote speaker is available.", "a": "ahead", "h": "Which particle completes the phrasal verb meaning 'proceed as planned'? The conference will go ___."},
  {"id": "p2_010", "sent": "_______ all her faults, she remains one of the most effective leaders the organisation has had.", "a": "for", "h": "Which preposition completes the fixed concessive phrase '___ all her faults'? Equivalent to 'despite'."},
  {"id": "p2_011", "sent": "The CEO refused to comment, _______ which point the journalist ended the interview.", "a": "at", "h": "Which preposition completes the fixed relative phrase '___ which point'? Think about timing."},
  {"id": "p2_012", "sent": "Had the engineers spotted the fault earlier, the accident _______ have been avoided.", "a": "could", "h": "This is a third conditional with inversion. What modal verb fits? 'Had they spotted it, the accident ___ have been avoided.'"},
  {"id": "p2_013", "sent": "The discovery was all _______ more remarkable given the limited resources the team had.", "a": "the", "h": "Fixed intensifier phrase: 'all ___ more remarkable'. Which article completes it?"},
  {"id": "p2_014", "sent": "The scheme is expected _______ create over two thousand permanent jobs in the region.", "a": "to", "h": "Passive reporting structure: 'is expected ___ create'. Which word links the passive verb to the infinitive?"},
  {"id": "p2_015", "sent": "She was _______ the impression that the meeting had been cancelled, which is why she didn't attend.", "a": "under", "h": "Fixed prepositional phrase for believing something (possibly incorrectly): '___ the impression that'. Which preposition?"},
  {"id": "p2_016", "sent": "_______ no circumstances should personal data be shared with third parties without consent.", "a": "under", "h": "This sentence uses negative fronting. Which two-word phrase meaning 'never' completes '___ no circumstances should...'?"},
  {"id": "p2_017", "sent": "The new model differs _______ its predecessor in several important respects.", "a": "from", "h": "Which preposition follows 'differs' when comparing two things? The new model differs ___ its predecessor."},
  {"id": "p2_018", "sent": "Much _______ everyone's surprise, the least-fancied team won the championship.", "a": "to", "h": "Fixed exclamatory phrase: 'Much ___ everyone's surprise'. Which preposition?"},
  {"id": "p2_019", "sent": "The report makes _______ clear that further investment is urgently needed.", "a": "it", "h": "Anticipatory structure: 'makes ___ clear that'. Which pronoun acts as a dummy object here?"},
  {"id": "p2_020", "sent": "She had no _______ but to accept the terms imposed by the new agreement.", "a": "choice/option", "h": "Fixed phrase of compulsion: 'had no ___ but to accept'. Which noun fits?"},
  {"id": "p2_021", "sent": "The evidence lends considerable _______ to the theory that sleep deprivation impairs judgement.", "a": "weight", "h": "Which noun collocates with 'lend' and 'to' to mean 'strengthen or support a theory'? Lend ___ to."},
  {"id": "p2_022", "sent": "By the time the rescue team arrived, the survivors _______ been waiting for over twenty hours.", "a": "had", "h": "What auxiliary verb is needed? 'By the time they arrived, the survivors ___ been waiting for hours.' \u2014 Past perfect."},
  {"id": "p2_023", "sent": "_______ is often the case with complex legislation, the new law has had unintended consequences.", "a": "as", "h": "Fixed comparative clause: '___ is often the case with'. Which word (not 'like') introduces a clause of comparison?"},
  {"id": "p2_024", "sent": "The government has been accused of turning a blind _______ to corruption at the highest levels.", "a": "eye", "h": "Which body part completes the fixed idiom 'turning a blind ___ to corruption'?"},
  {"id": "p2_025", "sent": "No _______ how hard she tried, she could not persuade the committee to change its decision.", "a": "matter", "h": "Fixed concessive phrase: 'No ___ how hard she tried'. Which noun?"},
  {"id": "p2_026", "sent": "The new regulations come _______ effect from the first of January.", "a": "into", "h": "Which preposition completes 'come ___ effect'? Think: the regulations came into ___."},
  {"id": "p2_027", "sent": "The evidence points _______ the conclusion that the fire was started deliberately.", "a": "to", "h": "Which preposition follows 'points' when evidence suggests something? The evidence points ___ the conclusion."},
  {"id": "p2_028", "sent": "It goes _______ saying that honesty is the foundation of any trusting relationship.", "a": "without", "h": "Fixed idiom meaning 'is so obvious it doesn't need stating'. Which preposition completes 'goes ___ saying'?"},
  {"id": "p2_029", "sent": "The professor was held _______ high regard by colleagues across the field.", "a": "in", "h": "Fixed phrase: 'held ___ high regard'. Which preposition?"},
  {"id": "p2_030", "sent": "_______ the fact that she had very little experience, she handled the crisis with remarkable skill.", "a": "given", "h": "Which word introduces a concessive clause meaning 'considering' or 'taking into account'?"},
  {"id": "p2_031", "sent": "She is _______ no means the most experienced candidate, but she is by far the most enthusiastic.", "a": "by", "h": "Fixed emphatic negative: '___ no means'. Which two-word phrase meaning 'not at all'?"},
  {"id": "p2_032", "sent": "The longer the problem goes unaddressed, _______ more difficult it becomes to find a solution.", "a": "the", "h": "Parallel comparative structure: 'The longer X, ___ more difficult Y'. Which article?"},
  {"id": "p2_033", "sent": "The agreement was signed _______ the presence of senior officials from both governments.", "a": "in", "h": "Fixed phrase: 'signed ___ the presence of officials'. Which preposition?"},
  {"id": "p2_034", "sent": "_______ being a talented musician, she is also a published author and accomplished painter.", "a": "besides/as well as", "h": "Which word (or two-word phrase) means 'in addition to' and takes a gerund? ___ being a musician, she is also..."},
  {"id": "p2_035", "sent": "The exhibition, _______ runs until the end of November, has attracted over fifty thousand visitors.", "a": "which", "h": "Which relative pronoun introduces a non-defining clause? The exhibition, ___ runs until November..."},
  {"id": "p2_036", "sent": "She was at a loss _______ to what she should do next, having never faced such a situation.", "a": "as", "h": "Fixed phrase: 'at a loss ___ to what she should do'. Which preposition?"},
  {"id": "p2_037", "sent": "The artist drew _______ from her childhood experiences growing up in rural Ireland.", "a": "inspiration", "h": "Which noun collocates with 'drew' and 'from' to describe a creative source? She drew ___ from her childhood."},
  {"id": "p2_038", "sent": "He behaved _______ if he had never met her, which made the situation extremely awkward.", "a": "as", "h": "Which word introduces an unreal comparison? He behaved ___ if he had never met her."},
  {"id": "p2_039", "sent": "_______ she had not eaten anything since breakfast, she showed no signs of fatigue.", "a": "although/even though/though", "h": "Which concessive conjunction introduces a contrast clause? ___ she had not eaten, she showed no fatigue."},
  {"id": "p2_040", "sent": "The new bridge will _______ doubt become a landmark feature of the city's skyline.", "a": "without", "h": "Fixed adverbial phrase meaning 'certainly'. It will ___ doubt become a landmark. Which preposition?"},
  {"id": "p2_041", "sent": "The study found _______ evidence to suggest a link between screen time and poor sleep quality.", "a": "little/no/some", "h": "Which quantifier fits? The study found ___ evidence \u2014 think about what the study likely concluded."},
  {"id": "p2_042", "sent": "The theatre has been undergoing major renovations, _______ is why performances have been cancelled.", "a": "which", "h": "Which relative pronoun refers back to the whole previous clause? The theatre has been renovating, ___ is why..."},
  {"id": "p2_043", "sent": "On _______ of the company, I would like to thank everyone who contributed to this project.", "a": "behalf", "h": "Fixed formal phrase: 'On ___ of the company'. Which noun means 'representing' or 'in the name of'?"},
  {"id": "p2_044", "sent": "The minister was asked to account _______ the discrepancies in the budget report.", "a": "for", "h": "Which preposition follows 'account' in the phrasal verb meaning 'explain or justify'? Asked to account ___ the discrepancies."},
  {"id": "p2_045", "sent": "The new policy came _______ force on the first day of the new financial year.", "a": "into", "h": "Which preposition completes 'came ___ force'? A synonym of 'come into effect' for laws."},
];
const P3 = [
  {"id": "p3_001", "sent": "The company's [FAIL] to adapt to changing market conditions ultimately led to its collapse.", "root": "FAIL", "a": "failure", "h": "FAIL (verb) → FAILURE (noun). Suffix -URE. 'The company's failure to do X' = the fact that the company failed to."},
  {"id": "p3_002", "sent": "The [PUBLISH] of the leaked documents caused a major political controversy.", "root": "PUBLISH", "a": "publication", "h": "PUBLISH (verb) → PUBLICATION (noun). Suffix -ATION. 'The publication of documents' = the act of publishing them."},
  {"id": "p3_003", "sent": "Many young people feel [OVERWHELM] by the sheer scale of the environmental challenges ahead.", "root": "OVERWHELM", "a": "overwhelmed", "h": "OVERWHELM (verb) → OVERWHELMED (past participle as adjective). 'Feel overwhelmed' = passive: be overcome by something too large to cope with."},
  {"id": "p3_004", "sent": "The minister gave an [ACCURATE] account of events, which directly contradicted what witnesses had said.", "root": "ACCURATE", "a": "inaccurate", "h": "ACCURATE (adjective) → INACCURATE (negative adjective). Prefix IN- reverses the meaning. The account contradicted witnesses, so it was not accurate."},
  {"id": "p3_005", "sent": "The committee's [REJECT] of the proposal came as a surprise to many who expected it to be approved.", "root": "REJECT", "a": "rejection", "h": "REJECT (verb) → REJECTION (noun). Suffix -ION. 'The rejection of something' = the act of rejecting it."},
  {"id": "p3_006", "sent": "She was known for her [FORESEE], always anticipating problems long before they arose.", "root": "FORESEE", "a": "foresight", "h": "FORESEE (verb) → FORESIGHT (noun). Irregular: FORE- prefix + SIGHT. The ability to predict future events — not 'foreseeing'."},
  {"id": "p3_007", "sent": "The council has a legal [OBLIGE] to ensure that all public buildings meet accessibility standards.", "root": "OBLIGE", "a": "obligation", "h": "OBLIGE (verb) → OBLIGATION (noun). OBLIG- + -ATION. A legal or moral duty — not 'obligement' or 'obliging'."},
  {"id": "p3_008", "sent": "The new treatment has shown highly [PROMISE] results in early clinical trials.", "root": "PROMISE", "a": "promising", "h": "PROMISE (verb/noun) → PROMISING (adjective). Suffix -ING. 'Highly promising results' = results that show great potential."},
  {"id": "p3_009", "sent": "She demonstrated remarkable [PERSEVERE] throughout the gruelling eighteen-month training programme.", "root": "PERSEVERE", "a": "perseverance", "h": "PERSEVERE (verb) → PERSEVERANCE (noun). PERSEVER- + -ANCE. Continued effort despite difficulty — note the spelling change."},
  {"id": "p3_010", "sent": "The [MERGE] of the two rival companies was announced at a press conference yesterday morning.", "root": "MERGE", "a": "merger", "h": "MERGE (verb) → MERGER (noun). Suffix -ER. The combining of two organisations into one — 'merge' becomes 'merger'."},
  {"id": "p3_011", "sent": "He made several [SUCCEED] attempts to access the system before his account was permanently locked.", "root": "SUCCEED", "a": "unsuccessful", "h": "SUCCEED → UNSUCCESSFUL. UN- + SUCCESS + -FUL + -adjective. He did not succeed, so: UN- (negative prefix) + SUCCESSF- + -UL. Three morphemes: UN + SUCCESS + FUL."},
  {"id": "p3_012", "sent": "The team's [ACHIEVE] in reaching the final was celebrated by supporters across the country.", "root": "ACHIEVE", "a": "achievement", "h": "ACHIEVE (verb) → ACHIEVEMENT (noun). Suffix -MENT. Something successfully accomplished — 'achieve' + -ment."},
  {"id": "p3_013", "sent": "The [WEAK] of the building's foundations was only discovered during renovation work.", "root": "WEAK", "a": "weakness", "h": "WEAK (adjective) → WEAKNESS (noun). Suffix -NESS. A structural or physical fault — 'weak' becomes 'weakness'."},
  {"id": "p3_014", "sent": "Her [WILL] to accept criticism made it very difficult for colleagues to work with her.", "root": "WILL", "a": "unwillingness", "h": "WILL → UNWILLINGNESS. UN- + WILLING + -NESS. Three steps: WILL → WILLING (adjective) → UNWILLING (negative) → UNWILLINGNESS (noun)."},
  {"id": "p3_015", "sent": "The report highlighted the [ADEQUATE] of existing legislation in dealing with online financial fraud.", "root": "ADEQUATE", "a": "inadequacy", "h": "ADEQUATE → INADEQUACY. IN- (negative) + ADEQUATE → INADEQUATE → INADEQUACY (noun with -CY). The legislation was not adequate."},
  {"id": "p3_016", "sent": "Her research has received [WIDE] recognition across the international scientific community.", "root": "WIDE", "a": "widespread", "h": "WIDE → WIDESPREAD. WIDE + SPREAD = compound adjective. 'Widespread recognition' = recognition existing in many places. Not 'widely' (adverb) — the noun 'recognition' needs an adjective."},
  {"id": "p3_017", "sent": "The school was praised for its [INNOVATE] approach to addressing underachievement among disadvantaged pupils.", "root": "INNOVATE", "a": "innovative", "h": "INNOVATE (verb) → INNOVATIVE (adjective). Suffix -IVE. Describing an approach that uses new ideas and methods."},
  {"id": "p3_018", "sent": "The [DISCOVER] of the ancient burial site has significant implications for our understanding of the period.", "root": "DISCOVER", "a": "discovery", "h": "DISCOVER (verb) → DISCOVERY (noun). Suffix -Y (with spelling change). The act of finding something previously unknown."},
  {"id": "p3_019", "sent": "Many staff felt [VALUE] by the management's failure to consult them before implementing the changes.", "root": "VALUE", "a": "undervalued", "h": "VALUE → UNDERVALUED. UNDER- (prefix: not sufficiently) + VALUE + -D (past participle). Not given sufficient recognition or appreciation."},
  {"id": "p3_020", "sent": "The regeneration project has greatly improved the [ACCESSIBLE] of the city's outer districts.", "root": "ACCESSIBLE", "a": "accessibility", "h": "ACCESSIBLE (adjective) → ACCESSIBILITY (noun). Change -BLE to -BILITY: ACCESSIBIL- + -ITY. The quality of being easy to reach or use."},
  {"id": "p3_021", "sent": "She handled the delicate diplomatic situation with great [SENSITIVE] and tact.", "root": "SENSITIVE", "a": "sensitivity", "h": "SENSITIVE (adjective) → SENSITIVITY (noun). SENSITIV- + -ITY. The quality of being aware of and considerate towards others."},
  {"id": "p3_022", "sent": "Researchers were surprised by the [RELUCTANT] of many participants to engage openly with the study.", "root": "RELUCTANT", "a": "reluctance", "h": "RELUCTANT (adjective) → RELUCTANCE (noun). RELUCT- + -ANCE. Unwillingness or hesitation — 'reluctant' becomes 'reluctance'."},
  {"id": "p3_023", "sent": "The [IMPLEMENT] of the new IT system took far longer than expected and caused significant disruption.", "root": "IMPLEMENT", "a": "implementation", "h": "IMPLEMENT (verb) → IMPLEMENTATION (noun). IMPLEMENT- + -ATION. The process of putting a plan or system into practice."},
  {"id": "p3_024", "sent": "The ambassador's formal [ENDORSE] of the agreement was widely seen as a diplomatic breakthrough.", "root": "ENDORSE", "a": "endorsement", "h": "ENDORSE (verb) → ENDORSEMENT (noun). ENDORS- + -EMENT. Formal approval or support — 'endorse' becomes 'endorsement'."},
  {"id": "p3_025", "sent": "She was [REFRESH] candid about the difficulties she had encountered during the research process.", "root": "REFRESH", "a": "refreshingly", "h": "REFRESH → REFRESHINGLY. REFRESH → REFRESHING (adjective) → REFRESHINGLY (adverb with -LY). In a way that is pleasantly honest and unexpected."},
  {"id": "p3_026", "sent": "The council adopted a [CONSULT] approach, holding several public meetings before finalising the plans.", "root": "CONSULT", "a": "consultative", "h": "CONSULT (verb) → CONSULTATIVE (adjective). CONSULT- + -ATIVE. Describing an approach that involves seeking input from others."},
  {"id": "p3_027", "sent": "A serious [COMMUNICATE] between the two project teams led to significant and costly delays.", "root": "COMMUNICATE", "a": "miscommunication", "h": "COMMUNICATE → MISCOMMUNICATION. MIS- (wrong/bad) + COMMUNICATE → MISCOMMUNICATION (noun). A failure to communicate clearly or correctly."},
  {"id": "p3_028", "sent": "The success of the fundraising campaign was [LARGE] dependent on the goodwill of local volunteers.", "root": "LARGE", "a": "largely", "h": "LARGE (adjective) → LARGELY (adverb). Suffix -LY. 'Largely dependent on' = mostly, to a great extent. Modifies the adjective 'dependent'."},
  {"id": "p3_029", "sent": "Her [DETERMINE] to complete the novel despite her illness was an inspiration to everyone who knew her.", "root": "DETERMINE", "a": "determination", "h": "DETERMINE (verb) → DETERMINATION (noun). DETERMIN- + -ATION. Firmness of purpose; the quality of being determined."},
  {"id": "p3_030", "sent": "The bridge was declared [SAFE] and closed to all vehicles immediately after the inspection.", "root": "SAFE", "a": "unsafe", "h": "SAFE (adjective) → UNSAFE (negative adjective). Prefix UN- = not. Simple negation: the bridge was not safe to use."},
  {"id": "p3_031", "sent": "A solid understanding of the [FOUND] of scientific method is essential for all research students.", "root": "FOUND", "a": "foundations", "h": "FOUND (verb: to establish) → FOUNDATIONS (plural noun). FOUND + -ATION + plural -S. The basic underlying principles — must be plural here."},
  {"id": "p3_032", "sent": "The new measures have been [BROAD] welcomed by businesses, though some concerns remain.", "root": "BROAD", "a": "broadly", "h": "BROAD (adjective) → BROADLY (adverb). Suffix -LY. 'Broadly welcomed' = generally, by most people. Modifies the past participle 'welcomed'."},
  {"id": "p3_033", "sent": "The [DEVASTATE] effects of the financial crash continued to be felt for over a decade.", "root": "DEVASTATE", "a": "devastating", "h": "DEVASTATE (verb) → DEVASTATING (adjective). Suffix -ING. Causing severe and widespread damage — modifies the noun 'effects'."},
  {"id": "p3_034", "sent": "The level of [CONTAMINATE] in the city's water supply was found to be within acceptable limits.", "root": "CONTAMINATE", "a": "contamination", "h": "CONTAMINATE (verb) → CONTAMINATION (noun). CONTAMINAT- + -ION. The presence of harmful substances in something."},
  {"id": "p3_035", "sent": "Her [RESILIENT] in the face of repeated setbacks earned the admiration of her colleagues.", "root": "RESILIENT", "a": "resilience", "h": "RESILIENT (adjective) → RESILIENCE (noun). Change -ENT to -ENCE: RESILI- + -ENCE. The ability to recover from difficulties."},
  {"id": "p3_036", "sent": "The [AUTHENTIC] of the ancient manuscript had been disputed for many years before new tests resolved the matter.", "root": "AUTHENTIC", "a": "authenticity", "h": "AUTHENTIC (adjective) → AUTHENTICITY (noun). AUTHENTIC + -ITY. The quality of being genuine or original."},
  {"id": "p3_037", "sent": "He showed great [FLEXIBLE] in managing the conflicting demands of his many clients simultaneously.", "root": "FLEXIBLE", "a": "flexibility", "h": "FLEXIBLE (adjective) → FLEXIBILITY (noun). Change -BLE to -BILITY: FLEXIBIL- + -ITY. The ability to adapt to different situations."},
  {"id": "p3_038", "sent": "The [INTRODUCE] of the new bus routes has transformed commuting for thousands of residents.", "root": "INTRODUCE", "a": "introduction", "h": "INTRODUCE (verb) → INTRODUCTION (noun). INTRODUCT- + -ION (note spelling change). The act of bringing something new into use."},
  {"id": "p3_039", "sent": "The company made an [UNWAVER] commitment to achieving carbon neutrality before the end of the decade.", "root": "UNWAVER", "a": "unwavering", "h": "UNWAVER → UNWAVERING. UN- (not) + WAVER (to be uncertain) + -ING (adjective). Steady, resolute, and never faltering."},
  {"id": "p3_040", "sent": "The council faced serious criticism over the [TRANSPARENT] of its planning process.", "root": "TRANSPARENT", "a": "lack of transparency", "h": "TRANSPARENT → LACK OF TRANSPARENCY. TRANSPARENT → TRANSPARENCY (noun: -CY suffix). The council was not transparent, so: 'lack of transparency'. Note: 'opacity' is also possible."},
  {"id": "p3_041", "sent": "The professor delivered a [COMPEL] lecture that kept the audience engaged from start to finish.", "root": "COMPEL", "a": "compelling", "h": "COMPEL (verb) → COMPELLING (adjective). COMPELL- + -ING (note double L). Evoking strong interest; difficult to ignore or look away from."},
  {"id": "p3_042", "sent": "The [FAIL] of the local population to engage with the consultation process disappointed the planners.", "root": "FAIL", "a": "failure", "h": "FAIL (verb) → FAILURE (noun). Suffix -URE. 'The failure of someone to do X' = the fact that they did not do it."},
  {"id": "p3_043", "sent": "She found the constant [CRITICISE] of her work by her manager both demoralising and counterproductive.", "root": "CRITICISE", "a": "criticism", "h": "CRITICISE (verb) → CRITICISM (noun). CRITIC- + -ISM. The act of finding fault — note the spelling: 'criticise' becomes 'criticism', not 'criticisation'."},
  {"id": "p3_044", "sent": "The report called for greater [COLLABORATE] between government departments on environmental policy.", "root": "COLLABORATE", "a": "collaboration", "h": "COLLABORATE (verb) → COLLABORATION (noun). COLLABORAT- + -ION. The act of working together towards a shared goal."},
  {"id": "p3_045", "sent": "The [THOROUGH] of her presentation impressed even the most sceptical members of the board.", "root": "THOROUGH", "a": "thoroughness", "h": "THOROUGH (adjective) → THOROUGHNESS (noun). THOROUGH + -NESS. The quality of being complete, careful, and missing nothing."},
];
const P4 = [
  {"id": "t001", "orig": "I regret not applying for that job when I had the chance.", "key": "WISH", "before": "I wish I", "after": "that job when I had the chance.", "ans": "had applied for", "accept": ["had applied for"], "chunk1": "had applied", "chunk2": "for", "p1": "past perfect after wish (had applied)", "p2": "for (preposition — applied FOR a job)", "hint": "REGRET NOT APPLYING → WISH I HAD APPLIED FOR. Past perfect after 'wish I'. Don't forget 'for'."},
  {"id": "t002", "orig": "It's a shame that we didn't book the hotel earlier.", "key": "ONLY", "before": "If", "after": "earlier!", "ans": "only we had booked the hotel", "accept": ["only we had booked the hotel"], "chunk1": "only we had", "chunk2": "booked the hotel", "p1": "If only + past perfect = past regret", "p2": "booked the hotel (past participle + object)", "hint": "IT'S A SHAME WE DIDN'T → IF ONLY WE HAD BOOKED. 'If only' + past perfect expresses regret."},
  {"id": "t003", "orig": "The mechanic is repairing my car at the moment.", "key": "HAVING", "before": "I am", "after": "at the moment.", "ans": "having my car repaired", "accept": ["having my car repaired"], "chunk1": "having my car", "chunk2": "repaired", "p1": "having my car (causative structure)", "p2": "repaired \u2014 passive participle (not repairing)", "hint": "CAUSATIVE HAVE: 'have + object + past participle'. The car doesn't repair itself \u2014 someone else does it for you."},
  {"id": "t004", "orig": "A professional photographer took our wedding photos.", "key": "HAD", "before": "We", "after": "by a professional photographer.", "ans": "had our wedding photos taken", "accept": ["had our wedding photos taken"], "chunk1": "had our wedding photos", "chunk2": "taken", "p1": "had our wedding photos (causative)", "p2": "taken \u2014 passive participle", "hint": "CAUSATIVE HAD: 'had + object + past participle'. Think about who arranged the action rather than doing it themselves."},
  {"id": "t005", "orig": "They say that he was involved in the fraud.", "key": "ALLEGED", "before": "He is", "after": "in the fraud.", "ans": "alleged to have been involved", "accept": ["alleged to have been involved"], "chunk1": "alleged to", "chunk2": "have been involved", "p1": "alleged to (passive reporting verb)", "p2": "have been involved (perfect infinitive passive)", "hint": "PASSIVE REPORTING: 'alleged to + infinitive'. When the original says 'was involved', what form of the infinitive do you need?"},
  {"id": "t006", "orig": "People believe that she is the best candidate for the role.", "key": "BELIEVED", "before": "She is believed", "after": "the role.", "ans": "to be the best candidate for", "accept": ["to be the best candidate for"], "chunk1": "to be", "chunk2": "the best candidate for", "p1": "to be (infinitive after passive reporting verb)", "p2": "the best candidate for (full phrase)", "hint": "PEOPLE BELIEVE SHE IS → SHE IS BELIEVED TO BE THE BEST CANDIDATE FOR. Passive reporting."},
  {"id": "t007", "orig": "It seems that the documents were mislaid during the move.", "key": "APPEAR", "before": "The documents", "after": "during the move.", "ans": "appear to have been mislaid", "accept": ["appear to have been mislaid"], "chunk1": "appear to", "chunk2": "have been mislaid", "p1": "appear to (reporting verb)", "p2": "have been mislaid (perfect infinitive passive)", "hint": "PASSIVE REPORTING + PERFECT INFINITIVE PASSIVE: for a past event, use 'to have been + past participle'. Don't drop 'been'."},
  {"id": "t008", "orig": "Experts say that the painting is a forgery.", "key": "THOUGHT", "before": "The painting", "after": "a forgery.", "ans": "is thought to be", "accept": ["is thought to be"], "chunk1": "is thought", "chunk2": "to be", "p1": "is thought (passive)", "p2": "to be (infinitive, not is/was)", "hint": "PASSIVE REPORTING: 'is thought to + infinitive'. The original says she IS a forgery \u2014 which infinitive form does that require?"},
  {"id": "t009", "orig": "If you had told me earlier, I could have helped you.", "key": "TOLD", "before": "Had", "after": "I could have helped you.", "ans": "you told me earlier", "accept": ["you told me earlier"], "chunk1": "you told", "chunk2": "me earlier", "p1": "you told (inversion: Had you told = If you had told)", "p2": "me earlier (object + adverb)", "hint": "THIRD CONDITIONAL INVERSION: 'If + subject + had + past participle' becomes 'Had + subject + past participle'. The 'if' disappears."},
  {"id": "t010", "orig": "If she had arrived on time, she wouldn't have missed the train.", "key": "ARRIVED", "before": "Had she", "after": "she wouldn't have missed the train.", "ans": "arrived on time", "accept": ["arrived on time"], "chunk1": "arrived", "chunk2": "on time", "p1": "arrived (past participle after 'Had she')", "p2": "on time (adverb phrase)", "hint": "THIRD CONDITIONAL INVERSION: 'Had she...' replaces 'If she had...'. What comes directly after 'Had she' to complete the condition?"},
  {"id": "t011", "orig": "If it weren't for her support, I would have given up.", "key": "NOT", "before": "Were it", "after": "I would have given up.", "ans": "not for her support", "accept": ["not for her support"], "chunk1": "not for", "chunk2": "her support", "p1": "not for (were it not for = if it weren't for)", "p2": "her support", "hint": "FORMAL INVERSION: 'Were it not for' = 'If it weren't for'. What two words follow 'Were it' to express the condition?"},
  {"id": "t012", "orig": "She speaks French so fluently she could pass for a native speaker.", "key": "SUCH", "before": "She has", "after": "she could pass for a native speaker.", "ans": "such fluent French that", "accept": ["such fluent French that"], "chunk1": "such fluent french", "chunk2": "that", "p1": "such fluent French (such + adj + noun)", "p2": "that (result clause \u2014 obligatory)", "hint": "SO + adverb \u2192 SUCH + adjective + noun + THAT. 'Speaks so fluently' becomes 'has such [adjective] [noun] that'. Include 'that'."},
  {"id": "t013", "orig": "He is such a convincing liar that no one ever suspects him.", "key": "CONVINCINGLY", "before": "He lies so", "after": "suspects him.", "ans": "convincingly that no one ever", "accept": ["convincingly that no one ever"], "chunk1": "convincingly", "chunk2": "that no one ever", "p1": "convincingly (adverb not adjective)", "p2": "that no one ever (result clause)", "hint": "SUCH + noun \u2192 SO + adverb. What is the adverb form of 'convincing'? The 'that' clause must follow."},
  {"id": "t014", "orig": "I had never visited such an impressive museum before.", "key": "WAS", "before": "It", "after": "I had ever visited.", "ans": "was the most impressive museum", "accept": ["was the most impressive museum"], "chunk1": "was the most impressive", "chunk2": "museum", "p1": "the most impressive (superlative, not more impressive)", "p2": "museum (noun, not one/building)", "hint": "SUPERLATIVE cleft: 'never such a + adj + noun' \u2192 'the most + adj + noun + subject + had ever + past participle'."},
  {"id": "t015", "orig": "Although she was tired, she finished all the work.", "key": "DESPITE", "before": "She finished all the work", "after": "tired.", "ans": "despite being", "accept": ["despite being", "despite feeling"], "chunk1": "despite", "chunk2": "being", "p1": "despite (not in spite/although)", "p2": "being \u2014 gerund (not she was/having been)", "hint": "DESPITE + gerund: 'although + clause' \u2192 'despite + -ing'. The preposition 'despite' must be followed by a gerund."},
  {"id": "t016", "orig": "Even though the weather was dreadful, we enjoyed the picnic.", "key": "SPITE", "before": "We enjoyed the picnic", "after": "weather.", "ans": "in spite of the dreadful", "accept": ["in spite of the dreadful", "in spite of the terrible", "in spite of the awful"], "chunk1": "in spite of", "chunk2": "the dreadful", "p1": "in spite of (not despite of/in spite that)", "p2": "the dreadful/terrible weather (noun phrase not clause)", "hint": "IN SPITE OF + noun phrase: 'even though + clause' \u2192 'in spite of + noun phrase'. A clause cannot follow 'in spite of'."},
  {"id": "t017", "orig": "Despite working hard, she failed the exam.", "key": "MATTER", "before": "She failed the exam", "after": "worked.", "ans": "no matter how hard she", "accept": ["no matter how hard she"], "chunk1": "no matter", "chunk2": "how hard she", "p1": "no matter (fixed phrase)", "p2": "how hard she (word order)", "hint": "NO MATTER HOW + adjective/adverb + subject + verb: 'despite + gerund' becomes a concessive with 'no matter how'."},
  {"id": "t018", "orig": "It was wrong of him to leave without saying goodbye.", "key": "HAVE", "before": "He should not", "after": "saying goodbye.", "ans": "have left without", "accept": ["have left without"], "chunk1": "have left", "chunk2": "without", "p1": "have left (perfect infinitive after should not)", "p2": "without (preposition)", "hint": "IT WAS WRONG → SHOULD NOT HAVE LEFT WITHOUT. Past modal criticism."},
  {"id": "t019", "orig": "It was unnecessary for her to stay so late.", "key": "NEED", "before": "She", "after": "so late.", "ans": "needn't have stayed", "accept": ["needn't have stayed", "need not have stayed"], "chunk1": "needn't have", "chunk2": "stayed", "p1": "needn't have (past modal: unnecessary action done)", "p2": "stayed (past participle)", "hint": "NEEDN'T HAVE + past participle = did something unnecessary. She DID stay, but didn't need to. Different from 'didn't need to stay'."},
  {"id": "t020", "orig": "I'm sure he didn't take the money \u2014 it's not like him.", "key": "HAVE", "before": "He can't", "after": "it's not like him.", "ans": "have taken the money,", "accept": ["have taken the money,", "have taken the money"], "chunk1": "have taken", "chunk2": "the money", "p1": "have taken (perfect infinitive after can't)", "p2": "the money (object)", "hint": "CAN'T HAVE + past participle = strong deduction that a past event didn't happen. What perfect infinitive follows 'can't have'?"},
  {"id": "t021", "orig": "It's a pity I don't live closer to the city centre.", "key": "WISH", "before": "I", "after": "the city centre.", "ans": "wish I lived closer to", "accept": ["wish i lived closer to"], "chunk1": "wish i lived", "chunk2": "closer to", "p1": "wish I lived (present wish = past simple)", "p2": "closer to (comparative + preposition)", "hint": "WISH + past simple = wanting the present to be different. 'I don't live closer' \u2192 'I wish I [past simple] closer to...'"},
  {"id": "t022", "orig": "I can't help you because I have too much work.", "key": "POSITION", "before": "I'm afraid I'm not in", "after": "help you.", "ans": "a position to", "accept": ["a position to"], "chunk1": "a position", "chunk2": "to", "p1": "not in a position to = formal way of saying unable to", "p2": "to (infinitive marker follows 'position')", "hint": "CAN'T HELP → NOT IN A POSITION TO HELP. Formal register expressing inability."},
  {"id": "t023", "orig": "Someone broke into our house while we were on holiday.", "key": "HAD", "before": "We", "after": "while we were on holiday.", "ans": "had our house broken into", "accept": ["had our house broken into"], "chunk1": "had our house", "chunk2": "broken into", "p1": "had our house (causative/passive experience)", "p2": "broken into (phrasal verb in passive)", "hint": "PASSIVE EXPERIENCE with HAD: 'someone broke into X' \u2192 'had X broken into'. The phrasal verb 'broken into' must stay together."},
  {"id": "t024", "orig": "It is difficult for me to concentrate when there is noise.", "key": "FIND", "before": "I", "after": "when there is noise.", "ans": "find it difficult to concentrate", "accept": ["find it difficult to concentrate"], "chunk1": "find it difficult", "chunk2": "to concentrate", "p1": "find it difficult (anticipatory it)", "p2": "to concentrate (infinitive not concentrating)", "hint": "ANTICIPATORY IT: 'it is difficult for me to' \u2192 'I find it difficult to'. Keep 'it' as a dummy object after 'find'."},
  {"id": "t025", "orig": "Keeping up with current affairs is something I find very important.", "key": "IMPORTANCE", "before": "I attach great", "after": "with current affairs.", "ans": "importance to keeping up", "accept": ["importance to keeping up"], "chunk1": "importance to", "chunk2": "keeping up", "p1": "importance to (attach importance to = fixed phrase)", "p2": "keeping up (gerund not infinitive)", "hint": "ATTACH IMPORTANCE TO + gerund: a formal noun phrase. 'Find very important' \u2192 'attach great importance to'. What gerund follows?"},
  {"id": "t026", "orig": "The manager forced all staff to work overtime.", "key": "MADE", "before": "All staff", "after": "overtime.", "ans": "were made to work", "accept": ["were made to work"], "chunk1": "were made", "chunk2": "to work", "p1": "were made (passive)", "p2": "to work (infinitive \u2014 obligatory after made passive)", "hint": "PASSIVE CAUSATIVE: in the passive 'made to do', the infinitive requires 'to' (unlike the active, which uses the bare infinitive)."},
  {"id": "t027", "orig": "The loud noise prevented me from sleeping.", "key": "STOP", "before": "The loud noise", "after": "sleeping.", "ans": "stopped me from", "accept": ["stopped me from", "stopped me (from)"], "chunk1": "stopped me", "chunk2": "from", "p1": "stopped me (verb + object)", "p2": "from (preposition \u2014 stop from not stop to)", "hint": "STOP + object + FROM + gerund: 'prevent from' and 'stop from' are synonyms. What preposition follows 'stopped me'?"},
  {"id": "t028", "orig": "Even if he had unlimited funds, he still wouldn't be satisfied.", "key": "MATTER", "before": "He wouldn't be satisfied", "after": "had.", "ans": "no matter how much money he", "accept": ["no matter how much money he"], "chunk1": "no matter", "chunk2": "how much money he", "p1": "no matter (concessive)", "p2": "how much money he (amount + subject)", "hint": "EVEN IF HE HAD → NO MATTER HOW MUCH MONEY HE HAD."},
  {"id": "t029", "orig": "You can borrow the car, but only if you promise to drive carefully.", "key": "CONDITION", "before": "You can borrow the car", "after": "carefully.", "ans": "on condition that you drive", "accept": ["on condition that you drive"], "chunk1": "on condition that", "chunk2": "you drive", "p1": "on condition that (formal conditional)", "p2": "you drive (subject + verb)", "hint": "BUT ONLY IF → ON CONDITION THAT YOU DRIVE. Formal conditional phrase."},
  {"id": "t030", "orig": "You can borrow my car, but make sure you fill up the tank.", "key": "LONG", "before": "You can borrow my car as long as", "after": "the tank.", "ans": "you fill up", "accept": ["you fill up"], "chunk1": "you fill", "chunk2": "up", "p1": "you (subject — part of the conditional clause)", "p2": "up (particle of phrasal verb fill up)", "hint": "AS LONG AS YOU FILL UP THE TANK. Phrasal verb 'fill up' must stay together."},
  {"id": "t031", "orig": "I haven't seen him since the graduation ceremony.", "key": "LAST", "before": "The last time I saw him was", "after": ".", "ans": "at the graduation ceremony", "accept": ["at the graduation ceremony"], "chunk1": "at the", "chunk2": "graduation ceremony", "p1": "at (preposition for events and venues)", "p2": "graduation ceremony (full phrase)", "hint": "HAVEN'T SEEN SINCE → LAST TIME I SAW HIM WAS AT. Preposition 'at' for events."},
  {"id": "t032", "orig": "The last time I visited Paris was three years ago.", "key": "SINCE", "before": "I", "after": "three years.", "ans": "haven't visited Paris for", "accept": ["haven't visited paris for", "have not visited paris for"], "chunk1": "haven't visited paris", "chunk2": "for", "p1": "haven't visited Paris (present perfect)", "p2": "for (duration not since/ago)", "hint": "PRESENT PERFECT + FOR: 'last time was ago' \u2192 'haven't + past participle + for + period'. 'Ago' always becomes 'for'."},
  {"id": "t033", "orig": "The concert was cancelled because there was heavy snow.", "key": "DUE", "before": "The concert was cancelled", "after": "snow.", "ans": "due to the heavy", "accept": ["due to the heavy"], "chunk1": "due to", "chunk2": "the heavy", "p1": "due to (preposition not because of)", "p2": "the heavy (article + adjective)", "hint": "DUE TO + noun phrase: 'because there was heavy snow' \u2192 'due to the heavy [noun]'. Include the article."},
  {"id": "t034", "orig": "The match was postponed because the pitch was waterlogged.", "key": "OWING", "before": "The match was postponed", "after": "being waterlogged.", "ans": "owing to the pitch", "accept": ["owing to the pitch"], "chunk1": "owing to", "chunk2": "the pitch", "p1": "owing to (formal preposition = because of)", "p2": "the pitch (definite article + noun)", "hint": "OWING TO + noun phrase + gerund: 'because the pitch was' \u2192 'owing to the pitch being'. Noun + gerund after the preposition."},
  {"id": "t035", "orig": "She left early because she wanted to catch the last train.", "key": "ORDER", "before": "She left early", "after": "the last train.", "ans": "in order to catch", "accept": ["in order to catch"], "chunk1": "in order", "chunk2": "to catch", "p1": "in order (not in order for)", "p2": "to catch (infinitive, not catching)", "hint": "IN ORDER TO + infinitive = purpose. 'Because she wanted to catch X' \u2192 'in order to catch X'. Simple purpose clause."},
  {"id": "t036", "orig": "She couldn't stop herself from laughing during the speech.", "key": "HELP", "before": "She", "after": "during the speech.", "ans": "couldn't help laughing", "accept": ["couldn't help laughing", "could not help laughing"], "chunk1": "couldn't help", "chunk2": "laughing", "p1": "couldn't help (can't help = can't stop)", "p2": "laughing (gerund not to laugh)", "hint": "CAN'T HELP + gerund = unable to stop doing. 'Couldn't stop herself from laughing' \u2192 'couldn't help...'. What verb form follows?"},
  {"id": "t037", "orig": "I was forced to sign the contract because I had no alternative.", "key": "CHOICE", "before": "I had no", "after": "the contract.", "ans": "choice but to sign", "accept": ["choice but to sign"], "chunk1": "choice but", "chunk2": "to sign", "p1": "choice but (no choice but to = fixed)", "p2": "to sign (infinitive)", "hint": "NO CHOICE BUT TO + infinitive = forced to do. 'No alternative' \u2192 'no choice but to'. What infinitive completes the phrase?"},
  {"id": "t038", "orig": "His resignation shocked everyone in the department.", "key": "TAKEN", "before": "Everyone in the department was", "after": "resignation.", "ans": "taken aback by his", "accept": ["taken aback by his"], "chunk1": "taken aback", "chunk2": "by his", "p1": "taken aback (fixed phrase \u2014 not taken back)", "p2": "by his (passive agent by, not with/at)", "hint": "TAKEN ABACK BY = shocked or surprised by. Passive idiom. What preposition introduces the cause after 'taken aback'?"},
  {"id": "t039", "orig": "The news that she had won completely surprised her.", "key": "GUARD", "before": "The news that she had won caught her", "after": ".", "ans": "off guard", "accept": ["off guard"], "chunk1": "off", "chunk2": "guard", "p1": "off (preposition in 'catch off guard')", "p2": "guard (noun \u2014 fixed idiom)", "hint": "CATCH OFF GUARD = surprise when unprepared. Two words follow 'caught her' to complete the idiom."},
  {"id": "t040", "orig": "It's not worth trying to persuade him; he won't change his mind.", "key": "POINT", "before": "There is no", "after": "him; he won't change his mind.", "ans": "point in trying to persuade", "accept": ["point in trying to persuade", "point trying to persuade"], "chunk1": "point in", "chunk2": "trying to persuade", "p1": "point in / point (no point in doing)", "p2": "trying to persuade (gerund phrase)", "hint": "NO POINT IN + gerund = not worth doing. 'Not worth trying to' \u2192 'no point in...' What gerund phrase follows?"},
  {"id": "t041", "orig": "It's no use complaining \u2014 nothing will change.", "key": "WORTH", "before": "It is not", "after": "nothing will change.", "ans": "worth complaining,", "accept": ["worth complaining,", "worth complaining"], "chunk1": "worth", "chunk2": "complaining", "p1": "worth (it's not worth = no use)", "p2": "complaining (gerund not to complain)", "hint": "NOT WORTH + gerund = no use doing. 'No use complaining' \u2192 'not worth...'. What -ing form follows directly?"},
