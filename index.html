TIVE modifying 'impact'. The root is a NOUN. The suffix -AL converts nouns into adjectives — check spelling carefully."}, {"id": "p3_n52", "sent": "The panel reached a [UNANIMOUS] decision after surprisingly little debate, given the complexity of the issues involved.", "root": "UNANIMOUS", "a": "unanimous", "h": "You need an ADJECTIVE. Check whether the root word itself, without any affixation, functions as the word class you need here. Sometimes the root form is already the correct answer."}, {"id": "p3_n53", "sent": "The exhibition was praised for its [INNOVATE] approach to displaying artefacts in their historical and cultural context.", "root": "INNOVATE", "a": "innovative", "h": "You need an ADJECTIVE meaning 'characterised by new ideas and methods'. The root is a verb. The suffix -IVE converts it to an adjective — check the spelling carefully."}, {"id": "p3_n54", "sent": "The company's [PERSIST] in pursuing the case, despite repeated setbacks, was ultimately rewarded by a favourable verdict.", "root": "PERSIST", "a": "persistence", "h": "You need a NOUN meaning 'continued determination despite difficulty'. The root is a verb. The suffix is -ENCE — check how the verb ending changes before it is added."}, {"id": "p3_n55", "sent": "The rate of [LITERATE] in the region has improved dramatically following sustained investment in primary education over the past decade.", "root": "LITERATE", "a": "literacy", "h": "You need a NOUN meaning 'the ability to read and write'. The root is an adjective. The suffix is -CY — but the ending of the adjective changes significantly before it is added."}];
const P4 = [{"id": "t001", "orig": "I regret not applying for that job when I had the chance.", "key": "WISH", "before": "I", "after": "that job when I had the chance.", "ans": "wish I had applied for", "accept": ["wish i had applied for"], "chunk1": "wish i had", "chunk2": "applied for", "p1": "wish + past perfect (had applied) for past regret", "p2": "applied FOR (preposition required — apply FOR a job)", "h": "REGRET NOT APPLYING → WISH I HAD APPLIED FOR. Past wish needs past perfect. Don't forget the preposition after 'applied'."}, {"id": "t002", "orig": "It's a shame that we didn't book the hotel earlier.", "key": "ONLY", "before": "If only", "after": "earlier!", "ans": "we had booked the hotel", "accept": ["we had booked the hotel"], "chunk1": "we had", "chunk2": "booked the hotel", "p1": "if only + past perfect (had booked) — past regret", "p2": "booked the hotel (past participle — not 'book' or 'booking')", "h": "IT'S A SHAME WE DIDN'T BOOK → IF ONLY WE HAD BOOKED. Past regret: If only + past perfect."}, {"id": "t003", "orig": "The mechanic is repairing my car at the moment.", "key": "HAVING", "before": "I am", "after": "at the moment.", "ans": "having my car repaired", "accept": ["having my car repaired", "having the car repaired"], "chunk1": "having my car", "chunk2": "repaired", "p1": "having my car (causative structure)", "p2": "repaired — passive participle (not repairing)", "h": "CAUSATIVE HAVE: 'have + object + past participle'. The car doesn't repair itself — someone else does it for you."}, {"id": "t004", "orig": "A professional photographer took our wedding photos.", "key": "HAD", "before": "We", "after": "by a professional photographer.", "ans": "had our wedding photos taken", "accept": ["had our wedding photos taken", "had our photos taken"], "chunk1": "had our wedding photos", "chunk2": "taken", "p1": "had our wedding photos (causative)", "p2": "taken — passive participle", "h": "CAUSATIVE HAD: 'had + object + past participle'. Think about who arranged the action rather than doing it themselves."}, {"id": "t005", "orig": "They say that he was involved in the fraud.", "key": "ALLEGED", "before": "He is", "after": "in the fraud.", "ans": "alleged to have been involved", "accept": ["alleged to have been involved", "alleged to have been involved in"], "chunk1": "alleged to", "chunk2": "have been involved", "p1": "alleged to (passive reporting verb)", "p2": "have been involved (perfect infinitive passive)", "h": "PASSIVE REPORTING: 'alleged to + infinitive'. When the original says 'was involved', what form of the infinitive do you need?"}, {"id": "t006", "orig": "People believe that she is the best candidate for the role.", "key": "BELIEVED", "before": "She is believed", "after": "for the role.", "ans": "to be the best candidate", "accept": ["to be the best candidate"], "chunk1": "to be", "chunk2": "the best candidate", "p1": "believed to be (passive reporting structure — believed + to-infinitive)", "p2": "to be the best candidate (infinitive complement after believed)", "h": "PEOPLE BELIEVE THAT SHE IS → SHE IS BELIEVED TO BE. Passive reporting. Answer: to be the best candidate."}, {"id": "t007", "orig": "It seems that the documents were mislaid during the move.", "key": "APPEAR", "before": "The documents", "after": "during the move.", "ans": "appear to have been mislaid", "accept": ["appear to have been mislaid"], "chunk1": "appear to", "chunk2": "have been mislaid", "p1": "appear to (reporting verb)", "p2": "have been mislaid (perfect infinitive passive)", "h": "PASSIVE REPORTING + PERFECT INFINITIVE PASSIVE: for a past event, use 'to have been + past participle'. Don't drop 'been'."}, {"id": "t008", "orig": "Experts say that the painting is a forgery.", "key": "THOUGHT", "before": "The painting", "after": "a forgery.", "ans": "is thought to be", "accept": ["is thought to be"], "chunk1": "is thought", "chunk2": "to be", "p1": "is thought (passive)", "p2": "to be (infinitive, not is/was)", "h": "PASSIVE REPORTING: 'is thought to + infinitive'. The original says she IS a forgery — which infinitive form does that require?"}, {"id": "t009", "orig": "If you had told me earlier, I could have helped you.", "key": "TOLD", "before": "Had", "after": "I could have helped you.", "ans": "you told me earlier", "accept": ["you told me earlier"], "chunk1": "you told", "chunk2": "me earlier", "p1": "you told (inversion: Had you told = If you had told)", "p2": "me earlier (object + adverb)", "h": "THIRD CONDITIONAL INVERSION: 'If + subject + had + past participle' becomes 'Had + subject + past participle'. The 'if' disappears."}, {"id": "t010", "orig": "If she had arrived on time, she wouldn't have missed the train.", "key": "ARRIVED", "before": "Had she", "after": "she wouldn't have missed the train.", "ans": "arrived on time", "accept": ["arrived on time"], "chunk1": "arrived", "chunk2": "on time", "p1": "arrived (past participle after 'Had she')", "p2": "on time (adverb phrase)", "h": "THIRD CONDITIONAL INVERSION: 'Had she...' replaces 'If she had...'. What comes directly after 'Had she' to complete the condition?"}, {"id": "t011", "orig": "If it weren't for her support, I would have given up.", "key": "NOT", "before": "Were it", "after": "I would have given up.", "ans": "not for her support", "accept": ["not for her support"], "chunk1": "not for", "chunk2": "her support", "p1": "not for (were it not for = if it weren't for)", "p2": "her support", "h": "FORMAL INVERSION: 'Were it not for' = 'If it weren't for'. What two words follow 'Were it' to express the condition?"}, {"id": "t012", "orig": "She speaks French so fluently she could pass for a native speaker.", "key": "SUCH", "before": "She has", "after": "she could pass for a native speaker.", "ans": "such fluent French that", "accept": ["such fluent French that"], "chunk1": "such fluent french", "chunk2": "that", "p1": "such fluent French (such + adj + noun)", "p2": "that (result clause — obligatory)", "h": "SO + adverb → SUCH + adjective + noun + THAT. 'Speaks so fluently' becomes 'has such [adjective] [noun] that'. Include 'that'."}, {"id": "t013", "orig": "He is such a convincing liar that no one ever suspects him.", "key": "CONVINCINGLY", "before": "He lies so", "after": "suspects him.", "ans": "convincingly that no one ever", "accept": ["convincingly that no one ever"], "chunk1": "convincingly", "chunk2": "that no one ever", "p1": "convincingly (adverb not adjective)", "p2": "that no one ever (result clause)", "h": "SUCH + noun → SO + adverb. What is the adverb form of 'convincing'? The 'that' clause must follow."}, {"id": "t014", "orig": "I had never visited such an impressive museum before.", "key": "WAS", "before": "It", "after": "I had ever visited.", "ans": "was the most impressive museum", "accept": ["was the most impressive museum"], "chunk1": "was the most impressive", "chunk2": "museum", "p1": "the most impressive (superlative, not more impressive)", "p2": "museum (noun, not one/building)", "h": "SUPERLATIVE cleft: 'never such a + adj + noun' → 'the most + adj + noun + subject + had ever + past participle'."}, {"id": "t015", "orig": "Although she was tired, she finished all the work.", "key": "DESPITE", "before": "She finished all the work", "after": ".", "ans": "despite being very tired", "accept": ["despite being very tired", "despite feeling very tired"], "chunk1": "despite", "chunk2": "being", "p1": "despite (not in spite/although)", "p2": "being — gerund (not she was/having been)", "h": "ALTHOUGH SHE WAS TIRED → DESPITE BEING VERY TIRED. DESPITE + gerund phrase. (3 transformations: conjunction→preposition, clause→gerund phrase, adjective retained)"}, {"id": "t016", "orig": "Even though the weather was dreadful, we enjoyed the picnic.", "key": "SPITE", "before": "We enjoyed the picnic", "after": "weather.", "ans": "in spite of the dreadful", "accept": ["in spite of the dreadful", "in spite of the terrible", "in spite of the awful"], "chunk1": "in spite of", "chunk2": "the dreadful", "p1": "in spite of (not despite of/in spite that)", "p2": "the dreadful/terrible weather (noun phrase not clause)", "h": "IN SPITE OF + noun phrase: 'even though + clause' → 'in spite of + noun phrase'. A clause cannot follow 'in spite of'."}, {"id": "t017", "orig": "Despite working hard, she failed the exam.", "key": "MATTER", "before": "She failed the exam", "after": "worked.", "ans": "no matter how hard she", "accept": ["no matter how hard she"], "chunk1": "no matter", "chunk2": "how hard she", "p1": "no matter (fixed phrase)", "p2": "how hard she (word order)", "h": "NO MATTER HOW + adjective/adverb + subject + verb: 'despite + gerund' becomes a concessive with 'no matter how'."}, {"id": "t018", "orig": "It was wrong of him to leave without saying goodbye.", "key": "HAVE", "before": "He should not", "after": "saying goodbye.", "ans": "have left without", "accept": ["have left without", "have left without saying"], "chunk1": "have left", "chunk2": "without", "p1": "have left (perfect infinitive after should not)", "p2": "without (preposition)", "h": "IT WAS WRONG → SHOULD NOT HAVE LEFT WITHOUT. Past modal criticism."}, {"id": "t019", "orig": "It was unnecessary for her to stay so late.", "key": "NEED", "before": "She", "after": "so late.", "ans": "needn't have stayed", "accept": ["needn't have stayed", "need not have stayed"], "chunk1": "needn't have", "chunk2": "stayed", "p1": "needn't have (past modal: unnecessary action done)", "p2": "stayed (past participle)", "h": "NEEDN'T HAVE + past participle = did something unnecessary. She DID stay, but didn't need to. Different from 'didn't need to stay'."}, {"id": "t020", "orig": "I'm sure he didn't take the money — it's not like him.", "key": "HAVE", "before": "He can't", "after": ", it's not like him.", "ans": "have taken the money", "accept": ["have taken the money"], "chunk1": "have taken", "chunk2": "the money", "p1": "have taken (perfect infinitive after can't)", "p2": "the money (object)", "h": "CAN'T HAVE + past participle = strong deduction that a past event didn't happen. What perfect infinitive follows 'can't have'?"}, {"id": "t021", "orig": "It's a pity I don't live closer to the city centre.", "key": "WISH", "before": "I", "after": "the city centre.", "ans": "wish I lived closer to", "accept": ["wish i lived closer to"], "chunk1": "wish i lived", "chunk2": "closer to", "p1": "wish I lived (present wish = past simple)", "p2": "closer to (comparative + preposition)", "h": "WISH + past simple = wanting the present to be different. 'I don't live closer' → 'I wish I [past simple] closer to...'"}, {"id": "t022", "orig": "I can't help you because I have too much work.", "key": "POSITION", "before": "I'm afraid I'm not in", "after": "help you.", "ans": "a position to", "accept": ["a position to"], "chunk1": "a position", "chunk2": "to", "p1": "not in a position to = formal way of saying unable to", "p2": "to (infinitive marker follows 'position')", "h": "CAN'T HELP → NOT IN A POSITION TO HELP. Formal register expressing inability."}, {"id": "t023", "orig": "Someone broke into our house while we were on holiday.", "key": "HAD", "before": "We", "after": "while we were on holiday.", "ans": "had our house broken into", "accept": ["had our house broken into"], "chunk1": "had our house", "chunk2": "broken into", "p1": "had our house (causative/passive experience)", "p2": "broken into (phrasal verb in passive)", "h": "PASSIVE EXPERIENCE with HAD: 'someone broke into X' → 'had X broken into'. The phrasal verb 'broken into' must stay together."}, {"id": "t024", "orig": "It is difficult for me to concentrate when there is noise.", "key": "FIND", "before": "I", "after": "when there is noise.", "ans": "find it difficult to concentrate", "accept": ["find it difficult to concentrate"], "chunk1": "find it difficult", "chunk2": "to concentrate", "p1": "find it difficult (anticipatory it)", "p2": "to concentrate (infinitive not concentrating)", "h": "ANTICIPATORY IT: 'it is difficult for me to' → 'I find it difficult to'. Keep 'it' as a dummy object after 'find'."}, {"id": "t025", "orig": "Keeping up with current affairs is something I find very important.", "key": "IMPORTANCE", "before": "I attach great", "after": "with current affairs.", "ans": "importance to keeping up", "accept": ["importance to keeping up"], "chunk1": "importance to", "chunk2": "keeping up", "p1": "importance to (attach importance to = fixed phrase)", "p2": "keeping up (gerund not infinitive)", "h": "ATTACH IMPORTANCE TO + gerund: a formal noun phrase. 'Find very important' → 'attach great importance to'. What gerund follows?"}, {"id": "t026", "orig": "The manager forced all staff to work overtime.", "key": "MADE", "before": "All staff", "after": "overtime.", "ans": "were made to work", "accept": ["were made to work"], "chunk1": "were made", "chunk2": "to work", "p1": "were made (passive)", "p2": "to work (infinitive — obligatory after made passive)", "h": "PASSIVE CAUSATIVE: in the passive 'made to do', the infinitive requires 'to' (unlike the active, which uses the bare infinitive)."}, {"orig": "The noise outside made it impossible for me to sleep.", "key": "STOP", "before": "Nothing could", "after": "me from sleeping, however loud the noise was.", "ans": "stop the noise keeping", "accept": ["stop the noise keeping", "stop the noise from keeping"], "chunk1": "stop the noise", "chunk2": "keeping", "p1": "stop (= prevent) — same FROM pattern: stop X from doing", "p2": "stop the noise keeping/from keeping me — the noise is the subject of the gerund", "hint": "MADE IT IMPOSSIBLE TO SLEEP → NOTHING COULD STOP … FROM SLEEPING. Two changes: prevent→stop + nothing could subject restructure.", "h": "MADE IT IMPOSSIBLE → NOTHING COULD STOP … FROM. Two changes: causative restructure + prevent→stop. Answer: stop the noise keeping.", "id": "t027"}, {"id": "t028", "orig": "Even if he had unlimited funds, he still wouldn't be satisfied.", "key": "MATTER", "before": "He wouldn't be satisfied", "after": "he had.", "ans": "no matter how much money", "accept": ["no matter how much money"], "chunk1": "no matter", "chunk2": "how much money", "p1": "no matter how + adjective/adverb (= even if, regardless of how)", "p2": "how much money (quantifier clause — not 'however much')", "h": "EVEN IF HE HAD UNLIMITED FUNDS → NO MATTER HOW MUCH MONEY. Concessive: no matter how + quantity."}, {"id": "t029", "orig": "You can borrow the car, but only if you promise to drive carefully.", "key": "CONDITION", "before": "You can borrow the car", "after": "carefully.", "ans": "on condition that you drive", "accept": ["on condition that you drive"], "chunk1": "on condition that", "chunk2": "you drive", "p1": "on condition that (formal conditional)", "p2": "you drive (subject + verb)", "h": "BUT ONLY IF → ON CONDITION THAT YOU DRIVE. Formal conditional phrase."}, {"id": "t030", "orig": "You can borrow my car, but make sure you fill up the tank.", "key": "LONG", "before": "You can borrow my car", "after": "you fill up the tank.", "ans": "as long as", "accept": ["as long as"], "chunk1": "long", "chunk2": "as", "p1": "as long as = provided that (conditional)", "p2": "as (the second 'as' — both words needed together)", "h": "MAKE SURE YOU = AS LONG AS. AS LONG AS introduces a conditional/condition clause."}, {"id": "t031", "orig": "I haven't seen him since the graduation ceremony.", "key": "LAST", "before": "The", "after": "was at the graduation ceremony.", "ans": "last time I saw him", "accept": ["last time I saw him"], "chunk1": "last", "chunk2": "time", "p1": "the last time + subject + verb (replaces present perfect + since)", "p2": "time (noun — both words form the fixed phrase)", "h": "HAVEN'T SEEN SINCE → THE LAST TIME I SAW HIM. Restructure: present perfect + since → past simple + last time clause."}, {"id": "t032", "orig": "The last time I saw her was at the conference in March.", "key": "SINCE", "before": "I", "after": "the conference in March.", "ans": "haven't seen her since", "accept": ["haven't seen her since", "have not seen her since"], "chunk1": "haven't seen her", "chunk2": "since", "p1": "present perfect + since (replaces 'last time X was')", "p2": "since (preposition/conjunction — used with a point in time, not a period)", "h": "THE LAST TIME I SAW HER WAS → HAVEN'T SEEN HER SINCE. Present perfect + since. 'Since' needs a point in time, not a duration."}, {"id": "t033", "orig": "The concert was cancelled because there was heavy snow.", "key": "DUE", "before": "The concert was cancelled", "after": "snow.", "ans": "due to the heavy", "accept": ["due to the heavy"], "chunk1": "due to", "chunk2": "the heavy", "p1": "due to (preposition not because of)", "p2": "the heavy (article + adjective)", "h": "DUE TO + noun phrase: 'because there was heavy snow' → 'due to the heavy [noun]'. Include the article."}, {"id": "t034", "orig": "The match was postponed because the pitch was waterlogged.", "key": "OWING", "before": "The match was postponed", "after": "being waterlogged.", "ans": "owing to the pitch", "accept": ["owing to the pitch"], "chunk1": "owing to", "chunk2": "the pitch", "p1": "owing to (formal preposition = because of)", "p2": "the pitch (definite article + noun)", "h": "OWING TO + noun phrase + gerund: 'because the pitch was' → 'owing to the pitch being'. Noun + gerund after the preposition."}, {"id": "t035", "orig": "She left early because she wanted to catch the last train.", "key": "ORDER", "before": "She left early", "after": "the last train.", "ans": "in order to catch", "accept": ["in order to catch"], "chunk1": "in order", "chunk2": "to catch", "p1": "in order (not in order for)", "p2": "to catch (infinitive, not catching)", "h": "IN ORDER TO + infinitive = purpose. 'Because she wanted to catch X' → 'in order to catch X'. Simple purpose clause."}, {"id": "t036", "orig": "She couldn't stop herself from laughing during the speech.", "key": "HELP", "before": "She", "after": "during the speech.", "ans": "couldn't help laughing", "accept": ["couldn't help laughing", "could not help laughing"], "chunk1": "couldn't help", "chunk2": "laughing", "p1": "couldn't help (can't help = can't stop)", "p2": "laughing (gerund not to laugh)", "h": "CAN'T HELP + gerund = unable to stop doing. 'Couldn't stop herself from laughing' → 'couldn't help...'. What verb form follows?"}, {"id": "t037", "orig": "I was forced to sign the contract because I had no alternative.", "key": "CHOICE", "before": "I had no", "after": "the contract.", "ans": "choice but to sign", "accept": ["choice but to sign"], "chunk1": "choice but", "chunk2": "to sign", "p1": "choice but (no choice but to = fixed)", "p2": "to sign (infinitive)", "h": "NO CHOICE BUT TO + infinitive = forced to do. 'No alternative' → 'no choice but to'. What infinitive completes the phrase?"}, {"id": "t038", "orig": "His resignation shocked everyone in the department.", "key": "TAKEN", "before": "Everyone in the department was", "after": "resignation.", "ans": "taken aback by his", "accept": ["taken aback by his"], "chunk1": "taken aback", "chunk2": "by his", "p1": "taken aback (fixed phrase — not taken back)", "p2": "by his (passive agent by, not with/at)", "h": "TAKEN ABACK BY = shocked or surprised by. Passive idiom. What preposition introduces the cause after 'taken aback'?"}, {"id": "t039", "orig": "The news that she had won completely surprised her.", "key": "GUARD", "before": "The news that she had won caught her", "after": ".", "ans": "completely off guard", "accept": ["completely off guard"], "chunk1": "off", "chunk2": "guard", "p1": "caught off guard = completely surprised", "p2": "off guard (two-word fixed phrase — both words needed)", "h": "COMPLETELY SURPRISED HER → CAUGHT HER COMPLETELY OFF GUARD. Fixed phrase: catch sb off guard."}, {"id": "t040", "orig": "It's not worth trying to persuade him; he won't change his mind.", "key": "POINT", "before": "There is no", "after": "him; he won't change his mind.", "ans": "point in trying to persuade", "accept": ["point in trying to persuade", "point trying to persuade"], "chunk1": "point in", "chunk2": "trying to persuade", "p1": "point in / point (no point in doing)", "p2": "trying to persuade (gerund phrase)", "h": "NO POINT IN + gerund = not worth doing. 'Not worth trying to' → 'no point in...' What gerund phrase follows?"}, {"id": "t041", "orig": "It's no use complaining as nothing will change.", "key": "WORTH", "before": "Complaining is not", "after": "as nothing will change.", "ans": "worth doing at all", "accept": ["worth doing at all", "worth it at all"], "chunk1": "worth", "chunk2": "it", "p1": "not worth it = no use / pointless", "p2": "it (dummy object required after 'worth' when no gerund follows)", "h": "IT'S NO USE COMPLAINING → NOT WORTH DOING AT ALL. WORTH + gerund; AT ALL strengthens negation."}, {"id": "t042", "orig": "The film was not as good as people had expected.", "key": "FALL", "before": "The film appeared to", "after": "people's expectations.", "ans": "fall short of", "accept": ["fall short of"], "chunk1": "fall short", "chunk2": "of", "p1": "fall short of = fail to meet (base form after 'appeared to')", "p2": "of (preposition — 'fall short OF expectations')", "h": "NOT AS GOOD AS EXPECTED → APPEARED TO FALL SHORT OF EXPECTATIONS. Phrasal verb in base form after 'appeared to'. Don't drop the preposition."}, {"id": "t043", "orig": "The holiday was a disappointment — it wasn't as good as we'd hoped.", "key": "LIVE", "before": "The holiday", "after": "expectations.", "ans": "didn't live up to", "accept": ["didn't live up to", "did not live up to"], "chunk1": "didn't live up", "chunk2": "to", "p1": "didn't live up (phrasal verb)", "p2": "to (preposition — live up TO)", "h": "LIVE UP TO + noun = meet expectations. 'Wasn't as good as hoped' → 'didn't live up to...'. What is the object?"}, {"id": "t044", "orig": "She doesn't mind whether we go by train or bus.", "key": "DIFFERENCE", "before": "It makes", "after": "whether we go by train or bus.", "ans": "no difference to her", "accept": ["no difference to her"], "chunk1": "no difference", "chunk2": "to her", "p1": "makes no difference to someone = they don't mind", "p2": "to her (preposition TO — not 'for her')", "h": "DOESN'T MIND → MAKES NO DIFFERENCE TO HER. Fixed phrase. Don't drop the preposition or the person."}, {"id": "t045", "orig": "Working night shifts was strange at first, but I've adapted.", "key": "USED", "before": "I have", "after": "night shifts.", "ans": "got used to working", "accept": ["got used to working"], "chunk1": "got used to", "chunk2": "working", "p1": "got used to (become accustomed)", "p2": "working (gerund not work/to work)", "h": "GOT USED TO + gerund = became accustomed to. 'Adapted' → 'got used to'. 'To' here is a preposition — it needs a gerund, not an infinitive."}, {"id": "t046", "orig": "She spent so long working abroad that she lost touch with old friends.", "key": "RESULT", "before": "Spending so long working abroad", "after": "in her losing touch with old friends.", "ans": "was to result", "accept": ["was to result"], "chunk1": "was to", "chunk2": "result", "p1": "was to result in + gerund (formal structure for inevitable consequence)", "p2": "result (infinitive after 'was to' — base form)", "h": "SPENT SO LONG THAT SHE LOST → WAS TO RESULT IN HER LOSING. Formal 'be to' + result in. What follows 'to'?"}, {"id": "t047", "orig": "He worked so hard that he eventually collapsed from exhaustion.", "key": "RESULT", "before": "His overworking", "after": "in him eventually collapsing from exhaustion.", "ans": "was to result", "accept": ["was to result"], "chunk1": "was to", "chunk2": "result", "p1": "was to result in + gerund", "p2": "result (base form after 'to')", "h": "WORKED SO HARD THAT → HIS OVERWORKING WAS TO RESULT IN. Same structure as the other RESULT question."}, {"id": "t048", "orig": "No sooner had we sat down than the fire alarm went off.", "key": "IMMEDIATELY", "before": "The fire alarm went off", "after": "down.", "ans": "immediately after we had sat", "accept": ["immediately after we had sat", "immediately after we sat"], "chunk1": "immediately after", "chunk2": "we had sat", "p1": "immediately after (not immediately when)", "p2": "we had sat (past perfect)", "h": "IMMEDIATELY AFTER + past perfect: 'no sooner had X than Y' → 'immediately after + subject + had + past participle'."}, {"orig": "It was only after she arrived home that she noticed her phone was missing.", "key": "UNTIL", "before": "She did not notice her phone was missing", "after": ".", "ans": "until after she arrived home", "accept": ["until after she arrived home", "until after she got home"], "chunk1": "until", "chunk2": "after", "p1": "not … until (= only when something happens)", "p2": "until AFTER (both words needed — not until after)", "hint": "ONLY AFTER → NOT UNTIL AFTER. Two changes: focus adverb (only after) → negative (not until after).", "h": "ONLY AFTER SHE ARRIVED → DID NOT NOTICE UNTIL AFTER SHE ARRIVED. Restructure negative + until after.", "id": "t049"}, {"id": "t050", "orig": "She had barely sat down when the phone rang.", "key": "SOONER", "before": "No sooner", "after": "the phone rang.", "ans": "had she sat down than", "accept": ["had she sat down than"], "chunk1": "had she sat down", "chunk2": "than", "p1": "no sooner + inversion (had + subject) — past perfect required", "p2": "than (NOT 'when' — no sooner … THAN)", "h": "BARELY SAT DOWN WHEN → NO SOONER HAD … THAN. Past perfect inversion + THAN."}, {"id": "t051", "orig": "I would prefer you not to mention this to anyone.", "key": "RATHER", "before": "I would", "after": "this to anyone.", "ans": "rather you didn't mention", "accept": ["rather you didn't mention", "rather you did not mention"], "chunk1": "rather you didn't", "chunk2": "mention", "p1": "would rather + subject + past simple (subjunctive)", "p2": "didn't mention (past simple negative — not 'don't mention' or 'not mention')", "h": "PREFER YOU NOT TO → WOULD RATHER YOU DIDN'T MENTION. Past subjunctive after 'would rather you'."}, {"id": "t052", "orig": "I regret agreeing to help him — it took all weekend.", "key": "RATHER", "before": "I would", "after": "to help him.", "ans": "rather not have agreed", "accept": ["rather not have agreed", "rather not have agreed to"], "chunk1": "rather not have", "chunk2": "agreed", "p1": "rather not have (past regret: would rather not have)", "p2": "agreed (past participle)", "h": "WOULD RATHER NOT HAVE + past participle = past regret. 'I regret agreeing' → 'I would rather not have...'. What past participle?"}, {"id": "t053", "orig": "People say that the company has been cutting corners on safety.", "key": "SAID", "before": "The company is", "after": "corners on safety.", "ans": "said to have been cutting", "accept": ["said to have been cutting"], "chunk1": "said to have been", "chunk2": "cutting", "p1": "is said to have been + gerund (passive reporting + perfect continuous)", "p2": "cutting (present participle — continuous aspect preserved)", "h": "PEOPLE SAY IT HAS BEEN CUTTING → IS SAID TO HAVE BEEN CUTTING. Passive report + perfect continuous infinitive."}, {"id": "t054", "orig": "She arrived at the theatre after the performance had started.", "key": "TIME", "before": "By the", "after": ", the performance had already started.", "ans": "time she arrived", "accept": ["time she arrived"], "chunk1": "time she arrived", "chunk2": "arrived", "p1": "by the time + subject + past simple", "p2": "arrived (past simple — not 'had arrived')", "h": "ARRIVED AFTER THE PERFORMANCE HAD STARTED → BY THE TIME SHE ARRIVED. Time clause + past simple. A comma naturally follows the clause."}, {"id": "t055", "orig": "Nobody has used this equipment for over a year.", "key": "OUT", "before": "This equipment has been", "after": "over a year.", "ans": "out of use for", "accept": ["out of use for", "out of action for"], "chunk1": "out of use", "chunk2": "for", "p1": "out of use/action (fixed phrase)", "p2": "for (duration not since/in)", "h": "OUT OF USE/ACTION + FOR: 'nobody has used it' → 'has been out of [noun phrase] for'. What noun phrase means not being used?"}, {"id": "t056", "orig": "The repairs will cost more than we can afford.", "key": "BEYOND", "before": "The cost of the repairs is", "after": ".", "ans": "beyond our means", "accept": ["beyond our means"], "chunk1": "beyond", "chunk2": "our means", "p1": "beyond (not above/outside)", "p2": "our means (financial capacity — fixed phrase)", "h": "BEYOND ONE'S MEANS = too expensive to afford. Fixed idiom. What possessive determiner completes 'beyond...'?"}, {"id": "t057", "orig": "The queue was so long that we decided to leave.", "key": "SUCH", "before": "It was", "after": "we decided to leave.", "ans": "such a long queue that", "accept": ["such a long queue that"], "chunk1": "such a long queue", "chunk2": "that", "p1": "such a long queue (such + a + adj + noun)", "p2": "that (result clause)", "h": "SUCH + article + adjective + noun + THAT: 'so + adjective + that' → 'such a + adjective + noun + that'. Include the article 'a'."}, {"id": "t058", "orig": "She was so exhausted after the marathon that she slept for twelve hours.", "key": "SUCH", "before": "She was in", "after": "that she slept for twelve hours.", "ans": "such a state of exhaustion", "accept": ["such a state of exhaustion"], "chunk1": "such a state", "chunk2": "of exhaustion", "p1": "such + (a) + noun phrase (so exhausted → such a state of exhaustion)", "p2": "a state of exhaustion (noun phrase — not the adjective 'exhausted')", "h": "SO EXHAUSTED THAT → IN SUCH A STATE OF EXHAUSTION THAT. So + adj → such + noun phrase."}, {"id": "t059", "orig": "The builders were expected to finish the project by June.", "key": "SUPPOSED", "before": "The builders", "after": "the project by June.", "ans": "were supposed to finish", "accept": ["were supposed to finish", "were supposed to have finished"], "chunk1": "were supposed", "chunk2": "to finish", "p1": "were supposed (past passive)", "p2": "to finish (infinitive)", "h": "WERE SUPPOSED TO + infinitive = a formal synonym of 'were expected to'. Passive modal — same infinitive follows."}, {"id": "t060", "orig": "She insisted that everyone should submit their reports by Friday.", "key": "INSISTED", "before": "She", "after": "their reports by Friday.", "ans": "insisted on everyone submitting", "accept": ["insisted on everyone submitting", "insisted on everybody submitting", "insisted on all staff submitting"], "chunk1": "insisted on", "chunk2": "everyone submitting", "p1": "insisted on (insist on + gerund)", "p2": "everyone submitting (possessive/object + gerund)", "h": "INSIST ON + object + gerund: 'insisted that everyone should submit' → 'insisted on everyone/everybody + gerund'. Preposition 'on' requires a gerund."}, {"id": "t061", "orig": "The council decided not to build any more car parks in the city centre.", "key": "DECISION", "before": "The council made", "after": "any more car parks in the city centre.", "ans": "the decision not to build", "accept": ["the decision not to build"], "chunk1": "the decision", "chunk2": "not to build", "p1": "made the decision (= decided — verb → noun phrase)", "p2": "not to build (negative infinitive — the council decided NOT TO build)", "h": "DECIDED NOT TO BUILD → MADE THE DECISION NOT TO BUILD. Verb nominalisation."}, {"id": "t062", "orig": "The new drug proved to be less effective than expected.", "key": "OUT", "before": "The new drug turned", "after": "less effective than expected.", "ans": "out to be", "accept": ["out to be"], "chunk1": "out to", "chunk2": "be", "p1": "out to (phrasal verb: turn out to)", "p2": "be (infinitive — not been/being)", "h": "PROVED TO BE → TURNED OUT TO BE. Direct phrasal verb synonym."}, {"id": "t063", "orig": "She is not only a talented musician but also an accomplished painter.", "key": "ADDITION", "before": "In", "after": "a talented musician, she is also an accomplished painter.", "ans": "addition to being", "accept": ["addition to being"], "chunk1": "addition to", "chunk2": "being", "p1": "addition to (in addition to = as well as)", "p2": "being (gerund not she is/to be)", "h": "IN ADDITION TO + gerund: 'not only X but also Y' → 'in addition to being X'. The preposition 'to' must be followed by a gerund."}, {"id": "t064", "orig": "My advice would be to book early to avoid disappointment.", "key": "STRONGLY", "before": "I would", "after": "early to avoid disappointment.", "ans": "strongly advise you to book", "accept": ["strongly advise you to book"], "chunk1": "strongly advise you", "chunk2": "to book", "p1": "strongly advise you (advise + object, not recommend you to)", "p2": "to book (infinitive)", "h": "STRONGLY ADVISE + object + TO + infinitive: 'my advice would be to' → 'I would strongly advise you to'. Object is required."}, {"id": "t065", "orig": "She can't afford a new car, and she definitely can't afford a sports car.", "key": "ALONE", "before": "She can't afford a new car,", "after": "a sports car.", "ans": "let alone buy", "accept": ["let alone buy", "let alone afford"], "chunk1": "let", "chunk2": "alone", "p1": "let (part of fixed phrase)", "p2": "alone (let alone = never mind/much less)", "h": "CAN'T AFFORD ... AND DEFINITELY CAN'T AFFORD → CAN'T AFFORD ... LET ALONE BUY. LET ALONE = and certainly not."}, {"id": "t066", "orig": "The concert was just starting when we arrived.", "key": "ABOUT", "before": "The concert was", "after": "when we arrived.", "ans": "about to start", "accept": ["about to start", "about to begin"], "chunk1": "about to", "chunk2": "start", "p1": "about to (be on the verge of)", "p2": "start/begin (infinitive)", "h": "ABOUT TO + infinitive = on the verge of doing. 'Was just starting' → 'was about to'. Present continuous → 'about to + infinitive'."}, {"id": "t067", "orig": "When I was young, I walked to school every day.", "key": "USED", "before": "I", "after": "to school every day when I was young.", "ans": "used to walk", "accept": ["used to walk", "used to walk to"], "chunk1": "used to", "chunk2": "walk", "p1": "used to (past habit discontinued)", "p2": "walk (bare infinitive — not walking/to walk)", "h": "WALKED (past habit) → USED TO WALK. Discontinued past habit uses 'used to + bare infinitive'."}, {"id": "t068", "orig": "The organisation gave financial help to the families affected.", "key": "PROVIDED", "before": "The organisation", "after": "the families affected.", "ans": "provided financial assistance to", "accept": ["provided financial assistance to", "provided financial support to"], "chunk1": "provided financial assistance", "chunk2": "to", "p1": "provided financial assistance/support (not gave help)", "p2": "to (not for/with)", "h": "PROVIDED + noun + TO: 'gave help to' → 'provided [formal noun] to'. What more formal noun replaces 'help'? And which preposition follows?"}, {"id": "t069", "orig": "He behaved badly, which made it seem like he didn't care.", "key": "IF", "before": "He behaved", "after": "didn't care.", "ans": "as if he", "accept": ["as if he"], "chunk1": "as if", "chunk2": "he", "p1": "as if (not as like/like)", "p2": "he (subject of subordinate clause)", "h": "AS IF + past simple = unreal comparison. 'Made it seem like he didn't care' → 'behaved as if he...' Same tense."}, {"id": "t070", "orig": "I think the government should take action on this immediately.", "key": "TIME", "before": "It is", "after": "action on this.", "ans": "high time the government took", "accept": ["high time the government took"], "chunk1": "high time", "chunk2": "the government took", "p1": "high time (it's high time = overdue)", "p2": "the government took (past subjunctive)", "h": "HIGH TIME + past subjunctive: 'should take action' → 'it is high time + subject + past simple'. The past simple here is a subjunctive."}, {"id": "t_n01", "orig": "He found the instructions very hard to follow.", "key": "DIFFICULTY", "before": "He had", "after": "the instructions.", "ans": "great difficulty following", "accept": ["great difficulty following", "great difficulty in following"], "chunk1": "difficulty", "chunk2": "following", "p1": "have difficulty (in) following — 'in' is optional", "p2": "following (gerund — not 'to follow')", "h": "FOUND VERY HARD TO FOLLOW → HAD GREAT DIFFICULTY FOLLOWING. HAVE DIFFICULTY + gerund; GREAT intensifies."}, {"id": "t_n02", "orig": "The announcement that the factory would close disappointed everyone who worked there.", "key": "CAME", "before": "The announcement that the factory would close", "after": "everyone who worked there.", "ans": "came as a disappointment to", "accept": ["came as a disappointment to"], "chunk1": "came as a disappointment", "chunk2": "to", "p1": "came as a disappointment (= disappointed — verb → fixed noun phrase)", "p2": "a disappointment TO (preposition required — came as X TO everyone)", "h": "DISAPPOINTED EVERYONE → CAME AS A DISAPPOINTMENT TO EVERYONE. Verb nominalisation + fixed phrase."}, {"id": "t_n03", "orig": "The region is often affected by severe flooding at this time of year.", "key": "FEELS", "before": "The region often", "after": "severe flooding at this time of year.", "ans": "feels the effects of", "accept": ["feels the effects of"], "chunk1": "feels the effects", "chunk2": "of", "p1": "feels the effects of (fixed phrase)", "p2": "of (preposition — completes the phrase)", "h": "IS AFFECTED BY → FEELS THE EFFECTS OF. Four-word fixed phrase. Don't forget the preposition."}, {"id": "t_n04", "orig": "She arrived at the station after the last train had already left.", "key": "TIME", "before": "By the", "after": ", the last train had already left.", "ans": "time she arrived", "accept": ["time she arrived"], "chunk1": "time she arrived", "chunk2": "arrived", "p1": "by the time + subject + past simple", "p2": "arrived (past simple in the 'by the time' clause)", "h": "ARRIVED AFTER THE TRAIN HAD LEFT → BY THE TIME SHE ARRIVED. Past simple in the time clause."}, {"id": "t_n05", "orig": "The company was forced to close three of its regional offices.", "key": "CHOICE", "before": "The company had no", "after": "three of its regional offices.", "ans": "choice but to close", "accept": ["choice but to close"], "chunk1": "choice but to", "chunk2": "close", "p1": "no choice but to + infinitive (forced → no choice)", "p2": "close (bare infinitive)", "h": "WAS FORCED TO CLOSE → HAD NO CHOICE BUT TO CLOSE. Fixed phrase. The infinitive stays bare."}, {"id": "t_n06", "orig": "She was just about to faint from the heat when someone helped her to a chair.", "key": "POINT", "before": "She was on the", "after": "from the heat when someone helped her.", "ans": "point of fainting", "accept": ["point of fainting"], "chunk1": "point of", "chunk2": "fainting", "p1": "on the point of + gerund (about to → on the point of)", "p2": "fainting (gerund — not 'to faint')", "h": "ABOUT TO FAINT → ON THE POINT OF FAINTING. Fixed phrase + gerund. NOT infinitive."}, {"id": "t_n07", "orig": "She demanded that all members of staff should sign a confidentiality agreement.", "key": "INSISTED", "before": "She", "after": "a confidentiality agreement.", "ans": "insisted on everyone signing", "accept": ["insisted on everyone signing", "insisted on all staff signing", "insisted on everybody signing"], "chunk1": "insisted on everyone", "chunk2": "signing", "p1": "insist on + object + gerund", "p2": "signing (gerund after object — not 'to sign')", "h": "DEMANDED THAT EVERYONE SIGN → INSISTED ON EVERYONE SIGNING. What follows 'insist on'?"}, {"id": "t_n08", "orig": "Her parents don't think she should stay out so late.", "key": "APPROVE", "before": "Her parents do not", "after": "so late.", "ans": "approve of her staying out", "accept": ["approve of her staying out"], "chunk1": "approve of her", "chunk2": "staying out", "p1": "do not approve of + object + gerund", "p2": "staying out (phrasal verb — not 'staying' or 'being out')", "h": "DON'T THINK SHE SHOULD STAY OUT → DON'T APPROVE OF HER STAYING OUT. Verb + preposition + gerund."}, {"id": "t_n09", "orig": "Because the concert was so successful, the band was invited on a world tour.", "key": "LED", "before": "The success of the concert", "after": "being invited on a world tour.", "ans": "led to the band", "accept": ["led to the band"], "chunk1": "led to", "chunk2": "the band", "p1": "led to (= resulted in — verb → phrasal verb)", "p2": "led to the band (= the band is the object — the band being invited)", "h": "BECAUSE THE CONCERT WAS SUCCESSFUL, THE BAND WAS INVITED → THE SUCCESS LED TO THE BAND BEING INVITED."}, {"id": "t_n10", "orig": "The council should have dealt with the flooding problem years ago.", "key": "TIME", "before": "It is high", "after": "with the flooding problem.", "ans": "time the council dealt", "accept": ["time the council dealt"], "chunk1": "time the council", "chunk2": "dealt", "p1": "high time + subject + past simple (subjunctive)", "p2": "dealt (past simple — not 'deals' or 'had dealt')", "h": "SHOULD HAVE DEALT → HIGH TIME THEY DEALT. The tense after 'high time' is past simple — even though the meaning is present."}, {"id": "t_n11", "orig": "It's hard to explain why some people are more resilient than others.", "key": "MAKES", "before": "It's hard to explain what", "after": "more resilient than others.", "ans": "makes some people", "accept": ["makes some people"], "chunk1": "makes some", "chunk2": "people", "p1": "what makes + object + adjective (replaces 'why X is adj')", "p2": "people (plural object — not 'person' or 'some are')", "h": "WHY SOME PEOPLE ARE MORE RESILIENT → WHAT MAKES SOME PEOPLE MORE RESILIENT. Cleft structure with 'make'."}, {"id": "t_n12", "orig": "She spoke with such confidence that it seemed she had been in charge for years.", "key": "IF", "before": "She spoke", "after": "in charge for years.", "ans": "as if she had been", "accept": ["as if she had been"], "chunk1": "as", "chunk2": "if", "p1": "as if + clause (seemed → spoke as if)", "p2": "as if (two words — do not confuse with 'as though', which is also acceptable but not the key word)", "h": "IT SEEMED SHE HAD BEEN → SPOKE AS IF SHE HAD BEEN. AS IF + past perfect for hypothetical/unreal situations."}, {"id": "t_n13", "orig": "It is extremely common for graduates of this programme to go on to senior positions.", "key": "MEANS", "before": "It is by no", "after": "rare for graduates of this programme to go on to senior positions.", "ans": "means extremely rare", "accept": ["means extremely rare"], "chunk1": "means uncommon", "chunk2": "uncommon", "p1": "by no means + adjective (quite common → by no means uncommon — double negative)", "p2": "uncommon (negative adjective — NOT 'common' — the double negative preserves the positive meaning)", "h": "EXTREMELY COMMON → BY NO MEANS EXTREMELY RARE. BY NO MEANS = not at all; restructure from positive to negative with extreme adverb."}, {"id": "t_n14", "orig": "In her new role, she is in charge of coordinating all communications across the department.", "key": "RESPONSIBILITY", "before": "In her new role, she has overall", "after": "all communications across the department.", "ans": "responsibility for coordinating", "accept": ["responsibility for coordinating"], "chunk1": "responsibility for", "chunk2": "coordinating", "p1": "overall responsibility for + gerund (in charge of → responsibility for)", "p2": "coordinating (gerund — not 'to coordinate' or 'coordination of')", "h": "IN CHARGE OF COORDINATING → OVERALL RESPONSIBILITY FOR COORDINATING. Fixed noun phrase. What follows 'responsibility'?"}, {"id": "t_n15", "orig": "Most people blame the economic crisis on poor financial regulation.", "key": "WIDELY", "before": "Poor financial regulation is", "after": "the economic crisis.", "ans": "widely held responsible for", "accept": ["widely held responsible for"], "chunk1": "widely held responsible", "chunk2": "for", "p1": "passive + widely + held responsible for", "p2": "for (preposition after 'responsible' — not 'of' or 'about')", "h": "MOST PEOPLE BLAME X ON → IS WIDELY HELD RESPONSIBLE FOR. Passive + adverb + fixed phrase. Don't forget the preposition."}, {"id": "t_a01", "orig": "Simon found the recipe book very hard to follow.", "key": "DIFFICULTY", "before": "Simon had great", "after": "the recipe book.", "ans": "difficulty in following", "accept": ["difficulty in following", "difficulty following"], "chunk1": "difficulty", "chunk2": "following", "p1": "have difficulty (in) + gerund — note 'in' is optional", "p2": "following (gerund — not 'to follow')", "h": "FOUND HARD TO FOLLOW → HAD GREAT DIFFICULTY FOLLOWING. What structure follows 'have difficulty'?"}, {"id": "t_a02", "orig": "Harry was disappointed to hear that the match had been cancelled.", "key": "CAME", "before": "News of the match cancellation", "after": "Harry.", "ans": "came as a disappointment to", "accept": ["came as a disappointment to"], "chunk1": "came as a disappointment", "chunk2": "to", "p1": "came as a + noun + to (nominalisation of verb)", "p2": "to (preposition — not 'for')", "h": "DISAPPOINTED HARRY → CAME AS A DISAPPOINTMENT TO HARRY. Verb becomes noun. Which preposition follows?"}, {"id": "t_a03", "orig": "At this time of year, the area is often affected by violent storms.", "key": "FEELS", "before": "At this time of year, the area often", "after": "violent storms.", "ans": "feels the effects of", "accept": ["feels the effects of"], "chunk1": "feels the effects", "chunk2": "of", "p1": "feels the effects of (fixed phrase — replaces passive 'is affected by')", "p2": "of (preposition completing the phrase)", "h": "IS OFTEN AFFECTED BY → OFTEN FEELS THE EFFECTS OF. Four-word fixed phrase. Don't drop the preposition."}, {"id": "t_a04", "orig": "It's difficult to explain why some cars are easier to drive than others.", "key": "MAKES", "before": "It's difficult to say what", "after": "easier to drive than others.", "ans": "makes some cars", "accept": ["makes some cars"], "chunk1": "makes some", "chunk2": "cars", "p1": "what makes + object + adjective (replaces 'why X is adjective')", "p2": "cars (plural object — not 'a car')", "h": "WHY SOME CARS ARE EASIER → WHAT MAKES SOME CARS EASIER. Cleft structure with 'make'."}, {"id": "t_a05", "orig": "Many people blame the hot weather for the rise in petty crime.", "key": "WIDELY", "before": "The hot weather is", "after": "the rise in petty crime.", "ans": "widely held responsible for", "accept": ["widely held responsible for"], "chunk1": "widely held responsible", "chunk2": "for", "p1": "passive + widely + held responsible for", "p2": "for (preposition after 'responsible' — not 'of' or 'about')", "h": "MANY PEOPLE BLAME X FOR → IS WIDELY HELD RESPONSIBLE FOR. Passive + adverb. Don't forget the preposition."}, {"id": "t_a06", "orig": "Even if she runs really fast, Tina won't get to school on time.", "key": "MATTER", "before": "No", "after": ", Tina won't get to school on time.", "ans": "matter how fast she runs", "accept": ["matter how fast she runs"], "chunk1": "matter how fast", "chunk2": "she runs", "p1": "no matter how + adjective + subject + verb", "p2": "she runs (subject + verb after adjective — not 'runs she')", "h": "EVEN IF SHE RUNS FAST → NO MATTER HOW FAST SHE RUNS. Fixed concessive phrase. What order follows 'how'?"}, {"id": "t_a07", "orig": "She was forced to sign the contract because there was no other option.", "key": "ALTERNATIVE", "before": "She had no", "after": "the contract.", "ans": "alternative but to sign", "accept": ["alternative but to sign"], "chunk1": "alternative but to", "chunk2": "sign", "p1": "had no alternative but to + infinitive", "p2": "sign (bare infinitive — not 'signing' or 'to signing')", "h": "WAS FORCED TO SIGN → HAD NO ALTERNATIVE BUT TO SIGN. 'But to' follows — what infinitive form?"}, {"id": "t_a08", "orig": "We were late arriving at the cinema and so missed the start of the film.", "key": "TIME", "before": "The film had already started by the", "after": "the cinema.", "ans": "time we arrived at", "accept": ["time we arrived at"], "chunk1": "time we arrived", "chunk2": "at", "p1": "by the time + subject + past simple (the other clause keeps past perfect)", "p2": "at (preposition — arrive AT a place)", "h": "WE WERE LATE → BY THE TIME WE ARRIVED AT. Which tense in the 'by the time' clause? Don't drop the preposition."}, {"id": "t_a09", "orig": "I was just about to call you to see what time you were coming.", "key": "POINT", "before": "I was on the", "after": "to see what time you were coming.", "ans": "point of calling you", "accept": ["point of calling you"], "chunk1": "point of calling", "chunk2": "you", "p1": "on the point of + gerund (= about to)", "p2": "calling (gerund — not 'to call')", "h": "ABOUT TO CALL → ON THE POINT OF CALLING. Fixed phrase + gerund. NOT infinitive."}, {"id": "t_a10", "orig": "Although the evidence was overwhelming, the jury still took three days to reach a verdict.", "key": "SPITE", "before": "The jury still took three days to reach a verdict", "after": "evidence being overwhelming.", "ans": "in spite of the", "accept": ["in spite of the"], "chunk1": "in spite of", "chunk2": "the", "p1": "in spite of (= although — preposition + noun/gerund phrase)", "p2": "in spite of the (preposition + article before noun — 'the evidence being')", "h": "ALTHOUGH THE EVIDENCE WAS → IN SPITE OF THE EVIDENCE BEING. Conjunction → prepositional phrase + gerund."}, {"id": "t_a11", "orig": "It was unnecessary for her to stay so late — everything was already finished.", "key": "NEED", "before": "She", "after": "so late — everything was already finished.", "ans": "needn't have stayed", "accept": ["needn't have stayed", "need not have stayed"], "chunk1": "needn't have", "chunk2": "stayed", "p1": "needn't have + past participle (unnecessary action that was done)", "p2": "stayed (past participle — not 'stay' or 'been staying')", "h": "UNNECESSARY FOR HER TO STAY → NEEDN'T HAVE STAYED. What form follows 'needn't have'?"}, {"id": "t_a12", "orig": "Thanks to the success of the concert, the singer was offered a recording contract.", "key": "LED", "before": "The success of the concert", "after": "being offered a recording contract.", "ans": "led to the singer", "accept": ["led to the singer"], "chunk1": "led to", "chunk2": "the singer", "p1": "led to (= resulted in — the success caused something)", "p2": "led to the singer (singer = object of led to, followed by being offered)", "h": "THANKS TO THE CONCERT, THE SINGER WAS OFFERED → THE SUCCESS LED TO THE SINGER BEING OFFERED."}, {"id": "t_a13", "orig": "The restaurant should have updated its menu months ago.", "key": "TIME", "before": "It is high", "after": "its menu.", "ans": "time the restaurant updated", "accept": ["time the restaurant updated"], "chunk1": "time the restaurant", "chunk2": "updated", "p1": "high time + subject + past simple subjunctive", "p2": "updated (past simple — not 'updates' or 'had updated')", "h": "SHOULD HAVE UPDATED → HIGH TIME THEY UPDATED. Past simple after 'high time', even though meaning is present."}, {"orig": "As soon as he left, it started to rain.", "key": "SOONER", "before": "No sooner", "after": "it started to rain.", "ans": "had he left than", "accept": ["had he left than", "had he left, than"], "chunk1": "had he left", "chunk2": "than", "p1": "no sooner + inversion: had + subject (inversion required after no sooner)", "p2": "than (NOT 'when' — no sooner … THAN is the fixed pattern)", "hint": "AS SOON AS → NO SOONER + inversion + THAN. Two changes: time conjunction + subject-auxiliary inversion.", "h": "AS SOON AS HE LEFT → NO SOONER HAD HE LEFT THAN. Inversion + THAN.", "id": "t_a14"}, {"id": "t_a15", "orig": "Sarah's father thinks she should come home earlier in the evening.", "key": "APPROVE", "before": "Sarah's father does not", "after": "coming home late in the evening.", "ans": "approve of her", "accept": ["approve of her"], "chunk1": "approve of", "chunk2": "her", "p1": "does not approve of + object + gerund", "p2": "her (object pronoun before the gerund)", "h": "THINKS SHE SHOULD COME HOME EARLIER → DOESN'T APPROVE OF HER COMING HOME LATE. Verb + preposition + object + gerund."}];
const P5 = [{"id": "pv001", "sent": "After years of resentment, it was hard to know what had really added up to the breakdown of their friendship.", "pv": "add up to", "opts": ["A: caused", "B: combined to produce", "C: explained", "D: resulted in a total amount"], "a": "B", "h": "ADD UP TO = combine to produce a particular result or effect."}, {"id": "pv002", "sent": "The politician was asked to back up her claims with evidence.", "pv": "back up", "opts": ["A: support by providing proof", "B: move backwards", "C: copy data", "D: make copies of"], "a": "A", "h": "BACK UP = give support to someone by confirming their account is true."}, {"id": "pv003", "sent": "She blurted out the news before she had time to think about how it would affect him.", "pv": "blurt out", "opts": ["A: misunderstood", "B: said thoughtfully", "C: said suddenly without thinking", "D: kept secret"], "a": "C", "h": "BLURT OUT = say something suddenly without thinking, usually because nervous or excited."}, {"id": "pv004", "sent": "The authorities have started to crack down on people who park illegally in the city centre.", "pv": "crack down on", "opts": ["A: ignore", "B: deal more strictly with", "C: fine", "D: arrest"], "a": "B", "h": "CRACK DOWN ON = start dealing with something much more strictly than before."}, {"id": "pv005", "sent": "New coffee shops have been cropping up all over the city.", "pv": "crop up", "opts": ["A: closing", "B: being planned", "C: appearing suddenly and unexpectedly", "D: becoming popular"], "a": "C", "h": "CROP UP = appear or happen suddenly or unexpectedly."}, {"id": "pv006", "sent": "Detectives are still trying to dig up information about his whereabouts on the night in question.", "pv": "dig up", "opts": ["A: bury", "B: find by searching carefully", "C: request", "D: invent"], "a": "B", "h": "DIG UP = find information by searching carefully."}, {"id": "pv007", "sent": "Please don't drop out now — we really need you for the final stage of the project.", "pv": "drop out", "opts": ["A: take a break", "B: stop participating before completion", "C: disagree", "D: resign"], "a": "B", "h": "DROP OUT = leave or stop participating in something before it is finished."}, {"id": "pv008", "sent": "She managed to figure out what the problem was after spending an hour on it.", "pv": "figure out", "opts": ["A: ignore", "B: describe", "C: solve or understand", "D: estimate"], "a": "C", "h": "FIGURE OUT = be able to understand or solve a problem."}, {"id": "pv009", "sent": "He had to face up to the fact that he wasn't good enough to compete at that level.", "pv": "face up to", "opts": ["A: deny", "B: accept and deal with something difficult", "C: argue about", "D: blame others for"], "a": "B", "h": "FACE UP TO = accept something difficult and deal with it rather than avoiding it."}, {"id": "pv010", "sent": "The editor asked me to cut out the last paragraph as the piece was too long.", "pv": "cut out", "opts": ["A: remove", "B: rewrite", "C: edit lightly", "D: move"], "a": "A", "h": "CUT OUT = remove something by cutting, or stop including something."}, {"id": "pv011", "sent": "Funding for the arts has slowly dried up over the past decade.", "pv": "dry up", "opts": ["A: run out", "B: become harder to access", "C: been reduced", "D: been cancelled"], "a": "A", "h": "DRY UP = gradually stop being available or stop existing."}, {"id": "pv012", "sent": "It was not until many years later that the full story finally came out.", "pv": "come out", "opts": ["A: was denied", "B: was published", "C: became known", "D: was investigated"], "a": "C", "h": "COME OUT = become known or be revealed."}, {"id": "pv013", "sent": "The committee was asked to look into the allegations before making any recommendations.", "pv": "look into", "opts": ["A: dismiss", "B: investigate", "C: respond to", "D: report on"], "a": "B", "h": "LOOK INTO = investigate a situation or problem carefully."}, {"id": "pv014", "sent": "He has a tendency to talk down to junior members of r reactions", "C: ignore", "D: summarise"], "a": "B", "h": "SOUND OUT = try to find out someone's opinions or feelings by talking to them."}, {"id": "pv027", "sent": "Several new brands have sprung up to meet the growing demand for plant-based food.", "pv": "spring up", "opts": ["A: been created gradually", "B: appeared or been produced suddenly", "C: expanded", "D: specialised"], "a": "B", "h": "SPRING UP = appear or be produced suddenly and quickly."}, {"id": "pv028", "sent": "The new model really stands out because of its sleek design and innovative features.", "pv": "stand out", "opts": ["A: is well-made", "B: is expensive", "C: is easy to notice because of being different", "D: is popular"], "a": "C", "h": "STAND OUT = be easy to notice or see because of being different or better than others."}, {"id": "pv029", "sent": "She stood up to her boss even though she knew it might cost her the job.", "pv": "stand up to", "opts": ["A: disagreed with privately", "B: refused to be treated badly by", "C: reported", "D: left"], "a": "B", "h": "STAND UP TO = resist someone who is treating you badly, especially someone in authority."}, {"id": "pv030", "sent": "The festival is starting to wind down for the evening, so let's head home.", "pv": "wind down", "opts": ["A: be cancelled", "B: be speeded up", "C: gradually come to an end", "D: stop suddenly"], "a": "C", "h": "WIND DOWN = gradually end or finish."}, {"id": "pv031", "sent": "The whole industry has been weighed down by rising costs and falling demand.", "pv": "weigh down", "opts": ["A: supported", "B: benefited from", "C: caused serious problems for", "D: investigated"], "a": "C", "h": "WEIGH DOWN = cause problems for someone or something or make them feel burdened."}, {"id": "pv032", "sent": "After the scandal, the charity had to write off any chance of government funding.", "pv": "write off", "opts": ["A: request", "B: decide had no chance of success", "C: reconsider", "D: apply for"], "a": "B", "h": "WRITE OFF = decide that someone or something has no chance of succeeding and stop investing effort."}, {"id": "pv033", "sent": "He had opted out of the pension scheme when he was young, and now regretted it.", "pv": "opt out", "opts": ["A: benefited from", "B: applied for", "C: decided not to participate in", "D: withdrawn from by force"], "a": "C", "h": "OPT OUT = decide not to take part in something or stop being part of it."}, {"id": "pv034", "sent": "She managed to piece together what had happened from the various accounts she'd heard.", "pv": "piece together", "opts": ["A: summarise", "B: learn the truth by combining separate pieces of information", "C: report", "D: imagine"], "a": "B", "h": "PIECE TOGETHER = learn the full truth about something by considering all the separate pieces of information."}, {"id": "pv035", "sent": "The costs are beginning to pile up and we'll need to find extra funding soon.", "pv": "pile up", "opts": ["A: reduce", "B: accumulate in large amounts", "C: be listed", "D: be reported"], "a": "B", "h": "PILE UP = accumulate in increasing amounts."}, {"id": "pv036", "sent": "After months of discussion, they managed to patch up their differences.", "pv": "patch up", "opts": ["A: highlight", "B: ignore", "C: repair or resolve after a disagreement", "D: investigate"], "a": "C", "h": "PATCH UP = repair a relationship or resolve differences after a disagreement."}, {"id": "pv037", "sent": "The doctor reassured her that he would personally follow up her case.", "pv": "follow up", "opts": ["A: close", "B: check on or take further action on", "C: report", "D: refer to a specialist"], "a": "B", "h": "FOLLOW UP = check on the progress of something or take further action to deal with it."}, {"id": "pv038", "sent": "A fresh wave of tourists has been buying up property in the area.", "pv": "buy up", "opts": ["A: improving", "B: advertising", "C: purchasing large amounts of", "D: selling"], "a": "C", "h": "BUY UP = buy large amounts of something or all that is available."}, {"id": "pv039", "sent": "The headphones are designed to cancel out background noise.", "pv": "cancel out", "opts": ["A: reduce", "B: stop something from having any effect", "C: eliminate entirely", "D: block"], "a": "B", "h": "CANCEL OUT = stop something from having any effect by counteracting it."}, {"id": "pv040", "sent": "He was unable to hold back his tears as he said goodbye.", "pv": "hold back", "opts": ["A: show", "B: stop or prevent from progressing", "C: hide", "D: control"], "a": "D", "h": "HOLD BACK = prevent something from moving forwards or being expressed."}, {"id": "pv041", "sent": "The company has been building up a loyal customer base over the past five years.", "pv": "build up", "opts": ["A: losing", "B: advertising to", "C: gradually developing or increasing", "D: competing for"], "a": "C", "h": "BUILD UP = gradually develop or increase over time."}, {"id": "pv042", "sent": "He tends to brighten up whenever the subject of music comes up in conversation.", "pv": "brighten up", "opts": ["A: become quieter", "B: become more animated and happy", "C: change the subject", "D: show off"], "a": "B", "h": "BRIGHTEN UP = start looking or feeling happier."}, {"id": "pv043", "sent": "Many of the old warehouses have been bought by developers who are converting them into apartments.", "pv": "convert into", "opts": ["A: demolishing to build", "B: advertising as", "C: changing into something different", "D: selling as"], "a": "C", "h": "CONVERT INTO = change something from one form or use into another."}, {"id": "pv044", "sent": "The new regulations will be phased out over the next three years.", "pv": "phase out", "opts": ["A: introduced gradually", "B: delayed", "C: gradually stopped", "D: reviewed"], "a": "C", "h": "PHASE OUT = gradually stop using something over a period of time."}, {"id": "pv045", "sent": "She cottoned on immediately when she realised what he was implying.", "pv": "cotton on", "opts": ["A: disagreed", "B: became angry", "C: began to realise or understand", "D: was shocked"], "a": "C", "h": "COTTON ON = begin to realise or understand something."}, {"id": "pv046", "sent": "The union threatened to walk out if management refused to negotiate.", "pv": "walk out", "opts": ["A: strike", "B: leave suddenly as a protest", "C: resign", "D: complain"], "a": "B", "h": "WALK OUT = suddenly leave a situation, meeting or job as a protest."}, {"id": "pv047", "sent": "She used to take the long way to school to avoid bumping into her ex.", "pv": "bump into", "opts": ["A: arguing with", "B: being seen by", "C: meeting unexpectedly", "D: following"], "a": "C", "h": "BUMP INTO = meet someone unexpectedly."}, {"id": "pv048", "sent": "The charity event threw up a few problems that nobody had anticipated.", "pv": "throw up", "opts": ["A: cancelled", "B: produced unexpectedly", "C: caused the cancellation of", "D: required"], "a": "B", "h": "THROW UP = produce something new or unexpected."}, {"id": "pv049", "sent": "She lashed out at critics who accused her of plagiarism.", "pv": "lash out", "opts": ["A: responded calmly to", "B: ignored", "C: spoke angrily against", "D: thanked"], "a": "C", "h": "LASH OUT = speak angrily against someone, especially in response to criticism."}, {"id": "pv050", "sent": "The investors tried to buy off the journalist to prevent the story from running.", "pv": "buy off", "opts": ["A: arrest", "B: threaten", "C: give money to prevent them from acting against you", "D: ignore"], "a": "C", "h": "BUY OFF = give someone money so they do not act against you."}, {"id": "pv051", "sent": "The security services cordoned off the area while they dealt with the suspicious package.", "pv": "cordon off", "opts": ["A: searched", "B: closed the road to", "C: put barriers around to prevent access", "D: evacuated"], "a": "C", "h": "CORDON OFF = stop people from entering an area by surrounding it with barriers."}, {"id": "pv052", "sent": "She finally opened up about her struggles after years of keeping them to herself.", "pv": "open up", "opts": ["A: exaggerated", "B: talked openly about personal feelings", "C: sought help", "D: recovered"], "a": "B", "h": "OPEN UP = begin to talk more openly about personal feelings or experiences."}, {"id": "pv053", "sent": "The bill was eventually voted down by a large majority.", "pv": "vote down", "opts": ["A: accepted", "B: discussed", "C: rejected by vote", "D: amended"], "a": "C", "h": "VOTE DOWN = reject something by voting against it."}, {"id": "pv054", "sent": "She has been swotting up on business law before her meeting with the lawyers.", "pv": "swot up", "opts": ["A: studying intensively", "B: asking questions about", "C: researching", "D: practising"], "a": "A", "h": "SWOT UP = study something very hard, especially in preparation for an exam or meeting."}, {"id": "pv055", "sent": "He managed to talk her round to his way of thinking after a long conversation.", "pv": "talk round", "opts": ["A: persuade", "B: confuse", "C: argue with", "D: consult"], "a": "A", "h": "TALK ROUND = succeed in persuading someone to agree to something."}, {"id": "pv056", "sent": "The factory has been running down its workforce for several years.", "pv": "run down", "opts": ["A: gradually reducing", "B: criticising", "C: dismissing immediately", "D: replacing"], "a": "A", "h": "RUN DOWN = gradually reduce the size or importance of something."}, {"id": "pv057", "sent": "A number of promising young scientists have been singled out for special funding.", "pv": "single out", "opts": ["A: awarded", "B: identified as special and chosen from a group", "C: promoted", "D: recommended"], "a": "B", "h": "SINGLE OUT = choose one person or thing from a group for special attention or treatment."}, {"id": "pv058", "sent": "She had to press ahead with the project despite strong opposition from several board members.", "pv": "press ahead", "opts": ["A: postpone", "B: cancel", "C: continue in a determined way despite difficulty", "D: reconsider"], "a": "C", "h": "PRESS AHEAD = continue doing something in a determined way despite opposition or difficulties."}, {"id": "pv059", "sent": "The CEO had agreed to step down after pressure from major shareholders.", "pv": "step down", "opts": ["A: retire", "B: resign or leave a position", "C: reduce their salary", "D: change roles"], "a": "B", "h": "STEP DOWN = leave a job or position of authority, especially voluntarily."}, {"id": "pv060", "sent": "They managed to narrow down the list of candidates to just four.", "pv": "narrow down", "opts": ["A: rank", "B: choose from", "C: reduce to a smaller number", "D: finalise"], "a": "C", "h": "NARROW DOWN = reduce the number of possibilities or options."}, {"id": "pv061", "sent": "His business partner pulled out of the deal at the last minute.", "pv": "pull out", "opts": ["A: invested more in", "B: withdrew from", "C: renegotiated", "D: finalised"], "a": "B", "h": "PULL OUT = withdraw from or stop being involved in something."}, {"id": "pv062", "sent": "The company has been trying to drum up support for its new initiative.", "pv": "drum up", "opts": ["A: create opposition to", "B: try to generate support or interest", "C: advertise", "D: discuss"], "a": "B", "h": "DRUM UP = try to make people support you or buy something from you."}, {"id": "pv063", "sent": "He managed to knock off early on Friday as his boss had already left.", "pv": "knock off", "opts": ["A: work overtime", "B: stop working for the day", "C: leave without permission", "D: finish work quickly"], "a": "B", "h": "KNOCK OFF = stop working, especially at the end of the day."}, {"id": "pv064", "sent": "She always seemed to get across her points very effectively in meetings.", "pv": "get across", "opts": ["A: argue", "B: make people understand", "C: dominate", "D: repeat"], "a": "B", "h": "GET ACROSS = make people understand what you are trying to say."}, {"id": "pv065", "sent": "It's time we set about finding a proper solution to this problem.", "pv": "set about", "opts": ["A: avoided", "B: started working on", "C: reported", "D: researched"], "a": "B", "h": "SET ABOUT = begin doing something, usually with determination."}, {"id": "pv066", "sent": "The investigation has been scraping through with minimal funding.", "pv": "scrape through", "opts": ["A: ending early", "B: succeeding but not impressively", "C: failing", "D: continuing despite difficulties"], "a": "B", "h": "SCRAPE THROUGH = succeed in doing something but only just, not impressively."}, {"id": "pv067", "sent": "Activists have been seeking out victims of the scheme to help them claim compensation.", "pv": "seek out", "opts": ["A: representing", "B: advising", "C: finding by searching deliberately", "D: interviewing"], "a": "C", "h": "SEEK OUT = find someone or something by searching for them in a determined way."}, {"id": "pv068", "sent": "The actor spent a week sizing up his character before filming began.", "pv": "size up", "opts": ["A: exaggerating", "B: considering carefully and forming an opinion of", "C: researching", "D: playing"], "a": "B", "h": "SIZE UP = think carefully about and form an opinion about a person or situation."}, {"id": "pv069", "sent": "She managed to slip away from the party without anyone noticing.", "pv": "slip away", "opts": ["A: fall over", "B: leave secretly without being noticed", "C: disappear suddenly", "D: avoid someone"], "a": "B", "h": "SLIP AWAY = leave secretly and quietly without being noticed."}, {"id": "pv070", "sent": "He's been lazing around all day instead of dealing with his emails.", "pv": "laze around", "opts": ["A: sleeping", "B: doing nothing in a relaxed way", "C: avoiding work", "D: wasting time"], "a": "B", "h": "LAZE AROUND = spend time relaxing and doing very little."}, {"id": "pv071", "sent": "The report confirms that emissions have been mounting up despite government pledges.", "pv": "mount up", "opts": ["A: decreasing", "B: being measured", "C: growing significantly", "D: being monitored"], "a": "C", "h": "MOUNT UP = get much larger or increase significantly over time."}, {"id": "pv072", "sent": "After the accident, she had to fade away from competitive sport entirely.", "pv": "fade away", "opts": ["A: retire suddenly", "B: disappear or reduce gradually", "C: withdraw", "D: recover slowly"], "a": "B", "h": "FADE AWAY = gradually disappear or reduce in strength or importance."}, {"id": "pv073", "sent": "He answered back rudely when the teacher corrected him.", "pv": "answer back", "opts": ["A: apologised", "B: replied rudely to someone in authority", "C: corrected", "D: argued"], "a": "B", "h": "ANSWER BACK = reply rudely to someone who has more authority than you."}, {"id": "pv074", "sent": "She blended in perfectly with the other guests at the formal dinner.", "pv": "blend in", "opts": ["A: stood out", "B: impressed others", "C: seemed appropriate and was not noticed", "D: dressed well"], "a": "C", "h": "BLEND IN = be similar enough to people or things around you that you are not noticed."}, {"id": "pv075", "sent": "Several new companies have been bought out by a larger rival in recent months.", "pv": "buy out", "opts": ["A: investigated", "B: had their shares purchased so one party gains full control", "C: acquired cheaply", "D: taken over by the government"], "a": "B", "h": "BUY OUT = pay money to a partner or shareholder so that you gain full control of a business."}, {"id": "pv076", "sent": "She brushed up on her Spanish before the business trip to Madrid.", "pv": "brush up on", "opts": ["A: started learning", "B: practised and improved existing knowledge", "C: translated documents in", "D: became fluent in"], "a": "B", "h": "BRUSH UP ON = practise and improve a skill or area of knowledge you already have."}, {"id": "pv077", "sent": "He clocked up over forty years of service before he retired.", "pv": "clock up", "opts": ["A: wasted", "B: recorded", "C: accumulated or reached a particular total", "D: celebrated"], "a": "C", "h": "CLOCK UP = reach or accumulate a particular number or amount over time."}, {"id": "pv078", "sent": "Friends and neighbours clubbed together to buy her a leaving present.", "pv": "club together", "opts": ["A: chose separately", "B: each contributed money towards a shared purchase", "C: organised a party", "D: decided together"], "a": "B", "h": "CLUB TOGETHER = each person in a group gives some money so it can be used to buy something shared."}, {"id": "pv079", "sent": "The protesters tried to come between the company and its investors.", "pv": "come between", "opts": ["A: help", "B: join together", "C: cause disagreement or problems between", "D: negotiate between"], "a": "C", "h": "COME BETWEEN = cause a disagreement or problem between people or things."}, {"id": "pv080", "sent": "She couldn't help coming out with the most inappropriate comment at exactly the wrong moment.", "pv": "come out with", "opts": ["A: publishing", "B: saying something surprising or inappropriate suddenly", "C: accidentally revealing", "D: admitting"], "a": "B", "h": "COME OUT WITH = say something suddenly, usually something surprising or shocking."}, {"id": "pv081", "sent": "The old power station was slowly dying out before the site was redeveloped.", "pv": "die out", "opts": ["A: closing down", "B: becoming completely extinct or disappearing", "C: being demolished", "D: losing customers"], "a": "B", "h": "DIE OUT = gradually become less common and then disappear completely."}, {"id": "pv082", "sent": "He ended up staying in the same job for twenty years despite his ambitions.", "pv": "end up", "opts": ["A: planned to stay", "B: finally found himself in a situation", "C: decided to remain", "D: was promoted to stay"], "a": "B", "h": "END UP = eventually be in a situation or place, often not as originally planned."}, {"id": "pv083", "sent": "She met up with her old university friends for a reunion dinner.", "pv": "meet up", "opts": ["A: came together as planned", "B: coincidentally saw", "C: arranged to call", "D: remembered"], "a": "A", "h": "MEET UP = come together with someone, either as planned or unexpectedly."}, {"id": "pv084", "sent": "The lecturer was repeatedly shouted down before she could finish her argument.", "pv": "shout down", "opts": ["A: interrupted", "B: made it impossible to be heard by shouting louder", "C: criticised publicly", "D: removed from the stage"], "a": "B", "h": "SHOUT DOWN = make it impossible to hear someone by shouting while they are speaking."}, {"id": "pv085", "sent": "She managed to talk over the problem with her manager and felt much better afterwards.", "pv": "talk over", "opts": ["A: ignore", "B: discuss a problem or plan in detail", "C: argue about", "D: report"], "a": "B", "h": "TALK OVER = discuss a problem or situation in order to understand or resolve it."}, {"id": "pv086", "sent": "The detective had to think through every possibility before reaching a conclusion.", "pv": "think through", "opts": ["A: research", "B: consider in an organised and thorough way", "C: discuss", "D: document"], "a": "B", "h": "THINK THROUGH = consider all aspects of a problem or decision carefully and systematically."}, {"id": "pv087", "sent": "Several of the proposals were thrown out by the committee without discussion.", "pv": "throw out", "opts": ["A: voted on", "B: amended", "C: refused or rejected", "D: passed on to others"], "a": "C", "h": "THROW OUT = if someone in authority throws out a proposal, they refuse to accept it."}, {"id": "pv088", "sent": "She tided him over with a small loan until his salary came through.", "pv": "tide over", "opts": ["A: employed", "B: helped someone get through a difficult period", "C: compensated", "D: advised"], "a": "B", "h": "TIDE OVER = help someone manage through a difficult period, especially by providing money."}, {"id": "pv089", "sent": "The new rule had to be set down in writing before it could be enforced.", "pv": "set down", "opts": ["A: delayed", "B: stated officially", "C: debated", "D: challenged"], "a": "B", "h": "SET DOWN = state something officially, or write something down so it can be referred to later."}, {"id": "pv090", "sent": "The old theatre was knocked down to make way for a new development.", "pv": "knock down", "opts": ["A: renovated", "B: repurposed", "C: demolished", "D: sold"], "a": "C", "h": "KNOCK DOWN = demolish a building or structure."}, {"id": "pv091", "sent": "The students were asked to knuckle down and prepare properly for their exams.", "pv": "knuckle down", "opts": ["A: relax", "B: start working hard, especially when you should have done so earlier", "C: collaborate", "D: ask for help"], "a": "B", "h": "KNUCKLE DOWN = start working seriously and hard, especially when you have been avoiding it."}, {"id": "pv092", "sent": "She managed to ward off any serious illness by eating well and exercising regularly.", "pv": "ward off", "opts": ["A: recover from", "B: be immune to", "C: prevent by taking protective action", "D: treat"], "a": "C", "h": "WARD OFF = do something to prevent someone or something harmful from affecting you."}, {"id": "pv093", "sent": "The illness caused her to waste away over the course of several months.", "pv": "waste away", "opts": ["A: deteriorate gradually", "B: become thinner and weaker due to illness", "C: recover slowly", "D: lose consciousness"], "a": "B", "h": "WASTE AWAY = gradually become thinner and weaker over time, usually because of illness."}, {"id": "pv094", "sent": "The investigation slowly petered out when funding was withdrawn.", "pv": "peter out", "opts": ["A: concluded successfully", "B: gradually came to nothing", "C: was cancelled", "D: was suspended"], "a": "B", "h": "PETER OUT = gradually reduce and then stop completely."}, {"id": "pv095", "sent": "He had to live down the embarrassment of his speech going wrong for years.", "pv": "live down", "opts": ["A: forget about", "B: make others forget something embarrassing by good behaviour over time", "C: accept", "D: apologise for"], "a": "B", "h": "LIVE DOWN = succeed in maki
