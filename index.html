const P4 = [
  {"id": "t001", "orig": "I regret not applying for that job when I had the chance.", "key": "WISH", "before": "I", "after": "that job when I had the chance.", "ans": "wish I had applied for", "accept": ["wish i had applied for"], "chunk1": "wish i had", "chunk2": "applied for", "p1": "wish + past perfect (had applied) for past regret", "p2": "applied FOR (preposition required — apply FOR a job)", "hint": "REGRET NOT APPLYING → WISH I HAD APPLIED FOR. Past wish needs past perfect. Don't forget the preposition after 'applied'."},
  {"id": "t002", "orig": "It's a shame that we didn't book the hotel earlier.", "key": "ONLY", "before": "If", "after": "earlier!", "ans": "only we had booked the hotel", "accept": ["only we had booked the hotel"], "chunk1": "only we had", "chunk2": "booked the hotel", "p1": "If only + past perfect = past regret", "p2": "booked the hotel (past participle + object)", "hint": "IT'S A SHAME WE DIDN'T → IF ONLY WE HAD BOOKED. 'If only' + past perfect expresses regret."},
  {"id": "t003", "orig": "The mechanic is repairing my car at the moment.", "key": "HAVING", "before": "I am", "after": "at the moment.", "ans": "having my car repaired", "accept": ["having my car repaired", "having the car repaired"], "chunk1": "having my car", "chunk2": "repaired", "p1": "having my car (causative structure)", "p2": "repaired — passive participle (not repairing)", "hint": "CAUSATIVE HAVE: 'have + object + past participle'. The car doesn't repair itself — someone else does it for you."},
  {"id": "t004", "orig": "A professional photographer took our wedding photos.", "key": "HAD", "before": "We", "after": "by a professional photographer.", "ans": "had our wedding photos taken", "accept": ["had our wedding photos taken", "had our photos taken"], "chunk1": "had our wedding photos", "chunk2": "taken", "p1": "had our wedding photos (causative)", "p2": "taken — passive participle", "hint": "CAUSATIVE HAD: 'had + object + past participle'. Think about who arranged the action rather than doing it themselves."},
  {"id": "t005", "orig": "They say that he was involved in the fraud.", "key": "ALLEGED", "before": "He is", "after": "in the fraud.", "ans": "alleged to have been involved", "accept": ["alleged to have been involved", "alleged to have been involved in"], "chunk1": "alleged to", "chunk2": "have been involved", "p1": "alleged to (passive reporting verb)", "p2": "have been involved (perfect infinitive passive)", "hint": "PASSIVE REPORTING: 'alleged to + infinitive'. When the original says 'was involved', what form of the infinitive do you need?"},
  {"id": "t006", "orig": "People believe that she is the best candidate for the role.", "key": "BELIEVED", "before": "She is", "after": "for the role.", "ans": "believed to be the best candidate", "accept": ["believed to be the best candidate"], "chunk1": "believed to be", "chunk2": "the best candidate", "p1": "is believed to be (passive reporting verb + infinitive)", "p2": "the best candidate (noun phrase — drop 'for' into after)", "hint": "PEOPLE BELIEVE SHE IS → SHE IS BELIEVED TO BE. Passive reporting structure + infinitive."},
  {"id": "t007", "orig": "It seems that the documents were mislaid during the move.", "key": "APPEAR", "before": "The documents", "after": "during the move.", "ans": "appear to have been mislaid", "accept": ["appear to have been mislaid"], "chunk1": "appear to", "chunk2": "have been mislaid", "p1": "appear to (reporting verb)", "p2": "have been mislaid (perfect infinitive passive)", "hint": "PASSIVE REPORTING + PERFECT INFINITIVE PASSIVE: for a past event, use 'to have been + past participle'. Don't drop 'been'."},
  {"id": "t008", "orig": "Experts say that the painting is a forgery.", "key": "THOUGHT", "before": "The painting", "after": "a forgery.", "ans": "is thought to be", "accept": ["is thought to be"], "chunk1": "is thought", "chunk2": "to be", "p1": "is thought (passive)", "p2": "to be (infinitive, not is/was)", "hint": "PASSIVE REPORTING: 'is thought to + infinitive'. The original says she IS a forgery \u2014 which infinitive form does that require?"},
  {"id": "t009", "orig": "If you had told me earlier, I could have helped you.", "key": "TOLD", "before": "Had", "after": "I could have helped you.", "ans": "you told me earlier", "accept": ["you told me earlier"], "chunk1": "you told", "chunk2": "me earlier", "p1": "you told (inversion: Had you told = If you had told)", "p2": "me earlier (object + adverb)", "hint": "THIRD CONDITIONAL INVERSION: 'If + subject + had + past participle' becomes 'Had + subject + past participle'. The 'if' disappears."},
  {"id": "t010", "orig": "If she had arrived on time, she wouldn't have missed the train.", "key": "ARRIVED", "before": "Had she", "after": "she wouldn't have missed the train.", "ans": "arrived on time", "accept": ["arrived on time"], "chunk1": "arrived", "chunk2": "on time", "p1": "arrived (past participle after 'Had she')", "p2": "on time (adverb phrase)", "hint": "THIRD CONDITIONAL INVERSION: 'Had she...' replaces 'If she had...'. What comes directly after 'Had she' to complete the condition?"},
  {"id": "t011", "orig": "If it weren't for her support, I would have given up.", "key": "NOT", "before": "Were it", "after": "I would have given up.", "ans": "not for her support", "accept": ["not for her support"], "chunk1": "not for", "chunk2": "her support", "p1": "not for (were it not for = if it weren't for)", "p2": "her support", "hint": "FORMAL INVERSION: 'Were it not for' = 'If it weren't for'. What two words follow 'Were it' to express the condition?"},
  {"id": "t012", "orig": "She speaks French so fluently she could pass for a native speaker.", "key": "SUCH", "before": "She has", "after": "she could pass for a native speaker.", "ans": "such fluent French that", "accept": ["such fluent French that"], "chunk1": "such fluent french", "chunk2": "that", "p1": "such fluent French (such + adj + noun)", "p2": "that (result clause \u2014 obligatory)", "hint": "SO + adverb \u2192 SUCH + adjective + noun + THAT. 'Speaks so fluently' becomes 'has such [adjective] [noun] that'. Include 'that'."},
  {"id": "t013", "orig": "He is such a convincing liar that no one ever suspects him.", "key": "CONVINCINGLY", "before": "He lies so", "after": "suspects him.", "ans": "convincingly that no one ever", "accept": ["convincingly that no one ever"], "chunk1": "convincingly", "chunk2": "that no one ever", "p1": "convincingly (adverb not adjective)", "p2": "that no one ever (result clause)", "hint": "SUCH + noun \u2192 SO + adverb. What is the adverb form of 'convincing'? The 'that' clause must follow."},
  {"id": "t014", "orig": "I had never visited such an impressive museum before.", "key": "WAS", "before": "It", "after": "I had ever visited.", "ans": "was the most impressive museum", "accept": ["was the most impressive museum"], "chunk1": "was the most impressive", "chunk2": "museum", "p1": "the most impressive (superlative, not more impressive)", "p2": "museum (noun, not one/building)", "hint": "SUPERLATIVE cleft: 'never such a + adj + noun' \u2192 'the most + adj + noun + subject + had ever + past participle'."},
  {"id": "t015", "orig": "Although she was tired, she finished all the work.", "key": "DESPITE", "before": "She finished all the work", "after": "tired.", "ans": "despite being", "accept": ["despite being", "despite feeling", "despite being tired"], "chunk1": "despite", "chunk2": "being", "p1": "despite (not in spite/although)", "p2": "being — gerund (not she was/having been)", "hint": "DESPITE + gerund: 'although + clause' → 'despite + -ing'. The preposition 'despite' must be followed by a gerund."},
  {"id": "t016", "orig": "Even though the weather was dreadful, we enjoyed the picnic.", "key": "SPITE", "before": "We enjoyed the picnic", "after": "weather.", "ans": "in spite of the dreadful", "accept": ["in spite of the dreadful", "in spite of the terrible", "in spite of the awful"], "chunk1": "in spite of", "chunk2": "the dreadful", "p1": "in spite of (not despite of/in spite that)", "p2": "the dreadful/terrible weather (noun phrase not clause)", "hint": "IN SPITE OF + noun phrase: 'even though + clause' \u2192 'in spite of + noun phrase'. A clause cannot follow 'in spite of'."},
  {"id": "t017", "orig": "Despite working hard, she failed the exam.", "key": "MATTER", "before": "She failed the exam", "after": "worked.", "ans": "no matter how hard she", "accept": ["no matter how hard she"], "chunk1": "no matter", "chunk2": "how hard she", "p1": "no matter (fixed phrase)", "p2": "how hard she (word order)", "hint": "NO MATTER HOW + adjective/adverb + subject + verb: 'despite + gerund' becomes a concessive with 'no matter how'."},
  {"id": "t018", "orig": "It was wrong of him to leave without saying goodbye.", "key": "HAVE", "before": "He should not", "after": "saying goodbye.", "ans": "have left without", "accept": ["have left without", "have left without saying"], "chunk1": "have left", "chunk2": "without", "p1": "have left (perfect infinitive after should not)", "p2": "without (preposition)", "hint": "IT WAS WRONG → SHOULD NOT HAVE LEFT WITHOUT. Past modal criticism."},
  {"id": "t019", "orig": "It was unnecessary for her to stay so late.", "key": "NEED", "before": "She", "after": "so late.", "ans": "needn't have stayed", "accept": ["needn't have stayed", "need not have stayed"], "chunk1": "needn't have", "chunk2": "stayed", "p1": "needn't have (past modal: unnecessary action done)", "p2": "stayed (past participle)", "hint": "NEEDN'T HAVE + past participle = did something unnecessary. She DID stay, but didn't need to. Different from 'didn't need to stay'."},
  {"id": "t020", "orig": "I'm sure he didn't take the money — it's not like him.", "key": "HAVE", "before": "He can't", "after": "it's not like him.", "ans": "have taken the money,", "accept": ["have taken the money,", "have taken the money"], "chunk1": "have taken", "chunk2": "the money", "p1": "have taken (perfect infinitive after can't)", "p2": "the money (object)", "hint": "CAN'T HAVE + past participle = strong deduction that a past event didn't happen. What perfect infinitive follows 'can't have'?"},
  {"id": "t021", "orig": "It's a pity I don't live closer to the city centre.", "key": "WISH", "before": "I", "after": "the city centre.", "ans": "wish I lived closer to", "accept": ["wish i lived closer to"], "chunk1": "wish i lived", "chunk2": "closer to", "p1": "wish I lived (present wish = past simple)", "p2": "closer to (comparative + preposition)", "hint": "WISH + past simple = wanting the present to be different. 'I don't live closer' \u2192 'I wish I [past simple] closer to...'"},
  {"id": "t022", "orig": "I can't help you because I have too much work.", "key": "POSITION", "before": "I'm afraid I'm not in", "after": "help you.", "ans": "a position to", "accept": ["a position to"], "chunk1": "a position", "chunk2": "to", "p1": "not in a position to = formal way of saying unable to", "p2": "to (infinitive marker follows 'position')", "hint": "CAN'T HELP → NOT IN A POSITION TO HELP. Formal register expressing inability."},
  {"id": "t023", "orig": "Someone broke into our house while we were on holiday.", "key": "HAD", "before": "We", "after": "while we were on holiday.", "ans": "had our house broken into", "accept": ["had our house broken into"], "chunk1": "had our house", "chunk2": "broken into", "p1": "had our house (causative/passive experience)", "p2": "broken into (phrasal verb in passive)", "hint": "PASSIVE EXPERIENCE with HAD: 'someone broke into X' \u2192 'had X broken into'. The phrasal verb 'broken into' must stay together."},
  {"id": "t024", "orig": "It is difficult for me to concentrate when there is noise.", "key": "FIND", "before": "I", "after": "when there is noise.", "ans": "find it difficult to concentrate", "accept": ["find it difficult to concentrate"], "chunk1": "find it difficult", "chunk2": "to concentrate", "p1": "find it difficult (anticipatory it)", "p2": "to concentrate (infinitive not concentrating)", "hint": "ANTICIPATORY IT: 'it is difficult for me to' \u2192 'I find it difficult to'. Keep 'it' as a dummy object after 'find'."},
  {"id": "t025", "orig": "Keeping up with current affairs is something I find very important.", "key": "IMPORTANCE", "before": "I attach great", "after": "with current affairs.", "ans": "importance to keeping up", "accept": ["importance to keeping up"], "chunk1": "importance to", "chunk2": "keeping up", "p1": "importance to (attach importance to = fixed phrase)", "p2": "keeping up (gerund not infinitive)", "hint": "ATTACH IMPORTANCE TO + gerund: a formal noun phrase. 'Find very important' \u2192 'attach great importance to'. What gerund follows?"},
  {"id": "t026", "orig": "The manager forced all staff to work overtime.", "key": "MADE", "before": "All staff", "after": "overtime.", "ans": "were made to work", "accept": ["were made to work"], "chunk1": "were made", "chunk2": "to work", "p1": "were made (passive)", "p2": "to work (infinitive \u2014 obligatory after made passive)", "hint": "PASSIVE CAUSATIVE: in the passive 'made to do', the infinitive requires 'to' (unlike the active, which uses the bare infinitive)."},
  {"id": "t027", "orig": "The loud noise prevented me from sleeping.", "key": "STOP", "before": "Nothing could", "after": "the loud noise from keeping me awake.", "ans": "stop", "accept": ["stop"], "chunk1": "stop", "chunk2": "stop", "p1": "nothing could stop X from doing (= nothing prevented X)", "p2": "stop (base form after modal 'could')", "hint": "PREVENTED ME FROM SLEEPING → NOTHING COULD STOP THE NOISE FROM KEEPING ME AWAKE. What verb means 'prevent' and takes 'from'?"},
  {"id": "t028", "orig": "Even if he had unlimited funds, he still wouldn't be satisfied.", "key": "MATTER", "before": "He wouldn't be satisfied", "after": "had.", "ans": "no matter how much money he", "accept": ["no matter how much money he"], "chunk1": "no matter", "chunk2": "how much money he", "p1": "no matter (concessive)", "p2": "how much money he (amount + subject)", "hint": "EVEN IF HE HAD → NO MATTER HOW MUCH MONEY HE HAD."},
  {"id": "t029", "orig": "You can borrow the car, but only if you promise to drive carefully.", "key": "CONDITION", "before": "You can borrow the car", "after": "carefully.", "ans": "on condition that you drive", "accept": ["on condition that you drive"], "chunk1": "on condition that", "chunk2": "you drive", "p1": "on condition that (formal conditional)", "p2": "you drive (subject + verb)", "hint": "BUT ONLY IF → ON CONDITION THAT YOU DRIVE. Formal conditional phrase."},

  {"id": "t031", "orig": "I haven't seen him since the graduation ceremony.", "key": "LAST", "before": "The", "after": "I saw him was at the graduation ceremony.", "ans": "last time", "accept": ["last time"], "chunk1": "last", "chunk2": "time", "p1": "the last time + subject + verb (replaces present perfect + since)", "p2": "time (noun — both words form the fixed phrase)", "hint": "HAVEN'T SEEN SINCE → THE LAST TIME I SAW HIM. Two words form the key phrase in the gap."},
  {"id": "t032", "orig": "The last time I saw her was at the conference in March.", "key": "SINCE", "before": "I", "after": "the conference in March.", "ans": "haven't seen her since", "accept": ["haven't seen her since", "have not seen her since"], "chunk1": "haven't seen her", "chunk2": "since", "p1": "present perfect + since (replaces 'last time X was')", "p2": "since (preposition/conjunction — used with a point in time, not a period)", "hint": "THE LAST TIME I SAW HER WAS → HAVEN'T SEEN HER SINCE. Present perfect + since. 'Since' needs a point in time, not a duration."},
  {"id": "t033", "orig": "The concert was cancelled because there was heavy snow.", "key": "DUE", "before": "The concert was cancelled", "after": "snow.", "ans": "due to the heavy", "accept": ["due to the heavy"], "chunk1": "due to", "chunk2": "the heavy", "p1": "due to (preposition not because of)", "p2": "the heavy (article + adjective)", "hint": "DUE TO + noun phrase: 'because there was heavy snow' \u2192 'due to the heavy [noun]'. Include the article."},
  {"id": "t034", "orig": "The match was postponed because the pitch was waterlogged.", "key": "OWING", "before": "The match was postponed", "after": "being waterlogged.", "ans": "owing to the pitch", "accept": ["owing to the pitch"], "chunk1": "owing to", "chunk2": "the pitch", "p1": "owing to (formal preposition = because of)", "p2": "the pitch (definite article + noun)", "hint": "OWING TO + noun phrase + gerund: 'because the pitch was' \u2192 'owing to the pitch being'. Noun + gerund after the preposition."},
  {"id": "t035", "orig": "She left early because she wanted to catch the last train.", "key": "ORDER", "before": "She left early", "after": "the last train.", "ans": "in order to catch", "accept": ["in order to catch"], "chunk1": "in order", "chunk2": "to catch", "p1": "in order (not in order for)", "p2": "to catch (infinitive, not catching)", "hint": "IN ORDER TO + infinitive = purpose. 'Because she wanted to catch X' \u2192 'in order to catch X'. Simple purpose clause."},
  {"id": "t036", "orig": "She couldn't stop herself from laughing during the speech.", "key": "HELP", "before": "She", "after": "during the speech.", "ans": "couldn't help laughing", "accept": ["couldn't help laughing", "could not help laughing"], "chunk1": "couldn't help", "chunk2": "laughing", "p1": "couldn't help (can't help = can't stop)", "p2": "laughing (gerund not to laugh)", "hint": "CAN'T HELP + gerund = unable to stop doing. 'Couldn't stop herself from laughing' \u2192 'couldn't help...'. What verb form follows?"},
  {"id": "t037", "orig": "I was forced to sign the contract because I had no alternative.", "key": "CHOICE", "before": "I had no", "after": "the contract.", "ans": "choice but to sign", "accept": ["choice but to sign"], "chunk1": "choice but", "chunk2": "to sign", "p1": "choice but (no choice but to = fixed)", "p2": "to sign (infinitive)", "hint": "NO CHOICE BUT TO + infinitive = forced to do. 'No alternative' \u2192 'no choice but to'. What infinitive completes the phrase?"},
  {"id": "t038", "orig": "His resignation shocked everyone in the department.", "key": "TAKEN", "before": "Everyone in the department was", "after": "resignation.", "ans": "taken aback by his", "accept": ["taken aback by his"], "chunk1": "taken aback", "chunk2": "by his", "p1": "taken aback (fixed phrase \u2014 not taken back)", "p2": "by his (passive agent by, not with/at)", "hint": "TAKEN ABACK BY = shocked or surprised by. Passive idiom. What preposition introduces the cause after 'taken aback'?"},
  {"id": "t039", "orig": "The news that she had won completely surprised her.", "key": "GUARD", "before": "The news that she had won caught her completely", "after": ".", "ans": "off guard", "accept": ["off guard"], "chunk1": "off", "chunk2": "guard", "p1": "caught off guard = completely surprised", "p2": "off guard (two-word fixed phrase — both words needed)", "hint": "COMPLETELY SURPRISED → CAUGHT COMPLETELY OFF GUARD. Fixed idiom. Two words fill the gap."},
  {"id": "t040", "orig": "It's not worth trying to persuade him; he won't change his mind.", "key": "POINT", "before": "There is no", "after": "him; he won't change his mind.", "ans": "point in trying to persuade", "accept": ["point in trying to persuade", "point trying to persuade"], "chunk1": "point in", "chunk2": "trying to persuade", "p1": "point in / point (no point in doing)", "p2": "trying to persuade (gerund phrase)", "hint": "NO POINT IN + gerund = not worth doing. 'Not worth trying to' \u2192 'no point in...' What gerund phrase follows?"},
  {"id": "t041", "orig": "It's no use complaining as nothing will change.", "key": "WORTH", "before": "Complaining is not", "after": "as nothing will change.", "ans": "worth it", "accept": ["worth it"], "chunk1": "worth", "chunk2": "it", "p1": "not worth it = no use / pointless", "p2": "it (dummy object required after 'worth' when no gerund follows)", "hint": "NO USE COMPLAINING → NOT WORTH IT. What two words express 'no point / no value'?"},
  {"id": "t042", "orig": "The film was not as good as people had expected.", "key": "FALL", "before": "The film appeared to", "after": "people's expectations.", "ans": "fall short of", "accept": ["fall short of"], "chunk1": "fall short", "chunk2": "of", "p1": "fall short of = fail to meet (base form after 'appeared to')", "p2": "of (preposition — 'fall short OF expectations')", "hint": "NOT AS GOOD AS EXPECTED → APPEARED TO FALL SHORT OF EXPECTATIONS. Phrasal verb in base form after 'appeared to'. Don't drop the preposition."},
  {"id": "t043", "orig": "The holiday was a disappointment \u2014 it wasn't as good as we'd hoped.", "key": "LIVE", "before": "The holiday", "after": "expectations.", "ans": "didn't live up to", "accept": ["didn't live up to", "did not live up to"], "chunk1": "didn't live up", "chunk2": "to", "p1": "didn't live up (phrasal verb)", "p2": "to (preposition \u2014 live up TO)", "hint": "LIVE UP TO + noun = meet expectations. 'Wasn't as good as hoped' \u2192 'didn't live up to...'. What is the object?"},
  {"id": "t044", "orig": "She doesn't mind whether we go by train or bus.", "key": "DIFFERENCE", "before": "It makes", "after": "whether we go by train or bus.", "ans": "no difference to her", "accept": ["no difference to her"], "chunk1": "no difference", "chunk2": "to her", "p1": "makes no difference to someone = they don't mind", "p2": "to her (preposition TO — not 'for her')", "hint": "DOESN'T MIND → MAKES NO DIFFERENCE TO HER. Fixed phrase. Don't drop the preposition or the person."},
  {"id": "t045", "orig": "Working night shifts was strange at first, but I've adapted.", "key": "USED", "before": "I have", "after": "night shifts.", "ans": "got used to working", "accept": ["got used to working"], "chunk1": "got used to", "chunk2": "working", "p1": "got used to (become accustomed)", "p2": "working (gerund not work/to work)", "hint": "GOT USED TO + gerund = became accustomed to. 'Adapted' \u2192 'got used to'. 'To' here is a preposition \u2014 it needs a gerund, not an infinitive."},
  {"id": "t046", "orig": "She spent so long working abroad that she lost touch with old friends.", "key": "RESULT", "before": "Spending so long working abroad", "after": "in her losing touch with old friends.", "ans": "was to result", "accept": ["was to result"], "chunk1": "was to", "chunk2": "result", "p1": "was to result in + gerund (formal structure for inevitable consequence)", "p2": "result (infinitive after 'was to' — base form)", "hint": "SPENT SO LONG THAT SHE LOST → WAS TO RESULT IN HER LOSING. Formal 'be to' + result in. What follows 'to'?"},
  {"id": "t047", "orig": "He worked so hard that he eventually collapsed from exhaustion.", "key": "RESULT", "before": "His overworking", "after": "in him eventually collapsing from exhaustion.", "ans": "was to result", "accept": ["was to result"], "chunk1": "was to", "chunk2": "result", "p1": "was to result in + gerund", "p2": "result (base form after 'to')", "hint": "WORKED SO HARD THAT → HIS OVERWORKING WAS TO RESULT IN. Same structure as the other RESULT question."},
  {"id": "t048", "orig": "No sooner had we sat down than the fire alarm went off.", "key": "IMMEDIATELY", "before": "The fire alarm went off", "after": "down.", "ans": "immediately after we had sat", "accept": ["immediately after we had sat", "immediately after we sat"], "chunk1": "immediately after", "chunk2": "we had sat", "p1": "immediately after (not immediately when)", "p2": "we had sat (past perfect)", "hint": "IMMEDIATELY AFTER + past perfect: 'no sooner had X than Y' \u2192 'immediately after + subject + had + past participle'."},
  {"id": "t049", "orig": "It was only after she arrived home that she noticed her phone was missing.", "key": "NOT", "before": "She did", "after": "her phone was missing until she arrived home.", "ans": "not notice", "accept": ["not notice", "not notice that"], "chunk1": "not", "chunk2": "notice", "p1": "did not notice until (replaces 'only after...that...noticed')", "p2": "notice (bare infinitive after 'did not')", "hint": "ONLY AFTER SHE ARRIVED THAT SHE NOTICED → DID NOT NOTICE UNTIL SHE ARRIVED. Simple negation + 'until'."},
  {"id": "t050", "orig": "She had barely sat down when the phone rang.", "key": "SOONER", "before": "No", "after": "the phone rang.", "ans": "sooner had she sat down than", "accept": ["sooner had she sat down than", "sooner had she sat down than,"], "chunk1": "sooner had she", "chunk2": "sat down than", "p1": "no sooner + past perfect + THAN (not 'when')", "p2": "than (critical — 'no sooner...than', never 'no sooner...when')", "hint": "BARELY...WHEN → NO SOONER HAD SHE SAT DOWN THAN. Inversion required. Critical: THAN not WHEN."},
  {"id": "t051", "orig": "I would prefer you not to mention this to anyone.", "key": "RATHER", "before": "I would", "after": "this to anyone.", "ans": "rather you didn't mention", "accept": ["rather you didn't mention", "rather you did not mention"], "chunk1": "rather you didn't", "chunk2": "mention", "p1": "would rather + subject + past simple (subjunctive)", "p2": "didn't mention (past simple negative — not 'don't mention' or 'not mention')", "hint": "PREFER YOU NOT TO → WOULD RATHER YOU DIDN'T MENTION. Past subjunctive after 'would rather you'."},
  {"id": "t052", "orig": "I regret agreeing to help him — it took all weekend.", "key": "RATHER", "before": "I would", "after": "to help him.", "ans": "rather not have agreed", "accept": ["rather not have agreed", "rather not have agreed to"], "chunk1": "rather not have", "chunk2": "agreed", "p1": "rather not have (past regret: would rather not have)", "p2": "agreed (past participle)", "hint": "WOULD RATHER NOT HAVE + past participle = past regret. 'I regret agreeing' → 'I would rather not have...'. What past participle?"},
  {"id": "t053", "orig": "People say that the company has been cutting corners on safety.", "key": "SAID", "before": "The company is", "after": "corners on safety.", "ans": "said to have been cutting", "accept": ["said to have been cutting"], "chunk1": "said to have been", "chunk2": "cutting", "p1": "is said to have been + gerund (passive reporting + perfect continuous)", "p2": "cutting (present participle — continuous aspect preserved)", "hint": "PEOPLE SAY IT HAS BEEN CUTTING → IS SAID TO HAVE BEEN CUTTING. Passive report + perfect continuous infinitive."},
  {"id": "t054", "orig": "She arrived at the theatre after the performance had started.", "key": "TIME", "before": "By the", "after": "the performance had already started.", "ans": "time she arrived,", "accept": ["time she arrived,", "time she arrived"], "chunk1": "time she arrived", "chunk2": "arrived", "p1": "by the time + subject + past simple", "p2": "arrived (past simple — not 'had arrived')", "hint": "ARRIVED AFTER THE PERFORMANCE HAD STARTED → BY THE TIME SHE ARRIVED. Time clause + past simple. A comma naturally follows the clause."},
  {"id": "t055", "orig": "Nobody has used this equipment for over a year.", "key": "OUT", "before": "This equipment has been", "after": "over a year.", "ans": "out of use for", "accept": ["out of use for", "out of action for"], "chunk1": "out of use", "chunk2": "for", "p1": "out of use/action (fixed phrase)", "p2": "for (duration not since/in)", "hint": "OUT OF USE/ACTION + FOR: 'nobody has used it' \u2192 'has been out of [noun phrase] for'. What noun phrase means not being used?"},
  {"id": "t056", "orig": "The repairs will cost more than we can afford.", "key": "BEYOND", "before": "The cost of the repairs is", "after": ".", "ans": "beyond our means", "accept": ["beyond our means"], "chunk1": "beyond", "chunk2": "our means", "p1": "beyond (not above/outside)", "p2": "our means (financial capacity \u2014 fixed phrase)", "hint": "BEYOND ONE'S MEANS = too expensive to afford. Fixed idiom. What possessive determiner completes 'beyond...'?"},
  {"id": "t057", "orig": "The queue was so long that we decided to leave.", "key": "SUCH", "before": "It was", "after": "we decided to leave.", "ans": "such a long queue that", "accept": ["such a long queue that"], "chunk1": "such a long queue", "chunk2": "that", "p1": "such a long queue (such + a + adj + noun)", "p2": "that (result clause)", "hint": "SUCH + article + adjective + noun + THAT: 'so + adjective + that' \u2192 'such a + adjective + noun + that'. Include the article 'a'."},
  {"id": "t058", "orig": "She was so exhausted after the marathon that she slept for twelve hours.", "key": "SUCH", "before": "She was in", "after": "she slept for twelve hours.", "ans": "such a state of exhaustion that", "accept": ["such a state of exhaustion that"], "chunk1": "such a state of", "chunk2": "exhaustion that", "p1": "such + a + noun phrase (state of exhaustion)", "p2": "that (result clause — obligatory)", "hint": "SO EXHAUSTED → IN SUCH A STATE OF EXHAUSTION THAT. Tests 'such a state of X that' — noun phrase variant."},
  {"id": "t059", "orig": "The builders were expected to finish the project by June.", "key": "SUPPOSED", "before": "The builders", "after": "the project by June.", "ans": "were supposed to finish", "accept": ["were supposed to finish", "were supposed to have finished"], "chunk1": "were supposed", "chunk2": "to finish", "p1": "were supposed (past passive)", "p2": "to finish (infinitive)", "hint": "WERE SUPPOSED TO + infinitive = a formal synonym of 'were expected to'. Passive modal — same infinitive follows."},
  {"id": "t060", "orig": "She insisted that everyone should submit their reports by Friday.", "key": "INSISTED", "before": "She", "after": "their reports by Friday.", "ans": "insisted on everyone submitting", "accept": ["insisted on everyone submitting", "insisted on everybody submitting", "insisted on all staff submitting"], "chunk1": "insisted on", "chunk2": "everyone submitting", "p1": "insisted on (insist on + gerund)", "p2": "everyone submitting (possessive/object + gerund)", "hint": "INSIST ON + object + gerund: 'insisted that everyone should submit' → 'insisted on everyone/everybody + gerund'. Preposition 'on' requires a gerund."},
  {"id": "t061", "orig": "The council decided not to build any more car parks in the city centre.", "key": "DECISION", "before": "The council", "after": "any more car parks in the city centre.", "ans": "made the decision not to build", "accept": ["made the decision not to build"], "chunk1": "made the decision", "chunk2": "not to build", "p1": "made the decision (collocation: make a decision)", "p2": "not to build (negative infinitive)", "hint": "DECIDED NOT TO → MADE THE DECISION NOT TO BUILD. Nominalisation of verb 'decide'."},
  {"id": "t062", "orig": "The new drug proved to be less effective than expected.", "key": "OUT", "before": "The new drug turned", "after": "less effective than expected.", "ans": "out to be", "accept": ["out to be"], "chunk1": "out to", "chunk2": "be", "p1": "out to (phrasal verb: turn out to)", "p2": "be (infinitive — not been/being)", "hint": "PROVED TO BE → TURNED OUT TO BE. Direct phrasal verb synonym."},
  {"id": "t063", "orig": "She is not only a talented musician but also an accomplished painter.", "key": "ADDITION", "before": "In", "after": "a talented musician, she is also an accomplished painter.", "ans": "addition to being", "accept": ["addition to being"], "chunk1": "addition to", "chunk2": "being", "p1": "addition to (in addition to = as well as)", "p2": "being (gerund not she is/to be)", "hint": "IN ADDITION TO + gerund: 'not only X but also Y' \u2192 'in addition to being X'. The preposition 'to' must be followed by a gerund."},
  {"id": "t064", "orig": "My advice would be to book early to avoid disappointment.", "key": "STRONGLY", "before": "I would", "after": "early to avoid disappointment.", "ans": "strongly advise you to book", "accept": ["strongly advise you to book"], "chunk1": "strongly advise you", "chunk2": "to book", "p1": "strongly advise you (advise + object, not recommend you to)", "p2": "to book (infinitive)", "hint": "STRONGLY ADVISE + object + TO + infinitive: 'my advice would be to' \u2192 'I would strongly advise you to'. Object is required."},
  {"id": "t065", "orig": "She can't afford a new car, and she definitely can't afford a sports car.", "key": "ALONE", "before": "She can't afford a new car,", "after": "a sports car.", "ans": "let alone", "accept": ["let alone"], "chunk1": "let", "chunk2": "alone", "p1": "let (part of fixed phrase)", "p2": "alone (let alone = never mind/much less)", "hint": "LET ALONE = not to mention, much less. Fixed phrase used to intensify a negative: can't afford X, let alone Y (the more extreme one)."},
  {"id": "t066", "orig": "The concert was just starting when we arrived.", "key": "ABOUT", "before": "The concert was", "after": "when we arrived.", "ans": "about to start", "accept": ["about to start", "about to begin"], "chunk1": "about to", "chunk2": "start", "p1": "about to (be on the verge of)", "p2": "start/begin (infinitive)", "hint": "ABOUT TO + infinitive = on the verge of doing. 'Was just starting' → 'was about to'. Present continuous → 'about to + infinitive'."},
  {"id": "t067", "orig": "When I was young, I walked to school every day.", "key": "USED", "before": "I", "after": "to school every day when I was young.", "ans": "used to walk", "accept": ["used to walk", "used to walk to"], "chunk1": "used to", "chunk2": "walk", "p1": "used to (past habit discontinued)", "p2": "walk (bare infinitive — not walking/to walk)", "hint": "WALKED (past habit) → USED TO WALK. Discontinued past habit uses 'used to + bare infinitive'."},
  {"id": "t068", "orig": "The organisation gave financial help to the families affected.", "key": "PROVIDED", "before": "The organisation", "after": "the families affected.", "ans": "provided financial assistance to", "accept": ["provided financial assistance to", "provided financial support to"], "chunk1": "provided financial assistance", "chunk2": "to", "p1": "provided financial assistance/support (not gave help)", "p2": "to (not for/with)", "hint": "PROVIDED + noun + TO: 'gave help to' \u2192 'provided [formal noun] to'. What more formal noun replaces 'help'? And which preposition follows?"},
  {"id": "t069", "orig": "He behaved badly, which made it seem like he didn't care.", "key": "IF", "before": "He behaved", "after": "didn't care.", "ans": "as if he", "accept": ["as if he"], "chunk1": "as if", "chunk2": "he", "p1": "as if (not as like/like)", "p2": "he (subject of subordinate clause)", "hint": "AS IF + past simple = unreal comparison. 'Made it seem like he didn't care' \u2192 'behaved as if he...' Same tense."},
  {"id": "t070", "orig": "I think the government should take action on this immediately.", "key": "TIME", "before": "It is", "after": "action on this.", "ans": "high time the government took", "accept": ["high time the government took"], "chunk1": "high time", "chunk2": "the government took", "p1": "high time (it's high time = overdue)", "p2": "the government took (past subjunctive)", "hint": "HIGH TIME + past subjunctive: 'should take action' \u2192 'it is high time + subject + past simple'. The past simple here is a subjunctive."},

  {"id": "t_n01", "orig": "He found the instructions very hard to follow.", "key": "DIFFICULTY", "before": "He had great", "after": "the instructions.", "ans": "difficulty following", "accept": ["difficulty following", "difficulty in following"], "chunk1": "difficulty", "chunk2": "following", "p1": "have difficulty (in) following — 'in' is optional", "p2": "following (gerund — not 'to follow')", "hint": "FOUND HARD TO FOLLOW → HAD GREAT DIFFICULTY FOLLOWING. Gerund after 'difficulty'. 'In' is optional."},
  {"id": "t_n02", "orig": "The announcement that the factory would close disappointed everyone who worked there.", "key": "CAME", "before": "The announcement that the factory would close", "after": "who worked there.", "ans": "came as a disappointment to everyone", "accept": ["came as a disappointment to everyone"], "chunk1": "came as a disappointment", "chunk2": "to everyone", "p1": "came as a + noun (disappointment)", "p2": "to everyone (preposition — not 'for everyone')", "hint": "DISAPPOINTED EVERYONE → CAME AS A DISAPPOINTMENT TO EVERYONE. Verb becomes noun. What preposition follows?"},
  {"id": "t_n03", "orig": "The region is often affected by severe flooding at this time of year.", "key": "FEELS", "before": "The region often", "after": "severe flooding at this time of year.", "ans": "feels the effects of", "accept": ["feels the effects of"], "chunk1": "feels the effects", "chunk2": "of", "p1": "feels the effects of (fixed phrase)", "p2": "of (preposition — completes the phrase)", "hint": "IS AFFECTED BY → FEELS THE EFFECTS OF. Four-word fixed phrase. Don't forget the preposition."},
  {"id": "t_n04", "orig": "She arrived at the station after the last train had already left.", "key": "TIME", "before": "By the", "after": "the last train had already left.", "ans": "time she arrived,", "accept": ["time she arrived,", "time she arrived"], "chunk1": "time she arrived", "chunk2": "arrived", "p1": "by the time + subject + past simple", "p2": "arrived (past simple in the 'by the time' clause)", "hint": "ARRIVED AFTER THE TRAIN HAD LEFT → BY THE TIME SHE ARRIVED. Past simple in the time clause."},
  {"id": "t_n05", "orig": "The company was forced to close three of its regional offices.", "key": "CHOICE", "before": "The company had no", "after": "three of its regional offices.", "ans": "choice but to close", "accept": ["choice but to close"], "chunk1": "choice but to", "chunk2": "close", "p1": "no choice but to + infinitive (forced → no choice)", "p2": "close (bare infinitive)", "hint": "WAS FORCED TO CLOSE → HAD NO CHOICE BUT TO CLOSE. Fixed phrase. The infinitive stays bare."},
  {"id": "t_n06", "orig": "She was just about to faint from the heat when someone helped her to a chair.", "key": "POINT", "before": "She was on the", "after": "from the heat when someone helped her.", "ans": "point of fainting", "accept": ["point of fainting"], "chunk1": "point of", "chunk2": "fainting", "p1": "on the point of + gerund (about to → on the point of)", "p2": "fainting (gerund — not 'to faint')", "hint": "ABOUT TO FAINT → ON THE POINT OF FAINTING. Fixed phrase + gerund. NOT infinitive."},
  {"id": "t_n07", "orig": "She demanded that all members of staff should sign a confidentiality agreement.", "key": "INSISTED", "before": "She", "after": "a confidentiality agreement.", "ans": "insisted on everyone signing", "accept": ["insisted on everyone signing", "insisted on all staff signing", "insisted on everybody signing"], "chunk1": "insisted on everyone", "chunk2": "signing", "p1": "insist on + object + gerund", "p2": "signing (gerund after object — not 'to sign')", "hint": "DEMANDED THAT EVERYONE SIGN → INSISTED ON EVERYONE SIGNING. What follows 'insist on'?"},
  {"id": "t_n08", "orig": "Her parents don't think she should stay out so late.", "key": "APPROVE", "before": "Her parents do not", "after": "so late.", "ans": "approve of her staying out", "accept": ["approve of her staying out"], "chunk1": "approve of her", "chunk2": "staying out", "p1": "do not approve of + object + gerund", "p2": "staying out (phrasal verb — not 'staying' or 'being out')", "hint": "DON'T THINK SHE SHOULD STAY OUT → DON'T APPROVE OF HER STAYING OUT. Verb + preposition + gerund."},
  {"id": "t_n09", "orig": "Because the concert was so successful, the band was invited on a world tour.", "key": "LED", "before": "The success of the concert", "after": "on a world tour.", "ans": "led to the band being invited", "accept": ["led to the band being invited", "led to them being invited"], "chunk1": "led to the band", "chunk2": "being invited", "p1": "led to + object + passive gerund (being + past participle)", "p2": "being invited (passive gerund — not 'being invite' or 'to be invited')", "hint": "BECAUSE IT WAS SUCCESSFUL → LED TO. What form follows 'led to' when the subject changes?"},
  {"id": "t_n10", "orig": "The council should have dealt with the flooding problem years ago.", "key": "TIME", "before": "It is high", "after": "with the flooding problem.", "ans": "time the council dealt", "accept": ["time the council dealt"], "chunk1": "time the council", "chunk2": "dealt", "p1": "high time + subject + past simple (subjunctive)", "p2": "dealt (past simple — not 'deals' or 'had dealt')", "hint": "SHOULD HAVE DEALT → HIGH TIME THEY DEALT. The tense after 'high time' is past simple — even though the meaning is present."},
  {"id": "t_n11", "orig": "It's hard to explain why some people are more resilient than others.", "key": "MAKES", "before": "It's hard to explain what", "after": "more resilient than others.", "ans": "makes some people", "accept": ["makes some people"], "chunk1": "makes some", "chunk2": "people", "p1": "what makes + object + adjective (replaces 'why X is adj')", "p2": "people (plural object — not 'person' or 'some are')", "hint": "WHY SOME PEOPLE ARE MORE RESILIENT → WHAT MAKES SOME PEOPLE MORE RESILIENT. Cleft structure with 'make'."},
  {"id": "t_n12", "orig": "She spoke with such confidence that it seemed she had been in charge for years.", "key": "IF", "before": "She spoke", "after": "she had been in charge for years.", "ans": "as if", "accept": ["as if"], "chunk1": "as", "chunk2": "if", "p1": "as if + clause (seemed → spoke as if)", "p2": "as if (two words — do not confuse with 'as though', which is also acceptable but not the key word)", "hint": "IT SEEMED → SHE SPOKE AS IF. How do we express manner that seems to reflect a particular reality?"},
  {"id": "t_n13", "orig": "It is quite common for graduates of this programme to go on to senior positions.", "key": "MEANS", "before": "It is by no", "after": "for graduates of this programme to go on to senior positions.", "ans": "means uncommon", "accept": ["means uncommon"], "chunk1": "means uncommon", "chunk2": "uncommon", "p1": "by no means + adjective (quite common → by no means uncommon — double negative)", "p2": "uncommon (negative adjective — NOT 'common' — the double negative preserves the positive meaning)", "hint": "QUITE COMMON → BY NO MEANS UNCOMMON. Double negative — both the phrase AND the adjective must be negative. What happens to 'common'?"},
  {"id": "t_n14", "orig": "In her new role, she is in charge of coordinating all communications across the department.", "key": "RESPONSIBILITY", "before": "In her new role, she has overall", "after": "all communications across the department.", "ans": "responsibility for coordinating", "accept": ["responsibility for coordinating"], "chunk1": "responsibility for", "chunk2": "coordinating", "p1": "overall responsibility for + gerund (in charge of → responsibility for)", "p2": "coordinating (gerund — not 'to coordinate' or 'coordination of')", "hint": "IN CHARGE OF COORDINATING → OVERALL RESPONSIBILITY FOR COORDINATING. Fixed noun phrase. What follows 'responsibility'?"},
  {"id": "t_n15", "orig": "Most people blame the economic crisis on poor financial regulation.", "key": "WIDELY", "before": "Poor financial regulation is", "after": "the economic crisis.", "ans": "widely held responsible for", "accept": ["widely held responsible for"], "chunk1": "widely held responsible", "chunk2": "for", "p1": "passive + widely + held responsible for", "p2": "for (preposition after 'responsible' — not 'of' or 'about')", "hint": "MOST PEOPLE BLAME X ON → IS WIDELY HELD RESPONSIBLE FOR. Passive + adverb + fixed phrase. Don't forget the preposition."},
  {"id": "t_a01", "orig": "Simon found the recipe book very hard to follow.", "key": "DIFFICULTY", "before": "Simon had great", "after": "the recipe book.", "ans": "difficulty in following", "accept": ["difficulty in following", "difficulty following"], "chunk1": "difficulty", "chunk2": "following", "p1": "have difficulty (in) + gerund — note 'in' is optional", "p2": "following (gerund — not 'to follow')", "hint": "FOUND HARD TO FOLLOW → HAD GREAT DIFFICULTY FOLLOWING. What structure follows 'have difficulty'?"},
  {"id": "t_a02", "orig": "Harry was disappointed to hear that the match had been cancelled.", "key": "CAME", "before": "News of the match cancellation", "after": "Harry.", "ans": "came as a disappointment to", "accept": ["came as a disappointment to"], "chunk1": "came as a disappointment", "chunk2": "to", "p1": "came as a + noun + to (nominalisation of verb)", "p2": "to (preposition — not 'for')", "hint": "DISAPPOINTED HARRY → CAME AS A DISAPPOINTMENT TO HARRY. Verb becomes noun. Which preposition follows?"},
  {"id": "t_a03", "orig": "At this time of year, the area is often affected by violent storms.", "key": "FEELS", "before": "At this time of year, the area often", "after": "violent storms.", "ans": "feels the effects of", "accept": ["feels the effects of"], "chunk1": "feels the effects", "chunk2": "of", "p1": "feels the effects of (fixed phrase — replaces passive 'is affected by')", "p2": "of (preposition completing the phrase)", "hint": "IS OFTEN AFFECTED BY → OFTEN FEELS THE EFFECTS OF. Four-word fixed phrase. Don't drop the preposition."},
  {"id": "t_a04", "orig": "It's difficult to explain why some cars are easier to drive than others.", "key": "MAKES", "before": "It's difficult to say what", "after": "easier to drive than others.", "ans": "makes some cars", "accept": ["makes some cars"], "chunk1": "makes some", "chunk2": "cars", "p1": "what makes + object + adjective (replaces 'why X is adjective')", "p2": "cars (plural object — not 'a car')", "hint": "WHY SOME CARS ARE EASIER → WHAT MAKES SOME CARS EASIER. Cleft structure with 'make'."},
  {"id": "t_a05", "orig": "Many people blame the hot weather for the rise in petty crime.", "key": "WIDELY", "before": "The hot weather is", "after": "the rise in petty crime.", "ans": "widely held responsible for", "accept": ["widely held responsible for"], "chunk1": "widely held responsible", "chunk2": "for", "p1": "passive + widely + held responsible for", "p2": "for (preposition after 'responsible' — not 'of' or 'about')", "hint": "MANY PEOPLE BLAME X FOR → IS WIDELY HELD RESPONSIBLE FOR. Passive + adverb. Don't forget the preposition."},
  {"id": "t_a06", "orig": "Even if she runs really fast, Tina won't get to school on time.", "key": "MATTER", "before": "No", "after": "Tina won't get to school on time.", "ans": "matter how fast she runs,", "accept": ["matter how fast she runs,", "matter how fast she runs"], "chunk1": "matter how fast", "chunk2": "she runs", "p1": "no matter how + adjective + subject + verb", "p2": "she runs (subject + verb after adjective — not 'runs she')", "hint": "EVEN IF SHE RUNS FAST → NO MATTER HOW FAST SHE RUNS. Fixed concessive phrase. What order follows 'how'?"},
  {"id": "t_a07", "orig": "She was forced to sign the contract because there was no other option.", "key": "ALTERNATIVE", "before": "She had no", "after": "the contract.", "ans": "alternative but to sign", "accept": ["alternative but to sign"], "chunk1": "alternative but to", "chunk2": "sign", "p1": "had no alternative but to + infinitive", "p2": "sign (bare infinitive — not 'signing' or 'to signing')", "hint": "WAS FORCED TO SIGN → HAD NO ALTERNATIVE BUT TO SIGN. 'But to' follows — what infinitive form?"},
  {"id": "t_a08", "orig": "We were late arriving at the cinema and so missed the start of the film.", "key": "TIME", "before": "The film had already started by the", "after": "the cinema.", "ans": "time we arrived at", "accept": ["time we arrived at"], "chunk1": "time we arrived", "chunk2": "at", "p1": "by the time + subject + past simple (the other clause keeps past perfect)", "p2": "at (preposition — arrive AT a place)", "hint": "WE WERE LATE → BY THE TIME WE ARRIVED AT. Which tense in the 'by the time' clause? Don't drop the preposition."},
  {"id": "t_a09", "orig": "I was just about to call you to see what time you were coming.", "key": "POINT", "before": "I was on the", "after": "to see what time you were coming.", "ans": "point of calling you", "accept": ["point of calling you"], "chunk1": "point of calling", "chunk2": "you", "p1": "on the point of + gerund (= about to)", "p2": "calling (gerund — not 'to call')", "hint": "ABOUT TO CALL → ON THE POINT OF CALLING. Fixed phrase + gerund. NOT infinitive."},
  {"id": "t_a10", "orig": "Although the evidence was overwhelming, the jury took three days to reach a verdict.", "key": "SPITE", "before": "", "after": "the evidence was overwhelming, the jury took three days to reach a verdict.", "ans": "In spite of the fact that", "accept": ["In spite of the fact that"], "chunk1": "spite of the fact", "chunk2": "that", "p1": "in spite of the fact that + clause (replaces 'although' + clause)", "p2": "that (essential — cannot drop when followed by a full clause)", "hint": "ALTHOUGH + CLAUSE → IN SPITE OF THE FACT THAT + CLAUSE. 'In spite of' alone needs a noun — what bridges it to a clause?"},
  {"id": "t_a11", "orig": "It was unnecessary for her to stay so late — everything was already finished.", "key": "NEED", "before": "She", "after": "so late — everything was already finished.", "ans": "needn't have stayed", "accept": ["needn't have stayed", "need not have stayed"], "chunk1": "needn't have", "chunk2": "stayed", "p1": "needn't have + past participle (unnecessary action that was done)", "p2": "stayed (past participle — not 'stay' or 'been staying')", "hint": "UNNECESSARY FOR HER TO STAY → NEEDN'T HAVE STAYED. What form follows 'needn't have'?"},
  {"id": "t_a12", "orig": "Thanks to the success of the concert, the singer was offered a recording contract.", "key": "LED", "before": "The success of the concert", "after": "a recording contract.", "ans": "led to the singer being offered", "accept": ["led to the singer being offered", "led to her being offered"], "chunk1": "led to the singer", "chunk2": "being offered", "p1": "led to + object + passive gerund (being + past participle)", "p2": "being offered (passive gerund — not 'being offer' or 'to be offered')", "hint": "THANKS TO THE SUCCESS → LED TO. What form follows 'led to' when the subject changes and the action is passive?"},
  {"id": "t_a13", "orig": "The restaurant should have updated its menu months ago.", "key": "TIME", "before": "It is high", "after": "its menu.", "ans": "time the restaurant updated", "accept": ["time the restaurant updated"], "chunk1": "time the restaurant", "chunk2": "updated", "p1": "high time + subject + past simple subjunctive", "p2": "updated (past simple — not 'updates' or 'had updated')", "hint": "SHOULD HAVE UPDATED → HIGH TIME THEY UPDATED. Past simple after 'high time', even though meaning is present."},
  {"id": "t_a14", "orig": "As soon as Alex finished his homework, he went out on his bike.", "key": "SOONER", "before": "No", "after": "had Alex finished his homework than he went out on his bike.", "ans": "sooner", "accept": ["sooner"], "chunk1": "sooner", "chunk2": "sooner", "p1": "no sooner + past perfect + than (inversion structure)", "p2": "sooner (single key word — the inversion marker that begins the structure)", "hint": "AS SOON AS → NO ___ HAD HE FINISHED THAN. One word fills the gap. The rest of the inversion is already given — what word comes after 'No' to begin this structure?"},
  {"id": "t_a15", "orig": "Sarah's father thinks she should come home earlier in the evening.", "key": "APPROVE", "before": "Sarah's father does not", "after": "coming home late in the evening.", "ans": "approve of her", "accept": ["approve of her"], "chunk1": "approve of", "chunk2": "her", "p1": "does not approve of + object + gerund", "p2": "her (object pronoun before the gerund)", "hint": "THINKS SHE SHOULD COME HOME EARLIER → DOESN'T APPROVE OF HER COMING HOME LATE. Verb + preposition + object + gerund."},
];

const P5 = [
  {"id": "pv001", "sent": "The journalist's investigation brought about a complete overhaul of the planning regulations.", "pv": "brought about", "opts": ["A: delayed", "B: caused to happen", "C: reported on", "D: argued against"], "a": "B", "h": "BRING ABOUT = cause something to happen, especially a significant change. It always implies the change was caused by deliberate action."},
  {"id": "pv002", "sent": "She was brought up to believe that education was the key to a better life.", "pv": "brought up", "opts": ["A: encouraged", "B: taught formally", "C: raised and instilled with values", "D: persuaded"], "a": "C", "h": "BRING UP (a child) = raise, instil values during childhood. Different from 'bring up' meaning 'mention a topic'."},
  {"id": "pv003", "sent": "The new management team brought in a series of radical cost-cutting measures.", "pv": "brought in", "opts": ["A: removed", "B: officially introduced", "C: debated", "D: rejected"], "a": "B", "h": "BRING IN = officially introduce a law, rule, or policy. Often used for legislation and workplace changes."},
  {"id": "pv004", "sent": "Her autobiography brought back painful memories of her difficult childhood.", "pv": "brought back", "opts": ["A: returned", "B: reintroduced", "C: caused to be remembered", "D: revived"], "a": "C", "h": "BRING BACK = cause memories or feelings to return to mind. Note: also means 'reintroduce' in a different context."},
  {"id": "pv005", "sent": "The crisis brought out the best in people, with communities rallying to support one another.", "pv": "brought out", "opts": ["A: removed", "B: revealed or caused to appear", "C: published", "D: celebrated"], "a": "B", "h": "BRING OUT = reveal a quality that was previously hidden, or cause it to appear. 'Bring out the best/worst in someone.'"},
  {"id": "pv006", "sent": "The union called off the strike after reaching a last-minute agreement with management.", "pv": "called off", "opts": ["A: postponed", "B: cancelled", "C: ended early", "D: announced"], "a": "B", "h": "CALL OFF = cancel something that had been planned. Stronger than 'postpone' — it means it won't happen at all."},
  {"id": "pv007", "sent": "The government was called upon to explain its handling of the financial crisis.", "pv": "called upon", "opts": ["A: criticised", "B: formally requested or asked", "C: blamed", "D: questioned"], "a": "B", "h": "CALL UPON = formally ask or request someone to do something. More formal than 'ask'; used in official or public contexts."},
  {"id": "pv008", "sent": "Critics called into question the reliability of the data used in the report.", "pv": "called into question", "opts": ["A: debated", "B: cast doubt on", "C: rejected entirely", "D: examined carefully"], "a": "B", "h": "CALL INTO QUESTION = cause something to be doubted or challenged. Fixed phrase — always 'call X into question'."},
  {"id": "pv009", "sent": "Despite the setbacks, the research team carried on with their work throughout the winter.", "pv": "carried on", "opts": ["A: finished", "B: continued", "C: struggled", "D: improved"], "a": "B", "h": "CARRY ON = continue doing something, especially despite difficulties. More informal than 'continue' but common at C1."},
  {"id": "pv010", "sent": "The recommendations of the report were fully carried out by the new administration.", "pv": "carried out", "opts": ["A: discussed", "B: rejected", "C: implemented or completed", "D: published"], "a": "C", "h": "CARRY OUT = implement, complete or perform a task, instruction or plan. Standard formal collocation."},
  {"id": "pv011", "sent": "Her passion for justice carried her through the most difficult periods of the legal battle.", "pv": "carried through", "opts": ["A: transported", "B: sustained or helped to survive", "C: completed", "D: strengthened"], "a": "B", "h": "CARRY THROUGH = sustain someone during a difficult period, or bring something to a successful conclusion."},
  {"id": "pv012", "sent": "A solution to the funding crisis finally came about after months of negotiation.", "pv": "came about", "opts": ["A: was discussed", "B: happened or developed", "C: was discovered", "D: was proposed"], "a": "B", "h": "COME ABOUT = happen or develop, often gradually or unexpectedly. Describes how a situation arose."},
  {"id": "pv013", "sent": "The missing documents came to light during a routine audit of the company's finances.", "pv": "came to light", "opts": ["A: were found by chance", "B: became known or were revealed", "C: were returned", "D: were confirmed"], "a": "B", "h": "COME TO LIGHT = become known, especially something that was previously hidden or unknown."},
  {"id": "pv014", "sent": "Several unexpected complications came up during the planning phase of the project.", "pv": "came up", "opts": ["A: were noticed", "B: arose or occurred unexpectedly", "C: were discussed", "D: were solved"], "a": "B", "h": "COME UP = arise or occur, especially unexpectedly. Often used for problems, issues, or topics that appear."},
  {"id": "pv015", "sent": "Despite initial optimism, the scheme did not come up to the expectations of investors.", "pv": "come up to", "opts": ["A: reach", "B: meet or match a standard", "C: approach", "D: exceed"], "a": "B", "h": "COME UP TO = reach or match a required standard or level. Often used negatively: 'didn't come up to expectations'."},
  {"id": "pv016", "sent": "The accused came across as calm and confident throughout the trial.", "pv": "came across", "opts": ["A: behaved", "B: was perceived or seemed", "C: appeared physically", "D: spoke"], "a": "B", "h": "COME ACROSS (as) = give a particular impression to others. How you seem or appear to other people."},
  {"id": "pv017", "sent": "She came into a considerable fortune when her aunt passed away.", "pv": "came into", "opts": ["A: earned", "B: inherited or received", "C: discovered", "D: invested"], "a": "B", "h": "COME INTO (money/a fortune) = inherit or receive money or property. Fixed phrase with financial contexts."},
  {"id": "pv018", "sent": "The new legislation cut across party lines, with politicians from all sides voting in favour.", "pv": "cut across", "opts": ["A: divided", "B: ignored", "C: went beyond or transcended", "D: affected"], "a": "C", "h": "CUT ACROSS = go beyond usual boundaries or divisions. When something applies to multiple groups that normally disagree."},
  {"id": "pv019", "sent": "The funding cuts meant the charity had to cut back on the services it offered.", "pv": "cut back on", "opts": ["A: improve", "B: reduce the amount of", "C: change", "D: stop completely"], "a": "B", "h": "CUT BACK ON = reduce the amount, size or cost of something. Less extreme than stopping entirely."},
  {"id": "pv020", "sent": "Her microphone cut out just as she was about to announce the winner.", "pv": "cut out", "opts": ["A: broke", "B: stopped working suddenly", "C: was removed", "D: failed gradually"], "a": "B", "h": "CUT OUT = stop working suddenly (for a machine, engine, or electrical device). Always sudden, not gradual."},
  {"id": "pv021", "sent": "The lengthy court case drew on the resources of both legal teams considerably.", "pv": "drew on", "opts": ["A: depended on", "B: used up or made use of", "C: extended", "D: highlighted"], "a": "B", "h": "DRAW ON = make use of a source, skill, or resource. Often implies drawing on experience, funds, or creativity."},
  {"id": "pv022", "sent": "The police drew up a detailed plan for managing the crowd at the event.", "pv": "drew up", "opts": ["A: presented", "B: prepared or formulated formally", "C: published", "D: discussed"], "a": "B", "h": "DRAW UP = prepare or write a formal document, plan, or agreement. Always implies a formal, written output."},
  {"id": "pv023", "sent": "The case drew out over several months, exhausting both parties involved.", "pv": "drew out", "opts": ["A: attracted", "B: became unnecessarily long", "C: revealed", "D: concluded"], "a": "B", "h": "DRAW OUT = make something last longer than necessary, or cause a process to be prolonged."},
  {"id": "pv024", "sent": "Sales fell off sharply in the final quarter of the year due to consumer uncertainty.", "pv": "fell off", "opts": ["A: decreased", "B: dropped suddenly and significantly", "C: collapsed", "D: were reported"], "a": "B", "h": "FALL OFF = decrease, especially sharply or notably. Often used for sales, demand, attendance, or standards."},
  {"id": "pv025", "sent": "The deal fell through at the last minute when the buyer withdrew their offer.", "pv": "fell through", "opts": ["A: was rejected", "B: failed to happen as planned", "C: was renegotiated", "D: collapsed financially"], "a": "B", "h": "FALL THROUGH = fail to happen, especially a deal, plan, or arrangement. Always implies complete failure."},
  {"id": "pv026", "sent": "The scheme fell foul of strict data protection regulations and had to be abandoned.", "pv": "fell foul of", "opts": ["A: was criticised by", "B: came into conflict with", "C: was investigated by", "D: was rejected by"], "a": "B", "h": "FALL FOUL OF = come into conflict with a rule, law, or person; get into trouble because of something."},
  {"id": "pv027", "sent": "Responsibility for the error fell squarely on the shoulders of the project manager.", "pv": "fell on", "opts": ["A: was blamed on", "B: became the responsibility of", "C: was reported to", "D: was noticed by"], "a": "B", "h": "FALL ON (someone) = become the responsibility or burden of a particular person. Often used with 'responsibility' or 'burden'."},
  {"id": "pv028", "sent": "It took years before she got over the trauma of losing her business.", "pv": "got over", "opts": ["A: forgot", "B: recovered from", "C: accepted", "D: moved away from"], "a": "B", "h": "GET OVER = recover from something difficult — an illness, loss, shock, or disappointment."},
  {"id": "pv029", "sent": "The committee got around the legal restriction by redefining the terms of the contract.", "pv": "got around", "opts": ["A: discussed", "B: found a way to avoid", "C: challenged", "D: publicised"], "a": "B", "h": "GET AROUND = find a way to avoid or overcome a rule, restriction, or problem without directly confronting it."},
  {"id": "pv030", "sent": "The message that the company was struggling to survive finally got through to shareholders.", "pv": "got through to", "opts": ["A: was communicated to", "B: was understood by", "C: reached", "D: was accepted by"], "a": "B", "h": "GET THROUGH TO = succeed in making someone understand something. Implies the communication was difficult."},
  {"id": "pv031", "sent": "She got away with submitting the report late because her manager was on leave.", "pv": "got away with", "opts": ["A: escaped", "B: succeeded in avoiding punishment for", "C: benefited from", "D: managed to do"], "a": "B", "h": "GET AWAY WITH = avoid punishment or negative consequences for something wrong or against the rules."},
  {"id": "pv032", "sent": "After hours of negotiation, the management gave in to the union's demands.", "pv": "gave in", "opts": ["A: agreed", "B: surrendered or yielded", "C: responded", "D: compromised"], "a": "B", "h": "GIVE IN = surrender or stop resisting; yield to pressure or demands. Similar to 'give way' but more personal."},
  {"id": "pv033", "sent": "The company gave up trying to enter the Asian market after three unsuccessful attempts.", "pv": "gave up", "opts": ["A: decided", "B: stopped trying", "C: failed", "D: withdrew"], "a": "B", "h": "GIVE UP = stop doing something, especially because it's too difficult. Implies a definitive end to the effort."},
  {"id": "pv034", "sent": "The scandal gave rise to calls for a thorough reform of the electoral system.", "pv": "gave rise to", "opts": ["A: caused or led to", "B: highlighted", "C: resulted from", "D: was connected to"], "a": "A", "h": "GIVE RISE TO = cause something to happen or develop, especially something abstract like a controversy or movement."},
  {"id": "pv035", "sent": "The minister held back information that could have been crucial to the investigation.", "pv": "held back", "opts": ["A: destroyed", "B: kept secret or refused to reveal", "C: delayed", "D: lost"], "a": "B", "h": "HOLD BACK = deliberately not reveal or share information. Also means to prevent progress or restrain someone."},
  {"id": "pv036", "sent": "Progress on the construction project was held up by a series of planning disputes.", "pv": "held up", "opts": ["A: supported", "B: delayed or obstructed", "C: halted permanently", "D: slowed"], "a": "B", "h": "HOLD UP = delay or obstruct progress. Note: also means 'rob' in a different context, so the sentence matters."},
  {"id": "pv037", "sent": "The theory has held up well under scrutiny from the wider scientific community.", "pv": "held up", "opts": ["A: been defended", "B: remained valid or strong", "C: been supported", "D: been published"], "a": "B", "h": "HOLD UP (under scrutiny/criticism) = remain valid or strong when tested or examined. A different meaning from 'delay'."},
  {"id": "pv038", "sent": "Analysts are looking to a recovery in consumer spending to drive economic growth.", "pv": "looking to", "opts": ["A: expecting", "B: relying on or hoping for", "C: predicting", "D: planning for"], "a": "B", "h": "LOOK TO = rely on or expect something to provide what is needed. Often followed by a noun or gerund."},
  {"id": "pv039", "sent": "The board is looking into allegations of financial misconduct at the company.", "pv": "looking into", "opts": ["A: reading about", "B: investigating", "C: discussing", "D: ignoring"], "a": "B", "h": "LOOK INTO = investigate or examine something carefully. Used for formal or official investigations."},
  {"id": "pv040", "sent": "She looked back on her years in the diplomatic service with great fondness.", "pv": "looked back on", "opts": ["A: reviewed", "B: reflected on or thought about the past", "C: remembered", "D: regretted"], "a": "B", "h": "LOOK BACK ON = reflect on a past period or experience. Implies distance in time and a degree of contemplation."},
  {"id": "pv041", "sent": "It was difficult to make out what she was trying to say through the poor telephone connection.", "pv": "make out", "opts": ["A: understand", "B: hear or see clearly enough to understand", "C: interpret", "D: decode"], "a": "B", "h": "MAKE OUT = manage to hear, see or understand something with difficulty. Implies the challenge of perception."},
  {"id": "pv042", "sent": "The press release made out that the company had been fully transparent throughout.", "pv": "made out", "opts": ["A: proved", "B: claimed or portrayed, often misleadingly", "C: stated", "D: confirmed"], "a": "B", "h": "MAKE OUT (that) = claim or suggest something, often implying the claim is exaggerated or misleading."},
  {"id": "pv043", "sent": "The new director is determined to make up for the years of underinvestment in staff training.", "pv": "make up for", "opts": ["A: explain", "B: compensate for", "C: correct", "D: report on"], "a": "B", "h": "MAKE UP FOR = compensate for a loss, mistake, or period of neglect. Implies actively correcting an imbalance."},
  {"id": "pv044", "sent": "The minister put forward a series of proposals aimed at reducing carbon emissions.", "pv": "put forward", "opts": ["A: introduced", "B: suggested or proposed formally", "C: defended", "D: published"], "a": "B", "h": "PUT FORWARD = suggest or propose an idea, plan, or candidate formally. Often used in professional or political contexts."},
  {"id": "pv045", "sent": "Many residents put up with years of noise pollution before the factory was finally closed.", "pv": "put up with", "opts": ["A: complained about", "B: tolerated", "C: opposed", "D: ignored"], "a": "B", "h": "PUT UP WITH = tolerate something unpleasant without complaining. Implies endurance over time."},
  {"id": "pv046", "sent": "The board put off making a decision until a full financial review had been completed.", "pv": "put off", "opts": ["A: cancelled", "B: delayed or postponed", "C: avoided", "D: refused"], "a": "B", "h": "PUT OFF = postpone or delay. Unlike 'cancel', it implies the thing will happen eventually, just not now."},
  {"id": "pv047", "sent": "The experience put her off applying for similar positions in the future.", "pv": "put off", "opts": ["A: discouraged", "B: prevented", "C: stopped", "D: warned"], "a": "A", "h": "PUT OFF (someone) = discourage or cause someone to lose interest or enthusiasm. A different meaning from 'postpone'."},

function shuffle(arr){
  var a=[...arr];
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=a[i];a[i]=a[j];a[j]=tmp;
  }
  return a;
}
const norm    = s => s.toLowerCase().replace(/\s+/g,' ').trim().replace(/['\u2019]/g,"'");
// Split answer string on / to get accepted variants (for P2/P3 with multiple answers)
const getAccepted = (q) => {
  if (q.accept) return q.accept.map(norm); // P4 has explicit accept array
  if (q.a) return q.a.split('/').map(s => norm(s.trim())); // P2/P3 slash-separated
  return [];
};

function updateBankBtn(){
  var wrongCount=Object.values(BANK).filter(function(e){return e.wrong;}).length;
  var hintCount=Object.values(BANK).filter(function(e){return !e.wrong&&e.hint;}).length;
  var total=wrongCount+hintCount;
  var btn=document.getElementById('bank-btn');
  var label=document.getElementById('bank-label');
  if(!btn) return;
  if(total>0){
    btn.style.display='flex';
    var parts=[];
    if(wrongCount>0) parts.push(wrongCount+' incorrect');
    if(hintCount>0) parts.push(hintCount+' hint-used');
    label.textContent=parts.join(' · ')+' saved for review';
  } else {
    btn.style.display='none';
  }
}

function startBankReview(filterFn){
  // Look up actual question objects from all pools
  var ALL={};
  [P1,P2,P3,P4,P5,COL,VOC].forEach(function(pool){
    pool.forEach(function(q){ ALL[q.id]=q; });
  });
  var ids=Object.keys(BANK).filter(filterFn||function(){return true;});
  var qs=ids.map(function(id){return ALL[id];}).filter(Boolean);
  if(!qs.length){ alert('No questions found.'); return; }
  // Determine partId from first question (mixed sessions use first part)
  var firstEntry=BANK[ids[0]];
  G.partId=firstEntry?firstEntry.partId:1;
  // For mixed parts, we need to handle rendering — set partId per question
  G.qs=qs.map(function(q){
    var entry=BANK[q.id];
    return Object.assign({},q,{_partId:entry?entry.partId:G.partId});
  });
  G.idx=0; G.score=0; G.done=false; G.val=''; G.hint=false; G.hintUsed=false; G.results=[]; G.streak=0; G.maxStreak=0;
  G.bankMode=true;
  renderQ(); show('s-question');
}

function startTopicSession(topic){
  var filtered=VOC.filter(function(q){return q.topic===topic;});
  G.partId=7; G.qs=shuffle(filtered);
  G.idx=0; G.score=0; G.done=false; G.val=''; G.hint=false; G.hintUsed=false; G.results=[]; G.streak=0; G.maxStreak=0; G.bankMode=false;
  renderQ(); show('s-question');
}

function startSession(partId,n){
  G.partId=partId;
  var pool=POOLS[partId];
  var SEEN=lsGet('c1seen',{});
  // Weight each question: unseen=4, wrong/hint-used=3, seen-correct-once=2, seen-correct-multiple=1
  var weighted=[];
  pool.forEach(function(q){
    var bankEntry=BANK[q.id];
    var seenCount=SEEN[q.id]||0;
    var w;
    if(bankEntry&&bankEntry.wrong) w=3;        // previously wrong — keep showing
    else if(bankEntry&&bankEntry.hint) w=2;    // correct but needed hint
    else if(seenCount===0) w=4;                // never seen — prioritise
    else if(seenCount===1) w=2;               // seen once correctly
    else w=1;                                  // seen correctly multiple times — rare
    for(var i=0;i<w;i++) weighted.push(q);
  });
  // Shuffle weighted pool, deduplicate preserving order, take n
  var seen={}; var deduped=[];
  shuffle(weighted).forEach(function(q){
    if(!seen[q.id]){seen[q.id]=true;deduped.push(q);}
  });
  G.qs=deduped.slice(0,n);
  G.idx=0; G.score=0; G.done=false; G.val=''; G.hint=false; G.hintUsed=false; G.results=[]; G.streak=0; G.maxStreak=0; G.bankMode=false;
  renderQ(); show('s-question');
}

function renderQ(){
  const q=G.qs[G.idx], effectivePartId=G.bankMode&&q._partId?q._partId:G.partId, p=PARTS.find(x=>x.id===effectivePartId)||PARTS[0], c=`var(${p.c})`;
  const total=G.qs.length, sMax=G.partId===4?G.idx*2:G.idx;
  document.getElementById('pfill').style.cssText=`width:${(G.idx/total)*100}%;background:${c}`;
  document.getElementById('qctr').style.color=c;
  document.getElementById('qctr').textContent=`${G.idx+1}/${total}`;
  document.getElementById('qscr').textContent=`${G.score}/${sMax}`;
  let html='<div class="ptag" style="color:'+c+'">'+(p.label?p.label+' &middot; ':'')+p.name+'</div>';
  var rPart=G.bankMode&&q._partId?q._partId:G.partId;
  if(rPart===1) html+=htmlP1(q);
  else if(rPart===2) html+=htmlP2(q);
  else if(rPart===3) html+=htmlP3(q);
  else if(rPart===4) html+=htmlP4(q);
  else if(rPart===5) html+=htmlP5(q);
  else if(rPart===6) html+=htmlCOL(q);
  else html+=htmlVOC(q);
  html+=htmlHint(q);
  document.getElementById('qbody').innerHTML=html;
  document.getElementById('qbody').scrollTop=0;
  renderBot();
  if(G.partId!==1) setTimeout(()=>{const i=document.getElementById('tin');if(i)i.focus();},80);
}

function htmlP5(q){
  // Highlight the phrasal verb within the sentence
  var highlighted = esc(q.sent).replace(
    esc(q.pv),

  );

function pickP5(letter){
  if(G.done) return;
  var q=G.qs[G.idx];
  var correct=letter===q.a;
  G.score+=correct?1:0;
  G.done=true;
  G.results.push({idx:G.idx,correct:correct,skipped:false,hint:G.hintUsed});
  if(correct){G.streak++;G.maxStreak=Math.max(G.maxStreak,G.streak);}else{G.streak=0;}
  document.querySelectorAll('.opt').forEach(function(btn){
    btn.disabled=true;
    if(btn.dataset.l===q.a) btn.classList.add('ok');
    else if(btn.dataset.l===letter&&!correct) btn.classList.add('bad');
  });
  if(correct){
    renderBot();
  } else {
    G.hint=true; G.hintUsed=true;
    var hb=document.getElementById('hbox'),hbtn=document.getElementById('hbtn');
    if(hb) hb.style.display='block';

}

function pickMC(letter){

  if(G.done) return;
  var q=G.qs[G.idx];

  G.score+=correct?1:0;
  G.done=true;
  G.results.push({idx:G.idx,correct:correct,skipped:false,hint:G.hintUsed});
  if(correct){G.streak++;G.maxStreak=Math.max(G.maxStreak,G.streak);}else{G.streak=0;}
  document.querySelectorAll('.opt').forEach(function(btn){
    btn.disabled=true;
    if(btn.dataset.l===q.a) btn.classList.add('ok');
    else if(btn.dataset.l===letter&&!correct) btn.classList.add('bad');
  });
  if(correct){
    renderBot();
  } else {
    G.hint=true; G.hintUsed=true;
    var hb=document.getElementById('hbox'),hbtn=document.getElementById('hbtn');

}

function renderBot(){

    el.innerHTML=`<button class="nxtbtn" style="background:${c}" onclick="nxt()">${isLast?'See Results &rarr;':'Next &rarr;'}</button>`;

  } else {

    <button class="skipbtn" onclick="doSkip()">Skip &rarr;</button>`;
  }
}

function updBot(){
