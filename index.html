<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>C1 Advanced — Use of English</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0f1a;--s1:#13152a;--bd:#1e2235;--tx:#eeeef5;--dim:rgba(238,238,245,.38);--dimmer:rgba(238,238,245,.18);--p1:#f59e0b;--p2:#34d399;--p3:#818cf8;--p4:#fb7185;--p5:#06b6d4;--p6:#8b5cf6;--p7:#f97316;
    --p8:#c084fc;
    --p8:#c084fc;--green:#34d399;--red:#fb7185;--amber:#f59e0b;--blue:#6c8ebf}
.light{--bg:#f5f4f0;--s1:#ffffff;--bd:#dddbd4;--tx:#1a1a18;--dim:rgba(26,26,24,.65);--dimmer:rgba(26,26,24,.45);--p1:#b8860b;--p2:#1a7a50;--p3:#4c3fbf;--p4:#b5253a;--p5:#0891b2;--p6:#6d28d9;--p7:#c2410c;--green:#1a7a50;--red:#b5253a;--amber:#b8860b;--blue:#2a5a9f}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif}
input,button{font-family:inherit}
input:focus{outline:none}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#2a2d3e;border-radius:2px}
.scr{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;transform:translateY(12px);overflow:hidden}
.scr.on{opacity:1;pointer-events:all;transform:none}
#s-home{overflow-y:auto}
.home-pad{padding:44px 20px 20px}
.eyebrow{font-family:'DM Mono',monospace;font-size:10px;color:var(--p1);letter-spacing:.14em;margin-bottom:10px}
.h1{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1.9rem,8vw,2.8rem);line-height:1.1;margin-bottom:6px}
.sub{color:var(--dim);font-size:.88rem;font-weight:300;margin-bottom:36px}
.tiles{padding:0 16px 48px;display:flex;flex-direction:column;gap:11px}
.tile{background:var(--s1);border:1px solid var(--bd);border-radius:14px;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background .12s,border-color .12s,transform .12s;text-align:left;width:100%;-webkit-appearance:none}
.tile:active{transform:scale(.97);background:#1a1d2e}
.tag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;margin-bottom:5px}
.tname{font-family:'Syne',sans-serif;font-weight:700;font-size:1.05rem;color:var(--tx);margin-bottom:2px}
.tsub{font-size:.76rem;color:var(--dimmer);font-weight:300}
.tile-r{display:flex;flex-direction:column;align-items:flex-end;gap:5px;margin-left:10px}
.bbadge{font-family:'DM Mono',monospace;font-size:11px;border-radius:6px;padding:3px 8px}
.arrow{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.15rem;line-height:1;flex-shrink:0}
#s-setup{overflow-y:auto;padding:0 20px 48px}
.setup-head{padding:36px 0 18px;display:flex;align-items:center;gap:12px}
.bk{background:none;border:none;color:var(--dimmer);font-size:1.5rem;padding:4px 8px;cursor:pointer;line-height:1}
.setup-head h2{font-family:'Syne',sans-serif;font-weight:700;font-size:1.35rem}
.p4note{color:var(--dim);font-size:.83rem;margin-bottom:22px;line-height:1.7;font-weight:300;background:rgba(251,113,133,.06);border:1px solid rgba(251,113,133,.2);border-radius:10px;padding:12px 15px}
.p4note strong{color:var(--red)}
.cnt-btns{display:flex;flex-direction:column;gap:10px}
.cnt-btn{border-radius:12px;padding:17px 20px;font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;text-align:left;cursor:pointer;transition:background .1s,color .1s,transform .1s;border:1.5px solid transparent;-webkit-appearance:none}
.cnt-btn:active{transform:scale(.97)}
#s-question{display:flex;flex-direction:column}
.qtop{padding:13px 18px 11px;border-bottom:1px solid var(--bd);flex-shrink:0}
.qtop-row{display:flex;align-items:center;gap:10px}
.stop-btn{background:none;border:none;color:var(--dim);font-size:1rem;padding:4px 6px;cursor:pointer;line-height:1;flex-shrink:0;border-radius:6px;transition:color .15s}
.stop-btn:hover{color:var(--red)}
.pbar{flex:1;height:5px;background:var(--bd);border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px;transition:width .4s}
.qctr{font-family:'DM Mono',monospace;font-size:12px;flex-shrink:0}
.qscr{font-family:'DM Mono',monospace;font-size:12px;color:var(--dim);flex-shrink:0}
.qbody{flex:1;overflow-y:auto;padding:22px 20px 14px;-webkit-overflow-scrolling:touch}
.ptag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;margin-bottom:16px}
.sent{font-size:1.07rem;line-height:1.85;margin-bottom:24px;color:var(--tx)}
.gap{display:inline-block;min-width:80px;border-bottom:2px solid rgba(238,238,245,.25);margin:0 4px;vertical-align:bottom;font-family:'DM Mono',monospace;font-size:.84rem;padding:0 3px;transition:color .2s,border-color .2s}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{background:var(--s1);border:1.5px solid var(--bd);border-radius:12px;padding:14px 18px;font-size:.93rem;text-align:left;cursor:pointer;transition:background .1s,border-color .1s,transform .1s;width:100%;-webkit-appearance:none;color:var(--tx)}
.opt:active:not(:disabled){transform:scale(.97)}
.opt.ok{background:rgba(52,211,153,.1)!important;border-color:var(--green)!important;color:var(--green)!important}
.opt.bad{background:rgba(251,113,133,.1)!important;border-color:var(--red)!important;color:var(--red)!important}
.tin{width:100%;background:var(--s1);border:1.5px solid var(--bd);border-radius:12px;padding:15px 18px;font-size:1rem;color:var(--tx);font-family:'DM Mono',monospace;-webkit-appearance:none;transition:border-color .2s}
.tin:focus{border-color:var(--blue)}
.rbadge{display:inline-flex;align-items:center;gap:7px;margin-bottom:16px;background:rgba(129,140,248,.1);border:1px solid rgba(129,140,248,.25);border-radius:7px;padding:5px 12px}
.rlabel{font-family:'DM Mono',monospace;font-size:10px;color:#818cf8;letter-spacing:.1em}
.rword{font-family:'DM Mono',monospace;font-size:.95rem;color:#c7d2fe;font-weight:500}
.origbox{background:var(--s1);border:1px solid var(--bd);border-radius:11px;padding:14px 17px;margin-bottom:14px}
.origlbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--dimmer);letter-spacing:.08em;margin-bottom:7px}
.origtxt{font-size:.93rem;color:var(--dim);line-height:1.65;font-style:italic}
.kbadge{display:inline-flex;align-items:center;gap:7px;margin-bottom:14px;background:rgba(251,113,133,.1);border:1px solid rgba(251,113,133,.25);border-radius:7px;padding:5px 12px}
.klabel{font-family:'DM Mono',monospace;font-size:10px;color:var(--red);letter-spacing:.1em}
.kword{font-family:'DM Mono',monospace;font-size:.95rem;color:#fda4af;font-weight:500}
.trow{font-size:.97rem;line-height:2;margin-bottom:12px}
.tgap{font-family:'DM Mono',monospace;font-size:.83rem;display:inline-block;min-width:140px;border-bottom:2px solid var(--bd);vertical-align:bottom;padding:0 3px;transition:color .2s,border-color .2s}
.fb{border-radius:10px;padding:12px 14px;margin-top:13px}
.fb.ok{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.25)}
.fb.bad{background:rgba(251,113,133,.08);border:1px solid rgba(251,113,133,.25)}
.fb.mid{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25)}
.fbm{font-family:'DM Mono',monospace;font-size:.84rem}
.fbm.ok{color:var(--green)}.fbm.bad{color:var(--red)}.fbm.mid{color:var(--amber)}
.fbs{font-size:.79rem;color:var(--dim);margin-top:4px}
.mbox{background:rgba(251,113,133,.05);border:1px solid rgba(251,113,133,.17);border-radius:10px;padding:12px 14px;margin-top:10px}
.mlbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--red);letter-spacing:.1em;margin-bottom:7px}
.mrow{font-size:.79rem;color:var(--tx);opacity:.75;line-height:1.8}
.harea{margin-top:16px}
.hbtn{background:transparent;border:1px dashed var(--bd);color:var(--dim);border-radius:8px;padding:7px 14px;font-size:.77rem;cursor:pointer;-webkit-appearance:none}
.hbox{background:rgba(108,142,191,.07);border:1px solid rgba(108,142,191,.18);border-radius:9px;padding:11px 13px;margin-top:10px}
.htag{font-family:'DM Mono',monospace;font-size:10px;color:var(--blue);letter-spacing:.1em;margin-bottom:5px}
.htxt{font-size:.82rem;color:var(--tx);opacity:.85;line-height:1.65}
.qbot{flex-shrink:0;border-top:1px solid var(--bd);padding:11px 18px 32px}
.chkbtn{width:100%;border:none;border-radius:12px;padding:15px;font-family:'Syne',sans-serif;font-weight:700;font-size:.97rem;cursor:pointer;transition:background .15s,color .15s;-webkit-appearance:none}
.skipbtn{width:100%;background:transparent;border:1.5px solid var(--bd);border-radius:12px;padding:10px;font-family:'DM Sans',sans-serif;font-size:.85rem;color:var(--dim);cursor:pointer;margin-top:8px;-webkit-appearance:none;transition:border-color .15s,color .15s}
.skipbtn:hover{border-color:var(--dim);color:var(--dim)}
.nxtbtn{width:100%;border:none;border-radius:12px;padding:15px;font-family:'Syne',sans-serif;font-weight:700;font-size:.97rem;cursor:pointer;color:#0d0f1a;-webkit-appearance:none}
#s-results{overflow-y:auto;padding:36px 22px 48px;display:flex;flex-direction:column}
.rcrd{background:var(--s1);border-radius:14px;padding:32px 22px;text-align:center;margin-bottom:16px}
.rscore{font-family:'Syne',sans-serif;font-weight:800;font-size:4rem;line-height:1;margin-bottom:4px}
.rpct{font-family:'DM Mono',monospace;font-size:.84rem;color:var(--dim);margin-bottom:14px}
.rgrade{font-family:'DM Mono',monospace;font-size:.77rem;border-radius:5px;padding:5px 14px;display:inline-block}
.rnote{font-family:'DM Mono',monospace;font-size:.67rem;color:var(--dim);margin-top:9px}
.rbest{text-align:center;font-family:'DM Mono',monospace;font-size:.74rem;color:var(--dim);margin-bottom:14px}
.rbreakdown{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-bottom:20px;padding:0 4px}
.rdot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-family:'DM Mono',monospace;font-weight:500;flex-shrink:0}
.rdot.ok{background:rgba(52,211,153,.15);color:var(--green)}
.rdot.bad{background:rgba(251,113,133,.15);color:var(--red)}
.rdot.skip{background:var(--bd);color:var(--dim)}
.streak-info{text-align:center;font-family:'DM Mono',monospace;font-size:.72rem;color:var(--dimmer);margin-bottom:4px}
.rbtns{display:flex;flex-direction:column;gap:10px;margin-top:auto;padding-top:20px}
.rpri{border:none;border-radius:12px;padding:15px;font-family:'Syne',sans-serif;font-weight:700;font-size:.97rem;cursor:pointer;color:#0d0f1a;-webkit-appearance:none}
.rpri.hint-review{background:transparent!important;border:1.5px solid var(--blue)!important;color:var(--blue)!important;font-weight:500}
.rghost{background:transparent;border:1.5px solid var(--bd);border-radius:12px;padding:15px;font-family:'DM Sans',sans-serif;font-size:.94rem;cursor:pointer;color:var(--tx);-webkit-appearance:none}
.footer{position:fixed;bottom:0;left:0;right:0;text-align:center;padding:7px;font-family:'DM Mono',monospace;font-size:10px;color:var(--dimmer);pointer-events:none;z-index:99;letter-spacing:.06em}
.footer{position:fixed;bottom:0;left:0;right:0;text-align:center;padding:7px 80px 7px 7px;font-family:'DM Mono',monospace;font-size:10px;color:rgba(128,128,128,.35);pointer-events:none;z-index:99;letter-spacing:.04em}
.light .footer{color:rgba(26,26,24,.25)}
.theme-toggle{position:fixed;top:12px;right:14px;background:var(--bg2);border:1.5px solid var(--bd);border-radius:24px;padding:6px 14px;font-size:18px;cursor:pointer;z-index:200;color:var(--tx);transition:all .2s;-webkit-appearance:none;box-shadow:0 1px 6px rgba(0,0,0,.12)}
.theme-toggle:hover{opacity:.8}.theme-toggle:hover{border-color:var(--p1);color:var(--p1)}
</style>
</head>
<body>
<div class="scr on" id="s-home">
  <div class="home-pad">
    <div class="eyebrow">CAMBRIDGE C1 ADVANCED</div>
    <h1 class="h1">Use of English</h1>
    <p class="sub">Reading &amp; Use of English &middot; Parts 1&ndash;4</p>
  </div>
  <div id="bank-btn" style="display:none;margin:0 16px 20px;background:rgba(108,142,191,.08);border:1.5px solid rgba(108,142,191,.3);border-radius:12px;padding:14px 18px;cursor:pointer;align-items:center;justify-content:space-between;gap:12px" onclick="showBankMenu()">
    <div>
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--blue);letter-spacing:.1em;margin-bottom:4px">REVIEW BANK</div>
      <div style="font-size:.88rem;color:var(--tx)" id="bank-label"></div>
    </div>
    <div style="color:var(--blue);font-size:1.2rem">&rsaquo;</div>
  </div>
  <div class="tiles" id="tiles"></div>
  <div style="text-align:center;padding:18px 16px 28px;font-size:.82rem;color:var(--dim)">
    An app by Ross Lawrence &nbsp;&middot;&nbsp;
    <a href="mailto:rossirlawrence@gmail.com" style="color:inherit;text-decoration:none;border-bottom:1px solid var(--bd);cursor:pointer">rossirlawrence@gmail.com</a>
  </div>
</div>
<div class="scr" id="s-setup">
  <div class="setup-head">
    <button class="bk" onclick="show('s-home')">&#8249;</button>
    <div><div class="eyebrow" id="stag"></div><h2 id="stitle"></h2></div>
  </div>
  <div class="p4note" id="p4note" style="display:none">
    Each question is worth <strong>2 marks</strong>. Score 1 mark for getting one transformation point right, 2 marks for a fully correct answer.
  </div>
  <div class="cnt-btns" id="cntbtns"></div>
</div>
<div class="scr" id="s-question">
  <div class="qtop"><div class="qtop-row">
    <button class="stop-btn" onclick="confirmStop()" title="Stop session">&#10005;</button>
    <div class="pbar"><div class="pfill" id="pfill"></div></div>
    <div class="qctr" id="qctr"></div>
    <div class="qscr" id="qscr"></div>
  </div></div>
  <div class="qbody" id="qbody"></div>
  <div class="qbot" id="qbot"></div>
</div>
<div class="scr" id="s-results">
  <div class="eyebrow" id="rtag"></div>
  <div class="rcrd" id="rcrd"></div>
  <div class="rbest" id="rbest"></div>
  <div class="rbreakdown" id="rbreakdown"></div>
  <div class="rbtns">
    <button class="rpri" id="ragain">Try Again</button>
    <button class="rpri" id="rreview" style="display:none">Review Mistakes</button>
    <button class="rpri" id="rreviewhint" style="display:none">Review Hint-Assisted</button>
    <button class="rghost" onclick="show('s-home')">Home</button>
  </div>
</div>
<button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">&#9788;</button>
<script>
const P1 = [{"id": "p1_001", "sent": "The board of directors finally _______ to the pressure from shareholders and agreed to restructure.", "opts": ["A: yielded", "B: submitted", "C: conceded", "D: surrendered"], "a": "A", "h": "Three of these verbs can describe someone giving in under pressure — but which one specifically pairs with TO PRESSURE as a fixed collocation in formal writing? Think about what you 'yield' versus what you 'submit to'."}, {"id": "p1_002", "sent": "The regulations will come into _______ immediately, with no transition period for businesses to prepare.", "opts": ["A: force", "B: practice", "C: operation", "D: use"], "a": "A", "h": "This is a fixed legal phrase meaning 'begin to apply'. All four options could follow 'come into' loosely — but only one completes a recognised term used when legislation becomes active."}, {"id": "p1_003", "sent": "The documentary drew _______ to the plight of refugees living in overcrowded camps.", "opts": ["A: notice", "B: focus", "C: attention", "D: awareness"], "a": "C", "h": "DRAW ___ TO something is a fixed phrase meaning 'direct people's attention to'. You 'raise' one of these, 'create' another — but only one collocates with DRAW in this specific pattern."}, {"id": "p1_004", "sent": "After months of negotiations, the two sides finally _______ agreement on the key terms of the deal.", "opts": ["A: reached", "B: found", "C: got", "D: achieved"], "a": "A", "h": "REACH AGREEMENT is the fixed formal collocation — it's the standard phrase in diplomatic, legal and business English. 'Found agreement', 'got agreement' and 'achieved agreement' are not standard collocations."}, {"id": "p1_005", "sent": "The prime minister _______ great emphasis on the need for fiscal responsibility in his opening address.", "opts": ["A: placed", "B: gave", "C: put", "D: laid"], "a": "D", "h": "LAY EMPHASIS ON is the standard formal collocation in written English. PLACE emphasis on is also used, but 'laid great emphasis on' is specifically the fixed phrase in formal speeches and writing. GAVE emphasis and PUT emphasis are not standard collocations."}, {"id": "p1_006", "sent": "The new director was _______ in her commitment to transparency, refusing to tolerate any form of misrepresentation.", "opts": ["A: uncompromising", "B: resolute", "C: unwavering", "D: steadfast"], "a": "C", "h": "UNWAVERING collocates most naturally with COMMITMENT — 'unwavering commitment' is a fixed formal phrase in English. UNCOMPROMISING suggests refusing to make concessions. RESOLUTE emphasises determination. STEADFAST is close but slightly archaic and more literary. UNWAVERING is the standard formal adjective before 'commitment'."}, {"id": "p1_007", "sent": "The autobiography _______ a fascinating light on the political tensions that shaped the decade.", "opts": ["A: threw", "B: shone", "C: cast", "D: shed"], "a": "A", "h": "THROW LIGHT ON is a fixed idiom meaning 'illuminate or explain'. In this context 'threw a fascinating light on' is the natural choice. 'Shed light' is also used but 'shed a fascinating light' is less natural. 'Cast' and 'shone' don't collocate with 'a fascinating light on' in this way."}, {"id": "p1_008", "sent": "She has a remarkable _______ for mimicry and can imitate any accent she hears within minutes.", "opts": ["A: talent", "B: skill", "C: gift", "D: flair"], "a": "D", "h": "All four nouns can describe a natural ability. The key is what follows — FOR MIMICRY. One of these specifically describes an instinctive, artistic or performative aptitude. Which feels most natural before 'for' when talking about a creative skill?"}, {"id": "p1_009", "sent": "The launch of the product was put _______ indefinitely after problems emerged during testing.", "opts": ["A: away", "B: aside", "C: off", "D: back"], "a": "C", "h": "The gap is followed by INDEFINITELY. All four particles follow PUT — but think about meaning: 'put away' means store; 'put aside' means set to one side; 'put back' suggests rescheduling to a specific time; only one means 'postpone with no new date set'."}, {"id": "p1_010", "sent": "The charity's report _______ serious concerns about the long-term sustainability of current funding.", "opts": ["A: lifted", "B: raised", "C: voiced", "D: expressed"], "a": "B", "h": "RAISE or VOICE concerns are both used — but here the subject is a REPORT, not a person. Which verb is used when a document, study or report brings concerns to attention? Think about whether a report can 'voice' anything."}, {"id": "p1_011", "sent": "The government's handling of the outbreak has come under _______ scrutiny following the publication of the leaked report.", "opts": ["A: intense", "B: harsh", "C: close", "D: tight"], "a": "C", "h": "COME UNDER CLOSE SCRUTINY is the fixed phrase meaning 'be examined very carefully'. 'Intense scrutiny' and 'harsh scrutiny' describe the quality of the examination, not the standard phrase used with 'come under'. 'Tight scrutiny' is not standard."}, {"id": "p1_012", "sent": "His sudden decision to resign came as a complete _______ to everyone who had worked with him.", "opts": ["A: surprise", "B: wonder", "C: revelation", "D: astonishment"], "a": "A", "h": "CAME AS A ___ is a fixed pattern. Three of these nouns could follow this structure — but only one is the natural, idiomatic choice in the phrase CAME AS A COMPLETE ___. Which is the most established collocation?"}, {"id": "p1_013", "sent": "The committee was asked to _______ a thorough review of all the evidence before reaching a verdict.", "opts": ["A: do", "B: make", "C: take", "D: conduct"], "a": "D", "h": "CONDUCT A REVIEW = carry out a formal, systematic review. DO and MAKE do not collocate with \"a thorough review\" at this formal register. TAKE is used for \"take a look/note\". CONDUCT is the correct formal collocate."}, {"id": "p1_014", "sent": "If you leave now without telling anyone, you are _______ to cause serious offence.", "opts": ["A: likely", "B: certain", "C: bound", "D: sure"], "a": "C", "h": "BOUND TO expresses a strong sense of inevitability, especially for negative or unwanted outcomes — stronger than 'likely', more idiomatic than 'certain' or 'sure' in this context. 'Bound to cause offence' is the natural fixed expression for inevitable negative consequences of an action."}, {"id": "p1_015", "sent": "The revelations cast a long _______ over what had previously been considered a successful administration.", "opts": ["A: darkness", "B: shade", "C: shadow", "D: cloud"], "a": "C", "h": "CAST A ___ OVER is a fixed idiom. You need the word that goes inside 'a long ___ over'. What object does a tall building or dark cloud cast?"}, {"id": "p1_016", "sent": "She was _______ aware of the risks but decided to invest anyway, convinced the returns would be worth it.", "opts": ["A: full", "B: deeply", "C: fully", "D: highly"], "a": "C", "h": "The gap is an adverb modifying AWARE. FULL is an adjective, not an adverb — so it's grammatically wrong. DEEPLY AWARE is non-standard. Which of the remaining two is the natural, established collocation with AWARE?"}, {"id": "p1_017", "sent": "The decision to merge the two departments was _______ welcomed by staff, with only a handful raising objections.", "opts": ["A: broadly", "B: warmly", "C: fully", "D: deeply"], "a": "A", "h": "BROADLY WELCOMED means generally accepted without fundamental objection, but not universally — which matches 'only a handful raising objections'. WARMLY welcomed implies enthusiasm. FULLY welcomed means completely. DEEPLY doesn't collocate naturally with 'welcomed'."}, {"id": "p1_018", "sent": "The auditors were _______ critical of the firm's accounting practices, identifying multiple irregularities.", "opts": ["A: bitterly", "B: deeply", "C: highly", "D: strongly"], "a": "D", "h": "STRONGLY CRITICAL is the standard formal collocation in reports and official documents. BITTERLY critical implies personal resentment. DEEPLY critical is used for emotional, not analytical criticism. HIGHLY critical is possible but 'strongly critical' is the established collocate in formal written English."}, {"id": "p1_019", "sent": "She _______ a brave face throughout the ordeal, though everyone could see she was struggling.", "opts": ["A: made", "B: kept", "C: put on", "D: wore"], "a": "C", "h": "This is a fixed idiom. Think: what do you PUT ON in front of people to appear brave? It's not a face you make, hold or wear — it's one you perform for an audience."}, {"id": "p1_020", "sent": "The new bypass is _______ to reduce journey times between the two towns by up to twenty minutes.", "opts": ["A: expected", "B: aimed", "C: set", "D: planned"], "a": "C", "h": "IS SET TO means 'is on course to / is expected imminently to'. The others — EXPECTED, PLANNED, AIMED — all work grammatically, but which one is the most established journalistic phrase for something about to happen?"}, {"id": "p1_021", "sent": "The artist's later work was _______ by his turbulent personal life during those years.", "opts": ["A: inspired", "B: informed", "C: driven", "D: fuelled"], "a": "B", "h": "INFORMED BY means 'shaped in depth by' — like information from a source running through a piece of work. INSPIRED BY suggests where ideas came from. DRIVEN BY suggests motivation. FUELLED BY suggests energy. Which best describes how a chaotic life leaves its mark on an artist's work?"}, {"id": "p1_022", "sent": "Years of scandal and broken promises have _______ the party's reputation beyond repair.", "opts": ["A: ruined", "B: tarnished", "C: damaged", "D: harmed"], "a": "B", "h": "TARNISHED is the precise metaphor for reputation — like silver losing its shine. It implies gradual dulling of something once bright. RUINED is too total and absolute. DAMAGED and HARMED are generic and lack the specific connotation of something previously admirable being diminished."}, {"id": "p1_023", "sent": "The organisation relies _______ on government grants and would not survive without them.", "opts": ["A: deeply", "B: heavily", "C: greatly", "D: strongly"], "a": "B", "h": "RELY ___ ON is a fixed adverb collocation. Only one adverb pairs naturally with RELY ON to mean 'depend to a large degree'. You can't 'rely deeply', 'rely greatly' or 'rely strongly' — but which adverb does work?"}, {"id": "p1_024", "sent": "The decision to cut the budget has _______ the difficulties already being experienced by the department.", "opts": ["A: increased", "B: worsened", "C: compounded", "D: deepened"], "a": "C", "h": "COMPOUND means make worse by adding to existing problems — it implies accumulation, not just intensification. The sentence says the difficulties ALREADY existed — COMPOUND specifically captures the idea of piling further problems onto existing ones, which the others do not."}, {"id": "p1_025", "sent": "The new filtration system is _______ to remove up to ninety-nine percent of waterborne contaminants.", "opts": ["A: capable", "B: designed", "C: able", "D: built"], "a": "B", "h": "DESIGNED TO means 'engineered for a specific purpose'. CAPABLE OF requires OF + gerund, not TO. ABLE TO requires an animate subject. BUILT TO is possible — but which is the standard technical phrase for how a system is constructed to achieve a goal?"}, {"id": "p1_026", "sent": "The journalist had spent months trying to _______ an interview with the famously private CEO.", "opts": ["A: obtain", "B: secure", "C: gain", "D: win"], "a": "B", "h": "SECURE means 'obtain through difficulty and competition'. OBTAIN and GAIN are more neutral. WIN an interview is not standard. Which verb implies that access to this person required sustained effort and wasn't guaranteed?"}, {"id": "p1_027", "sent": "The prime minister's apology simply didn't _______ with a public already deeply sceptical of his sincerity.", "opts": ["A: connect", "B: register", "C: resonate", "D: land"], "a": "C", "h": "RESONATE WITH means 'have meaning or emotional impact for'. REGISTER and CONNECT both describe types of impact too. LAND is very informal. Think: when music or an idea feels deeply meaningful to people, which verb is used?"}, {"id": "p1_028", "sent": "The board resolved to _______ any decision on the acquisition until a full due diligence report had been completed.", "opts": ["A: withhold", "B: defer", "C: delay", "D: postpone"], "a": "B", "h": "DEFER is the formal board/committee term for postponing a specific item to a future occasion. POSTPONE is general. DELAY implies passive obstruction. ADJOURN refers to the meeting itself, not a single item on the agenda. Which fits formal governance language?"}, {"id": "p1_029", "sent": "The manager was _______ to the concerns raised by her team, but ultimately chose not to act on them.", "opts": ["A: alive", "B: sensible", "C: conscious", "D: responsive"], "a": "A", "h": "ALIVE TO means aware of and attentive to — a formal, somewhat elevated expression meaning the person recognised the concerns. SENSIBLE TO is possible but archaic. CONSCIOUS OF means aware of but without the sense of being attuned to it. RESPONSIVE TO means reacting to, not just being aware of."}, {"id": "p1_030", "sent": "The decision is likely to have _______ consequences for the region's agricultural sector.", "opts": ["A: broad", "B: wide", "C: far-reaching", "D: sweeping"], "a": "C", "h": "FAR-REACHING specifically means 'having effects that extend widely across many areas'. SWEEPING collocates with CHANGES or REFORMS, not CONSEQUENCES. BROAD and WIDE are general adjectives. Which is the established collocation with CONSEQUENCES?"}, {"id": "p1_031", "sent": "The committee was not _______ to accepting a proposal that had already been rejected at regional level.", "opts": ["A: inclined", "B: minded", "C: disposed", "D: open"], "a": "C", "h": "NOT DISPOSED TO is the formal register expression meaning 'not inclined or willing to'. INCLINED TO is also used but is more informal. MINDED TO is slightly archaic. OPEN TO suggests receptiveness — but 'not open to accepting' is less natural than 'not disposed to accept'."}, {"id": "p1_032", "sent": "The committee has been _______ on announcing a decision, citing the need for further consultation.", "opts": ["A: slow", "B: reluctant", "C: hesitant", "D: uncertain"], "a": "C", "h": "HESITANT ON/ABOUT = unwilling to act quickly because of doubt or uncertainty (formal). SLOW ON is not standard here. RELUCTANT requires TO + infinitive, not ON. UNCERTAIN about is possible but less precise. HESITANT ON fits the collocation pattern tested here."}, {"id": "p1_033", "sent": "The changes to the tax system will have a direct _______ on the take-home pay of low-income workers.", "opts": ["A: impact", "B: bearing", "C: effect", "D: consequence"], "a": "C", "h": "EFFECT ON is the standard noun for a direct, measurable change produced by a cause — 'direct effect on pay'. IMPACT ON suggests a forceful, larger-scale change — less natural with 'direct'. BEARING ON means relevance to, not a change caused by. CONSEQUENCE is typically used in the plural and doesn't take ON in this way."}, {"id": "p1_034", "sent": "New evidence has _______ fresh doubt on the reliability of the eyewitness accounts used in the original trial.", "opts": ["A: raised", "B: thrown", "C: placed", "D: cast"], "a": "D", "h": "CAST DOUBT ON is the fixed idiom. The sentence uses 'fresh doubt' — the metaphor of casting (like casting a shadow or casting a spell) is specific to CAST. RAISED doubts is also standard but 'raised fresh doubt ON' is less idiomatic. THROWN and PLACED doubt are not standard collocations."}, {"id": "p1_035", "sent": "Several prominent academics _______ their concerns about the proposed changes to the curriculum.", "opts": ["A: voiced", "B: said", "C: spoke", "D: told"], "a": "A", "h": "VOICE means 'express publicly and formally'. SAID requires direct speech. SPOKE needs a different structure. TOLD requires a person as object. Which is the precise verb for formally and publicly expressing concerns?"}, {"id": "p1_036", "sent": "The medieval walls of the city have _______ remarkably well preserved despite centuries of conflict and neglect.", "opts": ["A: lasted", "B: remained", "C: kept", "D: continued"], "a": "B", "h": "REMAINED + adjective/adverb phrase is the standard formal construction for describing a continuing state. LASTED describes duration of time, not condition. KEPT requires a reflexive or object ('kept themselves'). CONTINUED requires a gerund or infinitive, not an adjective phrase."}, {"id": "p1_037", "sent": "Despite fierce opposition, the council _______ with its controversial redevelopment plan.", "opts": ["A: persisted", "B: proceeded", "C: continued", "D: advanced"], "a": "B", "h": "PROCEED WITH = continue with a plan despite difficulties (formal). PERSIST WITH is close but implies stubbornness/excess. CONTINUE WITH is less formal. ADVANCE WITH is not standard in this context. PROCEEDED WITH best fits the formal register."}, {"id": "p1_038", "sent": "The bursary scheme _______ students from disadvantaged backgrounds the opportunity to study abroad.", "opts": ["A: gives", "B: affords", "C: offers", "D: grants"], "a": "B", "h": "AFFORD someone something means 'provide in a way that makes something possible' — it's a formal register choice. GIVES and PROVIDES are more direct. GRANTS implies authority. The sentence uses 'opportunity' — which verb most precisely collocates with this noun in formal written English?"}, {"id": "p1_039", "sent": "The new planning restrictions were _______ in specifically to protect areas of outstanding natural beauty.", "opts": ["A: brought", "B: pushed", "C: written", "D: built"], "a": "A", "h": "BROUGHT IN means 'officially introduced' (for legislation or rules). WRITTEN IN means 'included in a document'. PUSHED THROUGH suggests force against opposition. BUILT IN means 'included as a feature'. Which specifically means 'enacted or introduced as official policy'?"}, {"id": "p1_040", "sent": "The study's conclusions _______ with those of earlier research, suggesting the findings are reliable.", "opts": ["A: correspond", "B: accord", "C: align", "D: tally"], "a": "D", "h": "TALLY WITH means match or agree when comparing figures, data or findings — specifically used for numerical or factual correspondence. CORRESPOND WITH is more general. ACCORD WITH is formal but used for opinions and principles, not findings. ALIGN WITH is more metaphorical. TALLY is the most precise for matching research findings or data."}, {"id": "p1_041", "sent": "Membership of the association has been _______ steadily, raising concerns about its long-term viability.", "opts": ["A: declining", "B: reducing", "C: shrinking", "D: lessening"], "a": "A", "h": "Think about formality and precision: all four verbs describe a decrease, but only one is the standard formal term for a slow, sustained downward trend in a measured quantity like membership or confidence."}, {"id": "p1_042", "sent": "She was _______ by the scale of the task ahead of her but determined not to show it.", "opts": ["A: nervous", "B: daunted", "C: frightened", "D: overwhelmed"], "a": "B", "h": "DAUNTED means discouraged or intimidated by the scale of something, but still functioning. NERVOUS implies anxiety. FRIGHTENED implies fear. OVERWHELMED implies you can't cope. The sentence says she was 'determined not to show it' — which word fits someone still coping?"}, {"id": "p1_043", "sent": "The construction work caused considerable _______ to commuters travelling through the city centre.", "opts": ["A: disturbance", "B: disruption", "C: interference", "D: inconvenience"], "a": "B", "h": "Think about the preposition: TO COMMUTERS. DISRUPTION TO a service or group of people is the standard collocation. DISTURBANCE is for noise or public order. INTERFERENCE takes a different preposition. INCONVENIENCE is too mild for construction work causing serious problems."}, {"id": "p1_044", "sent": "The spokesperson made it perfectly _______ that the company would not be accepting any further questions from the press.", "opts": ["A: known", "B: obvious", "C: clear", "D: apparent"], "a": "C", "h": "MADE IT CLEAR THAT is the dominant fixed phrase for communicating something explicitly and unambiguously. 'Made it perfectly clear' is the standard collocation. KNOWN works but lacks the adverb 'perfectly'. OBVIOUS and APPARENT suggest something visible or self-evident, not something being actively communicated."}, {"id": "p1_045", "sent": "Years of careful investment in youth development have finally begun to _______ results for the club.", "opts": ["A: produce", "B: generate", "C: yield", "D: deliver"], "a": "C", "h": "YIELD RESULTS is the precise formal and agricultural metaphor — investment 'yielding' results like a crop. This is especially natural with 'finally begun to yield', suggesting gradual productive outcome. PRODUCE and GENERATE results are also used but YIELD carries the specific connotation of patient effort finally bearing fruit."}, {"id": "p1_046", "sent": "The children were _______ to treat others with respect and to take responsibility for their actions.", "opts": ["A: raised", "B: taught", "C: brought up", "D: educated"], "a": "C", "h": "BROUGHT UP TO means 'instilled with values during childhood'. RAISED TO is primarily American English. TAUGHT TO and EDUCATED TO suggest formal instruction. Which British English phrase specifically describes values instilled through upbringing rather than schooling?"}, {"id": "p1_047", "sent": "The company was found to have systematically _______ its obligations under the terms of the contract.", "opts": ["A: broken", "B: infringed", "C: violated", "D: breached"], "a": "D", "h": "BREACH applies specifically to contracts, duties and legal obligations — to fail to fulfil them. VIOLATE applies to laws and rights. INFRINGE applies to rules and intellectual property. BREAK is general and informal. What is the most precise legal term for failing to meet contractual obligations?"}, {"id": "p1_048", "sent": "As the deadline approached, the team _______ themselves for what promised to be a gruelling final push.", "opts": ["A: prepared", "B: braced", "C: readied", "D: steeled"], "a": "D", "h": "STEELED means mentally hardened for something prolonged and difficult. BRACED means physically or mentally prepared for a sudden impact. PREPARED and READIED are general. Which word specifically suggests hardening your mind in advance of sustained effort?"}, {"id": "p1_049", "sent": "The report _______ an immediate debate about whether the current safeguards are fit for purpose.", "opts": ["A: launched", "B: caused", "C: ignited", "D: triggered"], "a": "D", "h": "TRIGGERED means set off automatically — like a mechanism. A report TRIGGERING a debate implies it was the direct, immediate cause that set it off. LAUNCHED suggests intention. CAUSED is generic. IGNITED is more dramatic and emotive — better for something described as a 'firestorm' than a 'debate'."}, {"id": "p1_050", "sent": "The application was _______ on the grounds that the proposed development would harm the local environment.", "opts": ["A: dismissed", "B: rejected", "C: overturned", "D: refused"], "a": "B", "h": "REJECTED ON THE GROUNDS THAT is the formal legal phrase meaning 'refused with stated reasons'. DISMISSED implies it wasn't taken seriously. REFUSED is more general. OVERTURNED means reversed a previous decision. Which fits a formal refusal with specific stated reasoning?"}, {"id": "p1_n01", "sent": "The storm _______ widespread damage to coastal properties, leaving thousands without power.", "opts": ["A: caused", "B: inflicted", "C: triggered", "D: wreaked"], "a": "D", "h": "WREAK DAMAGE/HAVOC = cause great destruction (formal/literary). CAUSE is too generic for C1. INFLICT collocates with suffering or pain on a person. TRIGGER implies setting something off. WREAKED DAMAGE is the most precise and formal collocate."}, {"id": "p1_n02", "sent": "Every summer, tourists from across the world _______ on this tiny Alpine village, transforming its quiet streets.", "opts": ["A: gather", "B: assemble", "C: converge", "D: collect"], "a": "C", "h": "All four words mean 'come together', but only one specifically means 'arrive from different directions towards a central point' and takes the preposition ON. Think about the movement pattern described."}, {"id": "p1_n03", "sent": "The new safety regulations _______ for all employees to undergo a full medical assessment before starting work.", "opts": ["A: ask", "B: demand", "C: call", "D: require"], "a": "C", "h": "All four verbs can mean 'need' or 'require', but only one forms a fixed phrasal verb with FOR in a regulatory context. The others cannot be followed by FOR in this construction."}, {"id": "p1_n04", "sent": "Visitors to the gallery could only _______ at the technical precision with which the miniatures had been painted.", "opts": ["A: astonish", "B: amaze", "C: fascinate", "D: marvel"], "a": "D", "h": "Three of these verbs require an object — someone IS astonished/amazed/fascinated BY something. Only one is used intransitively and takes the preposition AT. Think about the grammar pattern after the gap."}, {"id": "p1_n05", "sent": "The sculpture was constructed entirely from _______ materials found on local beaches, including driftwood, rope and rusted metal.", "opts": ["A: natural", "B: crude", "C: raw", "D: plain"], "a": "C", "h": "In the context of making something, one of these words is the standard technical term for unprocessed materials used as inputs. Another means unrefined (oil), another means from nature, another means simple. Which is the fixed compound noun?"}, {"id": "p1_n06", "sent": "Her argument was _______ on the assumption that consumer behaviour would remain stable, which proved to be incorrect.", "opts": ["A: built", "B: grounded", "C: founded", "D: based"], "a": "D", "h": "BASED ON is the standard phrase for an argument or conclusion resting on an assumption or evidence. FOUNDED ON is also used but more formal and less common in this context. GROUNDED IN is used for theoretical or philosophical bases. BUILT ON is more metaphorical and informal. BASED ON is the natural choice in academic and analytical writing."}, {"id": "p1_n07", "sent": "_______ its controversial subject matter, the documentary has been praised by critics for its balanced approach.", "opts": ["A: Despite", "B: Although", "C: Nevertheless", "D: Notwithstanding"], "a": "D", "h": "NOTWITHSTANDING = in spite of (formal/academic register). Like DESPITE, it is a preposition followed by a noun phrase. ALTHOUGH requires a full clause. NEVERTHELESS is an adverb. NOTWITHSTANDING is the more advanced item tested at C1/C2."}, {"id": "p1_n08", "sent": "After decades of denial, the truth about what had happened finally _______ when a whistleblower came forward.", "opts": ["A: appeared", "B: emerged", "C: arose", "D: surfaced"], "a": "D", "h": "SURFACED specifically means came to the surface after being buried or hidden — the metaphor of something rising from underwater. APPEARED is too general. EMERGED is close, but lacks the connotation of something deliberately concealed. AROSE implies coming into existence, not coming to light. SURFACED best captures the truth being hidden and then revealed."}, {"id": "p1_n09", "sent": "The project ran to a final cost _______ excess of twelve million pounds, almost double the original estimate.", "opts": ["A: above", "B: over", "C: beyond", "D: in"], "a": "D", "h": "Only one of these options completes the fixed formal phrase meaning 'more than' when used with a specific preposition + 'excess of'. The phrase is common in financial and official writing."}, {"id": "p1_n10", "sent": "The studio is open to the public by _______, and visitors are asked to contact the artist a week in advance.", "opts": ["A: schedule", "B: booking", "C: timetable", "D: appointment"], "a": "D", "h": "All four words relate to planning a visit, but only one completes the fixed formal phrase meaning 'only when a specific time has been arranged in advance'. It often appears on business signs and official notices."}, {"id": "p1_n11", "sent": "The work placement _______ students with an invaluable opportunity to apply theory in a real professional context.", "opts": ["A: gives", "B: offers", "C: provides", "D: grants"], "a": "C", "h": "All four verbs can mean 'give', but only one collocates with 'someone WITH something' as its standard grammatical pattern in formal English. The others take a direct object without WITH."}, {"id": "p1_n12", "sent": "Andrew is always _______ to know where his sculptures end up and regularly corresponds with buyers years after a sale.", "opts": ["A: fond", "B: keen", "C: desire", "D: wish"], "a": "B", "h": "Consider what grammatical structure follows the gap — there is an infinitive (TO KNOW). Which of these four words can be followed directly by a TO-infinitive in this sense? The others require different structures."}, {"id": "p1_n13", "sent": "Despite its extreme conditions, caving has an excellent safety _______, provided you go with a qualified guide.", "opts": ["A: report", "B: history", "C: standard", "D: record"], "a": "D", "h": "All four nouns relate to past performance, but only one completes the fixed noun phrase 'safety ___' meaning a documented history of safe practice. Think about what word follows 'track' in a similar expression."}, {"id": "p1_n14", "sent": "To reach the cave's most spectacular chamber, visitors must _______ through an underground river that reaches waist height.", "opts": ["A: amble", "B: wade", "C: stroll", "D: trek"], "a": "B", "h": "All four words describe moving through a space, but only one specifically means moving with effort through deep water or another thick substance. The others describe walking on solid ground."}, {"id": "p1_n15", "sent": "The proposals were _______ on the grounds that they had been prepared without adequate consultation with stakeholders.", "opts": ["A: dismissed", "B: withdrawn", "C: rejected", "D: overruled"], "a": "C", "h": "REJECTED ON THE GROUNDS THAT is the established formal phrase for a decision refused with stated reasons after consideration. DISMISSED suggests the proposal was not taken seriously. WITHDRAWN means removed by the proposer. OVERRULED means a higher authority reversed a decision already made."}, {"id": "p1_051", "sent": "After lengthy negotiations, the union and management finally _______ a compromise that both sides could accept.", "opts": ["A: made", "B: reached", "C: struck", "D: found"], "a": "B", "h": "REACHED A COMPROMISE is the standard collocate — the same as 'reach an agreement' or 'reach a conclusion'. STRUCK A COMPROMISE is less common than 'struck a deal'. MADE A COMPROMISE is non-standard — you 'make concessions' not 'make a compromise'. FOUND A COMPROMISE is informal."}, {"id": "p1_052", "sent": "The undercover investigation _______ a pattern of systematic misconduct that had been hidden from regulators for years.", "opts": ["A: revealed", "B: exposed", "C: discovered", "D: uncovered"], "a": "D", "h": "UNCOVERED is the most precise verb for an investigation digging up something deliberately hidden — the 'un-' prefix mirrors the act of removing a cover. EXPOSED focuses on revealing to public view. REVEALED is general. DISCOVERED implies stumbling upon something, not the active investigative work implied here."}, {"id": "p1_053", "sent": "The announcement of the redundancies _______ a wave of anger among staff who felt they had been kept in the dark.", "opts": ["A: produced", "B: caused", "C: sparked", "D: prompted"], "a": "C", "h": "SPARKED A WAVE OF ANGER is the fixed journalistic collocation — the metaphor of a spark setting off a larger reaction. PRODUCED and CAUSED are too neutral for the sudden, emotional reaction described. PROMPTED suggests a more measured, rational response — not a wave of anger."}, {"id": "p1_054", "sent": "Despite repeated setbacks, the team _______ their determination to complete the project on schedule.", "opts": ["A: retained", "B: maintained", "C: preserved", "D: sustained"], "a": "B", "h": "All four mean 'kept something going over time'. But only one is the standard collocate with abstract nouns like 'determination', 'composure', 'standards' and 'position'. Which is the natural choice when describing sustained effort or attitude?"}, {"id": "p1_055", "sent": "The programme _______ participants with a unique opportunity to work alongside leading researchers in their field.", "opts": ["A: gives", "B: offers", "C: provides", "D: affords"], "a": "C", "h": "PROVIDES someone WITH something is the fixed grammatical pattern — 'provide X with Y'. GIVES and OFFERS take a direct object without WITH: 'gives participants an opportunity'. AFFORDS is also possible but more literary. Only PROVIDES requires the WITH structure shown in the sentence."}, {"id": "p1_056", "sent": "The company's restructuring plan _______ for the closure of three of its least profitable sites.", "opts": ["A: asks", "B: provides", "C: calls", "D: makes"], "a": "B", "h": "All four can be followed by FOR. 'Call for' means demand or require. 'Make for' means lead to. 'Ask for' is informal. But one means 'formally stipulate that something shall happen' — used in legal documents and official plans to describe what a provision includes."}, {"id": "p1_057", "sent": "Several witnesses _______ to having seen the suspect near the scene in the hours before the incident.", "opts": ["A: admitted", "B: testified", "C: claimed", "D: confirmed"], "a": "B", "h": "All four relate to making a formal statement. But only one is specifically used for statements made under oath or in an official inquiry, and takes the structure '___ to + gerund' in legal contexts."}, {"id": "p1_058", "sent": "The club has a proven _______ of developing young talent into world-class performers.", "opts": ["A: history", "B: tradition", "C: record", "D: background"], "a": "C", "h": "A PROVEN RECORD is the fixed collocation — 'proven record' means documented and verified past performance. A 'proven history' is non-standard. A 'proven tradition' is also not used. BACKGROUND refers to context or experience, not documented performance."}, {"id": "p1_059", "sent": "The new findings have _______ into question the previously accepted theory about the origins of the settlement.", "opts": ["A: thrown", "B: brought", "C: called", "D: put"], "a": "C", "h": "CALL INTO QUESTION is the established fixed phrase meaning 'cause to be doubted'. 'Bring into question' and 'throw into question' are sometimes heard but are non-standard. 'Put into question' is not used. CALL is the only verb that forms this phrase correctly in formal English."}, {"id": "p1_060", "sent": "The new policy represents a significant _______ from the government's long-standing approach to social housing.", "opts": ["A: deviation", "B: departure", "C: diversion", "D: divergence"], "a": "B", "h": "All four describe moving away from something established. 'Deviation' implies wrongdoing; 'diversion' is a detour; 'divergence' is paths gradually separating. Which is the standard formal noun for a deliberate change in direction from an existing policy?"}, {"id": "p1_061", "sent": "The judge found that the defendant had acted in _______ faith and the charges were subsequently reduced.", "opts": ["A: honest", "B: genuine", "C: good", "D: true"], "a": "C", "h": "This is a fixed legal expression. Three of these adjectives mean 'sincerely', but only one forms the established phrase used in law and formal English meaning 'with honest intentions and no intention to deceive'."}, {"id": "p1_062", "sent": "The committee's recommendations were _______ in line with what the independent reviewers had suggested.", "opts": ["A: broadly", "B: generally", "C: largely", "D: mostly"], "a": "A", "h": "BROADLY IN LINE WITH is the established formal phrase. 'Generally in line with' and 'largely in line with' are sometimes used but 'broadly' is the natural collocate with 'in line with' in official and academic writing. MOSTLY is too informal for this register."}, {"id": "p1_063", "sent": "The company's failure to disclose the information was found to be in _______ of its contractual obligations.", "opts": ["A: violation", "B: contravention", "C: breach", "D: defiance"], "a": "C", "h": "All describe breaking a rule. 'In violation of' applies to laws; 'in contravention of' to regulations; 'in defiance of' implies deliberate challenge to authority. Which is the specific legal term that collocates with 'contractual obligations' in the phrase 'in ___ of'?"}, {"id": "p1_064", "sent": "Production at the factory was _______ to a halt after inspectors discovered serious safety violations.", "opts": ["A: pulled", "B: forced", "C: brought", "D: ground"], "a": "C", "h": "BROUGHT TO A HALT means stopped suddenly and completely. GROUND TO A HALT implies a slow, mechanical, grinding stop — inappropriate for a sudden discovery. PULLED TO A HALT is not standard. FORCED TO A HALT is not standard — 'forced to stop' would be used instead."}, {"id": "p1_065", "sent": "The council has _______ a new strategy aimed at reducing traffic congestion in the city centre over the next decade.", "opts": ["A: implemented", "B: introduced", "C: adopted", "D: adapted"], "a": "C", "h": "'Adapted' means modified something existing. 'Implemented' means put into practice. 'Introduced' means brought in for the first time. Which verb specifically means 'formally decided to use' a plan or strategy — the moment of official acceptance before implementation?"}, {"id": "p1_066", "sent": "The scheme was _______ down after just six months due to a combination of poor management and inadequate funding.", "opts": ["A: shut", "B: closed", "C: wound", "D: turned"], "a": "C", "h": "'Shut down' and 'closed down' mean operations stopped. 'Turned down' means rejected. Which phrasal verb specifically means 'brought an organisation to an orderly end', as in a formal winding-up process?"}, {"id": "p1_067", "sent": "There is growing _______ among climate scientists that the pace of change has been consistently underestimated.", "opts": ["A: agreement", "B: unity", "C: consensus", "D: conformity"], "a": "C", "h": "'Unity' and 'conformity' relate to behaviour, not shared opinion. 'Agreement' is general. Which word specifically refers to a collective view reached by a professional or scientific community — standard in academic and policy writing?"}, {"id": "p1_068", "sent": "The government is _______ pressure to reform the planning system following a series of high-profile failures.", "opts": ["A: facing", "B: under", "C: experiencing", "D: meeting"], "a": "B", "h": "The gap is followed by PRESSURE with no preposition. Which option forms a fixed two-word phrase — '___ pressure' — that is the standard formal expression for being in a pressured situation?"}, {"id": "p1_069", "sent": "The election result was _______ close, with the winning candidate securing just forty-three more votes than her rival.", "opts": ["A: remarkably", "B: extremely", "C: incredibly", "D: agonisingly"], "a": "D", "h": "AGONISINGLY CLOSE is the precise collocation for a result that was so nearly equal that it caused pain or suspense — 'forty-three votes' makes this agonising. REMARKABLY, EXTREMELY and INCREDIBLY close are generic intensifiers that don't capture the near-miss drama implied by such a tiny margin."}, {"id": "p1_070", "sent": "The documentary makers were _______ access to areas of the prison that had never before been filmed.", "opts": ["A: allowed", "B: given", "C: granted", "D: permitted"], "a": "C", "h": "All four mean 'allowed to have'. But in formal contexts — access, visas, licences, permissions — one verb specifically implies official authorisation from a body with the power to bestow it. Which one is used when a formal authority gives something it has the power to withhold?"}, {"id": "p1_071", "sent": "The safety inspectors found the equipment to be wholly _______ for use in high-temperature environments.", "opts": ["A: improper", "B: unfit", "C: inadequate", "D: unsuitable"], "a": "D", "h": "'Improper' relates to behaviour or procedure; 'unfit' is used for people or physical condition; 'inadequate' means insufficient in quantity or quality. Which adjective specifically means 'not appropriate for a particular purpose'?"}, {"id": "p1_072", "sent": "The original ruling was _______ by the Court of Appeal after it was found that key evidence had been withheld.", "opts": ["A: reversed", "B: cancelled", "C: overturned", "D: quashed"], "a": "C", "h": "OVERTURNED is the standard legal term for a higher court cancelling a lower court's decision. QUASHED is used specifically for convictions, not rulings. REVERSED means changed to the opposite — but a ruling isn't simply reversed, it's set aside. CANCELLED is too general and informal for legal contexts."}, {"id": "p1_073", "sent": "The charity's accounts had been _______ by an independent auditor, who confirmed all funds had been properly managed.", "opts": ["A: approved", "B: verified", "C: audited", "D: certified"], "a": "D", "h": "CERTIFIED means formally confirmed as meeting a required standard by an authorised body — the most precise term for official sign-off on financial accounts. APPROVED is too general. VERIFIED means checked for accuracy but without the formal credential that CERTIFIED carries. AUDITED means examined — which is already described in the sentence."}, {"id": "p1_074", "sent": "The new president's message of economic renewal clearly _______ with working-class voters who had felt left behind.", "opts": ["A: connected", "B: landed", "C: registered", "D: resonated"], "a": "D", "h": "RESONATED WITH means had deep emotional or intellectual meaning for — like a sound wave vibrating in harmony. CONNECTED WITH is possible but weaker. LANDED is informal slang. REGISTERED WITH means was noticed or acknowledged, not felt deeply. RESONATED specifically captures the emotional depth described."}, {"id": "p1_075", "sent": "She demonstrated a _______ command of the subject that belied her relative lack of formal training.", "opts": ["A: firm", "B: tight", "C: strong", "D: solid"], "a": "C", "h": "STRONG COMMAND is the standard collocation — 'a strong command of a subject/language'. FIRM command is less common and implies holding on. TIGHT command suggests controlling something. SOLID command is possible but informal. STRONG is the natural adjective for intellectual mastery."}, {"id": "p1_076", "sent": "The new guidelines _______ for the mandatory reporting of any incident involving patient safety within twenty-four hours.", "opts": ["A: allow", "B: call", "C: provide", "D: account"], "a": "C", "h": "'Call for' means demand; 'allow for' means make room for; 'account for' means explain. Which verb means 'formally stipulate that something must happen' — used in legal documents to describe what a provision includes or requires?"}, {"id": "p1_077", "sent": "The committee took the unprecedented step of publishing its findings before _______ to the minister.", "opts": ["A: referring", "B: reporting", "C: submitting", "D: presenting"], "a": "B", "h": "All involve sending information upwards. But one verb is specifically used for a formal body giving an official account of its findings to a superior — think of what a subcommittee or working group does when it formally addresses those it answers to."}, {"id": "p1_078", "sent": "The two approaches are similar in _______ respects but differ fundamentally in their underlying theoretical assumptions.", "opts": ["A: many", "B: several", "C: certain", "D: various"], "a": "C", "h": "In the phrase 'similar in ___ respects but different in others', the missing word implies a limited, specific set of ways — not a large or varied number. Which word means 'particular' or 'specific' — implying the speaker has particular ones in mind?"}, {"id": "p1_079", "sent": "The negotiations had been going well _______ a last-minute objection from the smaller partner derailed the entire process.", "opts": ["A: before", "B: when", "C: as", "D: until"], "a": "D", "h": "'As' and 'when' describe simultaneous events. 'Before' describes sequence. Which conjunction specifically marks the point at which a previously positive situation came to an end — the moment that changed everything?"}, {"id": "p1_080", "sent": "The audit _______ that the organisation had been systematically understating its liabilities for at least five years.", "opts": ["A: concluded", "B: established", "C: found", "D: determined"], "a": "C", "h": "FOUND THAT is the standard neutral verb for reporting what an audit or inquiry revealed. CONCLUDED suggests a final judgement after deliberation. ESTABLISHED implies proving something beyond doubt. DETERMINED implies a decision was made. An audit 'finding' something is the most natural and neutral formulation."}, {"id": "p1_081", "sent": "_______ its growing international reputation, the festival remains relatively unknown at home.", "opts": ["A: Despite", "B: Although", "C: Whereas", "D: Notwithstanding"], "a": "D", "h": "NOTWITHSTANDING (before noun phrase) = despite. DESPITE would also work, but NOTWITHSTANDING is the formal register tested at C1. ALTHOUGH requires a full clause (verb needed). WHEREAS signals contrast between clauses."}, {"id": "p1_082", "sent": "It took her several weeks to _______ into her new role, but she is now performing with considerable confidence.", "opts": ["A: ease", "B: grow", "C: settle", "D: slip"], "a": "C", "h": "SETTLE INTO A ROLE is the standard phrasal verb meaning 'become comfortable and effective in a new position'. EASE INTO is a process; you ease into something gradually but it implies the initial period of adjustment, not the established state. GROW INTO is for growing in competence over time. SLIP INTO suggests something passive or accidental."}, {"id": "p1_083", "sent": "The scheme is expected to _______ significant savings for taxpayers over the next five years.", "opts": ["A: make", "B: produce", "C: achieve", "D: deliver"], "a": "D", "h": "DELIVER SAVINGS is the dominant policy and business collocate. MAKE savings is informal. PRODUCE savings is possible but less standard. ACHIEVE savings implies difficulty rather than systematic generation."}, {"id": "p1_084", "sent": "The two experiments yielded contradictory results, which _______ a stark contrast with the team's earlier findings.", "opts": ["A: formed", "B: presented", "C: provided", "D: made"], "a": "A", "h": "FORMED A CONTRAST is natural when two things are inherently different from each other — you say the results 'formed a contrast'. PRESENTED A CONTRAST and PROVIDED A CONTRAST are less idiomatic. MADE A CONTRAST is less standard when used with 'with' — you more naturally 'make a contrast between' things."}, {"id": "p1_085", "sent": "The documentary makers were determined to _______ justice to the complexity of the story they were telling.", "opts": ["A: make", "B: render", "C: pay", "D: do"], "a": "D", "h": "'___ justice to something' is a fixed phrase meaning 'represent it fairly and fully'. Only one verb completes this idiom correctly. The others can follow different patterns but not this one."}];
const P2 = [{"id": "p2_001", "sent": "The committee reached a decision _______ which all members could agree.", "a": "on", "h": "Which preposition follows 'decision' when you specify what it's about? Think: a decision ___ something."}, {"id": "p2_002", "sent": "_______ having studied for weeks, she still found the exam extremely difficult.", "a": "despite", "h": "Which preposition or conjunction introduces a concessive clause followed by a gerund? ___ having studied..."}, {"id": "p2_003", "sent": "The results were _______ better than expected, surprising even the most optimistic researchers.", "a": "far", "h": "Which single word intensifies a comparative adjective? ___ better, ___ worse, ___ more interesting."}, {"id": "p2_004", "sent": "It was not _______ she arrived home that she realised her keys were missing.", "a": "until", "h": "Fixed negative time structure: 'It was not ___ she arrived that she realised.' Which conjunction?"}, {"id": "p2_005", "sent": "The new law, _______ comes into force next month, will affect millions of workers.", "a": "which", "h": "Which relative pronoun introduces a non-defining relative clause? Remember: 'that' cannot be used with commas."}, {"id": "p2_006", "sent": "She speaks French so fluently _______ she could easily pass for a native speaker.", "a": "that", "h": "What word introduces the result clause in 'so fluently ___ she could pass for a native speaker'?"}, {"id": "p2_007", "sent": "The proposal was met _______ considerable resistance from local residents.", "a": "with", "h": "Which preposition completes 'met ___ resistance'? Think about what you 'meet with' in formal English."}, {"id": "p2_008", "sent": "_______ few people realise is that the brain consumes twenty percent of the body's total energy.", "a": "what", "h": "Which question word introduces a nominal clause as subject? '___ few people realise is that...'"}, {"id": "p2_009", "sent": "The conference will go _______ regardless of whether the keynote speaker is available.", "a": "ahead", "h": "Which particle completes the phrasal verb meaning 'proceed as planned'? The conference will go ___."}, {"id": "p2_010", "sent": "_______ all her faults, she remains one of the most effective leaders the organisation has had.", "a": "for", "h": "Which preposition completes the fixed concessive phrase '___ all her faults'? Equivalent to 'despite'."}, {"id": "p2_011", "sent": "The CEO refused to comment, _______ which point the journalist ended the interview.", "a": "at", "h": "Which preposition completes the fixed relative phrase '___ which point'? Think about timing."}, {"id": "p2_012", "sent": "Had the engineers spotted the fault earlier, the accident _______ have been avoided.", "a": "could", "h": "This is a third conditional with inversion. What modal verb fits? 'Had they spotted it, the accident ___ have been avoided.'"}, {"id": "p2_013", "sent": "The discovery was all _______ more remarkable given the limited resources the team had.", "a": "the", "h": "Fixed intensifier phrase: 'all ___ more remarkable'. Which article completes it?"}, {"id": "p2_014", "sent": "The scheme is expected _______ create over two thousand permanent jobs in the region.", "a": "to", "h": "Passive reporting structure: 'is expected ___ create'. Which word links the passive verb to the infinitive?"}, {"id": "p2_015", "sent": "She was _______ the impression that the meeting had been cancelled, which is why she didn't attend.", "a": "under", "h": "Fixed prepositional phrase for believing something (possibly incorrectly): '___ the impression that'. Which preposition?"}, {"id": "p2_016", "sent": "_______ no circumstances should personal data be shared with third parties without consent.", "a": "under", "h": "This sentence uses negative fronting. Which two-word phrase meaning 'never' completes '___ no circumstances should...'?"}, {"id": "p2_017", "sent": "The new model differs _______ its predecessor in several important respects.", "a": "from", "h": "Which preposition follows 'differs' when comparing two things? The new model differs ___ its predecessor."}, {"id": "p2_018", "sent": "Much _______ everyone's surprise, the least-fancied team won the championship.", "a": "to", "h": "Fixed exclamatory phrase: 'Much ___ everyone's surprise'. Which preposition?"}, {"id": "p2_019", "sent": "The report makes _______ clear that further investment is urgently needed.", "a": "it", "h": "Anticipatory structure: 'makes ___ clear that'. Which pronoun acts as a dummy object here?"}, {"id": "p2_020", "sent": "She had no _______ but to accept the terms imposed by the new agreement.", "a": "choice/option", "h": "Fixed phrase of compulsion: 'had no ___ but to accept'. Which noun fits?"}, {"id": "p2_021", "sent": "The evidence lends considerable _______ to the theory that sleep deprivation impairs judgement.", "a": "weight", "h": "Which noun collocates with 'lend' and 'to' to mean 'strengthen or support a theory'? Lend ___ to."}, {"id": "p2_022", "sent": "By the time the rescue team arrived, the survivors _______ been waiting for over twenty hours.", "a": "had", "h": "What auxiliary verb is needed? 'By the time they arrived, the survivors ___ been waiting for hours.' — Past perfect."}, {"id": "p2_023", "sent": "_______ is often the case with complex legislation, the new law has had unintended consequences.", "a": "as", "h": "Fixed comparative clause: '___ is often the case with'. Which word (not 'like') introduces a clause of comparison?"}, {"id": "p2_024", "sent": "The government has been accused of turning a blind _______ to corruption at the highest levels.", "a": "eye", "h": "Which body part completes the fixed idiom 'turning a blind ___ to corruption'?"}, {"id": "p2_025", "sent": "No _______ how hard she tried, she could not persuade the committee to change its decision.", "a": "matter", "h": "Fixed concessive phrase: 'No ___ how hard she tried'. Which noun?"}, {"id": "p2_026", "sent": "The new regulations come _______ effect from the first of January.", "a": "into", "h": "Which preposition completes 'come ___ effect'? Think: the regulations came into ___."}, {"id": "p2_027", "sent": "The evidence points _______ the conclusion that the fire was started deliberately.", "a": "to", "h": "Which preposition follows 'points' when evidence suggests something? The evidence points ___ the conclusion."}, {"id": "p2_028", "sent": "It goes _______ saying that honesty is the foundation of any trusting relationship.", "a": "without", "h": "Fixed idiom meaning 'is so obvious it doesn't need stating'. Which preposition completes 'goes ___ saying'?"}, {"id": "p2_029", "sent": "The professor was held _______ high regard by colleagues across the field.", "a": "in", "h": "Fixed phrase: 'held ___ high regard'. Which preposition?"}, {"id": "p2_030", "sent": "_______ the fact that she had very little experience, she handled the crisis with remarkable skill.", "a": "given", "h": "Which word introduces a concessive clause meaning 'considering' or 'taking into account'?"}, {"id": "p2_031", "sent": "She is _______ no means the most experienced candidate, but she is by far the most enthusiastic.", "a": "by", "h": "Fixed emphatic negative: '___ no means'. Which two-word phrase meaning 'not at all'?"}, {"id": "p2_032", "sent": "The longer the problem goes unaddressed, _______ more difficult it becomes to find a solution.", "a": "the", "h": "Parallel comparative structure: 'The longer X, ___ more difficult Y'. Which article?"}, {"id": "p2_033", "sent": "The agreement was signed _______ the presence of senior officials from both governments.", "a": "in", "h": "Fixed phrase: 'signed ___ the presence of officials'. Which preposition?"}, {"id": "p2_034", "sent": "_______ being a talented musician, she is also a published author and accomplished painter.", "a": "besides/as well as", "h": "Which word (or two-word phrase) means 'in addition to' and takes a gerund? ___ being a musician, she is also..."}, {"id": "p2_035", "sent": "The exhibition, _______ runs until the end of November, has attracted over fifty thousand visitors.", "a": "which", "h": "Which relative pronoun introduces a non-defining clause? The exhibition, ___ runs until November..."}, {"id": "p2_036", "sent": "She was at a loss _______ to what she should do next, having never faced such a situation.", "a": "as", "h": "Fixed phrase: 'at a loss ___ to what she should do'. Which preposition?"}, {"id": "p2_037", "sent": "The artist drew _______ from her childhood experiences growing up in rural Ireland.", "a": "inspiration", "h": "Which noun collocates with 'drew' and 'from' to describe a creative source? She drew ___ from her childhood."}, {"id": "p2_038", "sent": "He behaved _______ if he had never met her, which made the situation extremely awkward.", "a": "as", "h": "Which word introduces an unreal comparison? He behaved ___ if he had never met her."}, {"id": "p2_039", "sent": "_______ she had not eaten anything since breakfast, she showed no signs of fatigue.", "a": "although/even though/though", "h": "Which concessive conjunction introduces a contrast clause? ___ she had not eaten, she showed no fatigue."}, {"id": "p2_040", "sent": "The new bridge will _______ doubt become a landmark feature of the city's skyline.", "a": "without", "h": "Fixed adverbial phrase meaning 'certainly'. It will ___ doubt become a landmark. Which preposition?"}, {"id": "p2_041", "sent": "The study found _______ evidence to suggest a link between screen time and poor sleep quality.", "a": "little/no/some", "h": "Which quantifier fits? The study found ___ evidence — think about what the study likely concluded."}, {"id": "p2_042", "sent": "The theatre has been undergoing major renovations, _______ is why performances have been cancelled.", "a": "which", "h": "Which relative pronoun refers back to the whole previous clause? The theatre has been renovating, ___ is why..."}, {"id": "p2_043", "sent": "On _______ of the company, I would like to thank everyone who contributed to this project.", "a": "behalf", "h": "Fixed formal phrase: 'On ___ of the company'. Which noun means 'representing' or 'in the name of'?"}, {"id": "p2_044", "sent": "The minister was asked to account _______ the discrepancies in the budget report.", "a": "for", "h": "Which preposition follows 'account' in the phrasal verb meaning 'explain or justify'? Asked to account ___ the discrepancies."}, {"id": "p2_045", "sent": "The new policy came _______ force on the first day of the new financial year.", "a": "into", "h": "Which preposition completes 'came ___ force'? A synonym of 'come into effect' for laws."}, {"id": "p2_n01", "sent": "When _______ comes to managing complex budgets, experience counts for far more than formal qualifications.", "a": "it", "h": "Fixed phrase — identifies the pronoun in a common idiomatic construction meaning 'regarding'."}, {"id": "p2_n02", "sent": "The building has undergone significant renovation. What's _______, the work was completed three months ahead of schedule.", "a": "more", "h": "Fixed discourse marker meaning 'in addition to that / furthermore'. It adds a further, more surprising point."}, {"id": "p2_n03", "sent": "The discovery was all the _______ remarkable given that the team had been working with extremely limited funding.", "a": "more", "h": "Fixed intensifier phrase: 'all the ___ + adjective' meaning 'even more so because of the circumstances'."}, {"id": "p2_n04", "sent": "No sooner had the prime minister announced his resignation _______ the speculation about his successor began.", "a": "than", "h": "Fixed correlative conjunction. 'No sooner...___' always pairs with one specific word — NOT 'when' or 'before'."}, {"id": "p2_n05", "sent": "_______ the time investigators arrived at the scene, most of the evidence had already been removed.", "a": "by", "h": "Preposition that introduces a time deadline or reference point — the moment at which another action was already complete."}, {"id": "p2_n06", "sent": "The discovery led to a reassessment of existing theories, which _______ turn prompted a series of new research projects.", "a": "in", "h": "Fixed phrase meaning 'as a consequence / subsequently'. Always appears between a subject and 'turn'."}, {"id": "p2_n07", "sent": "As _______ as Andrew can tell, none of the materials he collects are subject to any form of legal protection.", "a": "far", "h": "Fixed phrase: 'as ___ as X can tell' = 'according to what X knows or can judge'. Don't confuse with 'as long as'."}, {"id": "p2_n08", "sent": "The researchers found that early humans had begun to make _______ of stone tools nearly a million years earlier than assumed.", "a": "use", "h": "Fixed noun in the phrase 'make ___ of' meaning 'utilise'. The noun is always singular and uncountable in this expression."}, {"id": "p2_n09", "sent": "_______ a result of the merger, over two thousand jobs are expected to be relocated to the company's regional offices.", "a": "as", "h": "Fixed prepositional phrase of cause. Always begins with this word to introduce a consequence."}, {"id": "p2_n10", "sent": "Up to this point, the talks had been productive. _______ this point, however, the negotiations broke down entirely.", "a": "at", "h": "Preposition used with 'this point' to mean 'at this moment / stage'. Different prepositions create different meanings — 'up to', '___ this point', 'from this point'."}, {"id": "p2_n11", "sent": "Every expert consulted had _______ own interpretation of the data, making it difficult to reach any consensus.", "a": "their", "h": "Possessive pronoun agreeing with 'every expert'. Though singular in subject, the pronoun that follows is conventionally plural in modern English."}, {"id": "p2_n12", "sent": "Before deciding _______ of the available routes to take, the team spent three days studying satellite imagery of the terrain.", "a": "which", "h": "Interrogative/relative pronoun used when choosing between a defined set of options. Not 'what' — 'what' is for open-ended questions; '___ of the available routes' implies a specific limited set."}, {"id": "p2_n13", "sent": "_______ the committee been given more time to review the proposal, their conclusions might have been very different.", "a": "had", "h": "Inverted conditional auxiliary — formal/written alternative to 'IF the committee HAD been given'. The auxiliary moves to the front, replacing 'if'."}, {"id": "p2_n14", "sent": "The government can barely afford to maintain existing infrastructure, _______ alone fund entirely new projects.", "a": "let", "h": "Fixed phrase meaning 'much less / never mind'. Used after a negative statement to introduce something even more extreme."}, {"id": "p2_n15", "sent": "The planning application was refused _______ the grounds that the proposed building would obstruct the view of a listed structure.", "a": "on", "h": "Preposition in the fixed legal/formal phrase meaning 'because of / citing as the reason'. Always followed by 'the grounds that'."}, {"id": "p2_n16", "sent": "She lowered her voice _______ as not to disturb the other guests who were still sleeping.", "a": "so", "h": "Fixed phrase of purpose: 'so ___ to + infinitive' = in order not to. The missing word completes the two-word conjunction."}, {"id": "p2_n17", "sent": "The meeting will go ahead _______ or not all members are able to attend.", "a": "whether", "h": "Fixed conjunction introducing a condition that applies regardless of two alternatives. Not 'if' — 'if or not' is not standard."}, {"id": "p2_n18", "sent": "She had hardly sat down at her desk _______ the phone rang for the third time that morning.", "a": "when", "h": "Fixed correlative: 'hardly...___'. Not 'than' — that pairs with 'no sooner'. Which word completes the 'hardly had X done Y ___ Z happened' structure?"}, {"id": "p2_n19", "sent": "The chairman called for a short recess, _______ which point both sides took the opportunity to consult their legal teams.", "a": "at", "h": "Prepositional phrase: '___ which point' = at that moment in time. Which preposition locates a point in time or in a sequence of events?"}, {"id": "p2_n20", "sent": "The fire exits must be kept clear at all times _______ order to comply with health and safety regulations.", "a": "in", "h": "Fixed phrase of purpose: 'in ___ to + infinitive'. The missing word is the first of two that form a common formal conjunction of purpose."}, {"id": "p2_n21", "sent": "The new system is faster and more reliable. _______ is more, it costs significantly less to maintain than its predecessor.", "a": "what", "h": "Fixed discourse marker used to add a further, even more impressive point. It introduces something that strengthens the previous statement."}, {"id": "p2_n22", "sent": "_______ goes without saying that all employees are expected to maintain confidentiality regarding client information.", "a": "it", "h": "Fixed phrase: '___ goes without saying that'. The missing word is the dummy subject that begins this idiomatic expression."}, {"id": "p2_n23", "sent": "The exhibition features works by several major Impressionist painters, _______ as Monet, Renoir and Pissarro.", "a": "such", "h": "Fixed phrase for giving examples. Unlike 'for example' or 'for instance', this form integrates directly into the sentence without a comma or pause before the examples."}, {"id": "p2_n24", "sent": "_______ the whole, the reforms have been welcomed by businesses, though some concerns about implementation remain.", "a": "on", "h": "Fixed phrase: '___ the whole' = generally speaking / mostly. It begins with a preposition and is used to introduce a broad, qualified generalisation."}, {"id": "p2_n25", "sent": "The task is _______ no means straightforward and will require considerable expertise and planning to complete successfully.", "a": "by", "h": "Fixed phrase: '___ no means' = not at all. It introduces a strong negative emphasis. Which preposition begins this idiomatic intensifier?"}, {"id": "p2_n26", "sent": "You are welcome to use the equipment __
